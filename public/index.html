<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WWDC26 開發者筆記</title>
<style>
  :root{
    --bg:#FAFAF7; --surface:#FFFFFF; --ink:#18181B; --muted:#71717A; --faint:#A1A1AA;
    --line:#E8E8E3; --line-strong:#DBDBD4;
    --accent:#3B5BDB; --accent-soft:#EEF1FC;
    --star:#D9881A; --star-soft:#FBF1DD; --star-ink:#8a5a10;
    --claim:#0F6E56; --claim-soft:#E1F5EE; --claim-ink:#0a513f;
    --chip-bg:#F4F4F0; --track:#EDEDE8; --ink-soft:#27272A; --ink-mute:#3f3f46;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono","Menlo","Cascadia Code",monospace;
    --ui:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang TC","Noto Sans TC",system-ui,sans-serif;
  }
  /* Dark palette — applied when user picks dark, or by system when not forced light. */
  :root[data-theme="dark"]{
    --bg:#0E0E10; --surface:#191A1D; --ink:#ECECEE; --muted:#9A9AA2; --faint:#6B6B73;
    --line:#27272B; --line-strong:#37373D;
    --accent:#8AA0F2; --accent-soft:#1C2138;
    --star:#E0A23C; --star-soft:#332710; --star-ink:#E8B765;
    --claim:#3FB593; --claim-soft:#102A22; --claim-ink:#6FD3B0;
    --chip-bg:#232327; --track:#2A2A2F; --ink-soft:#D4D4D8; --ink-mute:#B4B4BC;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#0E0E10; --surface:#191A1D; --ink:#ECECEE; --muted:#9A9AA2; --faint:#6B6B73;
      --line:#27272B; --line-strong:#37373D;
      --accent:#8AA0F2; --accent-soft:#1C2138;
      --star:#E0A23C; --star-soft:#332710; --star-ink:#E8B765;
      --claim:#3FB593; --claim-soft:#102A22; --claim-ink:#6FD3B0;
      --chip-bg:#232327; --track:#2A2A2F; --ink-soft:#D4D4D8; --ink-mute:#B4B4BC;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);line-height:1.55;-webkit-font-smoothing:antialiased;padding:0 20px 96px;transition:background .2s ease,color .2s ease}
  .wrap{max-width:880px;margin:0 auto}
  a{color:inherit}

  header{padding:40px 0 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  h1{font-size:29px;font-weight:680;letter-spacing:-.02em;line-height:1.12}
  .lede{color:var(--muted);font-size:15px;margin-top:10px;max-width:60ch}
  .auth-row{flex:none;display:flex;align-items:center;gap:10px;padding-top:4px}
  .auth{font-size:13px;display:flex;align-items:center;gap:10px}
  .auth .who{color:var(--muted)}
  .auth .who b{color:var(--ink);font-weight:600}
  .auth button,.auth a,.theme-btn{font-family:var(--ui);font-size:13px;cursor:pointer;border:1px solid var(--line-strong);background:var(--surface);border-radius:999px;padding:7px 15px;color:var(--ink);text-decoration:none;transition:all .15s ease}
  .auth button:hover,.auth a:hover,.theme-btn:hover{border-color:var(--faint)}
  .auth a.login{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .theme-btn{padding:7px 11px;font-size:15px;line-height:1}

  .toolbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);margin:14px -20px 0;padding:12px 20px}
  .toolbar-inner{max-width:880px;margin:0 auto;display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center}
  .search{flex:1 1 200px;min-width:0;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;padding:8px 12px}
  .search svg{flex:none;color:var(--faint)}
  .search input{border:0;outline:0;background:transparent;font-family:var(--ui);font-size:14px;width:100%;color:var(--ink)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:var(--ui);font-size:13px;color:var(--muted);cursor:pointer;background:var(--surface);border:1px solid var(--line-strong);border-radius:999px;padding:6px 13px;transition:all .15s ease;display:inline-flex;align-items:center;gap:6px}
  .chip:hover{border-color:var(--faint);color:var(--ink)}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:var(--bg)}
  .chip .cdot{width:7px;height:7px;border-radius:50%}
  .chip .ct{color:var(--faint);font-variant-numeric:tabular-nums;font-size:12px}
  .chip[aria-pressed="true"] .ct{color:var(--bg);opacity:.6}
  .toggle{font-size:13px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-strong);background:var(--surface);border-radius:999px;padding:6px 13px;transition:all .15s ease}
  .toggle:hover{color:var(--ink);border-color:var(--faint)}
  .toggle[aria-pressed="true"]{background:var(--star-soft);border-color:var(--star);color:var(--star-ink)}
  .toggle.t-claim[aria-pressed="true"]{background:var(--claim-soft);border-color:var(--claim);color:var(--claim-ink)}
  .sortsel select{font-family:var(--ui);font-size:13px;color:var(--muted);cursor:pointer;background:var(--surface);border:1px solid var(--line-strong);border-radius:999px;padding:6px 12px;transition:all .15s ease}
  .sortsel select:hover{border-color:var(--faint);color:var(--ink)}
  .apifilter{font-family:var(--mono);font-size:12px;cursor:pointer;background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:5px 11px;display:inline-flex;align-items:center;gap:6px}
  .apifilter .x{font-weight:700}

  .meta-row{max-width:880px;margin:14px auto 0;display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:12px;color:var(--faint);padding-top:4px;gap:12px;flex-wrap:wrap}
  .meta-row b{color:var(--muted);font-weight:500}

  .list{margin-top:18px;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 22px 18px;position:relative;transition:box-shadow .18s ease,border-color .18s ease}
  .card:hover{box-shadow:0 6px 24px -12px rgba(0,0,0,.28);border-color:var(--line-strong)}
  .card.starred{border-color:var(--star);box-shadow:inset 3px 0 0 var(--star)}
  .card.flash{box-shadow:0 0 0 2px var(--accent)}
  .card.hidden{display:none}
  .card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .sid{font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--chip-bg);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-weight:600;cursor:pointer;transition:all .15s ease}
  .sid:hover{border-color:var(--accent);color:var(--accent)}
  .dur{font-family:var(--mono);font-size:12px;color:var(--faint)}
  .cat{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .cat .cdot{width:8px;height:8px;border-radius:50%}
  .spacer{flex:1}
  .star-btn{flex:none;cursor:pointer;background:none;border:0;padding:4px;border-radius:8px;color:var(--faint);display:inline-flex;align-items:center;gap:5px;font-family:var(--ui);font-size:12px;transition:color .15s ease,background .15s ease}
  .star-btn:hover{color:var(--star);background:var(--star-soft)}
  .star-btn.on{color:var(--star)}
  .star-btn svg{width:18px;height:18px}

  .card h2{font-size:19px;font-weight:640;letter-spacing:-.01em;line-height:1.25}
  .gloss{color:var(--muted);font-size:14px;margin-top:2px}
  .takeaway{font-size:15px;font-weight:500;margin:12px 0;padding-left:13px;border-left:2px solid var(--accent);color:var(--ink)}

  .ruler{margin:6px 0 16px}
  .ruler-track{position:relative;height:4px;background:var(--track);border-radius:2px}
  .tick{position:absolute;top:-3px;width:2px;height:10px;background:var(--line-strong);border-radius:1px;transform:translateX(-5px);padding:0 4px;background-clip:content-box;box-sizing:content-box;cursor:pointer}
  .tick:hover{background:var(--accent);height:13px;top:-4.5px}
  .ruler-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:6px}

  .label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:14px 0 7px;font-weight:600}
  ul.points{list-style:none;display:flex;flex-direction:column;gap:7px}
  ul.points li{font-size:14px;color:var(--ink-soft);padding-left:18px;position:relative;line-height:1.5}
  ul.points li::before{content:"";position:absolute;left:3px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.55}
  ul.points li strong{font-weight:620;color:var(--ink)}
  ul.points li.hot{background:var(--star-soft);box-shadow:0 0 0 1px var(--star-soft);border-radius:5px;padding:1px 4px 1px 18px}
  ul.points li.hot strong{color:var(--star-ink)}

  .apis{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .api{font-family:var(--mono);font-size:11.5px;color:var(--ink-mute);background:var(--chip-bg);border:1px solid var(--line);border-radius:6px;padding:3px 8px;cursor:pointer;transition:all .15s ease}
  .api:hover{border-color:var(--accent);color:var(--accent)}
  .audience{font-size:13.5px;color:var(--muted);margin-top:14px;line-height:1.5}
  .audience b{color:var(--ink-mute);font-weight:600}

  .card-foot{margin-top:16px;padding-top:13px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .src{font-family:var(--mono);font-size:12px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .src:hover{text-decoration:underline}
  .claim-btn{font-family:var(--ui);font-size:12px;cursor:pointer;border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);border-radius:999px;padding:5px 12px;display:inline-flex;align-items:center;gap:6px;transition:all .15s ease}
  .claim-btn:hover{border-color:var(--claim);color:var(--claim)}
  .claim-btn.mine{background:var(--claim-soft);border-color:var(--claim);color:var(--claim-ink)}
  .claim-btn.taken{background:var(--chip-bg);border-color:var(--line);color:var(--muted);cursor:default}
  .claim-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--claim)}

  .empty{text-align:center;color:var(--faint);font-size:14px;padding:48px 0}
  footer{max-width:880px;margin:40px auto 0;padding-top:20px;border-top:1px solid var(--line);font-size:12.5px;color:var(--faint);line-height:1.6}
  footer code{font-family:var(--mono);background:var(--chip-bg);padding:1px 5px;border-radius:4px;color:var(--ink-mute)}

  @media (max-width:560px){h1{font-size:23px} header{flex-direction:column} .card{padding:18px 16px 16px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
</style>
<script>try{var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow"><span class="dot"></span>WWDC26 · Developer Notes</div>
      <h1 id="pageTitle">Apple 開發者 Session 筆記</h1>
      <p class="lede" id="lede"></p>
    </div>
    <div class="auth-row">
      <button id="langBtn" class="theme-btn" title="中文 / English" aria-label="Language">EN</button>
      <button id="themeBtn" class="theme-btn" title="切換深色 / 淺色" aria-label="切換主題 / Toggle theme">🌙</button>
      <div class="auth" id="auth"></div>
    </div>
  </header>
</div>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" autocomplete="off">
    </div>
    <div class="chips" id="chips"></div>
    <button class="toggle" id="starredOnly" aria-pressed="false"></button>
    <button class="toggle t-claim" id="unclaimedOnly" aria-pressed="false"></button>
    <button class="toggle t-claim" id="mineClaimedOnly" aria-pressed="false"></button>
    <button class="toggle" id="hotOnly" aria-pressed="false"></button>
    <span class="sortsel"><select id="sort" aria-label="Sort">
      <option value="id"></option>
      <option value="dur-asc"></option>
      <option value="dur-desc"></option>
    </select></span>
    <span id="apiFilter" class="apifilter" hidden></span>
  </div>
</div>

<div class="meta-row">
  <span id="metaLeft"></span>
  <span id="metaRight"></span>
</div>

<div class="wrap">
  <div class="list" id="list"></div>
  <div class="empty" id="empty" style="display:none"></div>
  <footer id="footer"></footer>
</div>

<script>
let SESSIONS = [], me = null, myInterest = new Set(), claimed = {};
const state = { cat: "all", q: "", starredOnly: false, unclaimedOnly: false, mineClaimedOnly: false, hotOnly: false, sort: "id", api: "", lang: "zh" };

const $ = (id) => document.getElementById(id);
const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
const human = (sec) => { const h = Math.floor(sec / 3600), m = Math.round((sec % 3600) / 60); return h ? `${h}h ${m}m` : `${m}m`; };
const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const md = (s) => esc(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

// ---- i18n ----
const TT = {
  zh: {
    htmlLang: "zh-Hant",
    lede: "掃過清單,星號標記你想深入的(跨裝置同步),「認領」讓團隊看到誰負責哪一場、避免重複。",
    search: "搜尋標題、API、關鍵字…",
    chipAll: "全部",
    tStarred: `<span style="color:var(--star)">★</span> 只看我標記的`, tUnclaimed: "尚未認領", tMineClaimed: "只看我認領的", tHot: "🔥 重點",
    sortId: "場次編號", sortAsc: "時長 短→長", sortDesc: "時長 長→短",
    shown: (n) => `${n} 場顯示中`,
    stats: (m, t, c) => `我標記 <b>${m}</b> · 共 <b>${t}</b> · 已認領 <b>${c}</b>`,
    labelPoints: "重點", labelApis: "關鍵 API / 框架",
    star: "標記", starred: "已標記", claim: "認領", claimMine: "我已認領 · 取消", claimedBy: (n) => `${n} 認領中`,
    src: "看原片 ↗", chapters: (n) => `${n} 章`,
    copyTitle: "複製此場連結", copied: "已複製", apiFilterTitle: (a) => `篩選使用 ${a} 的場次`,
    empty: "沒有符合條件的 session。",
    footer: `瀏覽無需登入。第一次按「標記」或「認領」時會用 Google 登入一次,之後跨裝置都記得你。原始資料來源:<code>developer.apple.com/videos/wwdc2026</code>。`,
    hi: (n) => `嗨,<b>${n}</b>`, logout: "登出", login: "用 Google 登入",
  },
  en: {
    htmlLang: "en",
    lede: "Skim the list, star the ones you want to dig into (synced across devices); “claim” lets your team see who's covering what and avoid duplicate work.",
    search: "Search title, API, keyword…",
    chipAll: "All",
    tStarred: `<span style="color:var(--star)">★</span> My marks`, tUnclaimed: "Unclaimed", tMineClaimed: "My claims", tHot: "🔥 Key",
    sortId: "Session #", sortAsc: "Duration ↑", sortDesc: "Duration ↓",
    shown: (n) => `${n} shown`,
    stats: (m, t, c) => `Marked <b>${m}</b> · <b>${t}</b> total · Claimed <b>${c}</b>`,
    labelPoints: "Highlights", labelApis: "Key APIs / Frameworks",
    star: "Mark", starred: "Marked", claim: "Claim", claimMine: "Claimed by me · release", claimedBy: (n) => `Claimed by ${n}`,
    src: "Watch ↗", chapters: (n) => `${n} chapters`,
    copyTitle: "Copy link to this session", copied: "Copied", apiFilterTitle: (a) => `Filter sessions using ${a}`,
    empty: "No sessions match.",
    footer: `Browsing needs no sign-in. The first time you mark or claim, you sign in once with Google; after that it's remembered across devices. Source: <code>developer.apple.com/videos/wwdc2026</code>.`,
    hi: (n) => `Hi, <b>${n}</b>`, logout: "Sign out", login: "Sign in with Google",
  },
};
const CATLABEL_EN = { swift: "Swift", uikit: "UIKit", swiftui: "SwiftUI", testing: "Testing", ai: "AI & ML", design: "Design", appstore: "App Store", graphics: "Graphics & Games", visionos: "visionOS", other: "Other" };
const T = () => TT[state.lang];
// localized session content (en falls back to zh if a field is missing)
function L(s, field) {
  if (state.lang === "en") {
    if (field === "points") return s.points_en || s.points;
    if (field === "categoryLabel") return CATLABEL_EN[s.category] || s.categoryLabel;
    return s[field + "_en"] || s[field];
  }
  return field === "categoryLabel" ? s.categoryLabel : s[field];
}
function catLabel(s) { return L(s, "categoryLabel"); }

// ---- theme ----
function effectiveTheme() { const a = document.documentElement.getAttribute("data-theme"); return a || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"); }
function applyThemeBtn() { $("themeBtn").textContent = effectiveTheme() === "dark" ? "☀️" : "🌙"; }
function toggleTheme() {
  const next = effectiveTheme() === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  try { localStorage.setItem("theme", next); } catch (e) {}
  applyThemeBtn();
}
function toggleLang() {
  state.lang = state.lang === "en" ? "zh" : "en";
  try { localStorage.setItem("lang", state.lang); } catch (e) {}
  applyLang();
}

// ---- shareable URL state ----
function readHash() {
  const p = new URLSearchParams(location.hash.replace(/^#/, ""));
  if (p.has("cat")) state.cat = p.get("cat");
  if (p.has("q")) state.q = p.get("q");
  if (p.has("sort")) state.sort = p.get("sort");
  state.hotOnly = p.get("hot") === "1";
  state.starredOnly = p.get("star") === "1";
  state.unclaimedOnly = p.get("unclaimed") === "1";
  state.mineClaimedOnly = p.get("mine") === "1";
  if (p.has("api")) state.api = p.get("api");
  if (p.has("lang")) state.lang = p.get("lang");
  else { try { const l = localStorage.getItem("lang"); if (l) state.lang = l; } catch (e) {} }
  return p.get("s");
}
function writeHash() {
  const p = new URLSearchParams();
  if (state.cat !== "all") p.set("cat", state.cat);
  if (state.q) p.set("q", state.q);
  if (state.sort !== "id") p.set("sort", state.sort);
  if (state.hotOnly) p.set("hot", "1");
  if (state.starredOnly) p.set("star", "1");
  if (state.unclaimedOnly) p.set("unclaimed", "1");
  if (state.mineClaimedOnly) p.set("mine", "1");
  if (state.api) p.set("api", state.api);
  if (state.lang !== "zh") p.set("lang", state.lang);
  const s = p.toString();
  history.replaceState(null, "", s ? "#" + s : location.pathname + location.search);
}

async function boot() {
  const target = readHash();
  const [sData, meData, clData] = await Promise.all([
    fetch("data/sessions.json").then((r) => r.json()).catch(() => []),
    fetch("/api/me").then((r) => r.json()).catch(() => ({ user: null })),
    fetch("/api/claimed").then((r) => r.json()).catch(() => ({ claimed: {} })),
  ]);
  SESSIONS = Array.isArray(sData) ? sData : sData.sessions || [];
  me = meData.user;
  claimed = clData.claimed || {};
  if (me) {
    const i = await fetch("/api/interest").then((r) => r.json()).catch(() => ({ ids: [] }));
    myInterest = new Set(i.ids || []);
  } else {
    state.starredOnly = false;
    state.mineClaimedOnly = false;
  }
  applyThemeBtn();
  $("sort").value = state.sort;
  applyLang(); // sets all UI text, rebuilds chips, renders cards
  if (target) {
    const el = document.getElementById("s-" + target);
    if (el) { el.scrollIntoView({ behavior: "smooth", block: "center" }); el.classList.add("flash"); setTimeout(() => el.classList.remove("flash"), 1600); }
  }
}

// apply current language to all static UI + re-render
function applyLang() {
  const t = T();
  document.documentElement.lang = t.htmlLang;
  $("langBtn").textContent = state.lang === "en" ? "中" : "EN";
  $("pageTitle").textContent = state.lang === "en" ? "Apple Developer Session Notes" : "Apple 開發者 Session 筆記";
  $("lede").textContent = t.lede;
  $("search").placeholder = t.search;
  $("starredOnly").innerHTML = t.tStarred;
  $("unclaimedOnly").textContent = t.tUnclaimed;
  $("mineClaimedOnly").textContent = t.tMineClaimed;
  $("hotOnly").textContent = t.tHot;
  const so = $("sort").options; so[0].textContent = t.sortId; so[1].textContent = t.sortAsc; so[2].textContent = t.sortDesc;
  $("footer").innerHTML = t.footer;
  $("empty").textContent = t.empty;
  buildChips();
  renderAuth();
  render();
}

function renderAuth() {
  const t = T();
  $("auth").innerHTML = me
    ? `<span class="who">${t.hi(esc(me.name))}</span><a href="/api/auth/logout">${t.logout}</a>`
    : `<a class="login" href="/api/auth/login">${t.login}</a>`;
}

function buildChips() {
  const counts = {};
  for (const s of SESSIONS) counts[s.category] = (counts[s.category] || 0) + 1;
  const cats = [];
  const seen = new Set();
  for (const s of SESSIONS) { if (!seen.has(s.category)) { seen.add(s.category); cats.push({ cat: s.category, zh: s.categoryLabel }); } }
  $("chips").innerHTML =
    `<button class="chip" data-cat="all" aria-pressed="${state.cat === "all"}">${T().chipAll} <span class="ct">${SESSIONS.length}</span></button>` +
    cats.map((c) => {
      const label = state.lang === "en" ? (CATLABEL_EN[c.cat] || c.cat) : c.zh;
      return `<button class="chip" data-cat="${c.cat}" aria-pressed="${state.cat === c.cat}"><span class="cdot" style="background:${catColor(c.cat)}"></span>${esc(label)} <span class="ct">${counts[c.cat]}</span></button>`;
    }).join("");
  $("chips").querySelectorAll(".chip").forEach((b) => b.addEventListener("click", () => { state.cat = b.dataset.cat; render(); }));
}

function catColor(cat) {
  return { swift: "#F05138", uikit: "#3B5BDB", swiftui: "#7F77DD", testing: "#16A34A", ai: "#BA7517", design: "#D4537E" }[cat] || "#888780";
}

function cardHTML(s) {
  const t = T();
  const safeUrl = /^https?:\/\//i.test(s.url) ? s.url : "#";
  const ticks = s.chapters.map(([sec, name]) => `<a class="tick" href="${esc(safeUrl)}?time=${encodeURIComponent(sec)}" target="_blank" rel="noopener" style="left:${((sec / s.duration) * 100).toFixed(2)}%" title="${fmt(sec)} · ${esc(name)} ↗"></a>`).join("");
  const pts = L(s, "points").map((p) => `<li class="${p.hot ? "hot" : ""}">${md(p.text)}</li>`).join("");
  const apis = s.apis.map((a) => `<span class="api" data-api="${esc(a)}" title="${esc(t.apiFilterTitle(a))}">${esc(a)}</span>`).join("");
  const starred = myInterest.has(s.id);
  const c = claimed[s.id];
  const mine = c && me && c.email === me.email;
  let claimBtn;
  if (c && !mine) claimBtn = `<span class="claim-btn taken"><span class="cdot"></span>${t.claimedBy(esc(c.name))}</span>`;
  else if (mine) claimBtn = `<button class="claim-btn mine" data-claim="${s.id}"><span class="cdot"></span>${t.claimMine}</button>`;
  else claimBtn = `<button class="claim-btn" data-claim="${s.id}">${t.claim}</button>`;

  return `<article class="card${starred ? " starred" : ""}" id="s-${esc(s.id)}" data-id="${esc(s.id)}">
    <div class="card-top">
      <span class="sid" data-copy="${esc(s.id)}" title="${esc(t.copyTitle)}">${esc(s.id)}</span>
      <span class="dur">${fmt(s.duration)}</span>
      <span class="cat"><span class="cdot" style="background:${catColor(s.category)}"></span>${esc(catLabel(s))}</span>
      <span class="spacer"></span>
      <button class="star-btn${starred ? " on" : ""}" data-star="${s.id}" aria-pressed="${starred}" title="${esc(t.star)}">
        <svg viewBox="0 0 24 24" fill="${starred ? "currentColor" : "none"}" stroke="currentColor" stroke-width="1.8"><path d="M12 2.5l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 18.9 6.1 21l1.2-6.5L2.5 9.9l6.6-.9z"/></svg>
        ${starred ? t.starred : t.star}
      </button>
    </div>
    <h2>${esc(s.title)}</h2>
    <div class="gloss">${esc(L(s, "gloss"))}</div>
    <p class="takeaway">${md(L(s, "takeaway"))}</p>
    <div class="ruler"><div class="ruler-track">${ticks}</div><div class="ruler-meta"><span>0:00</span><span>${t.chapters(s.chapters.length)}</span><span>${fmt(s.duration)}</span></div></div>
    <div class="label">${t.labelPoints}</div>
    <ul class="points">${pts}</ul>
    <div class="label">${t.labelApis}</div>
    <div class="apis">${apis}</div>
    <p class="audience">${md(L(s, "audience"))}</p>
    <div class="card-foot">
      <a class="src" href="${esc(safeUrl)}" target="_blank" rel="noopener">${t.src}</a>
      ${claimBtn}
    </div>
  </article>`;
}

function matches(s) {
  if (state.cat !== "all" && s.category !== state.cat) return false;
  if (state.starredOnly && !myInterest.has(s.id)) return false;
  if (state.unclaimedOnly && claimed[s.id]) return false;
  if (state.mineClaimedOnly && !(me && claimed[s.id] && claimed[s.id].email === me.email)) return false;
  if (state.hotOnly && !s.points.some((p) => p.hot)) return false;
  if (state.api && !(s.apis || []).includes(state.api)) return false;
  if (state.q) {
    const hay = [s.title, s.gloss, s.gloss_en, s.takeaway, s.takeaway_en, s.apis.join(" "), s.categoryLabel, CATLABEL_EN[s.category],
      s.points.map((p) => p.text).join(" "), (s.points_en || []).map((p) => p.text).join(" "), s.audience, s.audience_en].join(" ").toLowerCase();
    if (!hay.includes(state.q.toLowerCase())) return false;
  }
  return true;
}

function reflectControls() {
  for (const [id, on] of [["starredOnly", state.starredOnly], ["unclaimedOnly", state.unclaimedOnly], ["mineClaimedOnly", state.mineClaimedOnly], ["hotOnly", state.hotOnly]])
    $(id).setAttribute("aria-pressed", on ? "true" : "false");
  $("chips").querySelectorAll(".chip").forEach((c) => c.setAttribute("aria-pressed", c.dataset.cat === state.cat ? "true" : "false"));
}

function render() {
  const t = T();
  let shown = SESSIONS.filter(matches);
  if (state.sort === "dur-asc") shown = shown.slice().sort((a, b) => a.duration - b.duration);
  else if (state.sort === "dur-desc") shown = shown.slice().sort((a, b) => b.duration - a.duration);
  $("list").innerHTML = shown.map(cardHTML).join("");
  $("empty").style.display = shown.length ? "none" : "block";
  let secs = 0;
  for (const s of SESSIONS) if (myInterest.has(s.id)) secs += s.duration || 0;
  $("metaLeft").textContent = t.shown(shown.length);
  $("metaRight").innerHTML = t.stats(myInterest.size, human(secs), Object.keys(claimed).length);
  const af = $("apiFilter");
  if (state.api) { af.hidden = false; af.innerHTML = `API: <b>${esc(state.api)}</b> <span class="x">✕</span>`; }
  else af.hidden = true;
  reflectControls();
  writeHash();
  $("list").querySelectorAll("[data-star]").forEach((b) => b.addEventListener("click", () => toggleInterest(b.dataset.star)));
  $("list").querySelectorAll("[data-claim]").forEach((b) => b.addEventListener("click", () => toggleClaim(b.dataset.claim)));
  $("list").querySelectorAll("[data-api]").forEach((b) => b.addEventListener("click", () => { state.api = b.dataset.api; render(); }));
  $("list").querySelectorAll("[data-copy]").forEach((b) => b.addEventListener("click", () => copyLink(b.dataset.copy, b)));
}

function copyLink(id, btn) {
  const url = location.origin + location.pathname + "#s=" + id + (state.lang !== "zh" ? "&lang=" + state.lang : "");
  const done = () => { const o = btn.textContent; btn.textContent = T().copied; setTimeout(() => (btn.textContent = o), 1200); };
  if (navigator.clipboard) navigator.clipboard.writeText(url).then(done).catch(() => prompt("", url));
  else prompt("", url);
}

async function toggleInterest(id) {
  if (!me) return (location.href = "/api/auth/login");
  const on = !myInterest.has(id);
  on ? myInterest.add(id) : myInterest.delete(id);
  render();
  try {
    const r = await fetch("/api/interest", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id, on }) });
    const d = await r.json();
    if (r.ok) myInterest = new Set(d.ids || []);
  } catch { on ? myInterest.delete(id) : myInterest.add(id); }
  render();
}

async function toggleClaim(id) {
  if (!me) return (location.href = "/api/auth/login");
  const mine = claimed[id] && claimed[id].email === me.email;
  const action = mine ? "release" : "claim";
  try {
    const r = await fetch("/api/claimed", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id, action }) });
    const d = await r.json();
    if (d.claimed) claimed = d.claimed;
    if (!r.ok && r.status === 409) alert(state.lang === "en" ? "Already claimed by someone else." : "這場已被其他人認領了。");
  } catch {}
  render();
}

$("search").addEventListener("input", (e) => { state.q = e.target.value; render(); });
$("sort").addEventListener("change", (e) => { state.sort = e.target.value; render(); });
$("hotOnly").addEventListener("click", () => { state.hotOnly = !state.hotOnly; render(); });
$("starredOnly").addEventListener("click", () => { if (!me) return (location.href = "/api/auth/login"); state.starredOnly = !state.starredOnly; render(); });
$("unclaimedOnly").addEventListener("click", () => { state.unclaimedOnly = !state.unclaimedOnly; render(); });
$("mineClaimedOnly").addEventListener("click", () => { if (!me) return (location.href = "/api/auth/login"); state.mineClaimedOnly = !state.mineClaimedOnly; render(); });
$("apiFilter").addEventListener("click", () => { state.api = ""; render(); });
$("themeBtn").addEventListener("click", toggleTheme);
$("langBtn").addEventListener("click", toggleLang);

boot();
</script>
</body>
</html>
