<script id="d" type="application/json">{"s":{"id":"278","title":"Modernize your UIKit app","gloss":"現代化你的 UIKit App","category":"uikit","categoryLabel":"UIKit","duration":963,"url":"https://developer.apple.com/videos/play/wwdc2026/278/","takeaway":"iOS 27 起 iPhone App 在 iPhone Mirroring 與 iPad 上可自由縮放,要全面改用 size class、丟掉一票 legacy API,Xcode 27 還附了能自動改的 agent skill。","chapters":[[0,"Introduction"],[34,"App adaptivity"],[130,"Legacy API: App lifecycle"],[171,"Legacy API: Main screen"],[346,"Full-screen mode for games"],[377,"Legacy API: UI idiom"],[426,"Legacy API: Interface orientation"],[475,"UIView Body protocols"],[499,"Test resizable iPhone app"],[558,"Tab bars and sidebars"],[652,"Navigation bars"],[757,"Menus"],[781,"Apple Intelligence"],[847,"Agentic coding"],[932,"Next steps"]],"points":[{"text":"App 必須能即時適應任意 scene 尺寸;四個要稽核的點:**scene lifecycle、main screen 參照、UI idiom 判斷、interface orientation 判斷**。"},{"text":"**UIScene lifecycle 變成必要**——用最新 SDK 建置時,沒採用的 App 會無法啟動。"},{"text":"**UIScreen.main 不可靠**:改用 windowScene 的 screen、trait collection 的 displayScale、windowScene.effectiveGeometry 取可用空間,並用 registerForTraitChanges 監聽。"},{"text":"UI idiom 與 interface orientation 對 layout 都不再有意義 → **一律改用 size class**(iPhone App 跑在 iPad 仍是 phone idiom 但可縮放;orientation 只是偏好會被忽略)。"},{"text":"導覽列捲動時會自動收合,用 **barMinimizationBehavior** 控制;分頁列新增 sidebar.preferredPlacement 與 prominentTabIdentifier。**.automatic 的 scroll edge effect 視覺有變,之前覆寫成 .soft 的要重新評估**。","hot":true},{"text":"Xcode 27 內建 app modernization skill 可自動轉 mainScreen、orientation→size class、遷移 scene lifecycle;xcrun agent skills export 可匯出給其他工具(如 Claude Code)用。"}],"apis":["UIScene","effectiveGeometry","displayScale","registerForTraitChanges","UITraitSizeClass","sidebar.preferredPlacement","prominentTabIdentifier","barMinimizationBehavior","scrollEdgeEffectStyle","xcrun agent skills export"],"audience":"**還在用 UIKit、且有 legacy lifecycle / orientation 假設的成熟專案(像 CUB App)。** 第 10:52「Navigation bars」段落直接對應 iOS 26 導覽列透明問題——很可能就是 scroll edge effect 改版造成的。","gloss_en":"Modernize your UIKit app","takeaway_en":"Starting in iOS 27, iPhone apps can be freely resized with iPhone Mirroring and on iPad, so you must move fully to size classes, drop a pile of legacy APIs—and Xcode 27 ships an agent skill that can do the migration for you.","points_en":[{"text":"Your app must adapt to any scene size on the fly; the four things to audit: **scene lifecycle, main screen references, UI idiom checks, and interface orientation checks**.","hot":false},{"text":"**The UIScene lifecycle is now required**—when building with the latest SDK, apps that haven't adopted it will fail to launch.","hot":false},{"text":"**UIScreen.main is unreliable**: instead use the windowScene's screen, the trait collection's displayScale, and windowScene.effectiveGeometry for available space, and observe changes with registerForTraitChanges.","hot":false},{"text":"UI idiom and interface orientation no longer mean anything for layout → **always use size classes** (an iPhone app running on iPad is still the phone idiom but resizable; orientation is just a preference that gets ignored).","hot":false},{"text":"Navigation bars now collapse automatically on scroll, controlled with **barMinimizationBehavior**; tab bars add sidebar.preferredPlacement and prominentTabIdentifier. **The .automatic scroll edge effect looks different now, so reassess anything you previously overrode to .soft.**","hot":true},{"text":"Xcode 27's built-in app modernization skill can automatically convert mainScreen, migrate orientation→size class, and migrate the scene lifecycle; xcrun agent skills export can export it for use with other tools (like Claude Code).","hot":false}],"audience_en":"**Mature projects (like the CUB App) still on UIKit with legacy lifecycle / orientation assumptions.** The 10:52 \"Navigation bars\" segment maps directly to the iOS 26 transparent navigation bar issue—very likely caused by the scroll edge effect changes.","code":["// Use local screen references\n// Access the correct screen through a windowScene\nlet screen = window?.windowScene?.screen\n\n// Pass in local screen references\nfunc generateThumbnail(_ image: UIImage, screen: UIScreen) -> UIImage {\n    // existing code, replacing main screen with local screen reference\n    // ...\n}","// Replace the screen's scale with trait collection's displayScale\noverride func layoutSubviews() {\n    super.layoutSubviews()\n\n    // layoutSubviews will be called again automatically when displayScale changes\n    let displayScale = traitCollection.displayScale\n    // ...\n}","// Manually register for trait changes\nlet displayScaleTrait: [UITrait] = [UITraitDisplayScale.self]\nregisterForTraitChanges(displayScaleTrait) {\n    (view: GalleryView, previousTraitCollection: UITraitCollection) in\n    view.cache.invalidate()\n}","// UIWindowSceneDelegate\nfunc windowScene(\n    _ windowScene: UIWindowScene,\n    didUpdateEffectiveGeometry previousEffectiveGeometry: UIWindowScene.Geometry\n) {\n    let geometry = windowScene.effectiveGeometry\n    let availableSpace = geometry.coordinateSpace.bounds\n    // ...\n}","// Checking available space\noverride func viewDidLayoutSubviews() {\n    super.viewDidLayoutSubviews()\n\n    let availableSpace = view.bounds.size\n    // ...\n}","// Configure motion and heading bodies\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\n    motionManager.deviceMotionBody = view\n    locationManager.headingBody = view\n}","tabBarController.sidebar.preferredPlacement = .sidebar","tabBarController.sidebar.isAvailable","// Set the prominent tab\nlet tabs = [\n    // ...\n]\nlet tabBarController = UITabBarController(tabs: tabs)\ntabBarController.prominentTabIdentifier = \"cart\"","// Customize bar minimization behavior\noverride init(\n    nibName nibNameOrNil: String?,\n    bundle nibBundleOrNil: Bundle?\n) {\n    super.init(nibName: nibNameOrNil, bundle: nibBundleOrNil)\n\n    navigationItem.barMinimizationBehavior = .always\n    navigationItem.barMinimizationSafeAreaAdjustment = .never\n}","xcrun agent skills export"]},"related":[{"id":"221","title":"Prepare your tvOS apps for Dynamic Type","gloss":"讓你的 tvOS App 支援動態字型","gloss_en":"Prepare your tvOS app for Dynamic Type","category":"uikit","categoryLabel":"UIKit"},{"id":"203","title":"Read between the strokes with PencilKit","gloss":"用 PencilKit 解讀筆跡內容","gloss_en":"Read handwriting content with PencilKit","category":"uikit","categoryLabel":"UIKit"},{"id":"212","title":"Rev up your CarPlay app","gloss":"強化你的 CarPlay App","gloss_en":"Rev up your CarPlay app","category":"uikit","categoryLabel":"UIKit"},{"id":"219","title":"Enhance the accessibility of your reading app","gloss":"強化你閱讀類 App 的無障礙體驗","gloss_en":"Enhance the accessibility of your reading app","category":"uikit","categoryLabel":"UIKit"},{"id":"226","title":"Create live communication experiences","gloss":"打造即時通訊體驗","gloss_en":"Build live communication experiences","category":"uikit","categoryLabel":"UIKit"}]}</script>
