<script id="d" type="application/json">{"s":{"id":"343","title":"Explore advanced App Intents features for Siri and Apple Intelligence","gloss":"探索 Siri 與 Apple Intelligence 的進階 App Intents 功能","category":"ai","categoryLabel":"AI 與機器學習","duration":1448,"url":"https://developer.apple.com/videos/play/wwdc2026/343/","takeaway":"用進階 App Intents 打磨與 Siri/Apple Intelligence 的整合:自訂對話與澄清提問、視覺片段回應、互動捐贈、語意索引、結構化搜尋與螢幕內容感知。","chapters":[[0,"Introduction"],[119,"Customize how Siri responds"],[162,"Custom dialog response"],[222,"Ask a clarifying question within an inten"],[260,"Visual responses"],[266,"Enhanced DisplayRepresentation"],[305,"Return a custom snippet view"],[382,"Interaction donations"],[464,"Donate a UI interaction"],[586,"Confirmations and entity ownership"],[603,"Declare entity ownership for confirmations"],[690,"Index entities with IndexedEntity"],[719,"Semantic index with IndexedEntity"],[812,"Structured search with IntentValueQuery"],[818,"Structured search with IntentValueQuer"],[889,"Re-run Siri search in your app"],[927,"In-app search"],[982,"Onscreen awareness"],[987,"Onscreen awareness annotations"],[1043,"Component-based display representation query"],[1251,"Leverage existing integrations"],[1267,"Entity annotations on system integrations"],[1410,"Next steps"]],"points":[{"text":"自訂 Siri 回應:用 **ProvidesDialog 的 IntentDialog** 給出完整/簡短對話,並可用 **$param.requestValue** 在 intent 中向使用者**反問澄清問題**。","hot":false},{"text":"視覺回應:強化 **DisplayRepresentation**(title/subtitle/image),並以 **ShowsSnippetView** 回傳自訂 snippet 視圖。","hot":false},{"text":"用 **IntentDonationManager.donate** 捐贈互動(含參數與結果),讓 Siri 學習使用者偏好。","hot":false},{"text":"語意整合:用 **IndexedEntity + CSSearchableIndex** 建語意索引,用 **IntentValueQuery** 做結構化搜尋,並以 .system.searchInApp 把 Siri 搜尋導回 App 內。","hot":true},{"text":"**螢幕內容感知(onscreen awareness)**:用 **EntityIdentifier / appEntityIdentifier** 在 NSUserActivity、視圖、清單、通知、Now Playing、AlarmKit 等處標註螢幕上的實體。","hot":false}],"apis":["AppIntents","IntentDialog","ProvidesDialog","requestValue","DisplayRepresentation","ShowsSnippetView","IntentDonationManager","OwnershipProvidingEntity","IndexedEntity","CSSearchableIndex","IntentValueQuery","EntityIdentifier","appEntityIdentifier","AlarmKit"],"audience":"**已導入 App Intents、想把 Siri 與 Apple Intelligence 整合做到更深(澄清提問、語意索引、螢幕感知)的開發者。**","gloss_en":"Explore advanced App Intents features for Siri and Apple Intelligence","takeaway_en":"Use advanced App Intents to polish your Siri/Apple Intelligence integration: custom dialog and clarifying questions, visual snippet responses, interaction donations, semantic indexing, structured search, and onscreen awareness.","points_en":[{"text":"Customize Siri responses: use **ProvidesDialog's IntentDialog** to give full/short dialog, and use **$param.requestValue** to **ask the user a clarifying question** within the intent.","hot":false},{"text":"Visual responses: enhance **DisplayRepresentation** (title/subtitle/image), and return a custom snippet view with **ShowsSnippetView**.","hot":false},{"text":"Use **IntentDonationManager.donate** to donate interactions (including parameters and results) so Siri learns user preferences.","hot":false},{"text":"Semantic integration: build a semantic index with **IndexedEntity + CSSearchableIndex**, do structured search with **IntentValueQuery**, and route Siri search back into your app with .system.searchInApp.","hot":true},{"text":"**Onscreen awareness**: use **EntityIdentifier / appEntityIdentifier** to annotate onscreen entities across NSUserActivity, views, lists, notifications, Now Playing, AlarmKit, and more.","hot":false}],"audience_en":"**Developers who have already adopted App Intents and want to deepen their Siri and Apple Intelligence integration (clarifying questions, semantic indexing, onscreen awareness).**","code":["@AppIntent(schema: .audio.addToPlaylist)\n  struct AddToPlaylistIntent {\n\n      func perform() async throws -> some IntentResult & ProvidesDialog {\n          // Adds song to playlist and responds\n          return .result(\n              dialog: IntentDialog(\n                  full: \"\"\"\n                        Added \\(song.title) to the \\\n                        \\(playlist.title) mix tape.\n                        \"\"\",\n                  supporting: \"Added\"\n              )\n          )\n      }\n  }","@AppIntent(schema: .clock.createTimer)\n  struct CreateTimerIntent {\n      // MARK: Schema Parameters\n      var duration: Duration\n      var label: String?\n      var isSleepTimer: Bool\n\n      func perform() async throws -> some ReturnsValue\u003cTimerEntity> {\n          // Checks active timers and requests label parameter\n          label = try await $label.requestValue(\n              \"\"\"\n              You already have a timer running. \\\n              What should we call this one?\n              \"\"\"\n          )\n          return .result(value: timerEntity)\n      }\n  }","// Enhanced DisplayRepresentation\n  @AppEntity(schema: .audio.song)\n  struct SongEntity {\n\n      var displayRepresentation: DisplayRepresentation {\n          DisplayRepresentation(\n              title: \"\\(title)\",\n              subtitle: \"\\(artistName)\",\n              image: artworkImage\n          )\n      }\n  }","@AppIntent(schema: .audio.addToPlaylist)\n  struct AddToPlaylistIntent {\n\n      var audioEntity: AudioEntity\n      var playlist: PlaylistEntity\n\n      func perform() async throws -> some IntentResult & ProvidesDialog & ShowsSnippetView {\n          // Adds to playlist and shows dialog and snippet\n          let view = PlaylistSnippetView(\n              playlist: updatedEntity,\n              tracks: updated.tracks\n          )\n          return .result(dialog: dialog, view: view)\n      }\n  }","@ModelActor\n  actor ModelManager {\n      func sendMessage(_ /* ... */, donateIntent: Bool = false) async throws -> [Message.ID] {\n\n          // Donate intent with parameters and result so Siri can learn user preferences\n          if donateIntent {\n              let intent = SendMessageIntent()\n              intent.destination = .recipients(conversation.recipients.map(\\.entity))\n\n              let result = messages.map(\\.entity)\n              Task {\n                  try await IntentDonationManager.shared.donate(\n                      intent: intent,\n                      result: .result(value: result)\n                  )\n              }\n          }\n      }\n  }","// Informs system if entity is public or shared with others\n  @AppEntity(schema: .calendar.event)\n  struct EventEntity: OwnershipProvidingEntity {\n\n      var ownership: EntityOwnership {\n          // isShared used to compute ownership state: .shared, .public, or .unknown\n          attendees.isEmpty ? .unknown : .shared\n      }\n  }","// Indexing IndexedEntity with CSSearchableIndex\n  struct EntityIndexingHelper {\n      // Indexes playlist entities\n      func indexPlaylist(_ playlist: Playlist) async throws {\n          let entity = PlaylistEntity(playlist: playlist)\n          try await CSSearchableIndex(name: indexName)\n              .indexAppEntities([entity])\n      }\n  }","// Structured search of songs and playlists\n  struct AudioIntentValueQuery: IntentValueQuery {\n\n      // AudioSearch, IntentPerson, and other system types may be supported as input\n      func values(for input: AudioSearch) async throws -> [AudioEntity] {\n          switch input.criteria {\n          case .searchQuery(let query):\n              return try await searchResults(for: query)\n          case .unspecified:\n              return try await likedSongResults()\n          // ... also a .url case\n          }\n      }\n  }","// Intent that re-runs the Siri search in app\n  @AppIntent(schema: .system.searchInApp)\n  struct SearchAudioLibraryIntent {\n\n      var criteria: StringSearchCriteria\n\n      func perform() async throws -> some IntentResult {\n          // Perform in-app search with Siri search string\n          navigation.searchText = criteria.term\n          navigation.selectedTab = .library\n          return .result()\n      }\n  }","// (a) Single primary entity on screen — NSUserActivity\n  struct NowPlayingView: View {\n      @Environment(PlaybackController.self) private var playback\n\n      var body: some View {\n          VStack {\n              // Player UI\n          }\n          .userActivity(\"cosmotunes.nowPlaying\", isActive: playback.currentTrack) { activity in\n              activity.title = playback.currentTrack?.title\n              activity.appEntityIdentifier = EntityIdentifier(\n                  for: SongEntity.self,\n                  identifier: playback.currentTrack.id\n              )\n          }\n      }\n  }\n\n  // (b) One entity among many — View Entity annotation\n  struct AlbumView: View {\n      private var header: some View {\n          VStack(alignment: .leading, spacing: 6) {\n              // ...\n          }\n          .appEntityIdentifier(\n              EntityIdentifier(for: AlbumEntity.self, identifier: session.id.uuidString)\n          )\n      }\n  }\n  \n  // (c) Lists and collections — Collection annotation\n  struct PlaylistDetailView: View {\n      var body: some View {\n          List {\n              ForEach(playlist.tracks) { track in\n                  PlaylistTrackRow(track: track)\n              }\n          }\n          .appEntityIdentifier(forSelectionType: GeneratedTrack.ID.self) { trackID in\n              EntityIdentifier(for: SongEntity.self, identifier: trackID)\n          }\n      }\n  }","// Component-based display representation queries\n  extension PlaylistQuery {\n      func displayRepresentations(\n          for identifiers: [PlaylistEntity.ID],\n          requestedComponents: DisplayRepresentation.Components = .text\n      ) async throws -> [PlaylistEntity.ID: DisplayRepresentation] {\n          let entities = try await model.playlistEntities(for: identifiers)\n\n          // Fetch display representations for fetched entities\n          var result: [PlaylistEntity.ID: DisplayRepresentation] = [:]\n          for entity in entities {\n              result[entity.id] = await entity.displayRepresentation(with: requestedComponents)\n          }\n          return result\n      }\n  }","// (a) User notifications\n  import AppIntents\n  import UserNotifications\n\n  func scheduleNotification(message: Message, author: Contact, conversation: Conversation) {\n      let content = UNMutableNotificationContent()\n      content.title = author.name\n      content.body = message.body\n\n      // Annotate with entity identifier\n      content.appEntityIdentifiers = [\n          EntityIdentifier(for: MessageEntity.self, identifier: message.id)\n      ]\n      // Schedule the notification\n  }\n\n  // (b) Now Playing — most specific to least specific\n  import NowPlaying\n\n  final class CosmoTunesMediaSession: MediaSessionRepresentable {\n      var content: (any MediaContentRepresentable)? {\n          var content = MusicContent(id: track.id.uuidString, songTitle: track.title /* ... */)\n          content.appEntityIdentifiers = [\n              EntityIdentifier(for: SongEntity.self, identifier: track.id),\n              EntityIdentifier(for: ArtistEntity.self, identifier: track.session.artistName),\n              EntityIdentifier(for: PlaylistEntity.self, identifier: currentPlaylist.id),\n          ]\n          return content\n      }\n  }\n\n  // (c) AlarmKit\n  import AlarmKit\n\n  func scheduleAlarm(_ alarm: Alarm) async throws {\n      let configuration = AlarmManager.AlarmConfiguration\u003cCosmoTunesAlarmMetadata>.alarm(\n          schedule: schedule,\n          attributes: attributes,\n          appEntityIdentifier: EntityIdentifier(for: AlarmEntity.self, identifier: alarm.id),\n          stopIntent: DismissAlarmIntent(),\n          secondaryIntent: SnoozeAlarmIntent(),\n          sound: sound\n      )\n      // Schedule alarm\n  }"]},"related":[{"id":"240","title":"Build intelligent Siri experiences with App Schemas","gloss":"用 App Schemas 打造智慧 Siri 體驗","gloss_en":"Build intelligent Siri experiences with App Schemas","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"297","title":"Best practices for integrating visual intelligence in your app","gloss":"在 App 中整合視覺智慧的最佳實務","gloss_en":"Best practices for integrating visual intelligence in your app","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"310","title":"What’s new in Shortcuts","gloss":"捷徑有什麼新東西","gloss_en":"What's new in Shortcuts","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"344","title":"Code-along: Make your app available to Siri","gloss":"程式碼實作：讓你的 App 可被 Siri 使用","gloss_en":"Code-along: Make your app available to Siri","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"347","title":"Secure your app: mitigate risks to agentic features","gloss":"保護你的 App：降低 agentic 功能的風險","gloss_en":"Secure your app: mitigate risks to agentic features","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
