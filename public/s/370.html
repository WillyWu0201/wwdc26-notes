<script id="d" type="application/json">{"s":{"id":"370","title":"Elevate your app’s text experience with TextKit","gloss":"用 TextKit 提升 App 的文字體驗","category":"uikit","categoryLabel":"UIKit","duration":1426,"url":"https://developer.apple.com/videos/play/wwdc2026/370/","takeaway":"結合內建文字視圖的便利與 TextKit 的掌控力,用新 API 做出行號、可折疊段落與可重用的文字附件視圖等進階文字體驗。","chapters":[[0,"Introduction"],[189,"TextKit architecture"],[557,"What's new in TextKit"],[587,"NSTextViewportRenderingSurface conformance"],[625,"NSTextViewportRenderingSurfaceKey and NSMapTable"],[687,"Extending framework text views"],[759,"UITextView/NSTextView in SwiftUI via ViewRepresentable"],[778,"Example: Code editor with line numbers"],[813,"ContainerView with TextView and line number view"],[882,"Three NSTextViewportLayoutControllerDelegate overrides"],[959,"startingLineNumber(for:) using enumerateTextElements"],[1022,"DidLayout: convert frames to viewport coordinates"],[1036,"Draw line numbers in ContainerView closure"],[1072,"Example: Collapsible recipe sections"],[1162,"Collapsible sections: full TextView class"],[1196,"Text attachments and view provider reuse"],[1326,"Text attachment view provider reuse policy"],[1380,"Next steps"]],"points":[{"text":"用新 API**結合內建文字視圖的便利與 TextKit 的底層掌控力**,提升 App 的文字體驗。","hot":false},{"text":"新增 **NSTextViewportRenderingSurface** conformance,讓自訂 UIView 直接作為 viewport 的渲染表面(搭配 NSMapTable 快取)。","hot":true},{"text":"可在 SwiftUI 中以 **UIViewRepresentable / NSViewRepresentable** 包裝 UITextView/NSTextView。","hot":false},{"text":"範例:用 **NSTextViewportLayoutControllerDelegate** 的三個 override + enumerateTextElements 算出起始行號,在 ContainerView 畫行號;另示範可折疊段落。","hot":false},{"text":"文字附件可用 **register(_:forTextAttachmentViewProviderType:)** 設定 view provider 的重用策略(如 .onEditingInlineParagraphs)。","hot":false}],"apis":["TextKit","NSTextViewportRenderingSurface","NSTextViewportLayoutController","NSTextViewportLayoutControllerDelegate","NSTextContentStorage","NSTextLayoutFragment","NSTextContentStorageDelegate","UITextView","NSTextView","UIViewRepresentable","NSMapTable"],"audience":"**需要進階文字排版(程式碼編輯器、行號、可折疊段落、自訂附件)、想善用 TextKit 的 UIKit/AppKit 開發者。**","gloss_en":"Elevate your app's text experience with TextKit","takeaway_en":"Combine the convenience of built-in text views with the control of TextKit, using new APIs to build advanced text experiences like line numbers, collapsible paragraphs, and reusable text attachment views.","points_en":[{"text":"Use new APIs to **combine the convenience of built-in text views with the low-level control of TextKit**, elevating your app's text experience.","hot":false},{"text":"Adds **NSTextViewportRenderingSurface** conformance, letting a custom UIView serve directly as the viewport's rendering surface (with NSMapTable caching).","hot":true},{"text":"In SwiftUI, wrap UITextView/NSTextView with **UIViewRepresentable / NSViewRepresentable**.","hot":false},{"text":"Example: use **NSTextViewportLayoutControllerDelegate**'s three overrides plus enumerateTextElements to compute the starting line number and draw line numbers in a ContainerView; also demonstrates collapsible paragraphs.","hot":false},{"text":"For text attachments, use **register(_:forTextAttachmentViewProviderType:)** to set the view provider's reuse policy (such as .onEditingInlineParagraphs).","hot":false}],"audience_en":"**UIKit/AppKit developers who need advanced text layout (code editors, line numbers, collapsible paragraphs, custom attachments) and want to make the most of TextKit.**","code":["class MyView: UIView, NSTextViewportRenderingSurface {}","class MyView: UIView, NSTextViewportRenderingSurface {}\n\nvar cache: NSMapTable\u003cNSTextLayoutFragment, MyView>","// Using a TextView in SwiftUI\n\nimport SwiftUI\n\nstruct MyTextView: View {\n    var body: some View { TextViewRepresentable() }\n}\n\n#if os(macOS)\nstruct TextViewRepresentable: NSViewRepresentable {\n    func makeNSView(context: Context) -> NSTextView { \n      NSTextView() \n    }\n    func updateNSView(_ nsView: NSTextView, context: Context) {\n    }\n}\n#else\nstruct TextViewRepresentable: UIViewRepresentable {\n    func makeUIView(context: Context) -> UITextView {\n        UITextView() \n    }\n    func updateUIView(_ uiView: UITextView, context: Context) {\n    }\n}\n#endif","// Create a text view subclass for a code editor\n\nimport UIKit\n\nclass TextView: UITextView {}\n\nclass ContainerView: UIView {\n    let textView = TextView()\n    let lineNumberView = UIView()\n   \n    textView.font = UIFont.monospacedSystemFont\n}","// Override viewport controller delegate methods\n\nclass TextView: UITextView {\n    // Set up\n\t\toverride func textViewportLayoutControllerWillLayout(_ textViewportLayoutController: NSTextViewportLayoutController) {\n    \tsuper.textViewportLayoutControllerWillLayout(textViewportLayoutController)\n      //...\n    }\n\n    // Get paragraph bounds\n    override func textViewportLayoutController (_ textViewportLayoutController: NSTextViewportLayoutController, configureRenderingSurfaceFor textLayoutFragment: NSTextLayoutFragment) {\n\t\t\tsuper.textViewportLayoutController(textViewportLayoutController, configureRenderingSurfaceFor: textLayoutFragment)\n      //...\n    }\n\n    // Share accumulated info back to ContainerView\n\t\toverride func textViewportLayoutControllerDidLayout (_ textViewportLayoutController: NSTextViewportLayoutController) {\n\t\t  super.textViewportLayoutControllerDidLayout(textViewportLayoutController)\n      //...\n    }\n}","func startingLineNumber(for viewportRange: NSTextRange?) -> Int {\n    guard let viewportRange,\n          let storage = textLayoutManager?.textContentManager\n              as? NSTextContentStorage else { return 0 }\n    let startLocation = storage.documentRange.location\n    var count = 1\n    storage.enumerateTextElements(from: startLocation) { element in\n        guard let range = element.elementRange else { return true }\n        if range.location.compare(viewportRange.location)\n            != .orderedAscending { return false }\n        count += 1\n        return true\n    }\n    return count\n}","// Override viewport controller delegate methods\n\nclass TextView: UITextView {\n    private var lines: [CGRect] = []\n    private var startingLineNumber = 0\n    var onDidLayout: ((Int, [CGRect]) -> Void)?\n\n    // Share accumulated info back to ContainerView\n\t\toverride func textViewportLayoutControllerDidLayout (_ textViewportLayoutController: NSTextViewportLayoutController) {\n        super.textViewportLayoutControllerDidLayout(controller)\n        let origin = controller.viewportBounds.origin\n        onDidLayout?(startingLineNumber, lines.map {$0.offsetBy(dx: 0, dy: -origin.y) })\n    }\n}","// Draw line numbers in the ContainerView\n\nclass ContainerView: UIView {\n    let textView = TextView()\n    let lineNumberView = UIView()\n    func setup() {\n        textView.onDidLayout = {startingLineNumber, lines in\n            let attributes: [NSAttributedString.Key: Any] = [\n                .font: UIFont.monospacedSystemFont(ofSize: 11, weight: .regular),\n                .foregroundColor: UIColor.secondaryLabel\n            ]\n            for (i, frame) in lines.enumerated() {\n                let number = \"\\(startingLineNumber + i)\" as NSString\n                number.draw(at: CGPoint(x: 8, y: frame.minY),\n                    withAttributes: attributes)\n            }\n        }\n    }\n}","// Add collapsible sections to your text view\n\nclass TextView: UITextView, NSTextContentStorageDelegate {\n    var collapsedSections: Set\u003cInt> = []\n\n    // Set up\n\t\toverride func textViewportLayoutControllerWillLayout(_ textViewportLayoutController: NSTextViewportLayoutController) {\n    \tsuper.textViewportLayoutControllerWillLayout(textViewportLayoutController)\n      //...\n    }\n\n    // Get paragraph bounds\n    override func textViewportLayoutController (_ textViewportLayoutController: NSTextViewportLayoutController, configureRenderingSurfaceFor textLayoutFragment: NSTextLayoutFragment) {\n\t\t\tsuper.textViewportLayoutController(textViewportLayoutController, configureRenderingSurfaceFor: textLayoutFragment)\n      //...\n    }\n\n    // Share accumulated info back to ContainerView\n\t\toverride func textViewportLayoutControllerDidLayout (_ textViewportLayoutController: NSTextViewportLayoutController) {\n\t\t  super.textViewportLayoutControllerDidLayout(textViewportLayoutController)\n      //...\n    }\n  \n    // Skip layout for paragraphs marked as collapsed\n    func textContentManager(shouldEnumerate textElement: NSTextElement, options: NSTextContentManager.EnumerationOptions) -> Bool {\n      //...\n    }\n\n    // Handle section collapse toggling\n    func toggleSection(headerOffset: Int) {\n        if collapsedSections.contains(headerOffset) {\n            collapsedSections.remove(headerOffset)\n        } else {\n            collapsedSections.insert(headerOffset)\n        }\n        guard let textLayoutManager = textLayoutManager else { return }\n\n        let textViewportLayoutController = textLayoutManager.textViewportLayoutController\n        textViewportLayoutController.delegate?.textViewportLayoutControllerReceivedSetNeedsLayout?(textViewportLayoutController)\n    }\n}","// Cache text attachment view providers\n\nimport UIKit\n\nclass ViewController: UIViewController {\n\n    var textView: UITextView\n    \n    func setupTextView() {\n        textView = UITextView()\n        textView.register(\n            [.onEditingInlineParagraphs],\n            forTextAttachmentViewProviderType: AnimatedAttachmentViewProvider.self\n        )\n    }\n}"]},"related":[{"id":"203","title":"Read between the strokes with PencilKit","gloss":"用 PencilKit 解讀筆跡內容","gloss_en":"Read handwriting content with PencilKit","category":"uikit","categoryLabel":"UIKit"},{"id":"212","title":"Rev up your CarPlay app","gloss":"強化你的 CarPlay App","gloss_en":"Rev up your CarPlay app","category":"uikit","categoryLabel":"UIKit"},{"id":"219","title":"Enhance the accessibility of your reading app","gloss":"強化你閱讀類 App 的無障礙體驗","gloss_en":"Enhance the accessibility of your reading app","category":"uikit","categoryLabel":"UIKit"},{"id":"221","title":"Prepare your tvOS apps for Dynamic Type","gloss":"讓你的 tvOS App 支援動態字型","gloss_en":"Prepare your tvOS app for Dynamic Type","category":"uikit","categoryLabel":"UIKit"},{"id":"226","title":"Create live communication experiences","gloss":"打造即時通訊體驗","gloss_en":"Build live communication experiences","category":"uikit","categoryLabel":"UIKit"}]}</script>
