<script id="d" type="application/json">{"s":{"id":"299","title":"Create robust evaluations for agentic apps","gloss":"為 agentic App 建立穩健的評估","category":"ai","categoryLabel":"AI 與機器學習","duration":1288,"url":"https://developer.apple.com/videos/play/wwdc2026/299/","takeaway":"運用 Evaluations 框架以 makeSamples 產生合成資料、驗證樣本，並用 TrajectoryExpectation 評估工具呼叫的順序與引數，打造穩健的 agentic 評估。","chapters":[[0,"Introduction"],[141,"The dataset problem in BookTracker"],[226,"Generating synthetic data with makeSamples"],[316,"Generate synthetic data with makeSamples"],[353,"Configure a custom SampleGenerator"],[387,"Customizing generation with SampleGenerator"],[518,"Sampling strategies"],[611,"Validating synthetic samples"],[637,"Validate generated samples"],[658,"Access valid and invalid results"],[784,"Comparing evaluation results"],[909,"Tool calling and tool evaluations"],[930,"Define a tool's Generable argument"],[997,"A basic trajectory expectation"],[1027,"Match arguments by intent (naturalLanguage)"],[1054,"Expect tool calls in order"],[1075,"Disallow specific tool calls"],[1094,"Build a tool call evaluation"],[1134,"Trajectory expectations"],[1160,"Synthesize tool-evaluation samples"],[1191,"Validate tool-evaluation samples"],[1286,"Building a tool call evaluation"],[1322,"Synthetic data for tool evaluations"],[1429,"Next steps"]],"points":[{"text":"用 **makeSamples** 與自訂 **SampleGenerator** 產生多樣化的**合成資料**，解決評估資料集不足的問題。","hot":true},{"text":"透過 **validator** 閉包驗證樣本，並可分別存取 valid 與 **invalidSamples**，再比較不同評估結果。","hot":false},{"text":"以 **TrajectoryExpectation** 與 **ToolExpectation** 評估工具呼叫，支援 ordered／unordered 與 disallowed。","hot":false},{"text":"引數比對提供 **.exact、.naturalLanguage、.keyOnly、.range、.contains** 等 matcher，可依語意而非字面匹配。","hot":false},{"text":"用 **ToolCallEvaluator** 搭配 Metric（allPass／percentagePass）建立完整的工具呼叫評估流程。","hot":false}],"apis":["Evaluations","makeSamples","SampleGenerator","ModelSample","TrajectoryExpectation","ToolExpectation","ToolCallEvaluator","Metric","Generable","Guide","PrivateCloudComputeLanguageModel"],"audience":"**建構 agentic 或工具呼叫型 AI 功能**、需要系統化評估模型行為與品質的開發者。","gloss_en":"Create robust evaluations for agentic apps","takeaway_en":"Use the Evaluations framework to generate synthetic data with makeSamples, validate samples, and assess the order and arguments of tool calls with TrajectoryExpectation to build robust agentic evaluations.","points_en":[{"text":"Use **makeSamples** with a custom **SampleGenerator** to generate diverse **synthetic data**, solving the problem of insufficient evaluation datasets.","hot":true},{"text":"Validate samples with a **validator** closure, access valid and **invalidSamples** separately, and compare different evaluation results.","hot":false},{"text":"Evaluate tool calls with **TrajectoryExpectation** and **ToolExpectation**, supporting ordered/unordered and disallowed.","hot":false},{"text":"Argument matching offers matchers like **.exact, .naturalLanguage, .keyOnly, .range, .contains**, matching by meaning rather than literal text.","hot":false},{"text":"Use **ToolCallEvaluator** with a Metric (allPass/percentagePass) to build a complete tool-call evaluation flow.","hot":false}],"audience_en":"**Developers building agentic or tool-calling AI features** who need to systematically evaluate model behavior and quality.","code":["// Synthetic data\n  let prompt = Prompt(\"\"\"\n      Generate diverse range of book reviews and corresponding tags.\n      Cover a wide range of genres, time periods, cultures, and\n      reader personas. Do not repeat books already in the dataset.\n      \"\"\")\n  \n  let dataset = Book.sampleBooks.map { book in\n      ModelSample(prompt: book.review, expected: BookTags(tags: book.tags))\n  }\n  \n  let targetCount = 100\n  var expandedDataset = dataset\n\n  for try await sample in dataset.makeSamples(prompt, targetCount: targetCount) {\n      expandedDataset.append(sample)\n      print(\"Generated \\(expandedDataset.count) samples so far.\")\n  }\n\n  2. Configure a custom SampleGenerator — slides 30–43\n  \n  // Define your own configuration\n  let generator = SampleGenerator\u003cModelSample\u003cBookTags>>(\n      prompt,\n      samples: dataset,\n      targetCount: targetCount,\n      sessionProvider: {\n          LanguageModelSession( \n              model: PrivateCloudComputeLanguageModel(),\n              instructions: \"\"\"\n                  You are a synthetic data generator for a book-tracking app's evaluation suite.\n                  Your job is to produce realistic, diverse book entries that will stress-test\n                  a tagging system.\n\n                  Rules:\n                  - Review must be at least 100 characters long.\n                  - Review should cover a mix of genre, mood/tone, and themes.\n                  - Reviews should vary in length.\n                  - Create between 3 and 8 tags.\n                  - Tags must be lowercase.\n                  \"\"\" \n          )\n      }\n  )","// Define your own configuration\n  let generator = SampleGenerator\u003cModelSample\u003cBookTags>>(\n      prompt,\n      samples: dataset,\n      targetCount: targetCount,\n      sessionProvider: {\n          LanguageModelSession( \n              model: PrivateCloudComputeLanguageModel(),\n              instructions: \"\"\"\n                  You are a synthetic data generator for a book-tracking app's evaluation suite.\n                  Your job is to produce realistic, diverse book entries that will stress-test\n                  a tagging system.\n\n                  Rules:\n                  - Review must be at least 100 characters long.\n                  - Review should cover a mix of genre, mood/tone, and themes.\n                  - Reviews should vary in length.\n                  - Create between 3 and 8 tags.\n                  - Tags must be lowercase.\n                  \"\"\" \n          )\n      }\n  )","// Define validation metrics\n  validator: { sample in\n      guard let book = sample.expected else { return false }\n\n      // Review must be at least 100 characters\n      guard sample.promptDescription.count >= 100 else { return false }\n\n      // Must have between 3 and 8 tags\n      guard (3...8).contains(book.tags.count) else { return false }\n\n      // All tags must be lowercase\n      guard book.tags.allSatisfy({ $0 == $0.lowercased() }) else { return false }\n\n      return true\n  }","// Accessing results\n  for try await sample in generator.run() {\n      // During iteration\n      expandedDataset.append(sample)\n  }\n\n  // After iteration\n  let allSamples = await generator.samples\n  let invalidSamples = await generator.invalidSamples\n  \n  print(\"Generated \\(allSamples.count) new samples. Total: \\(expandedDataset.count)\")","@Generable\n  struct SearchBooksArguments {\n      @Guide(description: \"A freeform search term to match against titles, reviews, or tags\")\n      var query: String?\n  \n      @Guide(description: \"Filter results to books with this specific tag\")\n      var tag: String?\n\n      @Guide(description: \"Filter results by mood\")\n      var mood: String?\n\n      @Guide(description: \"Filter results by genre\")\n      var genre: String?\n\n      @Guide(description: \"Maximum number of results to return. Defaults to 5.\")\n      var limit: Int? \n  }","// \"Find books tagged gothic\"\n  TrajectoryExpectation(\n      unordered: [\n          ToolExpectation(\n              \"searchBooks\",\n              arguments: [\n                  .exact(argumentName: \"tag\", value: .string(\"gothic\"))\n              ]\n          )\n      ]\n  )","// \"Find something cheerful\"\n  TrajectoryExpectation(\n      \"searchBooks\",\n      arguments: [\n          .naturalLanguage(\n              argumentName: \"mood\",\n              criteria: \"Should relate to uplifting, hopeful, or positive feelings\"\n          )\n      ]\n  )\n  Other matchers available: .contains, .oneOf, .pattern, .range, and more.","// \"Find gothic books and show details on the first\"\n  TrajectoryExpectation(\n      ordered: [\n          ToolExpectation(\n              \"searchBooks\",\n              arguments: [\n                  .exact(argumentName: \"tag\", value: .string(\"gothic\"))\n              ]\n          ),\n          ToolExpectation(\n              \"getBookDetails\",\n              arguments: [\n                  .keyOnly(argumentName: \"bookId\")\n              ]\n          )\n      ]\n  )","// \"Show only sci-fi books. Don't look for similar ones.\"\n  TrajectoryExpectation(\n      unordered: [\n          ToolExpectation(\n              \"searchBooks\",\n              arguments: [\n                  .naturalLanguage(\n                      argumentName: \"genre\",\n                      criteria: \"Should refer to science fiction\")\n              ]\n          )\n      ],\n      disallowed: [\n          ToolExpectation(\"findSimilarBooks\")\n      ]\n  )","// Tool call evaluations\n  let samples = SampleArrayLoader(samples: [\n      ModelSample(\n          prompt: \"Find all the books tagged with 'gothic'.\",\n          instructions: \"Help the user explore their book collection.\",\n          expectations: TrajectoryExpectation(  )\n      )\n  ])\n\n  struct BookLibraryToolCallEval: Evaluation {\n      var dataset = samples\n\n      let pass = Metric(\"All Passed\")\n      let percent = Metric(\"Percentage Passed\")\n\n      var evaluators: Evaluators { \n          ToolCallEvaluator(allPass: pass, percentagePass: percent)\n      }\n  }","// Tool call evaluations\n  let prompt = Prompt(\"\"\"\n      Generate diverse user queries for a personal book library assistant.\n      Each sample needs a prompt (what the user says), and a trajectory\n      expectation describing which tools should be called and in what order.\n      \"\"\")\n\n  let instructions = \"\"\"\n      AVAILABLE TOOLS:\n      - searchBooks(query?, tag?, mood?, genre?, limit?): search the library\n      - getBookDetails(bookId): full details for one book\n      - findSimilarBooks(bookId, maxResults?): find books sharing tags\n      ORDER REQUIREMENTS:\n      - searchBooks must comes before getBookDetails or findSimilarBooks\n      - Use TrajectoryExpectation(ordered:) when sequence matters, else (unordered:)\n      USE THESE ARGUMENT MATCHERS:\n      - .exact for precise values, .naturalLanguage for fuzzy matching\n      - .keyOnly when any value is acceptable, .range for numeric constraints\n      - .contains/.hasPrefix/.hasSuffix for partial string matching\n      \"\"\"","// Tool call evaluations\n  validator: { sample in\n      // Must have expectations defined\n      guard sample.output.expectations != nil else { return false }\n\n      let expectations = sample.output.expectations!\n\n      // Must reference at least one tool\n      let totalExpectations = expectations.ordered.count + expectations.unordered.count\n      guard totalExpectations > 0 else { return false }\n\n      // All tool names must be from the valid set\n      let validTools: Set\u003cString> = [\"searchBooks\", \"getBookDetails\", \"findSimilarBooks\"]\n      let allExpectations = expectations.ordered + expectations.unordered + expectations.disallowed\n      for expectation in allExpectations {\n          guard validTools.contains(expectation.name) else { return false }\n      }\n  \n      return true\n  }\n\n  ---"]},"related":[{"id":"298","title":"Meet the Evaluations framework","gloss":"認識 Evaluations 框架","gloss_en":"Meet the Evaluations framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"246","title":"LLM search using Core Spotlight","gloss":"使用 Core Spotlight 的 LLM 搜尋","gloss_en":"LLM search using Core Spotlight","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"242","title":"Build agentic app experiences with the Foundation Models framework","gloss":"用 Foundation Models 框架打造 agentic App 體驗","gloss_en":"Build agentic app experiences with Foundation Models","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
