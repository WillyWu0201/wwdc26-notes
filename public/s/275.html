<script id="d" type="application/json">{"s":{"id":"275","title":"Code-along: Add persistence with SwiftData","gloss":"程式碼實作：用 SwiftData 加入持久化","category":"swiftui","categoryLabel":"SwiftUI","duration":1355,"url":"https://developer.apple.com/videos/play/wwdc2026/275/","takeaway":"跟著實作把現有 App 加上 SwiftData 持久化：以 @Model 定義模型與關聯，再用 @Query 在 SwiftUI 中動態查詢資料。","chapters":[[0,"Introduction"],[65,"Identify relevant state"],[197,"Define your schemas"],[219,"Convert Activity to a persistent model with @Model"],[366,"Add Codable conformance to TripCollection"],[581,"Define model relationships"],[632,"Set up model relationships between Trip, TripImage, and Activity"],[801,"Enable interoperability between your schema and SwiftUI views"],[813,"Update the view layer"],[987,"Fetch achieved and upcoming goals"],[1009,"Fetch recent trips"],[1046,"Dynamically construct a query in the initializer of TripCollectionView"],[1093,"Search for trips and activities by name"],[1182,"Capture and report errors from ActivityItemView"],[1264,"Update dateEdited and propagate side effects on property changes"],[1307,"Next steps"]],"points":[{"text":"跟著實作為現有 App 加上持久化：用 **@Model** 把 Activity、Trip 等類別轉成持久化模型。","hot":true},{"text":"以 **@Relationship**（含 deleteRule 與 inverse）定義 Trip、TripImage、Activity 之間的關聯。","hot":false},{"text":"在 SwiftUI 中用 **@Query** 搭配 **#Predicate** 與 **FetchDescriptor** 動態查詢、排序與限制筆數，並支援依名稱搜尋。","hot":false},{"text":"用 **ModelContainer** 設定容器與種子資料，並在 View 中捕捉與回報儲存錯誤。","hot":false},{"text":"透過 **withContinuousObservation** 觀察屬性變更，更新 dateEdited 並連動處理副作用。","hot":false}],"apis":["SwiftData","@Model","@Query","@Relationship","#Predicate","FetchDescriptor","ModelContainer"],"audience":"**想為 SwiftUI App 加入本地持久化**、正要上手或深入 SwiftData 的開發者。","gloss_en":"Code-along: Add persistence with SwiftData","takeaway_en":"Follow along to add SwiftData persistence to an existing app: define models and relationships with @Model, then query data dynamically in SwiftUI with @Query.","points_en":[{"text":"Follow along to add persistence to an existing app: use **@Model** to turn classes like Activity and Trip into persistent models.","hot":true},{"text":"Use **@Relationship** (including deleteRule and inverse) to define the relationships between Trip, TripImage, and Activity.","hot":false},{"text":"In SwiftUI, use **@Query** with **#Predicate** and **FetchDescriptor** to dynamically query, sort, and limit results, with support for searching by name.","hot":false},{"text":"Use **ModelContainer** to configure the container and seed data, and catch and report save errors in the view.","hot":false},{"text":"Use **withContinuousObservation** to observe property changes, update dateEdited, and handle side effects in tandem.","hot":false}],"audience_en":"**Developers who want to add local persistence to a SwiftUI app** and are just getting started with or going deeper into SwiftData.","code":["import Foundation\nimport SwiftData\n\n// SwiftData automatically generates Observable conformance\n@Model\nclass Activity {\n    var name: String\n    var isComplete: Bool = false\n    var dateCreated = Date.now\n    var dateEdited = Date.now\n}","enum TripCollection: String, CaseIterable, RawRepresentable, Codable {\n    case springEscapes\n    case summerVibes\n    case fallGetaways\n    case winterRetreats\n}","import Foundation\nimport SwiftData\n\n@Model\nclass Trip {\n    var name: String\n    var collection: TripCollection\n  \n    var photo: TripImage\n    var thumbnailData: Data?\n  \n    @Relationship(deleteRule: .cascade, inverse: \\Activity.trip)\n    var activities: [Activity] = []\n  \n    private(set) var creationDate = Date.now\n    var subtitle: String?\n    var isComplete: Bool = false\n}","import SwiftUI\nimport SwiftData\n\n@main\nstruct WishlistApp: App {\n    let container: ModelContainer = {\n        do {\n            let modelContainer = try ModelContainer(for: Trip.self, Activity.self, TripImage.self, Goal.self, TripGoal.self, ActivityGoal.self)\n            try SampleData.seedIfNeeded(in: modelContainer.mainContext)\n            return modelContainer\n        } catch {\n            fatalError(\"Could not create model container: \\(error)\")\n        }\n    }()\n\n    var body: some Scene {\n        WindowGroup {\n            ContentView()\n                .preferredColorScheme(.dark)\n        }\n        .modelContainer(container)\n    }\n}","@Query(filter: #Predicate\u003cGoal> { $0.isAchieved }, sort: \\Goal.dateAchieved, order: .reverse)\nprivate var achievedGoals: [Goal]\n\n@Query(filter: #Predicate\u003cGoal> { !$0.isAchieved }, sort: \\Goal.sortOrder)\nprivate var upcomingGoals: [Goal]","import SwiftUI\nimport SwiftData\n\nstruct RecentTripsPageView: View {\n    // Fetch most recent trips in reverse chronological order\n    @Query(FetchDescriptor\u003cTrip>(sortBy: [SortDescriptor(\\Trip.creationDate, order: .reverse)], fetchLimit: 5))\n    private var trips: [Trip]\n\n    @Namespace private var namespace\n\n    var body: some View {\n        TabView {\n            ForEach(trips) { trip in\n                NavigationLink {\n                    TripDetailView(trip: trip)\n                        .navigationTransition(\n                            .zoom(sourceID: trip.id, in: namespace))\n                } label: {\n                    TripImageView(trip: trip)\n                        .overlay(alignment: .bottomLeading) {\n                            VStack(alignment: .leading) {\n                                Text(\"RECENTLY ADDED\")\n                                    .font(.subheadline)\n                                    .fontWeight(.bold)\n                                    .foregroundStyle(.limeGreen)\n\n                                Text(trip.name)\n                                    .font(.title)\n                                    .fontWidth(.expanded)\n                                    .fontWeight(.medium)\n                                    .foregroundStyle(.primary)\n                            }\n                            .padding(.horizontal)\n                            .padding(.bottom, 54)\n                        }\n                        .matchedTransitionSource(id: trip.id, in: namespace)\n                }\n                .buttonStyle(.plain)\n            }\n        }\n        .tabViewStyle(.page)\n        .containerRelativeFrame([.horizontal, .vertical]) { length, axis in\n            if axis == .vertical {\n                return length / 1.3\n            } else {\n                return length\n            }\n        }\n    }\n}","init(tripCollection: TripCollection, cardSize: TripCard.Size, namespace: Namespace.ID) {\n    _trips = Query(filter: #Predicate\u003cTrip> { $0.collection == tripCollection }, sort: \\Trip.name)\n    self.tripCollection = tripCollection\n    self.cardSize = cardSize\n    self.namespace = namespace\n}","import SwiftUI\nimport SwiftData\n\nprivate struct SearchResultsListView: View {\n    @Query(sort: \\Trip.name) private var trips: [Trip]\n    @Query(sort: \\Activity.name) private var activities: [Activity]\n\n    var searchText: String\n    var namespace: Namespace.ID\n\n    init(searchText: String, namespace: Namespace.ID) {\n        self.searchText = searchText\n        self.namespace = namespace\n\n        if searchText.isEmpty {\n            _trips = Query(FetchDescriptor(sortBy: [SortDescriptor(\\Trip.creationDate, order: .reverse)], fetchLimit: 3))\n            _activities = Query(filter: #Predicate\u003cActivity> { _ in false })\n        } else {\n            // All trips whose name matches searchText, sorted lexicographically\n            let tripSearchPredicate = #Predicate\u003cTrip> { $0.name.localizedStandardContains(searchText) }\n            _trips = Query(filter: tripSearchPredicate, sort: \\Trip.name)\n            // All matching activities that belong to a trip\n            let activitySearchPredicate = #Predicate\u003cActivity> { $0.trip != nil && $0.name.localizedStandardContains(searchText) }\n            _activities = Query(filter: activitySearchPredicate, sort: \\Activity.name)\n        }\n    }\n\n    var body: some View {\n        List {\n            if !trips.isEmpty {\n                TripSearchSectionView(trips: trips, namespace: namespace, title: searchText.isEmpty ? \"Recent Trips\" : \"Trips\")\n            }\n\n            if !activities.isEmpty {\n                ActivitySearchSectionView(activities: activities)\n            }\n        }\n        .overlay {\n            if trips.isEmpty && activities.isEmpty {\n                ContentUnavailableView(\n                    \"No results for “\\(searchText)”\",\n                    systemImage: \"magnifyingglass\",\n                    description: Text(\"Check spelling or try a new search.\")\n                )\n            }\n        }\n        .listStyle(.plain)\n    }\n}","var body: some View {\n    HStack(alignment: .firstTextBaseline, spacing: 17) {\n        Group {\n            if isEditing {\n                rowContentWhenEditing\n            } else {\n                rowContentWhenNotEditing\n            }\n        }\n        .transition(.opacity.animation(.snappy))\n        .animation(.snappy, value: isEditing)\n    }\n    .onDisappear {\n        do {\n            try updateGoalAchievements()\n        } catch {\n            updateError = error\n            reportError(error)\n        }\n    }\n    .alert(error: $updateError) {\n        // Customize the presentation of the error\n    }\n}","init(activity: Activity, isLast: Bool, isEditing: Bool) {\n    activity.token = withContinuousObservation(options: .didSet) { event in\n        _ = activity.name\n        _ = activity.isComplete\n\n        if event.matches(\\Activity.name) {\n            activity.dateEdited = .now\n        }\n\n        if event.matches(\\Activity.isComplete) {\n            activity.dateEdited = .now\n            activity.trip?.isComplete = activity.trip?.activities.isEmpty == false\n            && activity.trip?.activities.allSatisfy { $0.isComplete } == true\n        }\n    }\n    self.activity = activity\n    self.isLast = isLast\n    self.isEditing = isEditing\n}"]},"related":[{"id":"240","title":"Build intelligent Siri experiences with App Schemas","gloss":"用 App Schemas 打造智慧 Siri 體驗","gloss_en":"Build intelligent Siri experiences with App Schemas","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"274","title":"What’s new in SwiftData","gloss":"SwiftData 的新功能","gloss_en":"What's new in SwiftData","category":"swift","categoryLabel":"Swift"},{"id":"8017","title":"SwiftData Group Lab","gloss":"SwiftData 團體實驗室","gloss_en":"SwiftData Group Lab","category":"swift","categoryLabel":"Swift"},{"id":"223","title":"Live Activities essentials","gloss":"Live Activities 核心要點","gloss_en":"Live Activities essentials","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"269","title":"What’s new in SwiftUI","gloss":"SwiftUI 的新功能","gloss_en":"What's new in SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"}]}</script>
