<script id="d" type="application/json">{"s":{"id":"330","title":"Optimize custom machine learning operations with Metal tensors","gloss":"用 Metal tensors 最佳化自訂機器學習運算","category":"graphics","categoryLabel":"圖形與遊戲","duration":973,"url":"https://developer.apple.com/videos/play/wwdc2026/330/","takeaway":"運用 Metal Tensor API 與 MPP Tensor Ops，以量化張量與 cooperative tensor 打造高效能的自訂 ML 運算核心。","chapters":[[0,"Introduction"],[21,"Apple's ML software stack"],[145,"Managing quantized data"],[233,"Create a quantized MTLTensor"],[263,"Multi-plane tensors"],[288,"Declare a multi-plane tensor with scale factors"],[317,"Quantized matrix multiplication"],[367,"MSL type aliases for an MXFP8 tensor handle"],[411,"Declare an inline MXFP8 tensor on the stack"],[439,"Slice tensors and run a quantized matmul"],[571,"Building advanced ops"],[627,"Set up simdgroup-scoped QxK multiplication"],[678,"Compute row-wise reduction for SoftMax"],[716,"Compute element-wise SoftMax with map_iterator"],[753,"Reuse cooperative tensor as matmul input"],[815,"Integrating custom ops into Core AI"],[925,"Next steps"]],"points":[{"text":"介紹 Apple 的 ML 軟體堆疊，並說明 **Metal Tensor API** 與 MPP Tensor Ops 的定位。","hot":false},{"text":"用 **MTLTensor** 搭配量化資料型別（如 MetalFloat8E4M3）管理量化資料。","hot":false},{"text":"透過 **auxiliary plane** 宣告帶 scale factors 的 multi-plane tensor，支援 MXFP8 區塊量化。","hot":true},{"text":"以 **matmul2d** 執行量化矩陣乘法，TensorOps 會自動處理反量化。","hot":false},{"text":"用 **cooperative tensor** 與 map_iterator 打造 SoftMax 等進階運算，並可整合進 Core AI。","hot":false}],"apis":["Metal","MTLTensor","MTLTensorDescriptor","MTLTensorAuxiliaryPlaneDescriptor","matmul2d","metal_tensor","MetalPerformancePrimitives"],"audience":"撰寫 **自訂 Metal ML 核心或高效能推論運算** 的進階圖形與機器學習開發者。","gloss_en":"Optimize custom machine learning operations with Metal tensors","takeaway_en":"Use the Metal Tensor API and MPP Tensor Ops with quantized tensors and cooperative tensors to build high-performance custom ML compute kernels.","points_en":[{"text":"Introduces Apple's ML software stack and explains where the **Metal Tensor API** and MPP Tensor Ops fit in.","hot":false},{"text":"Use **MTLTensor** with quantized data types (such as MetalFloat8E4M3) to manage quantized data.","hot":false},{"text":"Declare a multi-plane tensor with scale factors via an **auxiliary plane** to support MXFP8 block quantization.","hot":true},{"text":"Use **matmul2d** to perform quantized matrix multiplication; TensorOps handles dequantization automatically.","hot":false},{"text":"Use a **cooperative tensor** with map_iterator to build advanced operations like SoftMax, and integrate them into Core AI.","hot":false}],"audience_en":"Advanced graphics and machine learning developers writing **custom Metal ML kernels or high-performance inference operations**.","code":["// Creating a tensor with a quantized data type from device\n\n#define RANK 2\n\nMTLTensorDescriptor *tensorDesc = [MTLTensorDescriptor new];\n\ntensorDesc.dataType = MTLTensorDataTypeMetalFloat8E4M3;\ntensorDesc.usage = MTLTensorUsageCompute;\n\nNSInteger dimensions[RANK] = {NumCols, NumRows};\ntensorDesc.dimensions = [[MTLTensorExtents alloc] initWithRank:RANK values:dimensions];\n\nNSError *err = nil;\nid \u003cMTLTensor> tensor = [device newTensorWithDescriptor:tensorDesc error:&err];","// Creating a tensor with a scales auxiliary plane from device\n\n#define RANK 2\n\nMTLTensorAuxiliaryPlaneDescriptor *planeDesc = [MTLTensorAuxiliaryPlaneDescriptor new];\nplaneDesc.dataType = MTLTensorDataTypeMetalFloat8UE8M0;\n\nNSInteger blockFactors[RANK] = {32, 1};\nplaneDesc.blockFactors = [[MTLTensorExtents alloc] initWithRank:RANK values:blockFactors];\n\nMTLTensorAuxiliaryPlaneDescriptorMap *auxiliaryPlanes =\n    [MTLTensorAuxiliaryPlaneDescriptorMap new];\n[auxiliaryPlanes setDescriptor:planeDesc forPlane:MTLTensorPlaneTypeScales];\n\nMTLTensorDescriptor *tensorDesc = [MTLTensorDescriptor new];\ntensorDesc.dataType = MTLTensorDataTypeMetalFloat8E4M3;\ntensorDesc.usage = MTLTensorUsageCompute;\n\nNSInteger dimensions[RANK] = {NumCols, NumRows};\ntensorDesc.dimensions = [[MTLTensorExtents alloc] initWithRank:RANK values:dimensions];\ntensorDesc.auxiliaryPlanes = auxiliaryPlanes;\n\nNSError *err = nil;\nid \u003cMTLTensor> tensor = [device newTensorWithDescriptor:tensorDesc error:&err];","// Type aliases for a MXFP8 multi-plane tensor handle\n\n#include \u003cmetal_tensor>\n\nusing namespace metal;\n\nusing scales_plane = tensor_blockwise\u003ctensor_plane_scales,\n                                      device metal_fp8_ue8m0_format,\n                                      32, 1>;\n\nusing mxfp8_tensor = tensor\u003cdevice metal_fp8_e4m3_format,\n                            dextents\u003cint, 2>,\n                            tensor_handle,\n                            scales_plane>;\n\nkernel void matmul(mxfp8_tensor matrixA [[buffer(0)]],\n                   mxfp8_tensor matrixB [[buffer(1)]],\n                   tensor\u003cdevice half, dextents\u003cint, 2>> matrixC [[buffer(2)]])\n{\n    // ...\n}","// Type aliases for a MXFP8 multi-plane tensor inline\n\n#include \u003cmetal_tensor>\n\nusing namespace metal;\n\nusing scales_plane = tensor_blockwise\u003ctensor_plane_scales,\n                                      device metal_fp8_ue8m0_format,\n                                      32, 1>;\n\nusing mxfp8_tensor_inline = tensor\u003cdevice metal_fp8_e4m3_format,\n                                   dextents\u003cint, 2>,\n                                   tensor_inline,\n                                   scales_plane>;\n\n// Construct tensor on the stack from buffer pointers\nmxfp8_tensor_inline matrixA(dataBufferA,\n                             dextents\u003cint, 2>(K, M),\n                             array\u003cint, 2>({ 1, K }),\n                             scales_plane(scalesBufferA));","// Slice the tensors to extract the relevant tile\nauto tA = matrixA.slice(0, tgid.y * TILEM);\nauto tB = matrixB.slice(tgid.x * TILEN, 0);\nauto tC = matrixC.slice(tgid.x * TILEN, tgid.y * TILEM);\n\n// Set up the matmul descriptor\nconstexpr auto descriptor = matmul2d_descriptor(TILEM,                  // M\n                                                TILEN,                  // N\n                                                dynamic_length_v\u003cint>,  // K\n                                                false,   // Left matrix transposed\n                                                false);  // Right matrix transposed\n\nmatmul2d\u003cdescriptor, execution_simdgroups\u003c4>> op;\n\n// Run the op — TensorOps handles dequantization automatically\nop.run(tA, tB, tC);","// Setup QxK matrix multiplication op\nconstexpr auto mul_qk_op_desc = matmul2d_descriptor(/* ... */);\nmatmul2d\u003cmul_qk_op_desc, execution_simdgroups> mul_qk_op;\n\n// Slice Q, K, V\nauto tQSlice = tQ.slice\u003cD, ROWS_PER_SIMD>(0, sgid * ROWS_PER_SIMD);\nauto tKSlice = tK.slice\u003cD, BK>(0, k);\nauto tVSlice = tV.slice\u003cD, BK>(0, k);\n\n// Create cooperative tensor to store tile of QxK\nauto ctQK = mul_qk_op.get_destination_cooperative_tensor\u003cdecltype(tQSlice),\n                                                         decltype(tKSlice),\n                                                         float>();\n\n// Multiply QxK\nmul_qk_op.run(tQSlice, tKSlice, ctQK);","// Create a cooperative tensor to store row reduction output\nauto ctTileRowMax = mul_qk_op.get_row_reduction_destination_cooperative_tensor\u003c\n                        decltype(tQSlice),\n                        decltype(tKSlice),\n                        float>();\n\n// Compute max over each row of QxK tile\nreduce_rows(ctQK, ctTileRowMax, reduction_operation::max, -INFINITY);","// Iterate over elements of QxK tile\n#pragma clang loop unroll(full)\nfor (auto it = ctQK.begin(); it != ctQK.end(); it++) {\n    // Fetch row max corresponding to this element\n    auto row_it = ctRowMax.map_iterator(it);\n\n    // Subtract row max from each element and compute exponent\n    *it = exp(*it - *row_it);\n}","constexpr auto mul_sv_op_desc = matmul2d_descriptor(/* ... */);\nmatmul2d\u003cmul_sv_op_desc, metal::execution_simdgroup> mul_sv_op;\n\nif (mul_sv_op.is_compatible_as_left_input\u003cfloat, half, float>(ctQK)) {\n    // Directly reuse cooperative tensor as input\n    auto ctQKIn = mul_sv_op.get_left_input_cooperative_tensor\u003cfloat, half, float>(ctQK);\n    mul_sv_op.run(ctQKIn, tVSlice, ctO);\n} else {\n    // Store and reload through threadgroup memory if layout is not compatible\n    ctQK.store(tgTensor);\n    simdgroup_barrier(mem_flags::mem_threadgroup);\n\n    auto ctQKIn = mul_sv_op.get_left_input_cooperative_tensor\u003cfloat, half, float>();\n    ctQKIn.load(tgTensor);\n    mul_sv_op.run(ctQKIn, tVSlice, ctO);\n}"]},"related":[{"id":"356","title":"Bringing Cyberpunk 2077 to Mac","gloss":"將《電馭叛客 2077》帶上 Mac","gloss_en":"Bringing Cyberpunk 2077 to Mac","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"359","title":"Build real-time neural rendering pipelines with Metal","gloss":"用 Metal 打造即時神經渲染管線","gloss_en":"Build real-time neural rendering pipelines with Metal","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"388","title":"Find and fix performance issues in your Metal games","gloss":"找出並修復 Metal 遊戲的效能問題","gloss_en":"Find and fix performance issues in your Metal games","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"322","title":"Compose advanced graphics effects with SwiftUI","gloss":"用 SwiftUI 組合進階圖形效果","gloss_en":"Compose advanced graphics effects with SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"325","title":"Dive into Core AI model authoring and optimization","gloss":"深入 Core AI 模型編寫與最佳化","gloss_en":"Dive into Core AI model authoring and optimization","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
