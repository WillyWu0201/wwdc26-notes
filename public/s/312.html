<script id="d" type="application/json">{"s":{"id":"312","title":"Meet the Now Playing framework","gloss":"認識 Now Playing 框架","category":"other","categoryLabel":"其他","duration":756,"url":"https://developer.apple.com/videos/play/wwdc2026/312/","takeaway":"用全新的 Now Playing 框架，讓 App 的媒體播放透過 MediaSession 連接到鎖定畫面等系統介面，並支援遠端播放與裝置控制。","chapters":[[0,"Introduction"],[68,"Media sessions"],[117,"Existing PlayerModel implementation"],[126,"Adopt MediaSessionRepresentable"],[271,"MediaSession initialization"],[303,"Remote media sessions"],[402,"App extension entry point"],[443,"Existing RemotePlayerModel implementation"],[460,"Adopt RemoteMediaSessionRepresentable in app extension"],[631,"Media sharing extensions"]],"points":[{"text":"全新的 **Now Playing** 框架讓 App 的播放狀態連接到**鎖定畫面等系統介面**，是現代化的 Swift 媒體整合方式。","hot":true},{"text":"讓 `@Observable` 的播放模型採用 **`MediaSessionRepresentable`**，提供 content、`playbackSnapshot` 與 `commands`，再以 `MediaSession` 建立連結。","hot":false},{"text":"透過 App extension 與 **`RemoteMediaSessionRepresentable`** 支援遠端媒體 session，並以 `MediaDevice` 描述喇叭與音量等裝置能力。","hot":false},{"text":"藝術圖透過 `Artwork` 以非同步方式依尺寸提供，命令（play／pause／next／previous）可直接綁定播放器或送往伺服器。","hot":false}],"apis":["NowPlaying","MediaSession","MediaSessionRepresentable","RemoteMediaSessionRepresentable","RemoteMediaSessionExtension","MediaContentRepresentable","MediaPlaybackSnapshot","MediaCommand","MediaDevice","Artwork"],"audience":"**開發音樂、Podcast、影音或任何媒體播放 App 的開發者**，想整合系統播放控制與遠端播放的人。","gloss_en":"Meet the Now Playing framework","takeaway_en":"Use the new Now Playing framework to connect your app's media playback to system surfaces like the Lock Screen through MediaSession, with support for remote playback and device control.","points_en":[{"text":"The new **Now Playing** framework connects your app's playback state to **system surfaces like the Lock Screen**, a modern Swift approach to media integration.","hot":true},{"text":"Have your `@Observable` playback model adopt **`MediaSessionRepresentable`**, providing content, `playbackSnapshot`, and `commands`, then establish the connection with `MediaSession`.","hot":false},{"text":"Support remote media sessions through an App extension and **`RemoteMediaSessionRepresentable`**, using `MediaDevice` to describe device capabilities like speakers and volume.","hot":false},{"text":"Artwork is provided asynchronously by size through `Artwork`, and commands (play/pause/next/previous) can bind directly to your player or be sent to a server.","hot":false}],"audience_en":"**Developers building music, podcast, video, or any media playback apps** who want to integrate system playback controls and remote playback.","code":["import Observation\n\n@Observable\nfinal class PlayerModel {\n    let player: SoundPlayer\n    var sound: Sound { player.currentSound }\n\n    init(player: SoundPlayer) {\n        self.player = player\n    }\n}","import NowPlaying\n\nextension PlayerModel: MediaSessionRepresentable {\n    var id: String { \"ambient-sound-session\" }\n\n    var content: (any MediaContentRepresentable)? {\n        return GenericContent(\n            id: sound.id,\n            title: sound.name,\n            subtitle: sound.description,\n            type: .audio,\n            duration: .live,\n            artwork: Artwork(id: sound.id) { size in\n                let data = try await self.artworkData(size: size)\n                return try ArtworkRepresentation(data: data)\n            }\n        )\n    }\n\n    var playbackSnapshot: MediaPlaybackSnapshot? {\n        MediaPlaybackSnapshot(\n            state: player.isPlaying ? .playing() : .paused\n        )\n    }\n\n    var commands: [MediaCommand] {[\n        .play { self.player.play() },\n        .pause { self.player.pause() },\n        .previous { self.player.previous() },\n        .next { self.player.next() }\n    ]}\n}","import NowPlaying\n\nstruct PlayerController {\n    let player: SoundPlayer\n    let model: PlayerModel\n    let session: MediaSession\u003cPlayerModel>\n\n    init() {\n        self.player = SoundPlayer()\n        self.model = PlayerModel(player: player)\n        self.session = MediaSession(model)\n    }\n}","import ExtensionFoundation\nimport NowPlaying\n\n@main\nfinal class SampleAppExtension: @MainActor RemoteMediaSessionExtension {\n    var configuration: some AppExtensionConfiguration {\n        RemoteMediaSessionExtensionConfiguration(extension: self)\n    }\n\n    var extensionPoint: AppExtensionPoint {\n        AppExtensionPoint.Identifier(host: \"com.apple.nowplaying\", name: \"remote-media\")\n    }\n\n    func session(_ state: RemotePlayerState) async throws -> RemotePlayerModel {\n        RemotePlayerModel(state: state)\n    }\n}","import Observation\n\n@Observable\n@MainActor\nfinal class RemotePlayerModel {\n    let client: ServerClient\n    var state: RemotePlayerState\n\n    init(state: RemotePlayerState) {\n        self.client = ServerClient(sessionID: state.sessionID)\n        self.state = state\n    }\n}","import NowPlaying\n\nextension RemotePlayerModel: @MainActor RemoteMediaSessionRepresentable {\n    var id: String { state.sessionID }\n\n    var content: (any MediaContentRepresentable)? {\n        GenericContent(\n            id: state.sound.id,\n            title: state.sound.name,\n            subtitle: state.sound.description,\n            type: .audio,\n            duration: .live,\n            artwork: Artwork(id: state.sound.id) { size in\n                let data = try await self.artworkData(size: size)\n                return try ArtworkRepresentation(data: data)\n            }\n        )\n    }\n\n    var playbackSnapshot: MediaPlaybackSnapshot? {\n        MediaPlaybackSnapshot(\n            state: state.isPlaying ? .playing() : .paused\n        )\n    }\n\n    var commands: [MediaCommand] {[\n        .play { try await self.client.send(.play) },\n        .pause { try await self.client.send(.pause) },\n        .previous { try await self.client.send(.previous) },\n        .next { try await self.client.send(.next) }\n    ]}\n\n    var devices: [MediaDevice] {\n        state.devices.map { device in\n            MediaDevice(\n                id: device.id,\n                name: device.name,\n                type: .speaker,\n                capabilities: [\n                    .absoluteVolume(device.volume) { volume in\n                        // send volume change to server\n                    }\n                ]\n            )\n        }\n    }\n\n    func update(_ state: RemotePlayerState) {\n        self.state = state\n    }\n}"]},"related":[{"id":"101","title":"Keynote","gloss":"主題演講","gloss_en":"Keynote","category":"other","categoryLabel":"其他"},{"id":"102","title":"Platforms State of the Union","gloss":"平台現況報告","gloss_en":"Platforms State of the Union","category":"other","categoryLabel":"其他"},{"id":"111","title":"Keynote (ASL)","gloss":"主題演講(美國手語版)","gloss_en":"Keynote (American Sign Language)","category":"other","categoryLabel":"其他"},{"id":"112","title":"Platforms State of the Union (ASL)","gloss":"平台現況報告（美國手語版）","gloss_en":"Platforms State of the Union (American Sign Language)","category":"other","categoryLabel":"其他"},{"id":"122","title":"WWDC26 Platforms State of the Union Recap","gloss":"WWDC26 平台現況演講重點回顧","gloss_en":"WWDC26 Platforms State of the Union recap","category":"other","categoryLabel":"其他"}]}</script>
