<script id="d" type="application/json">{"s":{"id":"324","title":"Meet Core AI","gloss":"認識 Core AI","category":"ai","categoryLabel":"AI 與機器學習","duration":1243,"url":"https://developer.apple.com/videos/play/wwdc2026/324/","takeaway":"Core AI 是 Apple 全新的裝置端 AI 模型部署框架，從 PyTorch 轉檔到 Swift 推論一條龍。","chapters":[[0,"Introduction"],[33,"What is Core AI"],[297,"Model conversion"],[308,"Convert a PyTorch model to Core AI"],[344,"Verify converted model numerics"],[376,"App integration"],[461,"Core AI framework core types"],[513,"Initialize ModelPlayer with AIModel"],[529,"Run inference with NDArray inputs"],[610,"Input features for the snake model"],[648,"Profiling with Instruments"],[675,"Optimizing performance"],[738,"Add KV cache buffers to PyTorch module"],[770,"Update forward pass to read/write KV caches"],[779,"Re-convert model with state names"],[797,"Store KV cache NDArrays in ModelPlayer"],[825,"Pass state views to inference function"],[853,"Additional features"],[934,"Specialization"],[982,"Check model cache before loading"],[1002,"Request model specialization"],[1207,"Next steps"]],"points":[{"text":"**Core AI** 是 Apple 全新的裝置端 AI 模型部署框架，涵蓋從轉檔、整合到推論的完整生態。","hot":true},{"text":"用 Python 的 **coreai_torch.TorchConverter** 把 PyTorch 模型轉成 **.aimodel** 資產，並可驗證轉檔前後的數值一致性。","hot":false},{"text":"App 端以 **AIModel** 載入模型、**InferenceFunction** 取得推論函式，並用 **NDArray** 餵入與取出資料。","hot":false},{"text":"為 Transformer 加上 **KV cache** 狀態並重新轉檔，可顯著優化逐 token 的推論效能。","hot":false},{"text":"透過 **AIModelCache** 檢查快取並用 **AIModel.specialize** 預先特化模型，搭配 Instruments 進行效能剖析。","hot":false}],"apis":["CoreAI","coreai_torch","TorchConverter","AIModel","InferenceFunction","NDArray","AIModelCache","ModelPlayer"],"audience":"想把 **PyTorch 模型部署到 Apple 裝置端執行**、追求效能與低延遲的 ML 與 App 開發者。","gloss_en":"Meet Core AI","takeaway_en":"Core AI is Apple's new on-device AI model deployment framework, end to end from PyTorch conversion to Swift inference.","points_en":[{"text":"**Core AI** is Apple's new on-device AI model deployment framework, covering the full ecosystem from conversion to integration to inference.","hot":true},{"text":"Use Python's **coreai_torch.TorchConverter** to convert PyTorch models into **.aimodel** assets, and verify numerical consistency before and after conversion.","hot":false},{"text":"On the app side, load the model with **AIModel**, get the inference function with **InferenceFunction**, and feed data in and out with **NDArray**.","hot":false},{"text":"Adding **KV cache** state to a Transformer and re-converting can significantly optimize per-token inference performance.","hot":false},{"text":"Inspect the cache with **AIModelCache** and pre-specialize models with **AIModel.specialize**, profiling performance with Instruments.","hot":false}],"audience_en":"ML and app developers **who want to deploy PyTorch models to run on-device on Apple platforms** and care about performance and low latency.","code":["import torch\nimport coreai_torch\n# Load trained snake model and sample input for tracing\npt_model = SnakeTransformer().load_checkpoint(\"snake.pt\")\nexample  = torch.randn(1, 5, 16)\n\n# Export the torch program including dynamic shape for input sequence\nseq_len  = torch.export.Dim(\"seq_len\", min=1, max=256)\nexported = torch.export.export(\n    pt_model, args=(example,), \n    dynamic_shapes={\"features\": {1: seq_len}},\n)\nexported = exported.run_decompositions(coreai_torch.get_decomp_table())\n\n# Convert torch graph → Core AI graph\nai_program = coreai_torch.TorchConverter().add_exported_program(\n    exported, input_names=[\"features\"], output_names=[\"logits\"],\n).to_coreai()\n\n# Save as a .aimodel asset the runtime can load\nai_program.save_asset(\"SnakeTransformer.aimodel\")","import torch\nimport numpy as np\nfrom coreai. runtime import AIModel, NDArray\n# Load models\npt_model = SnakeTransformer().load_checkpoint(\"snake.pt\")\nai_model = await AIModel.load(\"SnakeTransformer.aimodel\")\nfunction = ai_model.load_function(\"main\")\n# Assemble input sample - 10 frames of 16-dim game features, shape (1, 10, 16)\nfeatures = np.array(lextract_features(game) for - in range (10)],\ndtype=np.float32)[np.newaxis]\n# PyTorch reference\nwith torch.no_grad():\n\tpytorch_logits = pt_model(torch.from_numpy(features)) . numpy )[0, -1]\n# Core AI inference\nresult = await function({ \"features\": NDArray(data=features)} )\ncoreai_logits = result[\"logits\"]. numpy()[0, -1]\n# Validate\nmax_diff = np.max(np.abs(pytorch_logits - coreai_logits))\n\tassert max_diff \u003c 0.01","// Core types within Core AI\nimport CoreAI\n\n// Load the '.aimodel' file\nlet model = try await AIModel(contentsOf: modelURL)\n\n// Load the main inference function\nlet mainFunction: InferenceFunction = try model.loadFunction(named: \"main\")!\n\n// Construct the n-dimensional input data\nlet inputNDArray: NDArray = nextInput()\n\n// Run inference\nvar outputs = try await mainFunction.run(inputs: [\"input\": inputNDArray])\n\nguard let outputNDArray = outputs.remove(\"output\")?.ndArray else {\n  // Handle unexpected missing output\n}","// Initialize the player by loading the AIModel and InferenceFunction\nstruct ModelPlayer {\n  let nextActionFunction: InferenceFunction\n\n  init(modelURL: URL) async throws {\n    let model = try await AIModel(contentsOf: modelURL)\n    self.nextActionFunction = try model.loadFunction(named: \"main\")!\n  }\n}","extension ModelPlayer: SnakePlayer {\n\n  mutating func chooseAction(game: SnakeGame) async throws -> Direction {\n\n    // Create an NDArray for the next input and write board features into it\n    var inputFeatures = NDArray(shape: [game.stepCount, hiddenDim], scalarType: .float32)\n    writeFeatures(of: game, into: inputFeatures.mutableView())\n\n    // Run inference and extract the expected logits output NDArray\n    var outputs = try await nextActionFunction.run(inputs: [\"features\": inputFeatures])\n    guard let logits = outputs.remove(\"logits\")?.ndArray else {\n      throw ModelError.missingOutput\n    }\n\n    return predictedDirection(from: logits.view())\n  }\n\n  func writeFeatures(of game: SnakeGame, into view: consuming NDArray.MutableView\u003cFloat>) { … }\n  func predictedDirection(from logits: NDArray.View\u003cFloat>) -> Direction { … }\n}","// Features at each time step\nvar features = [Float]()\n\n// Distance to wall in all directions, normalized between [0, 1]\nfeatures += [dWallUp, dWallDown, dWallLeft, dWallRight]\n\n// Distance to nearest food, normalized between [-1, 1]\nfeatures += [dFoodX, dFoodY]\n\n// Direction encoded as one-hot: [1,0,0,0]=up, [0,1,0,0]=down, etc.\nfeatures += dir.oneHotEncoding\n\n// Distance to the other snake, normalized to [-1, 1]\nfeatures += [dUserX, dUserY]\n\n// Direction of the opponent snake\nfeatures += dirU.oneHotEncoding","# Update torch module to include key and value caches\n# Use register_buffer to later make the exported torch program treat them as mutable\n\nclass SnakeTransformerStateful(nn.Module):\n    def __init__(self, ...):\n        super().__init__()\n        self.register_buffer(\n            \"k_cache\", torch.zeros(N_LAYERS, 1, MAX_SEQ_LEN, D_MODEL))\n        self.register_buffer(\n            \"v_cache\", torch.zeros(N_LAYERS, 1, MAX_SEQ_LEN, D_MODEL))\n        # …","# During forward pass, read/write KV caches\n\nclass SnakeTransformerStateful(nn.Module):\n\n    def forward(self, features, position_ids):\n        new_k, new_v = [], []\n        for i, block in enumerate(self.blocks):\n            # read previous keys/values from caches\n            k_prev = self.k_cache[i]\n            v_prev = self.v_cache[i]\n            # ... compute q/k/v for the new token, attend over valid prefix ...\n            new_k.append(k_updated)\n            new_v.append(v_updated)\n\n        # Update key/value caches\n        self.k_cache.copy_(torch.stack(new_k))\n        self.v_cache.copy_(torch.stack(new_v))\n\n        return self.action_head(self.ln_final(x))","# Updated coreai-torch conversion code using key/value cache states\nimport torch\nimport coreai_torch\n\nexported = torch.export.export(\n    stateful_model,\n    args=(example_features, example_position_ids),\n    dynamic_shapes={\"position_ids\": {1: seq_len}},\n)\nexported = exported.run_decompositions(coreai_torch.get_decomp_table())\n\nai_program = coreai_torch.TorchConverter().add_exported_program(\n    exported,\n    input_names=[\"features\", \"position_ids\"],\n    state_names=[\"keyCache\", \"valueCache\"],\n    output_names=[\"logits\"],\n).to_coreai()\n\nai_program.save_asset(\"SnakeTransformer.aimodel\")","// Add stored properties for the key and value caches\nstruct ModelPlayer {\n    let nextActionFunction: InferenceFunction\n\n    var keyCache: NDArray\n    var valueCache: NDArray\n\n    init(modelURL: URL) async throws {\n        let model = try await AIModel(contentsOf: modelURL)\n        self.nextActionFunction = try model.loadFunction(named: \"main\")!\n\n        self.keyCache = NDArray(shape: [layers, maxContext, hiddenDim], scalarType: .float32)\n        self.valueCache = NDArray(shape: [layers, maxContext, hiddenDim], scalarType: .float32)\n    }\n}","extension ModelPlayer: SnakePlayer {\n    mutating func chooseAction(game: SnakeGame, snakeID: Int) async throws -> Direction {\n        // …\n\n        var stateViews = InferenceFunction.MutableViews()\n        stateViews.insert(&keyCache, for: \"keyCache\")\n        stateViews.insert(&valueCache, for: \"valueCache\")\n\n        // Run inference and extract the expected logits output NDArray\n        var outputs = try await nextActionFunction.run(\n            inputs: [\"features\": inputFeatures],\n            states: stateViews)\n        // …\n    }\n}","// Check if your model can be loaded from the cache\nlet cache = AIModelCache.default\n\nguard let model = try cache.model(for: modelURL, options: .default) else {\n    Task { @MainActor in\n        informUser(\"Preparing AI features. This may take a while…\")\n    }\n}"]},"related":[{"id":"325","title":"Dive into Core AI model authoring and optimization","gloss":"深入 Core AI 模型編寫與最佳化","gloss_en":"Dive into Core AI model authoring and optimization","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"326","title":"Integrate on-device AI models into your app using Core AI","gloss":"用 Core AI 把裝置端 AI 模型整合進你的 App","gloss_en":"Integrate on-device AI models with Core AI","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"121","title":"Announcing Apple’s next big step for Siri and iPhone","gloss":"宣布 Apple 為 Siri 與 iPhone 邁出的下一大步","gloss_en":"Announcing Apple's next big step for Siri and iPhone","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"227","title":"Create UI prototypes using agents in Xcode","gloss":"在 Xcode 用代理人打造 UI 原型","gloss_en":"Prototype UI with agents in Xcode","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"232","title":"Run local agentic AI on the Mac using MLX","gloss":"用 MLX 在 Mac 上執行本機 agentic AI","gloss_en":"Run local agentic AI on the Mac using MLX","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
