<script id="d" type="application/json">{"s":{"id":"388","title":"Find and fix performance issues in your Metal games","gloss":"找出並修復 Metal 遊戲的效能問題","category":"graphics","categoryLabel":"圖形與遊戲","duration":1261,"url":"https://developer.apple.com/videos/play/wwdc2026/388/","takeaway":"用 metalperftrace 收集與分析 Metal 效能追蹤，搭配 StateReporting 將指標對應到遊戲狀態，並以 MetricKit 蒐集實機現場資料，精準定位效能瓶頸。","chapters":[[0,"Introduction"],[111,"Metal performance metrics"],[212,"Trace collection"],[300,"Collect a trace with metalperftrace"],[398,"Analyze performance traces"],[422,"Print a trace overview"],[478,"Filter by process and emit JSON"],[608,"Contextualize with StateReporting"],[835,"Include full state transitions in overview"],[855,"Aggregate metrics by state"],[1068,"Collect field data with MetricKit"],[1181,"Next steps"]],"points":[{"text":"用命令列工具 **metalperftrace** 收集效能追蹤，可指定最近時段或明確時間範圍。","hot":true},{"text":"以 **overview** 檢視 FPS、Frame Time、On-GPU Time 等指標，並可依 process 過濾與輸出 JSON。","hot":false},{"text":"透過 **StateReporting** 的 **SRStateReporter** 回報狀態轉換與中繼資料，把效能指標對應到遊戲情境（如關卡、畫質）。","hot":false},{"text":"用 **--include-state-transitions** 與 **--aggregate** 依狀態彙總指標，找出哪些情境最耗效能。","hot":false},{"text":"搭配 **MetricKit** 蒐集使用者實機的現場效能資料，補足實驗室外的真實表現。","hot":false}],"apis":["Metal","metalperftrace","StateReporting","SRStateReporter","MetricKit"],"audience":"適合**開發 Metal 遊戲、需要診斷與優化 GPU 與整體效能的遊戲與圖形開發者**。","gloss_en":"Find and fix performance issues in your Metal games","takeaway_en":"Use metalperftrace to collect and analyze Metal performance traces, pair it with StateReporting to map metrics to game state, and gather on-device field data with MetricKit to pinpoint performance bottlenecks.","points_en":[{"text":"Collect performance traces with the command-line tool **metalperftrace**, targeting either a recent window or an explicit time range.","hot":true},{"text":"Use **overview** to inspect metrics like FPS, Frame Time, and On-GPU Time, with the ability to filter by process and output JSON.","hot":false},{"text":"Report state transitions and metadata via **StateReporting**'s **SRStateReporter** to map performance metrics to game context (such as level or quality settings).","hot":false},{"text":"Use **--include-state-transitions** and **--aggregate** to summarize metrics by state and find which contexts cost the most performance.","hot":false},{"text":"Pair with **MetricKit** to gather real on-device field performance data, filling in the gaps beyond the lab.","hot":false}],"audience_en":"**Game and graphics developers building Metal games who need to diagnose and optimize GPU and overall performance.**","code":["# Collect the last 5 hours\nmetalperftrace collect /tmp --last 5h\n\n# Output\n# Metal performance traces collected to: /tmp\n# /tmp/MetalPerfTrace_20260401_094100_to_144100.atrc\n\n# Or collect an explicit time range\nmetalperftrace collect /tmp \\\n  --start 2026-04-01T09:41:00 \\\n  --end 2026-04-01T12:41:00","metalperftrace overview /Data/MyGameTrace.atrc\n\n# [Modern Renderer pid:13833]\n# Mem: 2146.1 MiB (2343.9 Peak, 1199.4 Metal)\n# Total CPU Time: 2417.601s (33.17% Sys, 66.83% User)\n# Instructions: 9944836683668 (5.75% P, 94.25% E)\n# Cycles: 5176430469224 (4.45% P, 95.55% E)\n# Disk Reads / Writes: 317.37 / 0.04 MiB (Logical Write 0.04)\n# Layer 0x729293000 (3456x2104) Interval 300.065s Active 300.065s\n#   59.7 FPS  17735 Frames  188 Skipped\n#   Frame Time avg: 16.74ms min: 8.33 max: 125.00 stddev: 3.70\n#   CPU Begin-to-Present avg: 3.99ms min: 1.40 max: 94.37 stddev: 1.80\n#   On-GPU Time avg: 13.39ms min: 5.24 max: 37.57 stddev: 1.43\n#   Next Drawable Wait avg: 0.26ms min: 0.00 max: 91.08 stddev: 1.75\n#   Shader Compilation Time: 0.000s (Total: 0, Cached: 18)","// Report state transitions\n#import \u003cStateReporting/StateReporting.h>\n\nNSString *domain = @\"com.mygame.level\";\nSRStateReporter *reporter = [SRStateReporter reporterForDomain:domain];\n\n[reporter reportTransitionToStateLabel:@\"Level 1\"\n                        stableMetadata:nil\n                      volatileMetadata:nil];\n\n[reporter reportTransitionToStateLabel:@\"Level 1\"\n                        stableMetadata:@{ @\"id\": @1001 }\n                      volatileMetadata:nil];\n\n[reporter reportVolatileMetadataUpdate:@{ @\"health\": @100 }];","metalperftrace overview /Data/MyGameTrace.atrc --include-state-transitions\n\n# [States]\n# com.mygame.graphics\n#   High (30.59%, 14.996s)  raytracing: 1  shadow: ultra\n#   Medium (69.38%, 34.012s)  raytracing: 0  shadow: medium\n# com.mygame.level\n#   Level 1 (20.47%, 10.033s)  biome: forest   id: 1001\n#   Level 2 (79.53%, 38.991s)  biome: volcano  id: 1002","# Aggregate across all domains / transitions\nmetalperftrace overview /Data/MyGameTrace.atrc --aggregate\n\n# Aggregate one domain\nmetalperftrace overview /Data/MyGameTrace.atrc --aggregate \\\n  --domain com.mygame.graphics\n\n# Aggregate a specific state label within a domain\nmetalperftrace overview /Data/MyGameTrace.atrc --aggregate \\\n  --domain com.mygame.graphics \\\n  --state-label \"High\""]},"related":[{"id":"222","title":"Meet the new MetricKit","gloss":"認識全新的 MetricKit","gloss_en":"Meet the new MetricKit","category":"other","categoryLabel":"其他"},{"id":"330","title":"Optimize custom machine learning operations with Metal tensors","gloss":"用 Metal tensors 最佳化自訂機器學習運算","gloss_en":"Optimize custom machine learning operations with Metal tensors","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"356","title":"Bringing Cyberpunk 2077 to Mac","gloss":"將《電馭叛客 2077》帶上 Mac","gloss_en":"Bringing Cyberpunk 2077 to Mac","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"359","title":"Build real-time neural rendering pipelines with Metal","gloss":"用 Metal 打造即時神經渲染管線","gloss_en":"Build real-time neural rendering pipelines with Metal","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"322","title":"Compose advanced graphics effects with SwiftUI","gloss":"用 SwiftUI 組合進階圖形效果","gloss_en":"Compose advanced graphics effects with SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"}]}</script>
