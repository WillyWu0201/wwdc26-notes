hment** to bind SwiftUI views onto 3D content for presentation.","hot":false}],"audience_en":"**Designers and creators who want to build 3D games or interactive content with Reality Composer Pro 3 without writing much code.**","code":["// Advanced techniques\n\nif let scene = entity.scene {\n    scene.subscribe(forEventName: \"squirrelTalk\", on: { event in\n        if let sayThis: String = try? event.value(\"sayThis\") {\n            self.sayThis = sayThis\n        }\n     } ).store(in: &cancellables)\n}\n\n...\n} attachments: {\n    Attachment(id: \"squirrelTalk\") {\n        SquirrelTalkAttachmentView(text: sayThis)\n   }\n}"]},"related":[{"id":"237","title":"What’s new in image understanding","gloss":"影像理解的新功能","gloss_en":"What's new in image understanding","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"279","title":"Explore advances in RealityKit","gloss":"探索 RealityKit 的最新進展","gloss_en":"Explore advances in RealityKit","category":"visionos","categoryLabel":"visionOS"},{"id":"280","title":"Iterate your spatial scenes faster with Reality Composer Pro 3","gloss":"用 Reality Composer Pro 3 更快迭代空間場景","gloss_en":"Iterate your spatial scenes faster with Reality Composer Pro 3","category":"visionos","categoryLabel":"visionOS"},{"id":"283","title":"Explore enhancements to visionOS object tracking","gloss":"探索 visionOS 物件追蹤的強化功能","gloss_en":"Explore enhancements to visionOS object tracking","category":"visionos","categoryLabel":"visionOS"}]}</script>
