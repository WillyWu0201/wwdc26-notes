<script id="d" type="application/json">{"s":{"id":"289","title":"Modernize your AppKit app","gloss":"現代化你的 AppKit App","category":"uikit","categoryLabel":"UIKit","duration":1081,"url":"https://developer.apple.com/videos/play/wwdc2026/289/","takeaway":"用手勢辨識、控制事件、現代拖放與狀態還原把 AppKit App 更新到當代 macOS 慣例，並導入 macOS 27 的 Liquid Glass 與同心圓角。","chapters":[[0,"Introduction"],[66,"Modern input"],[87,"Modern event handling with gesture recognizers"],[145,"Selection, context menus, and drag and drop"],[215,"Modern dragging delegate"],[232,"Text selection in custom views"],[266,"Control events and gesture recognizers"],[295,"Control events"],[344,"hitTest override"],[351,"Keyboard navigation and status items"],[384,"autorecalculatesKeyViewLoop"],[457,"Expanded interface delegate — setup"],[472,"Expanded interface delegate — methods"],[496,"Expanded interface delegate — cancel"],[537,"Continuity across launches"],[548,"Graceful app termination"],[585,"preventsApplicationTerminationWhenModal"],[595,"State restoration"],[618,"Set window identifiers for state restoration"],[664,"encodeRestorableState"],[710,"invalidateRestorableState"],[746,"restoreWindow(withIdentifier:)"],[809,"restoreState"],[849,"Design updates"],[864,"Liquid Glass updates in macOS 27"],[941,"Concentricity"],[971,"cornerConfiguration"],[1019,"Next steps"]],"points":[{"text":"以**手勢辨識器（gesture recognizers）**處理現代輸入，並用 **NSPasteboardWriting** 採用現代拖放委派。","hot":false},{"text":"使用 **control events**（如 `.trackingEndedOutside`）與 hitTest 覆寫，改善控制項互動。","hot":false},{"text":"以 **autorecalculatesKeyViewLoop** 與 **NSStatusItemExpandedInterfaceDelegate** 強化鍵盤導覽與狀態列項目。","hot":false},{"text":"透過 **encodeRestorableState / restoreState** 與視窗識別碼做**狀態還原**，並優雅處理 App 終止。","hot":false},{"text":"導入 **macOS 27 的 Liquid Glass**，以 **cornerConfiguration** 實現同心圓角（concentricity）。","hot":true}],"apis":["AppKit","NSGestureRecognizer","NSPasteboardWriting","NSPasteboardItem","NSControl.EventType.trackingEndedOutside","NSView.hitTest","autorecalculatesKeyViewLoop","NSStatusItem","NSStatusItemExpandedInterfaceDelegate","preventsApplicationTerminationWhenModal","NSWindowRestoration","encodeRestorableState","restoreState","NSViewCornerConfiguration"],"audience":"**維護既有 AppKit macOS App 的開發者**，想跟上現代 macOS 慣例與 Liquid Glass 外觀的人。","gloss_en":"Modernize your AppKit app","takeaway_en":"Bring your AppKit app up to contemporary macOS conventions with gesture recognition, control events, modern drag and drop, and state restoration, and adopt macOS 27's Liquid Glass and concentric corners.","points_en":[{"text":"Handle modern input with **gesture recognizers**, and adopt modern drag and drop with **NSPasteboardWriting**.","hot":false},{"text":"Use **control events** (such as `.trackingEndedOutside`) and hitTest overrides to improve control interactions.","hot":false},{"text":"Strengthen keyboard navigation and status bar items with **autorecalculatesKeyViewLoop** and **NSStatusItemExpandedInterfaceDelegate**.","hot":false},{"text":"Do **state restoration** via **encodeRestorableState / restoreState** and window identifiers, and handle app termination gracefully.","hot":false},{"text":"Adopt **macOS 27's Liquid Glass**, achieving concentric corners (concentricity) with **cornerConfiguration**.","hot":true}],"audience_en":"**Developers maintaining an existing AppKit macOS app** who want to keep up with modern macOS conventions and the Liquid Glass look.","code":["// Modern dragging delegate methods\nfunc tableView(_ tableView: NSTableView,\n        pasteboardWriterForRow row: Int) -> (any NSPasteboardWriting)? {\n    let pasteboardItem = NSPasteboardItem()\n    pasteboardItem.setString(..., forType: .string)\n    return pasteboardItem\n}","// Use control events\nlet button = NSButton()\nbutton.addTarget(\n    self,\n    action: #selector(trackingEndedOutsideHandler),\n    for: .trackingEndedOutside\n)","override func hitTest(_ point: NSPoint) -> NSView? {\n    return nil\n}","window.autorecalculatesKeyViewLoop = true","// Set the expanded interface delegate\n@main class LightAppDelegate: NSObject, NSApplicationDelegate {\n    lazy var lightStatusItem: NSStatusItem = { ... }()\n\n    func applicationDidFinishLaunching(_ notification: Notification) {\n        // ...\n        lightStatusItem.expandedInterfaceDelegate = self\n    }\n}","// Implement the delegate methods\nextension LightAppDelegate: NSStatusItemExpandedInterfaceDelegate {\n    // ...\n    func statusItem(_ statusItem: NSStatusItem, didBegin session:\n                    NSStatusItemExpandedInterfaceSession) {\n        // Show window\n    }\n    func statusItemDidEndExpandedInterfaceSession(\n        _ statusItem: NSStatusItem, animated: Bool) {\n        // Hide window\n    }\n    func selectedAction() {\n        // Take the action\n        // Cancel session to request window dismissal\n        lightStatusItem.expandedInterfaceSession?.cancel()\n    }\n}","// Cancel the session when dismissing\nextension LightAppDelegate: NSStatusItemExpandedInterfaceDelegate {\n    // ...\n    func statusItem(_ statusItem: NSStatusItem, didBegin session:\n                    NSStatusItemExpandedInterfaceSession) {\n        // Show window\n    }\n    func statusItemDidEndExpandedInterfaceSession(\n        _ statusItem: NSStatusItem, animated: Bool) {\n        // Hide window\n    }\n    func selectedAction() {\n        // Take the action\n        // Cancel session to request window dismissal\n        lightStatusItem.expandedInterfaceSession?.cancel()\n    }\n}","window.preventsApplicationTerminationWhenModal = false","// Set window identifiers for state restoration\n@MainActor class MainWindowController: NSWindowController, NSWindowDelegate {\n    // ...\n    convenience init() {\n        let window = NSWindow( ... )\n        // ...\n        window.identifier = NSUserInterfaceItemIdentifier(WindowIdentifiers.mainWindow)\n        window.setFrameAutosaveName(WindowIdentifiers.mainWindow)\n        window.isRestorable = true\n        window.restorationClass = WindowRestorationHandler.self\n        // ...\n    }\n}","// Preserve state to recreate the UI\n@MainActor class MainWindowController: NSWindowController, NSWindowDelegate {\n    // ...\n    override func encodeRestorableState(with coder: NSCoder) {\n        super.encodeRestorableState(with: coder)\n        // ...\n        coder.encode(selectedProduct?.identifier.uuid,\n                    forKey: RestorationKeys.productIdentifier)\n        // ...\n    }\n    // ...\n}","// Invalidate restorable state when the view hierarchy changes\n@MainActor class MainWindowController: NSWindowController, NSWindowDelegate {\n    // ...\n    convenience init() {\n        // ...\n        splitViewController.onProductSelected = { [weak self] product in\n            self?.invalidateRestorableState()\n        }\n    }\n}","// Restore windows\nclass WindowRestorationHandler: NSObject, NSWindowRestoration {\n    static func restoreWindow(\n        withIdentifier identifier: NSUserInterfaceItemIdentifier,\n        state: NSCoder,\n        completionHandler: @escaping (NSWindow?, Error?) -> Void\n    ) {\n        //...\n        if identifier == .mainWindow, let window = appDelegate.mainWindowController?.window {\n            completionHandler(window, nil)\n        } else if identifier == .imageWindow {\n            let controller = ImageWindowController()\n            appDelegate.imageWindowControllers.append(controller)\n            completionHandler(controller.window, nil)\n        } else {\n            completionHandler(nil, error)\n        }\n    }\n}"]},"related":[{"id":"203","title":"Read between the strokes with PencilKit","gloss":"用 PencilKit 解讀筆跡內容","gloss_en":"Read handwriting content with PencilKit","category":"uikit","categoryLabel":"UIKit"},{"id":"212","title":"Rev up your CarPlay app","gloss":"強化你的 CarPlay App","gloss_en":"Rev up your CarPlay app","category":"uikit","categoryLabel":"UIKit"},{"id":"219","title":"Enhance the accessibility of your reading app","gloss":"強化你閱讀類 App 的無障礙體驗","gloss_en":"Enhance the accessibility of your reading app","category":"uikit","categoryLabel":"UIKit"},{"id":"221","title":"Prepare your tvOS apps for Dynamic Type","gloss":"讓你的 tvOS App 支援動態字型","gloss_en":"Prepare your tvOS app for Dynamic Type","category":"uikit","categoryLabel":"UIKit"},{"id":"226","title":"Create live communication experiences","gloss":"打造即時通訊體驗","gloss_en":"Build live communication experiences","category":"uikit","categoryLabel":"UIKit"}]}</script>
