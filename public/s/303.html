<script id="d" type="application/json">{"s":{"id":"303","title":"Build a responsive camera app that launches quickly","gloss":"打造啟動快速且反應靈敏的相機 App","category":"other","categoryLabel":"其他","duration":1520,"url":"https://developer.apple.com/videos/play/wwdc2026/303/","takeaway":"用 AVFoundation 的延遲啟動、反應式擷取與確定性檔案寫入，打造瞬間啟動、不錯失畫面的相機 App。","chapters":[[0,"Introduction"],[122,"Fast Launch"],[412,"Adopt deferred start"],[554,"Automatic deferred start delegate"],[586,"Adopt automatic deferred start"],[690,"Adopt manual deferred start"],[713,"Manage runDeferredStartWhenNeeded"],[847,"Enable responsive capture"],[906,"Steady preview"],[1084,"Sustained performance"],[1216,"Monitor for system pressure"],[1274,"Deterministic file writing"],[1337,"Manage pro video storage"],[1363,"Adopt AVProVideoStorage for deterministic file write speeds"]],"points":[{"text":"用**延遲啟動（deferred start）**讓相機**瞬間啟動**：先顯示預覽，再延後啟動非必要的輸出，避免錯失關鍵畫面。","hot":true},{"text":"可採**自動**或**手動**延遲啟動，透過 **automaticallyRunsDeferredStart**、isDeferredStartEnabled 與 **runDeferredStartWhenNeeded** 控制時機。","hot":false},{"text":"啟用**反應式擷取（responsive capture）**與穩定預覽，讓 **AVCapturePhotoOutput** 能立即拍照。","hot":false},{"text":"監控 **hardwareCost** 與 **systemPressureState** 維持持續效能，必要時改用低成本設定。","hot":false},{"text":"用 **AVProVideoStorage** 達成確定性的檔案寫入速度，妥善管理專業影片儲存空間。","hot":false}],"apis":["AVFoundation","AVCaptureSession","AVCapturePhotoOutput","AVProVideoStorage","automaticallyRunsDeferredStart","runDeferredStartWhenNeeded"],"audience":"**開發相機或影音擷取 App**、在意啟動速度、拍攝反應與錄影效能的開發者。","gloss_en":"Build a responsive camera app that launches quickly","takeaway_en":"Use AVFoundation's deferred start, responsive capture, and deterministic file writing to build a camera app that launches instantly and never misses the shot.","points_en":[{"text":"Use **deferred start** to launch the camera **instantly**: show the preview first, then defer starting non-essential outputs to avoid missing the key moment.","hot":true},{"text":"Use **automatic** or **manual** deferred start, controlling the timing via **automaticallyRunsDeferredStart**, isDeferredStartEnabled, and **runDeferredStartWhenNeeded**.","hot":false},{"text":"Enable **responsive capture** and a stable preview so **AVCapturePhotoOutput** can take photos immediately.","hot":false},{"text":"Monitor **hardwareCost** and **systemPressureState** to maintain sustained performance, switching to lower-cost settings when necessary.","hot":false},{"text":"Use **AVProVideoStorage** to achieve deterministic file-write speeds and properly manage professional video storage.","hot":false}],"audience_en":"Developers **building camera or audio/video capture apps** who care about launch speed, capture responsiveness, and recording performance.","code":["import AVFoundation\n\nclass DeferredStartDelegate: NSObject, AVCaptureSessionDeferredStartDelegate {\n    func sessionWillRunDeferredStart(_ session: AVCaptureSession)\n    {\n        // This is called before deferred start begins for the deferred outputs\n    }\n\n    func sessionDidRunDeferredStart(_ session: AVCaptureSession)\n    {\n        // This is called after deferred start completes for all outputs\n    }\n}","import AVFoundation\n\nlet captureSession = AVCaptureSession()\ncaptureSession.beginConfiguration()\ncaptureSession.automaticallyRunsDeferredStart = true\n\nlet videoPreviewLayer = AVCaptureVideoPreviewLayer(session: captureSession)\nvideoPreviewLayer.isDeferredStartEnabled = false\n\nlet photoOutput = AVCapturePhotoOutput()\nphotoOutput.isDeferredStartEnabled = true\ncaptureSession.addOutput(photoOutput)\n\ncaptureSession.setDeferredStartDelegate(deferredStartDelegate, deferredStartDelegateCallbackQueue: sessionQueue)\n\ncaptureSession.commitConfiguration()\ncaptureSession.startRunning()","import AVFoundation\n\nlet captureSession = AVCaptureSession()\ncaptureSession.beginConfiguration()\ncaptureSession.automaticallyRunsDeferredStart = false\n\nlet videoOutput = AVCaptureVideoDataOutput()\ncaptureSession.addOutput(videoOutput)\nvideoOutput.isDeferredStartEnabled = false\n\nlet photoOutput = AVCapturePhotoOutput()\nphotoOutput.isDeferredStartEnabled = true\ncaptureSession.addOutput(photoOutput)\n\ncaptureSession.setDeferredStartDelegate(deferredStartDelegate, deferredStartDelegateCallbackQueue: sessionQueue)\n\ncaptureSession.commitConfiguration()\ncaptureSession.startRunning()","import AVFoundation\nimport QuartzCore\n\nprivate var firstFramePresented = false\nguard let drawable = layer.nextDrawable()\nif (!firstFramePresented) {\n    drawable.addPresentedHandler({ drawable in\n        // Set up postponed UI elements\n        captureSession.runDeferredStartWhenNeeded()\n    })\n    firstFramePresented = true\n}","import AVFoundation\n\nfunc configurePhotoOutput(for session: AVCaptureSession, device: AVCaptureDevice) {\n    let photoOutput = AVCapturePhotoOutput()\n\n    guard session.canAddOutput(photoOutput) else { return }\n    session.addOutput(photoOutput)\n\n    photoOutput.maxPhotoQualityPrioritization = .quality\n    // Responsive capture lets the photo output capture immediately\n    photoOutput.isResponsiveCaptureEnabled = photoOutput.isResponsiveCaptureSupported\n}","import AVFoundation\n\nlet captureSession = AVCaptureSession()\nlet device = activeVideoInput?.device\ncaptureSession.beginConfiguration()\n// ...\ncaptureSession.commitConfiguration()\n\nguard captureSession.hardwareCost \u003c= 1.0 else {\n    print(\"hardwareCost \\(captureSession.hardwareCost) — cannot start session. Reconfiguring.\")\n    setupLowCostConfiguration()\n}\n\ncaptureSession.startRunning()\nlet systemPressureObserver = device?.observe(\\.systemPressureState,\n                                               options: [.initial, .new],\n                                               changeHandler: { /* Handle state change */ })","import AVFoundation\n\nfunc configureProVideoStorage() {\n    guard AVProVideoStorage.isSupported else { return }\n    let storage = AVProVideoStorage.shared\n    guard storage.remainingCapacity != 0 else {\n        storage.openSettings()\n        return\n    }\n}","import AVFoundation\n\nguard AVProVideoStorage.isSupported else { return }\nguard let pvs = AVProVideoStorage.shared else { return }\n\n// Configure and set up AVCaptureSession, AVCaptureConnections and format\n// ...\nlet movieOutput = AVCaptureMovieFileOutput()\n\nguard movieOutput.isProVideoStorageSupported else { return }\nguard !pvs.isBusy else { return }\n\nlet movieFileURL = FileManager.default.temporaryDirectory\n            .appendingPathComponent(UUID().uuidString)\n            .appendingPathExtension(\"mov\")\n\nmovieOutput.usesProVideoStorage = true // Also available with AVAssetWriter\nmovieOutput.startRecording(to: movieFileURL, recordingDelegate: delegate)"]},"related":[{"id":"304","title":"Implement high resolution photo capture","gloss":"實作高解析度照片拍攝","gloss_en":"Implement high resolution photo capture","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"341","title":"Support the Center Stage front camera in your iOS app","gloss":"在 iOS App 中支援人物居中前置鏡頭","gloss_en":"Support the Center Stage front camera in your iOS app","category":"other","categoryLabel":"其他"},{"id":"256","title":"Discover generated subtitles and subtitle styles","gloss":"認識自動產生字幕與字幕樣式","gloss_en":"Discover generated subtitles and subtitle styles","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"101","title":"Keynote","gloss":"主題演講","gloss_en":"Keynote","category":"other","categoryLabel":"其他"},{"id":"102","title":"Platforms State of the Union","gloss":"平台現況報告","gloss_en":"Platforms State of the Union","category":"other","categoryLabel":"其他"}]}</script>
