<script id="d" type="application/json">{"s":{"id":"341","title":"Support the Center Stage front camera in your iOS app","gloss":"在 iOS App 中支援人物居中前置鏡頭","category":"other","categoryLabel":"其他","duration":1064,"url":"https://developer.apple.com/videos/play/wwdc2026/341/","takeaway":"用 AVCapture 的動態長寬比與智慧取景 API，讓你的相機 App 支援 iPhone 17 等機型的 Center Stage 前置鏡頭。","chapters":[[0,"Introduction"],[67,"Center Stage front camera"],[129,"Center Stage for photos"],[189,"Capture session setup"],[236,"Dynamic aspect ratio"],[329,"Support dynamic aspect ratio"],[407,"Smart framing monitor"],[459,"Support smart framing monitor"],[564,"Sensor orientation compensation"],[713,"Center Stage for video recordings"],[796,"Center Stage for video calls"],[884,"Support Center Stage for video calls"]],"points":[{"text":"在 iPhone 17、iPhone 17 Pro 與 iPhone Air 上，以 **builtInUltraWideCamera** 前置鏡頭支援 Center Stage 拍照。","hot":false},{"text":"用 **supportedDynamicAspectRatios** 與 **setDynamicAspectRatio** 在拍攝中切換 4:3 等**動態長寬比**。","hot":false},{"text":"透過 **smartFramingMonitor** 觀察 **recommendedFraming**，自動調整長寬比與 **videoZoomFactor** 完成智慧取景。","hot":true},{"text":"需處理**感光元件方向補償（sensor orientation compensation）**，確保畫面方向正確。","hot":false},{"text":"錄影與視訊通話情境可用 **centerStageControlMode = .cooperative** 與 **isCenterStageEnabled** 開啟 Center Stage。","hot":false}],"apis":["AVFoundation","AVCaptureDevice","AVCaptureDevice.DiscoverySession","setDynamicAspectRatio","supportedDynamicAspectRatios","smartFramingMonitor","isSmartFramingSupported","isCenterStageSupported","videoZoomFactor"],"audience":"開發 **iOS 相機或視訊 App、想支援前置鏡頭 Center Stage 與智慧取景**的開發者。","gloss_en":"Support the Center Stage front camera in your iOS app","takeaway_en":"Use AVCapture's dynamic aspect ratio and smart framing APIs to support the Center Stage front camera on devices like iPhone 17 in your camera app.","points_en":[{"text":"On iPhone 17, iPhone 17 Pro, and iPhone Air, support Center Stage photo capture with the **builtInUltraWideCamera** front camera.","hot":false},{"text":"Use **supportedDynamicAspectRatios** and **setDynamicAspectRatio** to switch **dynamic aspect ratios** like 4:3 during capture.","hot":false},{"text":"Observe **recommendedFraming** via **smartFramingMonitor** to automatically adjust the aspect ratio and **videoZoomFactor** for smart framing.","hot":true},{"text":"Handle **sensor orientation compensation** to ensure the image is oriented correctly.","hot":false},{"text":"For video recording and video calling, enable Center Stage with **centerStageControlMode = .cooperative** and **isCenterStageEnabled**.","hot":false}],"audience_en":"Developers building **iOS camera or video apps who want to support front-camera Center Stage and smart framing**.","code":["// Select the Center Stage front camera\n\nimport AVFoundation\n\nlet deviceDiscoverySession = AVCaptureDevice.DiscoverySession(deviceTypes: [.builtInUltraWideCamera], mediaType: .video, position: .front)\n\nguard let camera = deviceDiscoverySession.devices.first else {\n    print(\"Failed to find the capture device\")\n    return\n}\n\n// Find a format that supports the 4x3 aspect ratio\n\nfor format in camera.formats {\n    if format.supportedDynamicAspectRatios.contains(.ratio4x3) {\n        try! camera.lockForConfiguration()\n        camera.activeFormat = format\n        camera.unlockForConfiguration()\n        break\n    }\n}\n\n// Set dynamic aspect ratio\n\ntry! camera.lockForConfiguration()\n\nlet timestamp = try! await camera.setDynamicAspectRatio(.ratio4x3)\nprint(\"Applied dynamic aspect ratio at timestamp: \\(timestamp)\")\n\ncamera.unlockForConfiguration()","// Find a format that supports smart framing\n\nimport AVFoundation\n\nfor format in camera.formats {\n    if format.isSmartFramingSupported {\n        try! camera.lockForConfiguration()\n        camera.activeFormat = format\n        camera.unlockForConfiguration()\n        break\n    }\n}\n\n// Configure the smart framing monitor\n\nlet monitor = camera.smartFramingMonitor!\n\ntry! camera.lockForConfiguration()\nmonitor.enabledFramings = monitor.supportedFramings\ncamera.unlockForConfiguration()\n\n// Monitor framing recommendations\n\nobservation = monitor.observe(\\.recommendedFraming, options: [.new,]) { monitor, change in\n    if let framing = monitor.recommendedFraming {\n\n        Task {\n            try! camera.lockForConfiguration()\n            try! await camera.setDynamicAspectRatio(framing.aspectRatio)\n            camera.videoZoomFactor = CGFloat(framing.zoomFactor)\n            camera.unlockForConfiguration()\n        }\n\n    }\n}\n\n// Start the smart framing monitor\n\ntry! monitor.startMonitoring()\n\n// Stop the smart framing monitor\n\nobservation?.invalidate()\nobservation = nil\n\nmonitor.stopMonitoring()","// Find a format that supports Center Stage\n\nimport AVFoundation\n\nfor format in camera.formats {\n    if format.isCenterStageSupported {\n        try! camera.lockForConfiguration()\n        camera.activeFormat = format\n        camera.unlockForConfiguration()\n        break\n    }\n}\n\n// Turn on Center Stage\n\nAVCaptureDevice.centerStageControlMode = .cooperative\nAVCaptureDevice.isCenterStageEnabled = true"]},"related":[{"id":"303","title":"Build a responsive camera app that launches quickly","gloss":"打造啟動快速且反應靈敏的相機 App","gloss_en":"Build a responsive camera app that launches quickly","category":"other","categoryLabel":"其他"},{"id":"256","title":"Discover generated subtitles and subtitle styles","gloss":"認識自動產生字幕與字幕樣式","gloss_en":"Discover generated subtitles and subtitle styles","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"304","title":"Implement high resolution photo capture","gloss":"實作高解析度照片拍攝","gloss_en":"Implement high resolution photo capture","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"101","title":"Keynote","gloss":"主題演講","gloss_en":"Keynote","category":"other","categoryLabel":"其他"},{"id":"102","title":"Platforms State of the Union","gloss":"平台現況報告","gloss_en":"Platforms State of the Union","category":"other","categoryLabel":"其他"}]}</script>
