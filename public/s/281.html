<script id="d" type="application/json">{"s":{"id":"281","title":"Extend Reality Composer Pro 3 functionality with Xcode","gloss":"用 Xcode 擴充 Reality Composer Pro 3 的功能","category":"visionos","categoryLabel":"visionOS","duration":1322,"url":"https://developer.apple.com/videos/play/wwdc2026/281/","takeaway":"用 Xcode 寫自訂 component、system、action 與 Script Graph 節點,透過 RealityComposerProPlugin 註冊進 Reality Composer Pro 3,打造更大型的空間專案。","chapters":[[0,"Introduction"],[120,"Extending the editor"],[291,"Custom components and systems"],[368,"Cauldron component"],[402,"CauldronSystem"],[420,"RCPCustomComponentsPlugin"],[632,"Controlling the water surface"],[649,"Cauldron component with vortex properties"],[665,"CauldronSystem update with ShaderGraph"],[799,"Custom animation actions"],[805,"SetWaterLevelAction"],[845,"SetWaterLevelAction subscribe"],[896,"RCPCustomComponentsPlugin with action"],[1032,"Custom Script Graph nodes"],[1052,"Cauldron with @Scriptable macro"],[1088,"Register scripting module"],[1276,"Next steps"]],"points":[{"text":"Reality Composer Pro 3 可用 **Xcode 撰寫專案專屬的編輯器擴充**,支援更大、更有野心的空間專案。","hot":false},{"text":"自訂 **Component(如 Cauldron)+ System(CauldronSystem)** 控制實體狀態,並用 EntityComponentQuery 在 update 中查詢。","hot":false},{"text":"透過 **RealityComposerProPlugin 的 setup(context:)** 以 registerComponent / registerSystem 把擴充註冊進編輯器(搭配 @_cdecl 進入點)。","hot":true},{"text":"自訂動畫用 **EntityAction(SetWaterLevelAction)**,以 subscribe(to: .updated) 依 normalizedTime 內插水位。","hot":false},{"text":"用 **@Scriptable macro** 將 component 暴露給 **Script Graph**,再以 RKS.Configuration 註冊 scripting module。","hot":false}],"apis":["RealityComposerProPlugin","Component","System","EntityComponentQuery","registerComponent","registerSystem","registerAction","EntityAction","ShaderGraphMaterial","@Scriptable","RealityKitScripting","RKS.Configuration"],"audience":"**已用 Reality Composer Pro 製作空間內容、想用 Xcode 加入自訂元件/系統/腳本節點的 visionOS 開發者。**","gloss_en":"Extend Reality Composer Pro 3 functionality with Xcode","takeaway_en":"Write custom components, systems, actions, and Script Graph nodes in Xcode, register them into Reality Composer Pro 3 via RealityComposerProPlugin, and build larger spatial projects.","points_en":[{"text":"Reality Composer Pro 3 lets you **author project-specific editor extensions in Xcode**, supporting bigger, more ambitious spatial projects.","hot":false},{"text":"Use a custom **Component (such as Cauldron) plus a System (CauldronSystem)** to control entity state, querying it in update with EntityComponentQuery.","hot":false},{"text":"Register extensions into the editor via **RealityComposerProPlugin's setup(context:)** using registerComponent / registerSystem (with an @_cdecl entry point).","hot":true},{"text":"For custom animation, use an **EntityAction (SetWaterLevelAction)** and subscribe(to: .updated) to interpolate the water level by normalizedTime.","hot":false},{"text":"Use the **@Scriptable macro** to expose a component to **Script Graph**, then register the scripting module via RKS.Configuration.","hot":false}],"audience_en":"**visionOS developers already building spatial content with Reality Composer Pro who want to add custom components, systems, and script nodes using Xcode.**","code":["// Add a component to represent the water level\n\nimport RealityKit\n\npublic struct Cauldron: Component, Codable {\n    public var waterLevel: Float\n\n    enum CodingKeys: CodingKey {\n        case waterLevel\n    }\n}","// Add a system to control the water level\n\nimport RealityKit\n\npublic struct CauldronSystem: System {\n    let query = EntityComponentQuery(Cauldron.self)\n    public init(scene: Scene) {}\n\n    public func update(context: SceneUpdateContext) {\n        for (entity, cauldron) in context.entities(matching: query) {\n            guard let water = entity.findEntity(named: \"Cauldron_Water_mesh\")\n                else { continue }\n            water.setPosition(SIMD3\u003cFloat>(0, 1, 0) * cauldron.waterLevel, relativeTo: entity)\n        }\n    }\n}","// Make sure that Reality Composer Pro 3 knows about the Cauldron and CauldronSystem\n\nimport RealityComposerPro\n\nfinal class RCPCustomComponentsPlugin: RealityComposerProPlugin {\n    public func setup(context: any RealityComposerProContext) {\n        context.registerComponent(Cauldron.self)\n        context.registerSystem(CauldronSystem.self)\n    }\n}\n\n@_cdecl(\"createRealityComposerProPlugin\")\npublic func createRealityComposerProPlugin() -> UnsafeMutableRawPointer {\n    return RCPCustomComponentsPlugin().passRetained()\n}","// Properties to control water surface\n\nimport RealityKit\n\npublic struct Cauldron: Component, Codable {\n    public var waterLevel: Float\n    public var rotationSpeed: Float\n    public var minWaterLevel: Float\n    public var maxWaterLevel: Float\n    public var vortexCoeff: Float\n}","public func update(context: SceneUpdateContext) {\n    for (entity, cauldron) in context.entities(matching: query) {\n        guard let water = entity.findEntity(named: \"Cauldron_Water_mesh\") else { continue }\n        water.setPosition(SIMD3\u003cFloat>(0, 1, 0) * cauldron.waterLevel, relativeTo: entity)\n\n        guard var model = water.components[ModelComponent.self] else { continue }\n        guard var mat = model.materials.first as? ShaderGraphMaterial else { continue }\n        let surface = computeSurface(cauldron: cauldron)\n        try? mat.setParameter(name: \"Level Radius\", value: .float(surface.levelRadius))\n        try? mat.setParameter(name: \"Lowest Point\",\n            value: .float(cauldron.waterLevel - surface.lowestPoint))\n        try? mat.setParameter(name: \"Height Change\", value: .float(surface.heightChange))\n        try? mat.setParameter(name: \"Level Coeff\", value: .float(surface.levelCoeff))\n        try? mat.setParameter(name: \"Is Level\", value: .bool(surface.isLevel))\n        model.materials[0] = mat\n        water.components.set(model)\n    }\n}","// Custom action for setting the water level of the Cauldron\n\nimport RealityKit\n\npublic struct SetWaterLevelAction: EntityAction, Codable {\n    // Parameters for the action\n    public let startWaterLevel: Float\n    public let endWaterLevel: Float\n\n    // Required by EntityAction protocol\n    public var animatedValueType: (any AnimatableData.Type)? { Transform.self }\n}","extension SetWaterLevelAction {\n    static func subscribe() {\n        Task { @MainActor in\n            SetWaterLevelAction.subscribe(to: .updated) { event in\n                let normalizedTime = (event.playbackController.time - event.startTime) /\n                    event.duration\n                let action = event.action\n                let currentLevel = action.startWaterLevel +\n                    Float(normalizedTime) * (action.endWaterLevel - action.startWaterLevel)\n                guard let entity = event.targetEntity else { return }\n                guard var cauldron = entity.components[Cauldron.self] else { return }\n                cauldron.waterLevel = currentLevel\n                entity.components.set(cauldron)\n            }\n        }\n    }\n}","// Make sure that Reality Composer Pro 3 knows about the SetWaterLevelAction\n\nimport RealityComposerPro\n\nfinal class RCPCustomComponentsPlugin: RealityComposerProPlugin {\n    public func setup(context: any RealityComposerProContext) {\n        context.registerComponent(Cauldron.self)\n        context.registerSystem(CauldronSystem.self)\n\n        context.registerAction(SetWaterLevelAction.self)\n        SetWaterLevelAction.subscribe()\n    }\n}\n\n@_cdecl(\"createRealityComposerProPlugin\")\npublic func createRealityComposerProPlugin() -> UnsafeMutableRawPointer {\n    return RCPCustomComponentsPlugin().passRetained()\n}","// Expose Cauldron to Script Graphs\n\nimport RealityKit\nimport RealityKitScripting\nimport RealityKitScriptingMacros\n\n@Scriptable\npublic struct Cauldron: Component, Codable {\n    public var waterLevel: Float\n    public var rotationSpeed: Float\n    public var minWaterLevel: Float\n    public var maxWaterLevel: Float\n    public var vortexCoeff: Float\n}","// Register scripting module\n\npublic func setup(context: any RealityComposerProContext) {\n    context.registerComponent(Cauldron.self)\n    context.registerSystem(CauldronSystem.self)\n\n    context.registerAction(SetWaterLevelAction.self)\n    SetWaterLevelAction.subscribe()\n\n    Task { @MainActor in\n        let config = RKS.Configuration(id: \"ChaparralVillage\")\n            .onInitialize { _ in\n            [\n                Module(\"ChaparralVillage\") {\n                    Cauldron.SchemaProvider.schema\n                }\n            ]\n        }\n        try! RKS.addConfiguration(config)\n    }\n}"]},"related":[{"id":"234","title":"Design immersive environments for visionOS apps and the spatial web","gloss":"為 visionOS App 與空間網頁設計沉浸式環境","gloss_en":"Design immersive environments for visionOS apps and the spatial web","category":"visionos","categoryLabel":"visionOS"},{"id":"279","title":"Explore advances in RealityKit","gloss":"探索 RealityKit 的最新進展","gloss_en":"Explore advances in RealityKit","category":"visionos","categoryLabel":"visionOS"},{"id":"280","title":"Iterate your spatial scenes faster with Reality Composer Pro 3","gloss":"用 Reality Composer Pro 3 更快迭代空間場景","gloss_en":"Iterate your spatial scenes faster with Reality Composer Pro 3","category":"visionos","categoryLabel":"visionOS"},{"id":"282","title":"Discover the Spatial Preview framework","gloss":"認識 Spatial Preview 框架","gloss_en":"Discover the Spatial Preview framework","category":"visionos","categoryLabel":"visionOS"},{"id":"283","title":"Explore enhancements to visionOS object tracking","gloss":"探索 visionOS 物件追蹤的強化功能","gloss_en":"Explore enhancements to visionOS object tracking","category":"visionos","categoryLabel":"visionOS"}]}</script>
