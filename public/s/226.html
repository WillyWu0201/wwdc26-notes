<script id="d" type="application/json">{"s":{"id":"226","title":"Create live communication experiences","gloss":"打造即時通訊體驗","category":"uikit","categoryLabel":"UIKit","duration":1038,"url":"https://developer.apple.com/videos/play/wwdc2026/226/","takeaway":"用 LiveCommunicationKit 的 ConversationManager 與動作委派模型，將即時通話整合進系統體驗，並支援來電、去電、群組與合併等場景。","chapters":[[1,"Introduction"],[401,"Set up a conversation manager"],[476,"Incoming conversations"],[562,"Report the incoming conversation to the system"],[597,"Implement the delegate"],[613,"Fulfill the join action"],[677,"Route end actions"],[689,"Outgoing conversations"],[734,"Create a start action"],[743,"Perform the action"],[749,"Route start actions"],[798,"Groups"],[831,"Start group conversations"],[841,"Report group membership updates"],[926,"Route merge actions"],[933,"Handle the merge action"]],"points":[{"text":"**LiveCommunicationKit** 透過 **ConversationManager** 與其 Configuration（鈴聲、圖示、視訊支援、handle 類型等）把即時通訊整合進系統。","hot":true},{"text":"來電以 **PushKit** 收到 VoIP 推播後，呼叫 **reportNewIncomingConversation** 回報系統，再於 delegate 處理 **JoinConversationAction**。","hot":false},{"text":"去電建立 **StartConversationAction** 並以 manager.perform 執行；通話狀態用 **reportConversationEvent** 回報連線進度。","hot":false},{"text":"支援**群組通話**：以 Conversation.Update 回報成員變動，並處理 **MergeConversationAction** 合併多通對話。","hot":false}],"apis":["LiveCommunicationKit","ConversationManager","ConversationManagerDelegate","JoinConversationAction","StartConversationAction","MergeConversationAction","Conversation.Update","PushKit","PKPushRegistry"],"audience":"**開發 VoIP、視訊或語音通話 App** 並希望深度整合系統來電 UI 與群組通話的工程師。","gloss_en":"Build live communication experiences","takeaway_en":"Use LiveCommunicationKit's ConversationManager and action delegate model to integrate real-time calls into the system experience, with support for incoming, outgoing, group, and merged call scenarios.","points_en":[{"text":"**LiveCommunicationKit** integrates real-time communication into the system through **ConversationManager** and its Configuration (ringtone, icon, video support, handle types, and more).","hot":true},{"text":"For incoming calls, after receiving a VoIP push via **PushKit**, call **reportNewIncomingConversation** to report it to the system, then handle the **JoinConversationAction** in the delegate.","hot":false},{"text":"For outgoing calls, create a **StartConversationAction** and execute it with manager.perform; report connection progress with **reportConversationEvent**.","hot":false},{"text":"Supports **group calls**: report membership changes with Conversation.Update and handle **MergeConversationAction** to merge multiple conversations.","hot":false}],"audience_en":"Engineers **building VoIP, video, or voice calling apps** who want deep integration with the system call UI and group calling.","code":["// Set up a conversation manager\n\nimport LiveCommunicationKit\n\nlet configuration = ConversationManager.Configuration(\n  ringtoneName: \"SampleRingtone.caf\",\n  iconTemplateImageData: UIImage(named: \"SampleIcon\")?.pngData(),\n  maximumConversationGroups: 1,\n  maximumConversationsPerConversationGroup: 2,\n  includesConversationInRecents: true,\n  supportsVideo: true,\n  supportedHandleTypes: [.phoneNumber, .emailAddress]\n)\n\nlet manager = ConversationManager(configuration: configuration)\nmanager.delegate = self","// Report the incoming conversation to the system\n\nimport LiveCommunicationKit\nimport PushKit\n\nfinal class SamplePushHandler: NSObject, PKPushRegistryDelegate {\n  func pushRegistry(\n    _ registry: PKPushRegistry,\n    didReceiveIncomingVoIPPushWith payload: PKPushPayload,\n    metadata: PKVoIPPushMetadata) async {\n\n    guard let (handle, uuid) = parseConversationPayload(from: payload) else { return }\n\n    let capabilities = [.video, .pausing, .merging]\n    let update = Conversation.Update(members: [handle], capabilities: capabilities)\n    try? await manager.reportNewIncomingConversation(uuid: uuid, update: update)\n  }\n}","// Implement the delegate\n\nimport LiveCommunicationKit\n\nfinal class SampleDelegate: ConversationManagerDelegate {\n  func conversationManager(\n    _ manager: ConversationManager,\n    perform action: ConversationAction\n  ) {\n    switch action {\n    case let action as JoinConversationAction:\n      handleJoinAction(action)\n    default:\n      action.fail()\n    }\n  }\n}","// Handle a failed connection\n\nextension SampleDelegate {\n func handleJoinAction(_ action: JoinConversationAction) {\n    guard let conversation = manager.conversations.first(where: {$0.uuid == uuid })else {\n      return action.fail()\n    }\n\n    manager.reportConversationEvent(.conversationStartedConnecting(.now), for: conversation)\n\n    Task {\n      do {\n        try await setupMediaStream(with: action.conversationUUID)\n        manager.reportConversationEvent(.conversationConnected(.now), for: conversation)\n        action.fulfill(dateConnected: .now)\n      } catch {\n        action.fail()\n      }\n    }\n  }\n}","// Route end actions\n\nfinal class SampleDelegate: ConversationManagerDelegate {\n  // …\n  func conversationManager(\n    _ manager: ConversationManager,\n    perform action: ConversationAction\n  ) {\n    switch action {\n    case let action as JoinConversationAction:\n      handleJoinAction(action)\n    case let action as EndConversationAction:\n      handleEndAction(action)\n    default:\n      action.fail()\n    }\n  }\n}","let startAction = StartConversationAction(\n  conversationUUID: UUID(),\n  handles: [Handle(type: .phoneNumber, value: \"+1-650-555-0199\", displayName: \"Ryan Notch\")],\n  isVideo: false\n)","try await manager.perform([startAction])","// Route start actions\n\nfinal class SampleDelegate: ConversationManagerDelegate {\n  // …\n  func conversationManager(\n    _ manager: ConversationManager,\n    perform action: ConversationAction\n  ) {\n    switch action {\n    case let action as JoinConversationAction:\n      handleJoinAction(action)\n    case let action as EndConversationAction:\n      handleEndAction(action)\n    case let action as StartConversationAction:\n      handleStartAction(action)\n    default:\n      action.fail()\n    }\n  }\n}","// Start group conversations\n\nlet adam = Handle(type: .emailAddress,\n                  value: \"adam.halwani@icloud.com\",\n                  displayName: \"Adam Halwani\")\nlet david = Handle(type: .emailAddress,\n                   value: \"david@example.com\",\n                   displayName: \"David Evans\")\nlet ryan = Handle(type: .phoneNumber,\n                  value: \"+16505550199\",\n                  displayName: \"Ryan Notch\")\n\nlet startAction = StartConversationAction(\n  conversationUUID: UUID(),\n  handles: [david, ryan],\n  isVideo: false\n)\ntry await manager.perform([startAction])","// Report group membership updates\n\nlet update = Conversation.Update(\n  localMember: adam,\n  members: [david, ryan],\n  activeRemoteMembers: [david, ryan],\n  capabilities: [.merging, .pausing, .unmerging]\n)\n\nmanager.reportConversationEvent(\n  .conversationUpdated(update),\n  for: conversation\n)","// Route merge actions\n\nfinal class SampleDelegate: ConversationManagerDelegate {\n  func conversationManager(\n    _ manager: ConversationManager,\n    perform action: ConversationAction\n  ) {\n    switch action {\n    case let action as JoinConversationAction:\n      handleJoinAction(action)\n    case let action as EndConversationAction:\n      handleEndAction(action)\n    case let action as StartConversationAction:\n        handleStartAction(action)\n    case let action as MergeConversationAction:\n      handleMergeAction(action)\n    default:\n      action.fail()\n    }\n  }\n}","// Handle the merge action\n\nextension SampleDelegate {\n  func handleMergeAction(_ action: MergeConversationAction) {\n    let sourceUUID = action.conversationUUID\n    let targetUUID = action.conversationUUIDToMergeWith\n    guard manager.conversations.contains(where: { $0.uuid == sourceUUID }),\n          manager.conversations.contains(where: { $0.uuid == targetUUID }) else {\n      return action.fail()\n    }\n\n    Task {\n      do {\n        let update = try await combineStreams(from: sourceUUID, into: targetUUID)\n        manager.reportConversationEvent(.conversationUpdated(update), for: target)\n        action.fulfill()\n      } catch {\n        action.fail()\n      }\n    }\n  }\n}"]},"related":[{"id":"203","title":"Read between the strokes with PencilKit","gloss":"用 PencilKit 解讀筆跡內容","gloss_en":"Read handwriting content with PencilKit","category":"uikit","categoryLabel":"UIKit"},{"id":"212","title":"Rev up your CarPlay app","gloss":"強化你的 CarPlay App","gloss_en":"Rev up your CarPlay app","category":"uikit","categoryLabel":"UIKit"},{"id":"219","title":"Enhance the accessibility of your reading app","gloss":"強化你閱讀類 App 的無障礙體驗","gloss_en":"Enhance the accessibility of your reading app","category":"uikit","categoryLabel":"UIKit"},{"id":"221","title":"Prepare your tvOS apps for Dynamic Type","gloss":"讓你的 tvOS App 支援動態字型","gloss_en":"Prepare your tvOS app for Dynamic Type","category":"uikit","categoryLabel":"UIKit"},{"id":"278","title":"Modernize your UIKit app","gloss":"現代化你的 UIKit App","gloss_en":"Modernize your UIKit app","category":"uikit","categoryLabel":"UIKit"}]}</script>
