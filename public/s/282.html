<script id="d" type="application/json">{"s":{"id":"282","title":"Discover the Spatial Preview framework","gloss":"認識 Spatial Preview 框架","category":"visionos","categoryLabel":"visionOS","duration":885,"url":"https://developer.apple.com/videos/play/wwdc2026/282/","takeaway":"用全新的 Spatial Preview 框架把 Mac 上的文件與 USD 內容即時串到 visionOS 預覽，並搭配 USDKit 進行即時編輯與標註。","chapters":[[0,"Introduction"],[157,"Learn about Spatial Preview"],[210,"Document Preview"],[238,"Document Preview Session with Device Picker"],[320,"Update Document Contents"],[396,"USD Preview"],[456,"Edit USD Live"],[536,"Opt out of optimization"],[556,"Editing Features"],[610,"USD Layout Variants"],[617,"Edit USD live using USDKit and Spatial Preview"],[649,"USD Stage Observations"],[673,"Annotation Spec"],[693,"Metadata for Object Manipulation"],[736,"Session Options and Events"],[758,"Observe Session Progress"],[808,"Next steps"]],"points":[{"text":"全新的 **Spatial Preview** 框架可把 Mac 上的內容直接送到 **visionOS** 預覽，透過 `SpatialPreviewDevicePicker` 選擇目標裝置。","hot":true},{"text":"支援 **Document Preview**（`DocumentPreviewSession`）即時更新內容，並可觀察 session 狀態以在失效時清理。","hot":false},{"text":"搭配 **USDKit** 進行 **USD 即時編輯**（`USDPreviewSession`、`USDStage`），可切換 layout variants 並透過 stage observation 監看變更。","hot":false},{"text":"支援標註（annotation）、逐物件操作與匯出等 session 選項，並可用 `Observations` 觀察傳輸進度。","hot":false}],"apis":["SpatialPreview","USDKit","DocumentPreviewSession","USDPreviewSession","SpatialPreviewDevicePicker","ConnectedSpatialEndpointObserver","SpatialPreviewEndpoint","USDStage","Observations"],"audience":"**開發 visionOS 空間內容或 3D／USD 工作流程的開發者與創作者**。","gloss_en":"Discover the Spatial Preview framework","takeaway_en":"Use the new Spatial Preview framework to stream documents and USD content from your Mac directly into a visionOS preview, paired with USDKit for live editing and annotation.","points_en":[{"text":"The new **Spatial Preview** framework sends content from your Mac directly to a **visionOS** preview, choosing the target device with `SpatialPreviewDevicePicker`.","hot":true},{"text":"Supports **Document Preview** (`DocumentPreviewSession`) for live content updates, and you can observe session state to clean up when it becomes invalid.","hot":false},{"text":"Pairs with **USDKit** for **live USD editing** (`USDPreviewSession`, `USDStage`), letting you switch layout variants and watch changes through stage observation.","hot":false},{"text":"Supports session options like annotation, per-object manipulation, and export, and you can observe transfer progress with `Observations`.","hot":false}],"audience_en":"**Developers and creators building visionOS spatial content or 3D/USD workflows**.","code":["// Send and update documents using the Spatial Preview framework\n\nimport SwiftUI\nimport SpatialPreview\nlet deviceObserver = ConnectedSpatialEndpointObserver()\n\nlet previewSession = DocumentPreviewSession(name: \"Immersive.aivu\", contentType: .aivu)\n\nfunc startPreview(contentURL: URL, endpoint: SpatialPreviewEndpoint) async throws {\n    let endpoint = try await deviceObserver.endpoint\n    try await previewSession.start(endpoint: endpoint)\n    try await previewSession.updateContents(url: contentURL)\n}\n\n@State var showDevicePicker: Bool = false\n\nvar body: some View {\n    ...\n    .sheet(isPresented: $showDevicePicker) {\n        SpatialPreviewDevicePicker(isPresented: $showDevicePicker) { endpoint in\n            showDevicePicker = false\n            Task {\n                try await startPreview(filename: filename, endpoint: endpoint)\n            }\n        }\n    }\n}","// Send and update documents using the Spatial Preview framework\n\nimport SwiftUI\nimport SpatialPreview\n\nForEach(contentURLs, id: \\.self) { url in\n    Button {\n        Task { try await previewSession?.updateContents(url: url) }\n    }\n}\n.task(id: previewSession.map { ObjectIdentifier($0) }) {\n    for await state in Observations({ session.state }) {\n        if state.isInvalidated {\n            previewSession = nil\n            break\n        }\n    }\n}\n\ntry await previewSession?.close()","// Edit USD live using USDKit and Spatial Preview\n\nimport SpatialPreview\nimport USDKit\n\nlet deviceObserver = ConnectedSpatialEndpointObserver()\n\nvar usdSession: USDPreviewSession?\n\nfunc shareStage(to endpoint: SpatialPreviewEndpoint) async throws -> USDPreviewSession {\n    let endpoint = try await deviceObserver.endpoint\n\n    let stageURL = Bundle.main.url(forResource: \"sampleScene\", withExtension: \"usdz\")\n    let stage = try USDStage.open(stageURL)\n    usdSession = USDPreviewSession(stage: stage)\n\n    try await usdSession?.start(endpoint: endpoint)\n}","// Optimization\n\nimport SpatialPreview\n\n\n\n\nlet endpoint = try await deviceObserver.endpoint\ndo {\n    try await usdSession.start(endpoint: endpoint, parameters: .unmodified)\n} catch USDPreviewSession.Error.assetUnshareable {\n    // Handle Asset Unshareable error\n}","// LayoutVariants.usda\n#usda 1.0\nover \"furniture\" (\n    variantSets = \"Layout\"\n    variants = { string Layout = \"LayoutA\" }\n)\n{\n    variantSet \"Layout\" = {\n        \"LayoutA\" {\n            // Default furniture position and rotation\n        }\n        \"LayoutB\" {\n            // Moves furniture prims to a different position and rotation\n        }\n        ...\n    }\n}","// Edit USD live using USDKit and Spatial Preview\n\nimport SpatialPreview\nimport USDKit\n\nfunc applyLayoutVariant(named layoutVariantName: String) throws {\n    let prim = stage.prim(at: SdfPath(\"/root/furniture\"))\n    try prim.variantSets?.setSelection(\"Layout\", variantName: layoutVariantName)\n}","// Edit USD live using Spatial Preview\n\nimport SpatialPreview\nimport USDKit\n\nlet observerToken: ObservationToken\n\nobserverToken = stage.addObserver(for: UsdStage.ObjectsDidChange.self) { notice in\n    for path in notice.resyncedPaths {\n        let prim = notice.stage.prim(at: path)\n        guard prim.isValid else { continue }\n        if prim.isAnnotation {\n            // Handle annotation change\n            break\n        }\n    }\n}","// Annotation spec example\n\nAppleTextAnnotation {\n    // The textual representation of this annotation\n    string text\n\n    // The identifier for this specific author\n    uniform string author\n\n    // An identifier that is unique to your data tracking system\n    uniform string identifier\n}\n\n/__documentAnnotationGroup__","// Metadata required for object manipulation in Quick Look\n\ncustomData = {\n    dictionary apple = {\n        bool spatialEditable = 1\n    }\n}","// Spatial Preview session options and events\n\nimport SpatialPreview\nimport USDKit\n\nsession.start(endpoint: endpoint, options: [.annotations, .perObjectManipulation, .export])\n\nfunc listenForEvents(session: USDPreviewSession) async {\n    for await event in session.events {\n        if case .timeChanged(let time) = event {\n            playbackModel.timeCode = time\n        } else if case .playbackStateChanged(let isPlaying) = event {\n            playbackModel.playbackStateChanged(isPlaying)\n        }\n    }\n}","// Observe Spatial Preview session progress\n\nimport SpatialPreview\nimport USDKit\n\n@State private var sessionProgress: Double = 0\n\nvar body: some View {\n    ...\n    .task(id: usdSession.map { ObjectIdentifier($0) }) {\n        guard let session = usdSession else { return }\n        for await fraction in Observations({ session.progress.fractionCompleted }) {\n            sessionProgress = fraction\n        }\n    }\n    .overlay(alignment: .bottom) {\n        ProgressView(value: sessionProgress)\n            .padding()\n    }\n}"]},"related":[{"id":"285","title":"Discover USDKit and what’s new in OpenUSD","gloss":"認識 USDKit 與 OpenUSD 的新功能","gloss_en":"Discover USDKit and what's new in OpenUSD","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"234","title":"Design immersive environments for visionOS apps and the spatial web","gloss":"為 visionOS App 與空間網頁設計沉浸式環境"
