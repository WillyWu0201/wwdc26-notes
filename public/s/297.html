<script id="d" type="application/json">{"s":{"id":"297","title":"Best practices for integrating visual intelligence in your app","gloss":"在 App 中整合視覺智慧的最佳實務","category":"ai","categoryLabel":"AI 與機器學習","duration":1065,"url":"https://developer.apple.com/videos/play/wwdc2026/297/","takeaway":"用 **Visual Intelligence** 搭配 App Intents 與 Vision 特徵比對，讓使用者以相機影像在你的 App 中探索內容。","chapters":[[7,"Introduction"],[122,"Defining your content"],[201,"Define the content you want to return as an App Entity"],[303,"Implementing a query"],[339,"Adopt IntentValueQuery to return results"],[384,"Build a catalog of albums with precomputed feature prints"],[405,"Search the catalog for albums matching the captured image"],[498,"Opening results"],[507,"Create an open intent to land users on the right screen"],[603,"Mac and iPad adoption"],[725,"Use UnionValue to return multiple visual search result types"],[738,"Expand the IntentValueQuery to return the UnionValue"],[747,"Returning multiple result types"],[776,"Continuing search in your app"],[793,"Provide a link to in-app search"],[867,"System store integrations"],[924,"Request calendar access and fetch upcoming concerts"],[942,"Filter for upcoming events that match known artists in our catalog"],[944,"Observe newly created events"],[1036,"Next steps"]],"points":[{"text":"把可回傳的內容定義成 **`AppEntity`**，並用 `IntentValueQuery` 接收 `SemanticContentDescriptor` 回傳視覺搜尋結果。","hot":true},{"text":"以 Vision 的 `GenerateImageFeaturePrintRequest` 預先計算**特徵指紋（feature print）**，再用 `distance(to:)` 比對拍攝影像。","hot":false},{"text":"用 `OpenIntent` 讓搜尋結果直接開啟到正確畫面，並用 `@UnionValue` 回傳多種結果類型（如專輯與演唱會）。","hot":false},{"text":"透過 `@AppIntent(schema: .visualIntelligence.semanticContentSearch)` 提供「**在 App 中繼續搜尋**」的入口。","hot":false},{"text":"整合系統 store 與 **EventKit**，請求行事曆權限抓取演唱會並監聽 `EKEventStoreChanged` 更新。","hot":false}],"apis":["VisualIntelligence","AppIntents","AppEntity","IntentValueQuery","SemanticContentDescriptor","Vision","GenerateImageFeaturePrintRequest","FeaturePrintObservation","OpenIntent","UnionValue","EventKit"],"audience":"**想讓 App 內容能透過相機與視覺智慧被探索**的 iOS／iPad／Mac 開發者。","gloss_en":"Best practices for integrating visual intelligence in your app","takeaway_en":"Use **Visual Intelligence** together with App Intents and Vision feature matching to let users discover content in your app from camera imagery.","points_en":[{"text":"Define returnable content as an **`AppEntity`**, and use `IntentValueQuery` to receive a `SemanticContentDescriptor` and return visual search results.","hot":true},{"text":"Precompute a **feature print** with Vision's `GenerateImageFeaturePrintRequest`, then compare it against the captured image using `distance(to:)`.","hot":false},{"text":"Use `OpenIntent` to open search results directly to the right screen, and `@UnionValue` to return multiple result types (such as albums and concerts).","hot":false},{"text":"Provide a \"**continue searching in the app**\" entry point via `@AppIntent(schema: .visualIntelligence.semanticContentSearch)`.","hot":false},{"text":"Integrate the system store with **EventKit**, requesting calendar access to fetch concerts and listening for `EKEventStoreChanged` updates.","hot":false}],"audience_en":"iOS/iPad/Mac developers who want **their app's content to be discoverable through the camera and visual intelligence**.","code":["// Define the content you want to return as an App Entity\n  import AppIntents\n  \n  struct AlbumEntity: AppEntity {\n      var id: String\n      @Property var name: String\n      @Property var artistName: String\n      var coverArtData: Data\n      \n      var displayRepresentation: DisplayRepresentation {\n          DisplayRepresentation( \n              title: \"\\(name)\",\n              subtitle: \"\\(artistName)\",\n              image: .init(data: coverArtData)\n          )   \n      }   \n      \n      static let defaultQuery = AlbumEntityQuery()\n      \n      static var typeDisplayRepresentation: TypeDisplayRepresentation { \"Album\" }\n  }   \n  \n  struct AlbumEntityQuery: EntityQuery {\n      @Dependency var catalog: AlbumCatalog\n      func entities(for identifiers: [String]) async throws -> [AlbumEntity] {\n          catalog.albums(for: identifiers)\n      }\n  }","// Adopt IntentValueQuery to return visual search results\n  import AppIntents\n  import VisualIntelligence\n  \n  struct SearchHandler: IntentValueQuery {\n      @Dependency var catalog: AlbumCatalog\n      @Dependency var concertFinder: ConcertFinder\n      \n      func values(for input: SemanticContentDescriptor) async throws -> [VisualSearchResult] {\n          guard let pixelBuffer = input.pixelBuffer else {\n              return []\n          }   \n          \n          let albums = try await catalog.search(matching: pixelBuffer)\n          \n          return albums.map { VisualSearchResult.album($0) }\n      }\n  }","// Build a catalog of albums with precomputed feature prints\n  import Vision\n  \n  @Observable\n  class AlbumCatalog {\n      static let shared = AlbumCatalog()\n      \n      struct CatalogEntry: Sendable {\n          let album: AlbumEntity\n          let featurePrint: FeaturePrintObservation\n      }   \n      \n      private(set) var entries: [CatalogEntry] = []\n      \n      private func generateFeaturePrint(\n          for image: CGImage\n      ) async throws -> FeaturePrintObservation {\n          let request = GenerateImageFeaturePrintRequest()\n          let result = try await request.perform(on: image)\n          return result\n      }\n  }","// Search the catalog for albums matching the captured image\n  func search(matching pixelBuffer: CVReadOnlyPixelBuffer, limit: Int = 10, maxDistance: Double = 1.0) async throws ->\n  [AlbumEntity] {\n      var cgImage: CGImage?\n      _ = pixelBuffer.withUnsafeBuffer { VTCreateCGImageFromCVPixelBuffer($0, options: nil, imageOut: &cgImage) }\n      guard let cgImage else { return [] }\n      \n      let queryPrint = try await generateFeaturePrint(for: cgImage)\n      \n      return try entries.compactMap { entry -> (album: AlbumEntity, distance: Double)? in\n          let distance = try queryPrint.distance(to: entry.featurePrint)\n          guard distance \u003c= maxDistance else { return nil }\n          return (entry.album, distance)\n      }   \n      .sorted { $0.distance \u003c $1.distance }\n      .prefix(limit)\n      .map { $0.album }\n  }","// Create an open intent to land users on the right screen\n  import AppIntents\n  \n  struct OpenAlbumIntent: OpenIntent {\n      static let title: LocalizedStringResource = \"Open Album\"\n      \n      @Parameter(title: \"Album\")\n      var target: AlbumEntity\n      \n      @Dependency var appState: AppState\n      \n      func perform() async throws -> some IntentResult {\n          await appState.openAlbum(id: target.id)\n          return .result()\n      }\n  }","// Use UnionValue to return multiple visual search result types\n  @UnionValue\n  enum VisualSearchResult {\n      case album(AlbumEntity)\n      case concert(ConcertEntity)\n  }   \n  \n  struct OpenConcertIntent: OpenIntent {\n      static let title: LocalizedStringResource = \"Open Concert\"\n      \n      @Parameter(title: \"Concert\")\n      var target: ConcertEntity\n      \n      @Dependency var appState: AppState\n      \n      func perform() async throws -> some IntentResult {\n          await appState.openConcert(id: target.id)\n          return .result()\n      }\n  }","// Expand the IntentValueQuery to return the UnionValue\n  struct SearchHandler: IntentValueQuery {\n      @Dependency var catalog: AlbumCatalog\n      @Dependency var concertFinder: ConcertFinder\n      \n      func values(for input: SemanticContentDescriptor) async throws -> [VisualSearchResult] {\n          guard let pixelBuffer = input.pixelBuffer else {\n              return []\n          }   \n          \n          let albums = try await catalog.search(matching: pixelBuffer)\n          \n          let artists = albums.map { $0.artistName }\n          \n          let concerts = await concertFinder.findNearby(byArtists: artists)\n\n          return albums.map { VisualSearchResult.album($0) }\n              + concerts.map { VisualSearchResult.concert($0) }\n      }\n  }","// Provide a link to in-app search\n  @AppIntent(schema: .visualIntelligence.semanticContentSearch)\n  struct SemanticContentSearchIntent: AppIntent {\n      static let title: LocalizedStringResource = \"Search in app\"\n      static let openAppWhenRun: Bool = true\n      \n      var semanticContent: SemanticContentDescriptor\n      @Dependency var catalog: AlbumCatalog\n      @Dependency var concertFinder: ConcertFinder\n      @Dependency var appState: AppState\n      \n      func perform() async throws -> some IntentResult {\n          guard let pixelBuffer = semanticContent.pixelBuffer else { return .result() }\n          let albums = try await catalog.search(matching: pixelBuffer)\n          let artists = albums.map { $0.artistName }\n          let concerts = await concertFinder.findNearby(byArtists: artists)\n          await appState.openSearch(albums: albums, concerts: concerts)\n          return .result()\n      }   \n  }","// Request calendar access and fetch upcoming concerts\n  import EventKit\n  \n  @Observable\n  class UpcomingConcertManager {\n      private let eventStore = EKEventStore()\n      var upcomingConcerts: [EKEvent] = []\n      var authorizationStatus: EKAuthorizationStatus = .notDetermined\n      \n      func requestAccessAndFetch() async throws {\n          let granted = try await eventStore.requestFullAccessToEvents()\n          guard granted else {\n              authorizationStatus = .denied\n              return\n          }   \n          authorizationStatus = .fullAccess\n          await fetchUpcomingConcerts()\n\n          // ...\n      }\n  }","// Filter for upcoming events that match known artists in our catalog\n  class UpcomingConcertManager {\n      func fetchUpcomingConcerts() async {\n          let predicate = eventStore.predicateForEvents(\n              withStart: .now,\n              end: .now.addingTimeInterval(90 * 24 * 60 * 60),\n              calendars: nil\n          )   \n          \n          let events = eventStore.events(matching: predicate)\n          \n          upcomingConcerts = events.filter { event in\n              AlbumCatalog.shared.entries.contains { entry in\n                  event.title?.localizedCaseInsensitiveContains(entry.album.artistName) == true\n              }\n          }\n      }\n  }","// Observe newly created events\n  @Observable\n  class UpcomingConcertManager {\n      // ...\n\n      func requestAccessAndFetch() async throws {\n          // ...\n\n          for await _ in NotificationCenter.default\n              .notifications(\n                  named: .EKEventStoreChanged\n              ) {\n              await fetchUpcomingConcerts()\n          }\n      }\n  }"]},"related":[{"id":"344","title":"Code-along: Make your app available to Siri","gloss":"程式碼實作：讓你的 App 可被 Siri 使用","gloss_en":"Code-along: Make your app available to Siri","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"240","title":"Build intelligent Siri experiences with App Schemas","gloss":"用 App Schemas 打造智慧 Siri 體驗","gloss_en":"Build intelligent Siri experiences with App Schemas","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"310","title":"What’s new in Shortcuts","gloss":"捷徑有什麼新東西","gloss_en":"What's new in Shortcuts","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"343","title":"Explore advanced App Intents features for Siri and Apple Intelligence","gloss":"探索 Siri 與 Apple Intelligence 的進階 App Intents 功能","gloss_en":"Explore advanced App Intents features for Siri and Apple Intelligence","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"345","title":"Discover new capabilities in the App Intents framework","gloss":"探索 App Intents 框架的新能力","gloss_en":"Discover new capabilities in the App Intents framework","category":"other","categoryLabel":"其他"}]}</script>
