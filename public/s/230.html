<script id="d" type="application/json">{"s":{"id":"230","title":"What’s new in assessment on macOS","gloss":"macOS 評量功能的新變化","category":"other","categoryLabel":"其他","duration":841,"url":"https://developer.apple.com/videos/play/wwdc2026/230/","takeaway":"透過 Automatic Assessment Configuration 框架的新選項，可在 macOS 上為教育 App 設定前置檢查、無障礙限制與系統體驗，打造安全的考試環境。","chapters":[[0,"Introduction"],[94,"Precondition checks"],[150,"Set up precondition checks"],[180,"Accessibility restrictions"],[241,"Restrict accessibility features"],[273,"System experience customization"],[332,"Customize the Menu Bar items"],[421,"Define input restrictions"],[458,"Enable dock appearance"],[515,"Set allowed directories and files"],[556,"Application launch restrictions"],[598,"Set application launch restrictions"],[651,"Best practices"],[755,"Next steps"]],"points":[{"text":"以 **precondition checks** 在進入評量前要求 SIP、受管理裝置、單一使用者等條件，確保環境安全。","hot":false},{"text":"可精細控制 **accessibility restrictions**，個別允許或停用 VoiceOver、Switch Control、Zoom 等無障礙功能。","hot":true},{"text":"透過 **system experience customization** 自訂 Menu Bar 項目、輸入限制（聽寫、自動填寫、Emoji 鍵盤）與 Dock 外觀。","hot":false},{"text":"可設定允許存取的目錄檔案，並以 **application launch restrictions** 限制可啟動的程式與腳本執行。","hot":false}],"apis":["AutomaticAssessmentConfiguration","AEAssessmentConfiguration"],"audience":"適合**開發教育與考試類 App、需在 macOS 上提供安全評量環境的開發者**。","gloss_en":"What's new in assessment on macOS","takeaway_en":"New options in the Automatic Assessment Configuration framework let you set up precondition checks, accessibility restrictions, and the system experience for education apps on macOS to create a secure testing environment.","points_en":[{"text":"Use **precondition checks** to require conditions such as SIP, a managed device, or a single user before entering assessment, ensuring a secure environment.","hot":false},{"text":"Fine-tune **accessibility restrictions** to individually allow or disable assistive features like VoiceOver, Switch Control, and Zoom.","hot":true},{"text":"Use **system experience customization** to customize Menu Bar items, input restrictions (Dictation, autofill, Emoji keyboard), and the Dock's appearance.","hot":false},{"text":"Configure which directories and files can be accessed, and use **application launch restrictions** to limit which apps can launch and which scripts can run.","hot":false}],"audience_en":"For **developers building education and exam apps who need to provide a secure assessment environment on macOS**.","code":["import AutomaticAssessmentConfiguration\n\nfunc makeAssessmentConfiguration() -> AEAssessmentConfiguration {\n    let configuration = AEAssessmentConfiguration()\n\n    configuration.allowLockdownMode = false\n    configuration.allowPrivateRelay = false\n    configuration.requiresSIP = true\n    configuration.requiresManagedDevice = true\n    configuration.requiresSingleUser = true\n    configuration.requiresUserAccountType = .standard\n\n    return configuration\n}","import AutomaticAssessmentConfiguration\n\nfunc makeAssessmentConfiguration() -> AEAssessmentConfiguration {\n    let configuration = AEAssessmentConfiguration()\n\n    configuration.allowsAccessibilityVoiceOver = true\n    configuration.allowsAccessibilitySwitchControl = false\n    configuration.allowsAccessibilityAlternativeInputMethods = true\n    configuration.allowsAccessibilityBackgroundSounds = true\n    configuration.allowsAccessibilityHoverText = true\n    configuration.allowsAccessibilityLiveSpeech = true\n    configuration.allowsAccessibilitySpokenContent = true\n    configuration.allowsAccessibilityVoiceControl = true\n    configuration.allowsAccessibilityZoom = true\n\n    return configuration\n}","import AutomaticAssessmentConfiguration\n\nfunc makeAssessmentConfiguration() -> AEAssessmentConfiguration {\n    let configuration = AEAssessmentConfiguration()\n\n    configuration.allowsMenuBar = true\n    configuration.allowedMenuBarItems = [\n        .battery,\n        .clock,\n        .volume\n    ]\n    configuration.allowedAppleMenuItems = [\n        .sleep\n    ]\n\n    return configuration\n}","import AutomaticAssessmentConfiguration\n\nfunc makeAssessmentConfiguration() -> AEAssessmentConfiguration {\n    let configuration = AEAssessmentConfiguration()\n\n    configuration.allowsDictation = false\n    configuration.allowsAutoFill = false\n    configuration.allowsStructuralInput = false\n    configuration.allowsEmojiKeyboard = false\n\n    return configuration\n}","import AutomaticAssessmentConfiguration\n\nfunc makeAssessmentConfiguration() -> AEAssessmentConfiguration {\n    let configuration = AEAssessmentConfiguration()\n\n    configuration.allowsDock = true\n\n    return configuration\n}","import AutomaticAssessmentConfiguration\n\nfunc makeAssessmentConfiguration() -> AEAssessmentConfiguration {\n    let configuration = AEAssessmentConfiguration()\n\n    configuration.allowedDirectoriesAndFiles = [\n        URL(fileURLWithPath: \"~/Documents/\")\n    ]\n\n    return configuration\n}","import AutomaticAssessmentConfiguration\n\nfunc makeAssessmentConfiguration() -> AEAssessmentConfiguration {\n    let configuration = AEAssessmentConfiguration()\n\n    configuration.allowOnlyParticipantsToRun = true\n    configuration.allowsUserScriptExecution = false\n\n    return configuration\n}"]},"related":[{"id":"101","title":"Keynote","gloss":"主題演講","gloss_en":"Keynote","category":"other","categoryLabel":"其他"},{"id":"102","title":"Platforms State of the Union","gloss":"平台現況報告","gloss_en":"Platforms State of the Union","category":"other","categoryLabel":"其他"},{"id":"111","title":"Keynote (ASL)","gloss":"主題演講(美國手語版)","gloss_en":"Keynote (American Sign Language)","category":"other","categoryLabel":"其他"},{"id":"112","title":"Platforms State of the Union (ASL)","gloss":"平台現況報告（美國手語版）","gloss_en":"Platforms State of the Union (American Sign Language)","category":"other","categoryLabel":"其他"},{"id":"122","title":"WWDC26 Platforms State of the Union Recap","gloss":"WWDC26 平台現況演講重點回顧
