<script id="d" type="application/json">{"s":{"id":"285","title":"Discover USDKit and what’s new in OpenUSD","gloss":"認識 USDKit 與 OpenUSD 的新功能","category":"graphics","categoryLabel":"圖形與遊戲","duration":873,"url":"https://developer.apple.com/videos/play/wwdc2026/285/","takeaway":"全新 Swift 原生的 USDKit 讓你以類型安全的 API 開啟、走訪與編輯 USD Stage，並支援無障礙中繼資料與網格／紋理壓縮匯出。","chapters":[[7,"Introduction"],[53,"OpenUSD: Industry Foundation and New Standards"],[171,"Gaussian Splats and Particle Fields"],[227,"Introducing USDKit"],[246,"3D Editing in Preview and New Renderers"],[342,"Spatial Preview: Live Collaboration Between Mac and Vision Pro"],[385,"USD on the Web: The Safari Model Tag"],[417,"USDKit: Key Concepts and Swift API Walkthrough"],[492,"Opening a USD Stage"],[524,"Traversing the Stage Hierarchy"],[576,"Moving a Prim with a Transform Operation"],[605,"Accessibility Metadata in USD"],[642,"Applying Accessibility Metadata"],[679,"Asset Compression: Mesh and Texture"],[725,"Exporting with Mesh and Texture Compression"],[756,"Integration Paths: USDKit, SwiftUSD, and OpenUSD"],[804,"Next steps"]],"points":[{"text":"推出 **Swift 原生的 USDKit**，可建立／開啟 **USDStage**、走訪 prim 階層、定義 Xform 並加入檔案參照。","hot":true},{"text":"OpenUSD 採用新標準，支援 **Gaussian Splats 與 Particle Fields**；Preview 可進行 3D 編輯，並與 Vision Pro 即時協作。","hot":false},{"text":"可在 USD 中套用 **AccessibilityAPI schema**，為 3D 物件加上 label 與 description 等**無障礙中繼資料**。","hot":false},{"text":"匯出 **USDZ** 時可用 preferSmallTextureFiles 與 preferSmallMeshFiles 進行**網格與紋理壓縮**；Safari 也支援 model 標籤呈現 USD。","hot":false}],"apis":["USDKit","USDStage","USDValue","OpenUSD","SwiftUSD","USDZ","AccessibilityAPI"],"audience":"**處理 3D 內容、AR/visionOS 場景或遊戲資產管線**、需要在 Apple 平台上以 Swift 操作 USD 的開發者。","gloss_en":"Discover USDKit and what's new in OpenUSD","takeaway_en":"The new Swift-native USDKit lets you open, traverse, and edit a USD Stage with type-safe APIs, with support for accessibility metadata and mesh/texture-compressed export.","points_en":[{"text":"Introduces **Swift-native USDKit**, which can create/open a **USDStage**, traverse the prim hierarchy, define Xforms, and add file references.","hot":true},{"text":"OpenUSD adopts new standards supporting **Gaussian Splats and Particle Fields**; Preview enables 3D editing and real-time collaboration with Vision Pro.","hot":false},{"text":"Apply the **AccessibilityAPI schema** in USD to add **accessibility metadata** such as label and description to 3D objects.","hot":false},{"text":"When exporting **USDZ**, use preferSmallTextureFiles and preferSmallMeshFiles for **mesh and texture compression**; Safari also supports rendering USD via the model tag.","hot":false}],"audience_en":"**Developers working with 3D content, AR/visionOS scenes, or game asset pipelines** who need to work with USD in Swift on Apple platforms.","code":["import USDKit\n\n// Create a new empty in-memory stage\n\nlet stage = USDStage()\n\n// Open a stage from a file on disk\n\nlet url = URL(fileURLWithPath: \"/ALab/entry.usda\")\nlet stage = try USDStage.open(url)","// Traverse all prims looking for the oscilloscope\nfor prim in stage.descendants {\n    if prim.name == \"scope\" {\n        // There it is! 🔬\n    }\n}\n\n// It wasn't there — define a new Xform prim for it\n\nlet scope = stage.definePrim(at: \"/World/scope\", type: “Xform\"))\n                             \n// Add a file reference to the prim\n\ntry scope.references.add(“/ALab/assets/scope.usda”)","// Creates xformOp:translate and updates xformOpOrder automatically\n\nscope.addTransformOperation(type: .translate)\nscope[\"xformOp:translate\", as: USDValue.Vec3d.self] = [2.5, 0.0, -1.0]","// Apply the multi-apply AccessibilityAPI schema with instance name \"default\"\n\ntry scope.applyAPISchema(\"AccessibilityAPI\", instanceName:\"default\")\n\n// Create the label and description attributes\n\nscope.makeAttribute(named: \"accessibility:default:label\", as: .string)\nscope.makeAttribute(named: \"accessibility:default:description\", as: .string)\n\n// Set their values\n\nscope[\"accessibility:default:label\", as: String.self] = \"Oscilloscope\"\nscope[\"accessibility:default:description\", as: String.self] = \n    \"Vintage signal analyzer with a 3D wireframe display, topped by a color bar test monitor\"","let output = URL(fileURLWithPath: \"/ALab/alab_compressed.usdz\")\n\n// Export the stage as a USDZ package\n\ntry stage.exportPackage(\n    to: output,\n    options: [\n        .preferSmallTextureFiles(quality: .standard),   // compress textures\n        .preferSmallMeshFiles                           // compress mesh geometry\n    ]\n)"]},"related":[{"id":"282","title":"Discover the Spatial Preview framework","gloss":"認識 Spatial Preview 框架","gloss_en":"Discover the Spatial Preview framework","category":"visionos","categoryLabel":"visionOS"},{"id":"215","title":"Get started with the HTML Model Element","gloss":"開始使用 HTML model 元素","gloss_en":"Getting started with the HTML model element","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"284","title":"Collaborate on structured 3D models in visionOS","gloss":"在 visionOS 中協作操作結構化 3D 模型","gloss_en":"Collaborate on structured 3D models in visionOS","category":"visionos","categoryLabel":"visionOS"},{"id":"252","title":"Design no-code games with Reality Composer Pro 3","gloss":"用 Reality Composer Pro 3 設計無程式碼遊戲","gloss_en":"Design no-code games with Reality Composer Pro 3","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"256","title":"Discover generated subtitles and subtitle styles","gloss":"認識自動產生字幕與字幕樣式","gloss_en":"Discover generated subtitles and subtitle styles","category":"graphics","categoryLabel":"圖形與遊戲"}]}</script>
