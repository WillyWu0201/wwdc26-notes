<script id="d" type="application/json">{"s":{"id":"328","title":"Explore numerical computing in Swift with MLX","gloss":"用 MLX 探索 Swift 的數值計算","category":"ai","categoryLabel":"AI 與機器學習","duration":871,"url":"https://developer.apple.com/videos/play/wwdc2026/328/","takeaway":"**MLX Swift** 把 NumPy 風格的陣列運算原生帶進 Swift，消除機器學習開發的跨語言摩擦並善用 Apple 晶片。","chapters":[[0,"Introduction"],[57,"MLX Swift and the Apple ecosystem"],[184,"MLX Swift"],[268,"Mandelbrot"],[309,"Mandelbrot set in plain Swift (scalar)"],[327,"Mandelbrot set in MLX Swift (array)"],[394,"Heat distribution"],[447,"Jacobi iteration with conv2d"],[492,"Faster convergence with SOR"],[557,"Successive Over-Relaxation (SOR)"],[617,"Curve fitting"],[673,"Curve fitting with automatic differentiation"],[737,"The full MLX toolkit and ecosystem"],[827,"Next steps"]],"points":[{"text":"**MLX Swift** 提供 NumPy 風格的 `MLXArray` 與向量化運算，讓數值計算原生寫在 Swift 裡。","hot":true},{"text":"以 Mandelbrot 為例，展示從 scalar 逐點迴圈改寫成**陣列式（array）**運算的巨大簡化與加速。","hot":false},{"text":"用 `conv2d` 做 Jacobi 迭代解熱傳導，再以 **SOR（Successive Over-Relaxation）** 加速收斂。","hot":false},{"text":"透過 **自動微分（`grad`）** 進行曲線擬合，以梯度下降更新參數。","hot":false},{"text":"MLX 採**延遲求值**，需以 `eval()` 強制計算，並串接完整的 MLX 工具鏈與生態系。","hot":false}],"apis":["MLX","MLXArray","MLXRandom","conv2d","matmul","grad","eval","linspace"],"audience":"**想在 Swift 中做數值計算或機器學習**、需善用 Apple 晶片的開發者與研究者。","gloss_en":"Explore numerical computing in Swift with MLX","takeaway_en":"**MLX Swift** brings NumPy-style array computing natively to Swift, eliminating cross-language friction in machine learning development and making full use of Apple silicon.","points_en":[{"text":"**MLX Swift** provides a NumPy-style `MLXArray` and vectorized operations, letting you write numerical computing natively in Swift.","hot":true},{"text":"Using Mandelbrot as an example, shows the dramatic simplification and speedup of rewriting a scalar point-by-point loop into **array** operations.","hot":false},{"text":"Solve heat conduction with Jacobi iteration using `conv2d`, then accelerate convergence with **SOR (Successive Over-Relaxation)**.","hot":false},{"text":"Perform curve fitting via **automatic differentiation (`grad`)**, updating parameters with gradient descent.","hot":false},{"text":"MLX uses **lazy evaluation**, requiring `eval()` to force computation, and connects to the full MLX toolchain and ecosystem.","hot":false}],"audience_en":"Developers and researchers who want to **do numerical computing or machine learning in Swift** while making full use of Apple silicon.","code":["import MLX\nlet n = 100\nlet steps = 10\nlet B = MLXRandom.normal([n, n])\nvar v = MLXRandom.normal([n])\n\n// get symmetric matrix A = Bᵀ + B\nlet A = B.T + B\n\n// Power iteration → top eigenvector of A.\n//   v ← A v / ‖A v‖\nfor _ in 0 ..\u003c steps {\n    let Av = matmul(A, v)\n    v = Av / norm(Av)\n    eval(v)\n}\n\n// recover the eigenvalue.\n//   λ = vᵀ A v\nlet lambda = matmul(matmul(v.T, A), v)\n\nprint(lambda)","// Plain Swift, scalar-at-a-time\nvar counts = Array2D\u003cInt>(width: w, height: h)\n\nfor y in 0 ..\u003c h {\n    for x in 0 ..\u003c w {\n        let c = Complex(xMin + Float(x) * xStep, yMin + Float(y) * yStep)\n        var z = Complex\u003cFloat>.zero\n        var limit = maxIterations\n        for i in 0 ..\u003c maxIterations {\n            z = z * z + c\n            if z.lengthSquared > radiusSquared {\n                limit = i\n                break\n            }\n        }\n        counts[x, y] = limit\n    }\n}","// Compute the Mandelbrot set on a grid of complex numbers\nimport MLX\n\nlet x = linspace(Float(-2.0), 0.5, count: w)\nlet y = linspace(Float(-1.25), 1.25, count: h).reshaped(h, 1)\nlet c = x + y.asImaginary()\n\nvar z = MLXArray.zeros(like: c)\nvar counts = MLXArray.zeros(c.shape, dtype: .int16)\n\nfor _ in 0 ..\u003c maxIterations {\n    z = z * z + c                       // iterate z ← z² + c\n    counts = counts + (abs(z) .\u003c 2)     // count bounded iterations\n}","// Jacobi iteration: average the four neighbors\n\n// Convolution weights\nlet kernel = MLXArray(converting: [\n    0,    0.25, 0,\n    0.25, 0,    0.25,\n    0,    0.25, 0,\n]).reshaped(1, 3, 3, 1)\n\n// Initial value\nvar temperature = heatSources\n\n// Run this in a loop until convergence\nlet next = conv2d(temperature, kernel, padding: 1)\ntemperature = which(heatMask, heatSources, next)","// Successive Over-Relaxation: blend the previous and next state\nlet ω: Float = 2.0 / (1.0 + sin(Float.pi / Float(max(M, N))))\n\nlet redMask   = checkerboard(rows: M, cols: N, phase: 0)\nlet blackMask = checkerboard(rows: M, cols: N, phase: 1)\n\n// Update red cells using black neighbors\nlet sorRed  = ω * conv2d(temperature, kernel, padding: 1) + (1 - ω) * temperature\ntemperature = which(redMask, sorRed, temperature)\ntemperature = which(heatMask, heatSources, temperature)\n\n// Update black cells using (now-updated) red neighbors\nlet sorBlack = ω * conv2d(temperature, kernel, padding: 1) + (1 - ω) * temperature\ntemperature  = which(blackMask, sorBlack, temperature)\ntemperature  = which(heatMask, heatSources, temperature)","// Define a loss, then optimize it with autodiff\n// x, y: data points as MLXArrays\nfunc f(_ θ: MLXArray) -> MLXArray {\n    θ[0] + θ[1] * x + θ[2] * x ** 2\n}\n\nfunc loss(_ θ: MLXArray) -> MLXArray {\n    mean((f(θ) - y) ** 2)\n}\n\nvar θ = zeros([numParams])\nlet gradLoss = grad(loss)\n\nfor _ in 0 ..\u003c steps {\n    let g = gradLoss(θ)         // ∇L(θ)\n    θ = θ - learningRate * g    // parameter update\n    eval(θ)                     // force evaluation\n}"]},"related":[{"id":"232","title":"Run local agentic AI on the Mac using MLX","gloss":"用 MLX 在 Mac 上執行本機 agentic AI","gloss_en":"Run local agentic AI on the Mac using MLX","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"233","title":"Explore distributed inference and training with MLX","gloss":"用 MLX 探索分散式推論與訓練","gloss_en":"Explore distributed inference and training with MLX","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"382","title":"Inside Apple Intelligence and Xcode: Special Presentation","gloss":"深入 Apple Intelligence 與 Xcode：特別發表","gloss_en":"Inside Apple Intelligence and Xcode: Special Presentation","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"121","title":"Announcing Apple’s next big step for Siri and iPhone","gloss":"宣布 Apple 為 Siri 與 iPhone 邁出的下一大步","gloss_en":"Announcing Apple's next big step for Siri and iPhone","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"227","title":"Create UI prototypes using agents in Xcode","gloss":"在 Xcode 用代理人打造 UI 原型","gloss_en":"Prototype UI with agents in Xcode","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
