<script id="d" type="application/json">{"s":{"id":"372","title":"Unwrap PaperKit","gloss":"深入了解 PaperKit","category":"uikit","categoryLabel":"UIKit","duration":459,"url":"https://developer.apple.com/videos/play/wwdc2026/372/","takeaway":"用 PaperKit 全新的資料模型 API 以程式存取、建立與修改畫布上的 markup 元素，並結合 adornments 與 Image Playground 打造互動式畫布應用。","chapters":[[0,"Introduction"],[82,"Data model"],[96,"Creating markup subelements"],[183,"Making template elements read-only"],[221,"Elements"],[262,"Apply style to template elements"],[317,"Adornments"],[353,"Add adornments to each panel"],[368,"Handle adornment taps"],[380,"Place the generated image"],[431,"Next steps"]],"points":[{"text":"**PaperKit** 推出全新的**資料模型 API**，可用程式存取、建立與修改畫布上的 markup 元素（`PaperMarkup`、`MarkupOrderedSet`）。","hot":true},{"text":"可建立 `ShapeMarkup` 等 subelement，並用 `allowedInteractions = .readOnly` 把模板元素設為唯讀。","hot":false},{"text":"用 **adornments**（`MarkupAdornment`）在畫布上加入可點擊的浮動按鈕，並透過 delegate 處理點擊事件。","hot":false},{"text":"結合 **Image Playground**（`ImagePlaygroundViewController`）產生圖片，再以 `ImageMarkup` 放置到對應面板中。","hot":false}],"apis":["PaperKit","PaperMarkup","PaperMarkupViewController","MarkupOrderedSet","ShapeMarkup","ImageMarkup","MarkupAdornment","ImagePlayground","ImagePlaygroundViewController"],"audience":"**開發畫布、繪圖、筆記或標註類 App，想以程式控制 PaperKit 內容的開發者**。","gloss_en":"Unwrap PaperKit","takeaway_en":"Use PaperKit's new data model APIs to programmatically access, create, and modify markup elements on the canvas, combining adornments and Image Playground to build interactive canvas apps.","points_en":[{"text":"**PaperKit** introduces new **data model APIs** to programmatically access, create, and modify markup elements on the canvas (`PaperMarkup`, `MarkupOrderedSet`).","hot":true},{"text":"You can create subelements like `ShapeMarkup` and use `allowedInteractions = .readOnly` to make template elements read-only.","hot":false},{"text":"Use **adornments** (`MarkupAdornment`) to add tappable floating buttons on the canvas, handling tap events through a delegate.","hot":false},{"text":"Combine with **Image Playground** (`ImagePlaygroundViewController`) to generate images, then place them into the corresponding panel with `ImageMarkup`.","hot":false}],"audience_en":"**Developers building canvas, drawing, note-taking, or markup apps who want to control PaperKit content programmatically**.","code":["import PaperKit\n\nfunc generateMarkup(pageSize: CGSize, panelFrames: [CGRect], configuration: ShapeConfiguration) -> PaperMarkup {\n    var markup = PaperMarkup(bounds: CGRect(origin: .zero, size: pageSize))\n    var subelements: MarkupOrderedSet = markup.subelements\n    for panelFrame: CGRect in panelFrames {\n        let shape = ShapeMarkup(frame: panelFrame, configuration: configuration)\n        subelements.append(shape)\n    }\n    markup.subelements = subelements\n    return markup\n}","import PaperKit\n\nfunc generateMarkup(pageSize: CGSize, panelFrames: [CGRect], configuration: ShapeConfiguration) -> PaperMarkup {\n    var markup = PaperMarkup(bounds: CGRect(origin: .zero, size: pageSize))\n    var subelements: MarkupOrderedSet = markup.subelements\n    for panelFrame: CGRect in panelFrames {\n        var shape = ShapeMarkup(frame: panelFrame, configuration: configuration)\n        shape.allowedInteractions = .readOnly\n        subelements.append(shape)\n    }\n    markup.subelements = subelements\n    return markup\n}","import PaperKit\n\nfunc updatePanelColor(_ selectedColor: CGColor) {\n    guard var markup: PaperMarkup = paperMarkupViewController.markup else { return }\n    var subelements: MarkupOrderedSet = markup.subelements\n    for element in subelements {\n        guard var shape = element as? ShapeMarkup else { continue }\n        shape.strokeColor = selectedColor\n        shape.fillColor = selectedColor.copy(alpha: 0.15)\n        subelements.updateOrAppend(shape)\n    }\n    markup.subelements = subelements\n    markup.backgroundColor = selectedColor.copy(alpha: 0.15)\n    paperMarkupViewController.markup = markup\n}","import PaperKit\n\nfunc addPanelAdornments(for page: Page) {\n    var adornments: [MarkupAdornment] = []\n    for (panelIndex, panel) in page.panels.enumerated() {\n        let adornmentID = UUID()\n        adornmentPanelMapping[adornmentID] = panelIndex\n        let center = CGPoint(x: panel.midX, y: panel.midY)\n        let adornment = MarkupAdornment(\n            id: adornmentID,\n            anchor: .canvas(location: center),\n            imageConfiguration: .systemImage(\"photo.badge.plus\"),\n            dragRegion: .fixed,\n            scalesWithZoom: false\n        )\n        adornments.append(adornment)\n    }\n    paperMarkupViewController.adornments = adornments\n}","import ImagePlayground\nimport PaperKit\n\nfunc paperMarkupViewController(_ paperMarkupViewController: PaperMarkupViewController, didTapAdornmentWithID id: UUID) {\n    guard let panelIndex = adornmentPanelMapping[id] else { return }\n    activeImageGenerationPanelIndex = panelIndex\n\n    let imagePlaygroundViewController = ImagePlaygroundViewController()\n    imagePlaygroundViewController.delegate = self\n    present(imagePlaygroundViewController, animated: true)\n}","import ImagePlayground\nimport PaperKit\n\nfunc imageViewController(_ imageViewController: ImagePlaygroundViewController, didCreateImageAt imageURL: URL) {\n    guard let panelFrame = activeGenerationPanelFrame,\n          let paperMarkupViewController = pageViewController.paperViewController,\n          var markup = paperMarkupViewController.markup,\n          let image = UIImage(contentsOfFile: imageURL.path) else { return }\n\n    let imageMarkup = ImageMarkup(frame: panelFrame, image: image)\n    markup.subelements.append(imageMarkup)\n    paperMarkupViewController.markup = markup\n}"]},"related":[{"id":"375","title":"Create high-quality images using Image Playground","gloss":"用 Image Playground 產生高品質影像","gloss_en":"Create high-quality images using Image Playground","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"203","title":"Read between the strokes with PencilKit","gloss":"用 PencilKit 解讀筆跡內容","gloss_en":"Read handwriting content with PencilKit","category":"uikit","categoryLabel":"UIKit"},{"id":"212","title":"Rev up your CarPlay app","gloss":"強化你的 CarPlay App","gloss_en":"Rev up your CarPlay app","category":"uikit","categoryLabel":"UIKit"},{"id":"219","title":"Enhance the accessibility of your reading app","gloss":"強化你閱讀類 App 的無障礙體驗","gloss_en":"Enhance the accessibility of your reading app","category":"uikit","categoryLabel":"UIKit"},{"id":"221","title":"Prepare your tvOS apps for Dynamic Type","gloss":"讓你的 tvOS App 支援動態字型","gloss_en":"Prepare your tvOS app for Dynamic Type","category":"uikit","categoryLabel":"UIKit"}]}</script>
