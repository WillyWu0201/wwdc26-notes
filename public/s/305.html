     height: min(tileSize, extent.maxY - y))\n        tiles.append(CIVector(cgRect: tile))\n    }\n}\n\nlet result = try MyProcessor.apply(withTiledExtent: tiles, inputs: [inImg], arguments: [:])","import CoreImage\n\nclass MyProcessor: CIImageProcessorKernel {\n    override class func process(with inputs: [CIImageProcessorInput]?,\n                                arguments: [String: Any]?,\n                                output: CIImageProcessorOutput) throws {\n        guard let input = inputs?.first,\n              let srcPixelBuffer = input.pixelBuffer,\n              let dstPixelBuffer = output.pixelBuffer else { return }\n        \n        // Get a scratch buffer from Core Image's cache\n        guard let scratch = output.temporaryPixelBuffer(identifier : \"myScratch\",\n                   format: kCVPixelFormatType_64RGBAHalf,\n                   width: Int(output.region.width),\n                   height: Int(output.region.height),\n                   pixelBufferAttributes: nil) else { return }\n        \n        // Step 1: copy input CVPixelBuffer → scratch\n        // Step 2: process pixels in scratch\n        // Step 3: copy scratch → output CVPixelBuffer\n    }\n}"]},"related":[{"id":"215","title":"Get started with the HTML Model Element","gloss":"開始使用 HTML model 元素","gloss_en":"Getting started with the HTML model element","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"252","title":"Design no-code games with Reality Composer Pro 3","gloss":"用 Reality Composer Pro 3 設計無程式碼遊戲","gloss_en":"Design no-code games with Reality Composer Pro 3","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"256","title":"Discover generated subtitles and subtitle styles","gloss":"認識自動產生字幕與字幕樣式","gloss_en":"Discover generated subtitles and subtitle styles","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"285","title":"Discover USDKit and what’s new in OpenUSD","gloss":"認識 USDKit 與 OpenUSD 的新功能","gloss_en":"Discover USDKit and what's new in OpenUSD","category":"g
