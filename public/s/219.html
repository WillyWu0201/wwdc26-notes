<script id="d" type="application/json">{"s":{"id":"219","title":"Enhance the accessibility of your reading app","gloss":"強化你閱讀類 App 的無障礙體驗","category":"uikit","categoryLabel":"UIKit","duration":1200,"url":"https://developer.apple.com/videos/play/wwdc2026/219/","takeaway":"運用文字導覽 API、連結群組與自訂 UITextInput，為 VoiceOver 與 Speak Screen 打造順暢、可選取且能自動翻頁的閱讀體驗。","chapters":[[1,"Introduction"],[86,"Characteristics"],[225,"Standard views"],[449,"Link text elements together with navigation APIs"],[479,"Link text elements together with a linked group"],[590,"Turn pages automatically after reading"],[705,"Add actions to the editor rotor"],[845,"Custom text"],[970,"Adopt UITextInput"]],"points":[{"text":"為 **VoiceOver**、**Speak Screen** 等輔助技術打造穩固的閱讀體驗，提供直覺的文字選取。","hot":false},{"text":"用 **accessibilityNextTextNavigationElement**／**accessibilityPreviousTextNavigationElement** 把段落串連，讓導覽依閱讀順序前後移動。","hot":false},{"text":"以 **accessibilityLinkedGroup** 在 SwiftUI 中把同一頁的文字元素群組起來。","hot":false},{"text":"插入 **causesPageTurn** 特徵並回應 **accessibilityScroll**，朗讀完畢後自動翻頁。","hot":false},{"text":"為自訂文字（如掃描頁面）採用 **UITextInput**，讓輔助技術能正確選取與讀取內容。","hot":true}],"apis":["UIAccessibility","accessibilityNextTextNavigationElement","accessibilityPreviousTextNavigationElement","accessibilityLinkedGroup","UIAccessibilityTraits.causesPageTurn","accessibilityScroll","UIAccessibilityCustomAction","UITextInput","UITextInteraction"],"audience":"**開發閱讀、文件或電子書類 App 的 UIKit／SwiftUI 工程師**，想完善無障礙閱讀體驗的人。","gloss_en":"Enhance the accessibility of your reading app","takeaway_en":"Use text navigation APIs, linked groups, and custom UITextInput to build a smooth, selectable reading experience with automatic page turns for VoiceOver and Speak Screen.","points_en":[{"text":"Build robust reading experiences for assistive technologies like **VoiceOver** and **Speak Screen**, with intuitive text selection.","hot":false},{"text":"Use **accessibilityNextTextNavigationElement**/**accessibilityPreviousTextNavigationElement** to chain paragraphs so navigation moves forward and backward in reading order.","hot":false},{"text":"Use **accessibilityLinkedGroup** in SwiftUI to group the text elements on a single page together.","hot":false},{"text":"Add the **causesPageTurn** trait and respond to **accessibilityScroll** to turn the page automatically once reading finishes.","hot":false},{"text":"Adopt **UITextInput** for custom text (such as scanned pages) so assistive technologies can correctly select and read the content.","hot":true}],"audience_en":"**UIKit/SwiftUI engineers building reading, document, or e-book apps** who want to perfect the accessible reading experience.","code":["// Link text elements together with navigation APIs\n\nimport UIKit\n\nclass TravelGuidePageController: UIViewController {\n\n    var paragraphs: [TravelGuideParagraph]\n\n    func configureNavigationElements() {\n        for (index, paragraph) in paragraphs.enumerated() {\n            if index + 1 \u003c paragraphs.count {\n                paragraph.accessibilityNextTextNavigationElement = paragraphs[index + 1]\n            }\n            if index - 1 >= 0 {\n                paragraph.accessibilityPreviousTextNavigationElement = paragraphs[index - 1]\n            }\n        }\n    }\n}","// Link text elements together with a linked group\n\nimport SwiftUI\n\nstruct PageView : View {\n    @Namespace private var pageNamespace\n    var paragraphs: [String\n    var pageNumber: Int\n\n    var body: some View {\n        Text(paragraphs[0])\n            .textSelection(.enabled)\n            .accessibilityLinkedGroup(id: pageNumber, in: pageNamespace)\n\n        Text(paragraphs[1])\n            .textSelection(.enabled)\n            .accessibilityLinkedGroup(id: pageNumber, in: pageNamespace)\n    }\n}","// Turn pages automatically after reading\n\nimport UIKit\n\nclass TravelGuidePageController: UIViewController {\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        self.lastParagraphView.accessibilityTraits.insert(.causesPageTurn)\n    }\n\n    override func accessibilityScroll(_ direction: UIAccessibilityScrollDirection) -> Bool {\n        moveToPage(direction)\n        var scrollString = \"Page \\(currentPage) of \\(pages.count)\"\n        UIAccessibility.post(notification: .pageScrolled, argument: scrollString)\n        return true\n    }\n}","// Add actions to the editor rotor\n\nimport UIKit\n\nclass TravelGuideParagraph: UITextView {\n\n    override var accessibilityCustomActions: [UIAccessibilityCustomAction]? {\n        get {\n            let saveAction = UIAccessibilityCustomAction(name: \"Save Recommendation\") { _ in\n                self.saveRecommendation()\n            }\n            saveAction.category = UIAccessibilityCustomAction.editCategory\n            return (super.accessibilityCustomActions ?? []) + [saveAction]\n        }\n        set { }\n    }\n\n    private func saveRecommendation() -> Bool {\n        ...\n        return true\n    }\n}","// Adopt UITextInput\n\nimport UIKit\n\nclass ScannedPage: UIView, UITextInput {\n\n    override init(frame: CGRect) {\n        super.init(frame: frame)\n        let interaction = UITextInteraction(for: .nonEditable)\n        interaction.textInput = self\n        addInteraction(interaction)\n    }\n   \n    func selectionRects(for range: UITextRange) -> [UITextSelectionRect] {\n        var rects: [UITextSelectionRect] = []\n\n        let startLine = lineIndex(for: range.start)\n        let endLine = lineIndex(for: range.end)\n\n        for line in startLine...endLine {\n            let rect = selectionRectFromImage(for: range, in: line)\n            rects.append(rect)\n        }\n\n        return rects\n    }\n  \n    func text(in range: UITextRange) -> String? {\n        let nsRange = nsRange(from: range)\n        guard let range = Range(nsRange, in: scannedText) else {\n            return nil\n        }\n        return String(scannedText[range])\n    }\n\n    var tokenizer: any UITextInputTokenizer { CustomHandwritingTokenizer(textInput: self) }\n\n    weak var inputDelegate: UITextInputDelegate?\n  \n      var selectedTextRange: UITextRange? {\n        // Update visuals when assistive technologies change selection\n        willSet { inputDelegate?.selectionWillChange(self) }\n        didSet { inputDelegate?.selectionDidChange(self) }\n    }\n  \n}"]},"related":[{"id":"203","title":"Read between the strokes with PencilKit","gloss":"用 PencilKit 解讀筆跡內容","gloss_en":"Read handwriting content with PencilKit","category":"uikit","categoryLabel":"UIKit"},{"id":"212","title":"Rev up your CarPlay app","gloss":"強化你的 CarPlay App","gloss_en":"Rev up your CarPlay app","category":"uikit","categoryLabel":"UIKit"},{"id":"221","title":"Prepare your tvOS apps for Dynamic Type","gloss":"讓你的 tvOS App 支援動態字型","gloss_en":"Prepare your tvOS app for Dynamic Type","category":"uikit","categoryLabel":"UIKit"},{"id":"226","title":"Create live communication experiences","gloss":"打造即時通訊體驗","gloss_en":"Build live communication experiences","category":"uikit","categoryLabel":"UIKit"},{"id":"278","title":"Modernize your UIKit app","gloss":"現代化你的 UIKit App","gloss_en":"Modernize your UIKit app","category":"uikit","categoryLabel":"UIKit"}]}</script>
