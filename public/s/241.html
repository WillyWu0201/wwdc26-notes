<script id="d" type="application/json">{"s":{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","category":"ai","categoryLabel":"AI 與機器學習","duration":1273,"url":"https://developer.apple.com/videos/play/wwdc2026/241/","takeaway":"Foundation Models framework 新增影像理解、Private Cloud Compute、第三方模型整合與 Dynamic Profiles，打造更強大的 agentic App。","chapters":[[0,"Introduction"],[154,"New on-device model"],[166,"Context size and token counting"],[201,"Vision: image understanding"],[232,"Attachable image types"],[260,"Private Cloud Compute"],[406,"Model abstraction layer"],[452,"Partner model integrations"],[525,"Inspecting usage"],[580,"System tools: Vision and Spotlight"],[657,"Dynamic Profiles for agentic apps"],[715,"Routing between craft analysis and brainstorm"],[762,"Describing the profile for craft app"],[826,"Composing models and configurations"],[876,"Describing the profile for craft app"],[930,"Evaluations framework"],[962,"The fm command line tool"],[1033,"Foundation Models Python SDK"],[1075,"Open source and framework utilities"],[1109,"Foundation Models SDK for Python"],[1164,"Next steps"]],"points":[{"text":"新的 **on-device 模型** 提供更大的 context size，並可用 **tokenCount** 預估輸入長度。","hot":false},{"text":"支援 **影像理解（Vision）**，可在 respond 中透過 **Attachment** 附加 UIImage 等影像類型發問。","hot":true},{"text":"可存取 **Private Cloud Compute**，並透過模型抽象層整合第三方與開源模型。","hot":false},{"text":"以 **DynamicProfile** 為 agentic App 動態組合 instructions、tools 與模型設定，並支援模式切換。","hot":false},{"text":"提供 **fm 命令列工具**、Evaluations framework 與 **Foundation Models Python SDK** 等開發配套。","hot":false}],"apis":["FoundationModels","SystemLanguageModel","LanguageModelSession","Attachment","ContextOptions","DynamicProfile","Tool","Generable","PrivateCloudComputeLanguageModel"],"audience":"想在 App 中加入 **裝置端生成式 AI 與 agentic 功能** 的 Apple 平台開發者。","gloss_en":"What's new in the Foundation Models framework","takeaway_en":"The Foundation Models framework adds image understanding, Private Cloud Compute, third-party model integration, and Dynamic Profiles to build more powerful agentic apps.","points_en":[{"text":"The new **on-device model** offers a larger context size, and you can estimate input length with **tokenCount**.","hot":false},{"text":"Supports **image understanding (Vision)**: attach images such as UIImage via an **Attachment** in respond to ask questions about them.","hot":true},{"text":"Access **Private Cloud Compute**, and integrate third-party and open source models through a model abstraction layer.","hot":false},{"text":"Use **DynamicProfile** to dynamically compose instructions, tools, and model settings for agentic apps, with support for mode switching.","hot":false},{"text":"Ships developer tooling including the **fm command-line tool**, the Evaluations framework, and the **Foundation Models Python SDK**.","hot":false}],"audience_en":"Apple platform developers who want to add **on-device generative AI and agentic features** to their apps.","code":["// Context size and token counting\n  \n  let model = SystemLanguageModel()\n  print(model.contextSize)\n  // 8192\n  \n  let count = try await model.tokenCount(for: \"What are the Japanese characters for origami?\")\n  print(count)","// Insert c// Attachable image types\n\n  let response = try await session.respond {\n      \"What animal is this?\"\n      Attachment(UIImage(...))\n  }ode snippet.","// Inspecting usage\n  \n  let response = try await session.respond(\n      to: \"Recommend a craft that doesn't require scissors.\",\n      contextOptions: ContextOptions(reasoningLevel: .light)\n  )\n\n  print(response.usage.input.totalTokenCount)\n  print(response.usage.input.cachedTokenCount)\n\n  print(response.usage.output.totalTokenCount)\n  print(response.usage.output.reasoningTokenCount)","// Routing between craft analysis and brainstorm\n  \n  @Observable\n  final class AppStates {\n      var mode: Mode\n  }\n\n  let appStates: AppStates\n  var session: LanguageModelSession?\n\n  func updateSession() {\n      let originalTranscript = session?.transcript.dropFirstInstructions() ?? Transcript()\n\n      // Create a new session with new instructions and tools\n      switch appStates.mode {\n      case .craftAnalysis:\n          session = LanguageModelSession(\n              tools: [\n                  RecordImageAnalysisTool(),\n                  SwitchModeTool(states: appStates)\n              ],\n              instructions: \"Analyze the user's craft project...\",\n              transcript: originalTranscript\n          )\n      case .brainstorm:\n          session = LanguageModelSession(\n              tools: [\n                  RecordBrainstormTool(),\n              ],\n              instructions: \"Brainstorm some ideas...\",\n              transcript: originalTranscript\n          )\n      }\n  }\n  \n  struct SwitchModeTool: Tool {\n      let description = \"Switch to a different mode.\"\n      let states: AppStates\n\n      @Generable\n      struct Arguments {\n          let mode: Mode\n      }\n\n      func call(arguments: Arguments) async throws -> some PromptRepresentable {\n          appStates.mode = arguments.mode\n          return \"Successfully switched to \\(arguments.mode).\"\n      }\n  }\n  \n  // If mode changes, update the session\n  withObservationTracking {\n      appStates.mode\n  } onChange: {\n      updateSession()\n  }","// Describing the profile for craft app\n\n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      var body: some DynamicProfile {\n          Profile {\n              Instructions {\n                  \"\"\"\n                  You are an expert crafting assistant. \\\n                  Record craft project image analyses   \\\n                  using the recordImageAnalysis tool.\n                  \"\"\"\n              }\n              RecordImageAnalysisTool()\n          }\n      }\n  }\n\n  let session = LanguageModelSession(\n      profile: CraftProfile()\n  )","// Describing the profile for craft app\n  \n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      let states: CraftProjectStates\n\n      var body: some DynamicProfile {\n          switch states.mode {\n          case .craftAnalysis:\n              Profile {\n                  Instructions { /* ... */ }\n                  RecordImageAnalysisTool()\n                  SwitchModeTool(states: states)\n              }\n          case .brainstorm:\n              Profile {\n                  Instructions { /* ... */ }\n                  BrainstormRecordTool()\n              }\n              .model(states.privateCloudCompute)\n              .reasoningLevel(.deep)\n          }\n      }\n  }","# Foundation Models SDK for Python\n  \n  import apple_fm_sdk as fm\n\n  model = fm.SystemLanguageModel()\n\n  # Check the model's availability\n  is_available, reason = model.is_available()\n\n  if is_available:\n\n      # Create a session\n      session = fm.LanguageModelSession(model=model)\n\n      # Generate a response\n      response = await session.respond(prompt=\"Hello!\")\n      print(response)"]},"related":[{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"242","title":"Build agentic app experiences with the Foundation Models framework","gloss":"用 Foundation Models 框架打造 agentic App 體驗","gloss_en":"Build agentic app experiences with Foundation Models","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"347","title":"Secure your app: mitigate risks to agentic features","gloss":"保護你的 App：降低 agentic 功能的風險","gloss_en":"Secure your app: mitigate risks to agentic features","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"237","title":"What’s new in image understanding","gloss":"影像理解的新功能","gloss_en":"What's new in image understanding","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"326","title":"Integrate on-device AI models into your app using Core AI","gloss":"用 Core AI 把裝置端 AI 模型整合進你的 App","gloss_en":"Integrate on-device AI models with Core AI","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
