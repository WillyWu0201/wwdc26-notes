<script id="d" type="application/json">{"s":{"id":"345","title":"Discover new capabilities in the App Intents framework","gloss":"探索 App Intents 框架的新能力","category":"other","categoryLabel":"其他","duration":1082,"url":"https://developer.apple.com/videos/play/wwdc2026/345/","takeaway":"App Intents 新增 **ValueRepresentation、EntityCollection、SyncableEntity、LongRunningIntent 與 ExecutionTargets**，讓 intent 更快、更彈性也更貼近情境。","chapters":[[0,"Introduction"],[1,"Share structured entities with ValueRepresentation"],[160,"Share entities across apps with ValueRepresentation"],[225,"Register relevant entities with RelevantEntities"],[318,"Register relevant entities with RelevantEntities"],[425,"Handle entities efficiently with EntityCollection"],[435,"Handle large entity sets with EntityCollection"],[535,"Use entities across devices with SyncableEntity"],[614,"Make entity IDs stable with SyncableEntity"],[661,"Richer parameter types"],[718,"Accept multiple types with @UnionValue"],[758,"Union value parameters"],[806,"Extend execution with LongRunningIntent"],[821,"Run beyond 30 s with LongRunningIntent + CancellableIntent"],[927,"Target the right process with ExecutionTargets"],[1014,"Control which process runs your intent with ExecutionTargets"],[1034,"Next steps"]],"points":[{"text":"用 **`ValueRepresentation`** 分享結構化實體（如以 `PlaceDescriptor` 表示地點），可用 key-path 大幅減少程式碼。","hot":false},{"text":"以 **`EntityCollection`** 取代 `[Entity]` 高效處理大量實體，只在需要時取用識別碼。","hot":true},{"text":"透過 **`SyncableEntity`** 與 `SyncableEntityIdentifier` 讓實體 ID 跨裝置穩定一致。","hot":false},{"text":"用 `LongRunningIntent` 搭配 `CancellableIntent` 讓 intent 執行**超過 30 秒**並回報進度、可取消。","hot":false},{"text":"以 **`ExecutionTargets`** 指定 intent 執行於主 App、App Intents extension 或 widget extension。","hot":false}],"apis":["App Intents","AppEntity","ValueRepresentation","RelevantEntities","EntityCollection","SyncableEntity","SyncableEntityIdentifier","UnionValue","LongRunningIntent","CancellableIntent","ExecutionTargets"],"audience":"**已採用 App Intents、想用進階功能提升彈性與效能**的 iOS 開發者。","gloss_en":"Discover new capabilities in the App Intents framework","takeaway_en":"App Intents adds **ValueRepresentation, EntityCollection, SyncableEntity, LongRunningIntent, and ExecutionTargets**, making intents faster, more flexible, and more relevant.","points_en":[{"text":"Use **`ValueRepresentation`** to share structured entities (such as representing a place with `PlaceDescriptor`), with key paths to greatly reduce code.","hot":false},{"text":"Use **`EntityCollection`** instead of `[Entity]` to efficiently handle large numbers of entities, fetching identifiers only when needed.","hot":true},{"text":"Keep entity IDs stable and consistent across devices with **`SyncableEntity`** and `SyncableEntityIdentifier`.","hot":false},{"text":"Use `LongRunningIntent` with `CancellableIntent` to let an intent run **longer than 30 seconds** while reporting progress and being cancellable.","hot":false},{"text":"Use **`ExecutionTargets`** to specify whether an intent runs in the main app, an App Intents extension, or a widget extension.","hot":false}],"audience_en":"iOS developers who **have already adopted App Intents and want to use advanced features to improve flexibility and performance**.","code":["struct LandmarkEntity: AppEntity, Transferable {\n      var id: Int\n      var landmark: Landmark  // contains CLLocationCoordinate2D\n\n      static var transferRepresentation: some TransferRepresentation {\n          ValueRepresentation(\n              exporting: { entity in\n                  PlaceDescriptor(\n                      representations: [.coordinate(entity.landmark.locationCoordinate)],\n                      commonName: entity.landmark.name\n                  )\n              }\n          )\n      }\n  }\n\n  // If the entity already has a PlaceDescriptor property, use a key-path — much less code:\n  struct LandmarkEntity: AppEntity, Transferable {\n      var id: Int\n      @Property var placeDescriptor: PlaceDescriptor\n\n      static var transferRepresentation: some TransferRepresentation {\n          ValueRepresentation(exporting: \\.placeDescriptor)\n      }\n  }","// Suggest playlists for the workout session\n  let playlistEntities = [dailyRun, runningMix]\n  let workoutContext = AppEntityContext.audio(.workout(activityType: .running))\n\n  try await RelevantEntities.shared.updateEntities(\n      playlistEntities, for: workoutContext\n  )\n  \n  // Clear all entities for a context\n  try await RelevantEntities.shared.removeAllEntities(for: workoutContext)\n\n  // Remove specific entities from a context\n  try await RelevantEntities.shared.removeEntities(playlistEntities, from: workoutContext)\n\n  // Or remove all entities across all contexts\n  try await RelevantEntities.shared.removeAllEntities()","struct TagPhotosIntent: AppIntent {\n      static let title: LocalizedStringResource = \"Tag Travel Photos\"\n\n      @Parameter var photos: EntityCollection\u003cPhotoEntity>   // was: [PhotoEntity]\n      @Parameter var tag: String\n\n      func perform() async throws -> some IntentResult {\n          modelData.tagPhotos(ids: photos.identifiers, tag: tag)   // was: tagPhotos(photos, tag: tag)\n          return .result()\n      }\n  }","// If your ID is already stable across devices (server UUID, CloudKit record ID):\n  struct PhotoEntity: AppEntity, SyncableEntity {\n      var id: Int  // Already stable across devices — that's it\n  }\n  \n  // If you use local IDs, pair a local and a stable ID:\n  struct PhotoEntity: AppEntity, SyncableEntity {\n      var id: SyncableEntityIdentifier\u003cString, String>\n\n      init(localID: String, stableID: String) {\n          self.id = SyncableEntityIdentifier(local: localID, stable: stableID)\n      }\n  }","@UnionValue\n  enum TravelGalleryContent {\n      case landmarkCollection(LandmarkCollectionEntity)\n      case photoAlbum(PhotoAlbumEntity)\n\n      static let typeDisplayRepresentation: TypeDisplayRepresentation = \"Travel Gallery\"\n      static let caseDisplayRepresentations: [Cases: DisplayRepresentation] = [\n          .landmarkCollection: \"Landmark Collection\",\n          .photoAlbum: \"Photo Album\"\n      ]\n  }","struct UploadPhotoIntent: LongRunningIntent, CancellableIntent {\n      static let title: LocalizedStringResource = \"Upload Photo\"\n\n      @Parameter var photo: IntentFile\n  \n      func perform() async throws -> some IntentResult & ProvidesDialog {\n          let result = try await performBackgroundTask {\n              let chunks = calculateChunks(for: photo)\n              progress.totalUnitCount = Int64(chunks)\n\n              for chunk in 1...chunks {\n                  try Task.checkCancellation()\n                  try await uploadChunk(chunk)\n                  progress.completedUnitCount = Int64(chunk)\n              }\n              return \"Upload complete!\"\n          } onCancel: { reason in\n              cleanup(for: reason)\n          }\n          return .result(dialog: \"\\(result)\")\n      }\n  }","// Write operation — needs the main app\n  struct UpdateFavoriteIntent: AppIntent {\n      static var allowedExecutionTargets: ExecutionTargets { .main }\n  }\n\n  // Standalone download — runs in the extension\n  struct DownloadPhotoIntent: AppIntent {\n      static var allowedExecutionTargets: ExecutionTargets { .appIntentsExtension }\n  }\n\n  // Display-only — runs in the widget extension\n  struct GetLandmarkStatusIntent: AppIntent {\n      static var allowedExecutionTargets: ExecutionTargets { .widgetKitExtension }\n  }\n\n  // Works in either — lets the system choose\n  struct TagPhotosIntent: AppIntent {\n      static var allowedExecutionTargets: ExecutionTargets { [.main, .appIntentsExtension] }\n  }"]},"related":[{"id":"240","title":"Build intelligent Siri experiences with App Schemas","gloss":"用 App Schemas 打造智慧 Siri 體驗","gloss_en":"Build intelligent Siri experiences with App Schemas","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"297","title":"Best practices for integrating visual intelligence in your app","gloss":"在 App 中整合視覺智慧的最佳實務","gloss_en":"Best practices for integrating visual intelligence in your app","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"310","title":"What’s new in Shortcuts","gloss":"捷徑有什麼新東西","gloss_en":"What's new in Shortcuts","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"344","title":"Code-along: Make your app available to Siri","gloss":"程式碼實作：讓你的 App 可被 Siri 使用","gloss_en":"Code-along: Make your app available to Siri","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"382","title":"Inside Apple Intelligence and Xcode: Special Presentation","gloss":"深入 Apple Intelligence 與 Xcode：特別發表","gloss_en":"Inside Apple Intelligence and Xcode: Special Presentation","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
