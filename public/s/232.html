<script id="d" type="application/json">{"s":{"id":"232","title":"Run local agentic AI on the Mac using MLX","gloss":"用 MLX 在 Mac 上執行本機 agentic AI","category":"ai","categoryLabel":"AI 與機器學習","duration":817,"url":"https://developer.apple.com/videos/play/wwdc2026/232/","takeaway":"在 Mac 上以 MLX-LM 啟動本機 OpenAI 相容伺服器，讓 AI agent 兼顧隱私、低延遲與離線運作，並可透過分散式推論擴展更大模型。","chapters":[[0,"Introduction"],[32,"The chat and agentic loop"],[162,"Local agentic AI stack"],[276,"Setting up your own agent"],[280,"Set up MLX-LM and start the local server"],[318,"Configure an agent to use your local MLX server"],[339,"Making agents fast"],[413,"Concurrency and distributed inference"],[513,"Launch distributed inference with MLX"],[560,"More examples"],[781,"Next steps"]],"points":[{"text":"在本機執行 AI agent，兼顧**隱私、低延遲與離線存取**，由 MLX 進展與 Mac 硬體共同支撐。","hot":false},{"text":"用 **mlx_lm.server** 啟動本機伺服器，提供與 **OpenAI 相容**的 `/v1/chat/completions` 端點。","hot":true},{"text":"把 agent（例如 **opencode**）的 baseURL 指向 `http://127.0.0.1:8080/v1` 即可改用本機模型。","hot":false},{"text":"說明如何**讓 agent 變快**，並透過並行處理提升吞吐。","hot":false},{"text":"以 **mlx.launch** 搭配 hostfile 與 jaccl backend 進行**分散式推論**，跑更大的模型。","hot":false}],"apis":["MLX","mlx-lm","mlx_lm.server","mlx.launch"],"audience":"**想在 Mac 上自建本機 LLM／agent 服務的開發者與 ML 工程師**，重視隱私與離線運作的人。","gloss_en":"Run local agentic AI on the Mac using MLX","takeaway_en":"Launch a local OpenAI-compatible server with MLX-LM on the Mac so AI agents get privacy, low latency, and offline operation, and scale to larger models with distributed inference.","points_en":[{"text":"Run AI agents locally with **privacy, low latency, and offline access**, backed by MLX advances and Mac hardware.","hot":false},{"text":"Use **mlx_lm.server** to launch a local server that exposes an **OpenAI-compatible** `/v1/chat/completions` endpoint.","hot":true},{"text":"Point an agent's (for example, **opencode**) baseURL at `http://127.0.0.1:8080/v1` to switch to the local model.","hot":false},{"text":"Explains how to **make your agent faster** and increase throughput through concurrency.","hot":false},{"text":"Run **distributed inference** with **mlx.launch** plus a hostfile and the jaccl backend to run larger models.","hot":false}],"audience_en":"**Developers and ML engineers who want to self-host a local LLM/agent service on the Mac** and care about privacy and offline operation.","code":["# Step 1: Install MLX-LM\npip install mlx-lm\n\n# Step 2: Start the server\nmlx_lm.server --model mlx-community/Qwen-3.5-4B-8bit\n\n# Step 3: Point your agent to the server\ncurl -X POST \\\n  http://127.0.0.1:8080/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"default_model\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello!\"}]}'","{\n  \"$schema\": \"https://opencode.ai/config.json\",\n  \"model\": \"mlx/default_model\",\n  \"small_model\": \"mlx/default_model\",\n  \"provider\": {\n    \"mlx\": {\n      \"npm\": \"@ai-sdk/openai-compatible\",\n      \"name\": \"MLX (local)\",\n      \"options\": {\n        \"baseURL\": \"http://127.0.0.1:8080/v1\"\n      },\n      \"models\": {\n        \"default_model\": {\n          \"name\": \"Default MLX Model\"\n        }\n      }\n    }\n  }\n}","mlx.launch --hostfile hosts.json \\\n  --backend jaccl \\\n  /remote/path/to/mlx_lm.server \\\n  --model mlx-community/Qwen-3.5-122B-A3B-8bit"]},"related":[{"id":"233","title":"Explore distributed inference and training with MLX","gloss":"用 MLX 探索分散式推論與訓練","gloss_en":"Explore distributed inference and training with MLX","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"328","title":"Explore numerical computing in Swift with MLX","gloss":"用 MLX 探索 Swift 的數值計算","gloss_en":"Explore numerical computing in Swift with MLX","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"382","title":"Inside Apple Intelligence and Xcode: Special Presentation","gloss":"深入 Apple Intelligence 與 Xcode：特別發表","gloss_en":"Inside Apple Intelligence and Xcode: Special Presentation","category"
