<script id="d" type="application/json">{"s":{"id":"246","title":"LLM search using Core Spotlight","gloss":"使用 Core Spotlight 的 LLM 搜尋","category":"ai","categoryLabel":"AI 與機器學習","duration":985,"url":"https://developer.apple.com/videos/play/wwdc2026/246/","takeaway":"結合 SpotlightSearchTool 與 LanguageModelSession，可把基本搜尋升級為以 App 索引為依據的檢索增強（RAG）系統。","chapters":[[0,"Introduction"],[59,"Ask the model with a Foundation Models session"],[101,"Grounding answers with Spotlight tool-calling"],[240,"Configure and add SpotlightSearchTool"],[260,"Set up SpotlightSearchTool"],[290,"Add SpotlightSearchTool to a session"],[384,"Implement an index delegate"],[404,"Displaying results and partial replies"],[406,"Provide full items with an index delegate"],[457,"Track the query token for refresh"],[492,"Customizing with guidance profiles"],[522,"Set a dynamic guidance profile"],[572,"Implement a ContactResolver"],[662,"Reference resolution with a contact resolver"],[684,"Custom pipeline stages"],[694,"Define a custom stage"],[730,"Handle a reply data types"],[767,"Evaluating response quality"],[827,"Define an evaluation dataset with ModelSampleProtocol"],[906,"Define the trajectory expectation"],[917,"Run the evaluation test —"],[953,"Next steps"]],"points":[{"text":"把 **SpotlightSearchTool** 加入 **LanguageModelSession** 的 tools，即可讓模型以 App 的 Core Spotlight 索引為依據回答問題。","hot":true},{"text":"透過 **CSSearchableIndexDelegate** 提供完整項目，並追蹤 query token 來刷新逐步顯示的結果。","hot":false},{"text":"用 **GuidanceProfile** 調整搜尋導引層級，裝置端模型 context 較小時宜採用 focused 導引。","hot":false},{"text":"可實作 **ContactResolver** 做指代解析，並以 **CustomStage** 自訂搜尋管線階段。","hot":false},{"text":"使用 **Evaluations** 框架與 **ModelSampleProtocol**、**TrajectoryExpectation** 建立資料集，量化評估回應品質。","hot":false}],"apis":["CoreSpotlight","SpotlightSearchTool","FoundationModels","LanguageModelSession","CSSearchableIndexDelegate","CSSearchableItem","ContactResolver","CustomStage","Evaluations","ModelSampleProtocol","TrajectoryExpectation"],"audience":"適合**想在 App 中以裝置端模型打造 RAG 搜尋體驗、並善用 Spotlight 索引的開發者**。","gloss_en":"LLM search using Core Spotlight","takeaway_en":"Combining SpotlightSearchTool with LanguageModelSession lets you upgrade basic search into a retrieval-augmented (RAG) system grounded in your app's index.","points_en":[{"text":"Add **SpotlightSearchTool** to a **LanguageModelSession**'s tools so the model can answer questions grounded in your app's Core Spotlight index.","hot":true},{"text":"Provide full items via **CSSearchableIndexDelegate**, and track the query token to refresh results as they're shown incrementally.","hot":false},{"text":"Use **GuidanceProfile** to tune the search guidance level; favor focused guidance when the on-device model's context is small.","hot":false},{"text":"Implement a **ContactResolver** for reference resolution, and use **CustomStage** to customize stages of the search pipeline.","hot":false},{"text":"Use the **Evaluations** framework with **ModelSampleProtocol** and **TrajectoryExpectation** to build datasets and quantitatively assess response quality.","hot":false}],"audience_en":"For **developers who want to build a RAG search experience in their app using on-device models and make good use of the Spotlight index**.","code":["let response = try await session.respond(to: \"What are some nice hikes near water?\")","// Set up SpotlightSearchTool\n  import CoreSpotlight\n  import FoundationModels\n\n  // In one line, the tool is ready to search your app's Core Spotlight index\n  let tool = SpotlightSearchTool()\n\n  // Or provide a custom configuration — e.g. search file paths in your app's sandbox\n  let fileTool = SpotlightSearchTool(\n      configuration: .init(\n          sources: [\n              .files\n          ]\n      )\n  )","// Add SpotlightSearchTool to a session\n  import CoreSpotlight\n  import FoundationModels\n  \n  let tool = SpotlightSearchTool()\n\n  let session = LanguageModelSession(model: model, tools: [tool], instructions: instructions)\n\n  let response = try await session.respond(to: \"What hikes have I gone on?\")","// Implement an index delegate\n  import CoreSpotlight\n\n  class IndexDelegate: NSObject, CSSearchableIndexDelegate {\n\n      // Called when the index requests searchable items for the provided identifiers\n      func searchableItems(forIdentifiers identifiers: [String]) async -> [CSSearchableItem] {\n          let entries = await mystore.fetchEntries(ids: identifiers)\n          return entries.map { makeSearchableItem(from: $0) }\n      }\n  }","// Track the query token for refresh\n  import CoreSpotlight\n  import FoundationModels\n\n  let tool = SpotlightSearchTool()\n\n  for await reply in tool.searchResults {\n  \n      if reply.queryToken != currentToken {\n          // New query — start a new display section\n          currentToken = reply.queryToken\n      }\n\n      switch reply.content {\n      case .items(let searchItems):\n      }\n  }","// Set a dynamic guidance profile\n  import CoreSpotlight\n  import FoundationModels\n\n  let profile = SpotlightSearchTool.GuidanceProfile(\n      textMatch: true,\n      dates: true,\n      people: false,\n      attributes: [.title, .altitude, .completionDate]\n  )\n\n  let tool = SpotlightSearchTool(\n      configuration: .init(\n          guide: .init(level: .dynamic(profile))\n      )\n  )\n\n  // On-device models have smaller context — prefer focused guidance\n  let focusedTool = SpotlightSearchTool(\n      configuration: .init(\n          guide: .init(level: .focused(.items))\n      )\n  )","// Implement a ContactResolver\n  import CoreSpotlight\n  import FoundationModels\n\n  struct MyContactResolver: ContactResolver {\n  \n      func userIdentity() -> ResolvedContact {\n          // Pull from whatever identity source your app has —\n          // account profile, Contacts framework, sign-in session, etc.\n          var contact = ResolvedContact(displayName: \"Jane Doe\")\n          contact.emailAddresses = [\"jane@example.com\", \"jdoe@work.com\"]\n          contact.names = [\"Jane\", \"JD\"]\n          return contact\n      }\n  }\n  \n  tool.contactResolver = MyContactResolver()","// Define a custom stage\n  import CoreSpotlight\n  import FoundationModels\n\n  @Generable\n  struct HappinessStage: CustomStage {\n      static var name = \"happiness\"\n      static var description = \"Scores hike by how happy the author was\"\n      static var inputTypes: [SearchPipelineDataType] = [.items]\n      static var outputTypes: [SearchPipelineDataType] = [.scoredItems]\n\n      @Guide(description: \"Minimum happiness score (0.0-1.0) to include in results\")\n      var threshold: Double?\n\n      func execute(on input: SearchPipelineData) async throws -> SearchPipelineData {\n          return SearchPipelineData(payload: .scoredItems(sorted))\n      }\n  }\n\n  // Register the stage by adding it to the tool's configuration\n  let tool = SpotlightSearchTool(configuration: .init(\n      customStages: [.happinessBoost(threshold: 0.5)])\n  )","// Handle a reply data types\n  import CoreSpotlight\n  import FoundationModels\n\n  for await reply in tool.searchResults {\n\n      let label = reply.label\n      case .items(let searchItems):\n      case .scoredItems(let scored):\n      case .groupedItems(let groups):\n      case .count(let count):\n      case .table(let table):\n      case .statistic(let statistic):\n      case .text(let text):\n          continue\n      }   \n  }","// Evaluations\n  import Evaluations\n  \n  struct TrailRequest: ModelSampleProtocol {\n  \n      typealias ExpectedValue = String                    // sample response\n      typealias Expectation   = TrajectoryExpectation     \n      \n      var input:  ModelSampleInput\n      var output: ModelSampleOutput\u003cString, TrajectoryExpectation>\n      \n      var expectedIdentifiers: [String]\n  }","// Evaluations\n  import Evaluations\n  \n  TrajectoryExpectation(\n      unordered: [\n          ToolExpectation(\"searchSpotlight\", arguments: [.keyOnly(argumentName: \"query\")])\n      ]   \n  )","@Test(\"Trail search evaluation meets quality thresholds\")\n  func trailSearchEval() async throws {\n  \n      let items = try Self.loadItems()\n      let samples = try Self.loadSamples()\n      \n      try await Self.indexDelegate.indexSearchableItems(items)\n      let tool = Self.makeSearchTool()\n      \n      let evaluation = TrailSearchEvaluation(\n          tool: tool,\n          dataset: ArrayLoader(samples: samples)\n      )   \n      \n      let result = try await evaluation.run()\n      let coverageMean = result.aggregateValue(.mean(of: Metric(\"ResultCoverage\")))\n      #expect(coverageMean >= 0.5, \"Result coverage should be at least 50% across queries\")\n  }"]},"related":[{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"242","title":"Build agentic app experiences with the Foundation Models framework","gloss":"用 Foundation Models 框架打造 agentic App 體驗","gloss_en":"Build agentic app experiences with Foundation Models","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"299","title":"Create robust evaluations for agentic apps","gloss":"為 agentic App 建立穩健的評估","gloss_en":"Create robust evaluations for agentic apps","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"326","title":"Integrate on-device AI models into your app using Core AI","gloss":"用 Core AI 把裝置端 AI 模型整合進你的 App","gloss_en":"Integrate on-device AI models with Core AI","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
