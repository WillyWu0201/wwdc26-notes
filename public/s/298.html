<script id="d" type="application/json">{"s":{"id":"298","title":"Meet the Evaluations framework","gloss":"認識 Evaluations 框架","category":"ai","categoryLabel":"AI 與機器學習","duration":1546,"url":"https://developer.apple.com/videos/play/wwdc2026/298/","takeaway":"在機率性的 AI 世界裡，用 Evaluations 框架以資料集、metrics 與 model judge 系統化評估模型驅動功能的品質。","chapters":[[0,"Introduction"],[190,"Demo app Book Tacker: a manual evaluation"],[271,"Building your first evaluation"],[294,"Define an Evaluation"],[482,"Run with Swift Testing and an optimization target"],[486,"Running the evaluation and reading the report"],[609,"Constrain output with a Generable @Guide"],[657,"Building robust datasets"],[675,"Define the dataset with ModelSample"],[773,"Synthesize more samples with a SampleGenerator"],[842,"More evaluators: word count and genre"],[843,"Define a Metric and Evaluator"],[860,"Refining metrics and evaluators"],[867,"Aggregate metrics across samples"],[933,"Iterate the feature's instructions (hill-climbing)"],[941,"Evaluation-driven development and hill-climbing"],[972,"Model judges: qualitative metrics"],[1122,"Building a model judge"],[1133,"Build a model judge"],[1279,"Refining with score dimensions"],[1337,"Split into score dimensions"],[1352,"Add dimensions to the judge"],[1397,"Add app context with a ModelJudgePrompt"],[1425,"Reviewing dimension results"],[1460,"Best practices"],[1538,"Next steps"]],"points":[{"text":"在機率性世界中，**單元測試不足以驗證模型行為**，需要專門的 Evaluations 框架。","hot":true},{"text":"用 **Evaluation** 搭配 **ModelSample** 資料集定義要評估的功能，並可用 SampleGenerator 合成更多樣本。","hot":false},{"text":"透過 **Metric** 與 **Evaluator** 定義通過／失敗條件，並用 MetricsAggregator 跨樣本彙總統計。","hot":false},{"text":"可用 **.evaluates** 與 Swift Testing 整合，設定 optimization target 並以 hill-climbing 迭代 instructions。","hot":false},{"text":"以 **ModelJudgeEvaluator** 進行質性評分，並用 ScoreDimension 與 ModelJudgePrompt 細分維度。","hot":false}],"apis":["Evaluations","Evaluation","ModelSample","Metric","Evaluator","MetricsAggregator","ModelJudgeEvaluator","ScoreDimension","ModelJudgePrompt","Generable"],"audience":"正在打造 **模型驅動或生成式 AI 功能**、需要系統化衡量輸出品質的開發者。","gloss_en":"Meet the Evaluations framework","takeaway_en":"In a probabilistic AI world, use the Evaluations framework to systematically assess the quality of model-driven features with datasets, metrics, and a model judge.","points_en":[{"text":"In a probabilistic world, **unit tests alone aren't enough to verify model behavior**; a dedicated Evaluations framework is needed.","hot":true},{"text":"Use **Evaluation** with a **ModelSample** dataset to define the feature to evaluate, and use SampleGenerator to synthesize more samples.","hot":false},{"text":"Define pass/fail criteria with **Metric** and **Evaluator**, and use MetricsAggregator to aggregate statistics across samples.","hot":false},{"text":"Integrate with Swift Testing via **.evaluates**, set an optimization target, and iterate on instructions with hill-climbing.","hot":false},{"text":"Use **ModelJudgeEvaluator** for qualitative scoring, and break it down by dimension with ScoreDimension and ModelJudgePrompt.","hot":false}],"audience_en":"Developers building **model-driven or generative AI features** who need to systematically measure output quality.","code":["// Evaluations\n  import Evaluations\n\n  struct BookTaggingEvaluation: Evaluation {\n  \n  }","// Optimization Target\n  @Test(\"Book Tag Evaluations\", .evaluates(evaluation, info: evaluationInfo))\n  func evaluateBookTagging() async throws {\n      let result = EvaluationContext.current.result\n  \n      let rangeMetric = BookTagEvaluationTests.evaluation.tagCount\n      #expect(result.aggregateValue(.mean(of: rangeMetric)) >= 0.8)\n  }","// BookTags.swift\n  @Generable\n  struct BookTags: Codable {\n      @Guide(description: \"Descriptive tags capturing themes, genres, moods, and topics from the summary\", .count(3...8))\n      var tags: [String]\n  } snippet.","// BookTaggingEvaluation\n  var dataset = ArrayLoader(samples: [\n      ModelSample(prompt: \"okay I am OBSESSED and I need everyone to read this RIGHT NOW...\",\n                  expected: BookTags(tags: [\"classic\", \"romance\", \"wit\", \"regency\"])),\n\n      ModelSample(prompt: \"Read this in one sitting between midnight and 4am and I cannot...\",\n                  expected: BookTags(tags: [\"classic\", \"gothic\", \"horror\", \"vampire\", \"suspense\"])),\n  ])\n  \n  // Or load your whole library:\n  var dataset = ArrayLoader(samples:\n      Book.sampleBooks.map { book in\n          ModelSample(prompt: book.review, expected: BookTags(tags: book.tags))\n      }\n  )","// Synthesizing more inputs\n  let samples: [ModelSample\u003cString>] = [\n      ModelSample(prompt: \"The largest planet in our solar system...\", expected: \"Jupiter.\"),\n      ModelSample(prompt: \"The capital of Thailand...\", expected: \"Bangkok.\"),\n      ModelSample(prompt: \"Swift is...\", expected: \"a powerful programming language.\"),\n      ModelSample(prompt: \"All those moments will be lost in time...\", expected: \"Like tears in rain.\")\n  ]\n  \n  for try await sample in samples.makeSamples(\n      \"\"\"\n      Generate diverse sentence completions about the listed topics:\n        - The Solar System\n        - World Capitals \n      \"\"\",\n      targetCount: 1000) {\n          samples.append(sample)\n  }","let wordCount = Metric(\"WordCount\")\n\n  Evaluator { _, subject in\n      for tag in subject.value.tags {\n          if tag.contains(\" \") {\n              return wordCount.failing(rationale: \"Tag \\(tag) contains multiple words\")\n          }\n      }\n      return wordCount.passing()\n  }\n\n  let hasGenreTag = Metric(\"HasGenreTag\")\n  \n  Evaluator { _, subject in\n      let tags = subject.value.tags.map { $0.lowercased() }\n      let knownGenres = await BookTaggingService.knownGenres\n      for tag in tags {\n          if knownGenres.contains(tag) {\n              return hasGenreTag.passing(rationale: \"Matched \\(tag)\")\n          }\n      }\n      return hasGenreTag.failing() \n  }","let tagCount = Metric(\"TagCount\")\n\n  var evaluators: Evaluators {\n\n      // Tag count is within the required 3–8 range\n      Evaluator { _, subject in \n          let count = subject.value.tags.count\n          if (count >= 3 && count \u003c= 8) {\n              return tagCount.passing(rationale: \"\\(count) tags\")\n          } \n          return tagCount.failing(rationale: \"Got \\(count) tags, expected 3–8\")\n      }\n  }","let tagCount = Metric(\"TagCount\")\n  let tagTotal = Metric(\"TagTotal\")\n  \n  func aggregateMetrics(using aggregator: inout MetricsAggregator) {\n      aggregator.computeMean(of: tagCount)\n      aggregator.group(\"Distribution of Tag Totals\") { aggregator in\n          aggregator.computeStandardDeviation(of: tagTotal)\n          aggregator.computeMean(of: tagTotal)\n          aggregator.computeVariance(of: tagTotal)\n      }\n  }","// BookTaggingService.swift\n  let instructions = Instructions {\n      \"\"\"\n      You are a librarian and literary analyst. Given a reader's\n      freeform summary of a book they read — describing their\n      thoughts, feelings, and what stood out — generate a set of\n      descriptive tags reflected in the summary.\n\n      Rules:\n       - Return between 3 and 8 tags.\n       - Tags should be lowercase, concise (single word or hyphenated), and descriptive.\n       - Tags should include the book's genre, chosen from the included list of known genres.\n  \n      Known Genres:\n       - \\(Self.knownGenres.joined(separator: \", \"))\n      \"\"\"\n  }","ModelJudgeEvaluator(\n      \"TagQuality\",\n      scale: .numeric([\n          4: \"Tags are relevant and helpful for browsing\",\n          3: \"Mostly relevant, one tag too vague or generic\",\n          2: \"Several tags are wrong or generic\",\n          1: \"Unhelpful or irrelevant\"\n      ]),   \n      judge: PrivateCloudComputeLanguageModel()\n  )","// BookTaggingEvaluation.swift\n  ScoreDimension(\n      \"Relevance\",\n      description: \"\"\"\n          Whether each tag describes a quality, theme, or tone\n          of the book itself rather than incidental details or\n          the reader's personal reactions.\n          \"\"\",\n      scale: .numeric([\n          4: \"Every tag describes the book itself\",\n          3: \"Most tags describe the book\",\n          2: \"Some tags describe personal reactions\",\n          1: \"Tags don't meaningfully describe the book\"\n      ])    \n  )\n  // Define `usefulness` the same way as a second ScoreDimension.","// BookTaggingEvaluation.swift\n  var evaluators: Evaluators {\n\n      Evaluator {  }  \n\n      Evaluator {  }\n\n      Evaluator {  }\n  \n      ModelJudgeEvaluator(\n          judge: PrivateCloudComputeLanguageModel(),\n          dimensions: [relevance, usefulness]\n      )\n  }"]},"related":[{"id":"299","title":"Create robust evaluations for agentic apps","gloss":"為 agentic App 建立穩健的評估","gloss_en":"Create robust evaluations for agentic apps","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"335","title":"Improve your prompts by hill-climbing with Evaluations","gloss":"用評估爬坡法改進你的提示詞","gloss_en":"Improve your prompts by hill-climbing with Evaluations","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"246","title":"LLM search using Core Spotlight","gloss":"使用 Core Spotlight 的 LLM 搜尋","gloss_en":"LLM search using Core Spotlight","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
