<script id="d" type="application/json">{"s":{"id":"242","title":"Build agentic app experiences with the Foundation Models framework","gloss":"用 Foundation Models 框架打造 agentic App 體驗","category":"ai","categoryLabel":"AI 與機器學習","duration":1303,"url":"https://developer.apple.com/videos/play/wwdc2026/242/","takeaway":"透過 DynamicProfile、動態指令、transcript 管理與多 agent 編排（baton-pass、phone-a-friend、skills），用 Foundation Models 打造可隨階段切換模型與行為的 agentic 體驗。","chapters":[[0,"Introduction"],[167,"The example app and agents"],[227,"Declaring a dynamic profile"],[285,"Dynamic instructions"],[304,"DynamicInstructions"],[336,"Configuring models per phase"],[401,"DynamicProfile"],[403,"Initialize your session with your dynamic profile"],[441,"Transcript management and history transforms"],[513,"Transcript management"],[530,"Custom modifiers"],[555,"Custom modifiers"],[567,"History management modifiers"],[579,"Lifecycle modifiers and session properties"],[648,"Lifecycle modifiers"],[700,"Declare a custom session property"],[744,"Read and write session properties in a profile"],[772,"Orchestration: baton-pass"],[782,"Orchestration: baton-pass"],[846,"Orchestration: phone-a-friend and skills"],[854,"Orchestration: phone-a-friend"],[915,"The skills pattern"],[918,"Tool calling mode"],[931,"Tool calling mode"],[1007,"Escaping a tool call loop"],[1017,"Define a tool that throws an error"],[1032,"Transcript error handling"],[1048,"Set the transcript error handling policy"],[1071,"Transcript mutation"],[1107,"Performance, accuracy, and evaluations"],[1284,"Next steps"]],"points":[{"text":"新的 **DynamicProfile** 與 **DynamicInstructions** 能依 App 階段動態切換**指令、模型（on-device 或 PCC）、溫度與推理層級**。","hot":true},{"text":"提供 **historyTransform**、rollingWindow、lifecycle modifiers 與 **@SessionProperty** 來管理 transcript 歷史與自訂工作階段狀態。","hot":false},{"text":"多 agent 編排模式：**baton-pass**（交棒切換模式）、**phone-a-friend**（委派子 session）與 **Skills**（依需求注入知識）。","hot":false},{"text":"可用 **toolCallingMode**（.required/.disallowed）控制工具呼叫並跳出迴圈，並以 **transcriptErrorHandlingPolicy** 決定錯誤後保留或還原 transcript。","hot":false},{"text":"最後涵蓋 **效能、準確度與評估**（evaluations），協助衡量 agentic 流程的品質。","hot":false}],"apis":["FoundationModels","LanguageModelSession","DynamicProfile","DynamicInstructions","SessionProperty","ToolCallingMode","Tool","GenerationOptions","PrivateCloudComputeLanguageModel","historyTransform","transcriptErrorHandlingPolicy"],"audience":"**已熟悉 Foundation Models 基礎、想進一步打造多階段 agentic 流程**的進階 AI 功能開發者。","gloss_en":"Build agentic app experiences with Foundation Models","takeaway_en":"Use DynamicProfile, dynamic instructions, transcript management, and multi-agent orchestration (baton-pass, phone-a-friend, skills) to build agentic experiences with Foundation Models that switch models and behavior by stage.","points_en":[{"text":"The new **DynamicProfile** and **DynamicInstructions** let you dynamically switch **instructions, model (on-device or PCC), temperature, and reasoning level** based on your app's stage.","hot":true},{"text":"Provides **historyTransform**, rollingWindow, lifecycle modifiers, and **@SessionProperty** to manage transcript history and customize session state.","hot":false},{"text":"Multi-agent orchestration patterns: **baton-pass** (handing off between modes), **phone-a-friend** (delegating to a sub-session), and **Skills** (injecting knowledge on demand).","hot":false},{"text":"Use **toolCallingMode** (.required/.disallowed) to control tool calls and break out of loops, and **transcriptErrorHandlingPolicy** to decide whether to keep or restore the transcript after an error.","hot":false},{"text":"Finally covers **performance, accuracy, and evaluations** to help you measure the quality of your agentic flows.","hot":false}],"audience_en":"Advanced AI feature developers who **already know the Foundation Models basics and want to build multi-stage agentic flows**.","code":["// DynamicInstructions\n  \n  struct BrainstormFacilitator: DynamicInstructions {\n      var orchestrator: CraftOrchestrator\n      var body: some DynamicInstructions {\n          Instructions {\n              \"You are a warm and friendly expert crafting brainstorm facilitator.\"\n          }\n          // Tools\n          GenerateProjectTitle()\n          // Conditionally include Origami knowledge\n          if orchestrator.techniques.contains(.origami) {\n              OrigamiExpert()\n          }\n      }\n  }","// DynamicProfile\n\n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      var orchestrator: CraftOrchestrator\n      var body: some DynamicProfile {\n          switch orchestrator.mode {\n          case .brainstorming:\n              Profile { BrainstormFacilitator(orchestrator: orchestrator) }\n                  .model(orchestrator.pccLanguageModel)\n                  .temperature(1)\n          case .planning:\n              Profile { TutorialAuthor(orchestrator: orchestrator) }\n                  .model(orchestrator.pccLanguageModel)\n                  .reasoningLevel(.deep)\n          case .reviewing:\n              Profile { CraftCoach() }\n                  .model(orchestrator.systemLanguageModel)\n          }\n      }\n  }","// Initialize your session with your dynamic profile\n  let session = LanguageModelSession(profile: CraftProfile(orchestrator: orchestrator))","// Transcript management\n  \n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      var orchestrator: CraftOrchestrator\n      var body: some DynamicProfile {\n          switch orchestrator.mode {\n          case .reviewing:\n              Profile { CraftCoach() }\n                  .model(orchestrator.systemLanguageModel)\n                  .historyTransform { history in\n                      // Update the history for your profile\n                      guard let latestResponseIndex = lastResponseEntryIndex(history) else {\n                          return history\n                      }\n                      let filteredHistory = history[0..\u003clatestResponseIndex].filter { entry in\n                          isToolCallsOrToolOutput(entry)\n                      }\n                      return filteredHistory + history[latestResponseIndex...]\n                  }\n          }\n      }\n  }","// Custom modifiers\n  \n  struct DroppingToolCallsProfileModifier: LanguageModelSession.DynamicProfileModifier {\n      func body(content: Content) -> some DynamicProfile {\n          content\n              .historyTransform { history in\n                  guard let latestResponseIndex = lastResponseEntryIndex(history) else {\n                      return history\n                  }\n                  let filteredHistory = history[0..\u003clatestResponseIndex].filter { entry in\n                      isToolCallsOrToolOutput(entry)\n                  }\n                  return filteredHistory + history[latestResponseIndex...]\n              }\n      }\n  }\n\n  extension LanguageModelSession.DynamicProfile {\n      func droppingCompletedToolCalls() -> some DynamicProfile {\n          self.modifier(DroppingToolCallsProfileModifier())\n      }\n  }","// History management modifiers\n\n  import FoundationModelsUtilities\n\n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      var orchestrator: CraftOrchestrator\n      var body: some DynamicProfile {\n          switch orchestrator.mode {\n          case .reviewing:\n              Profile { CraftCoach() }\n                  // Keep the most recent 10 entries\n                  // after dropping finished tool calls\n                  .rollingWindow(size: .entries(10))\n                  .droppingCompletedToolCalls()\n          }\n      }\n  }","// Lifecycle modifiers\n  \n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      @SessionProperty(\\.history) var history\n      var orchestrator: CraftOrchestrator\n      var body: some DynamicProfile {\n          switch orchestrator.mode {\n          case .planning:\n              Profile { TutorialAuthor(orchestrator: orchestrator) }\n                  .model(orchestrator.pccLanguageModel)\n                  .reasoningLevel(.deep)\n                  .onResponse {\n                      // Update history\n                      if history.count > 50, let responseIndex = lastResponseIndex(history) {\n                          history = history[responseIndex...]\n                      }\n                  }\n          }\n      }\n  }","// Session properties — declaration\n\n  extension SessionPropertyValues {\n      @SessionPropertyEntry var summary: String?\n  }","// Session properties\n  \n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      @SessionProperty(\\.history) var history\n      @SessionProperty(\\.summary) var summary\n      var orchestrator: CraftOrchestrator\n      var body: some DynamicProfile {\n          switch orchestrator.mode {\n          case .planning:\n              Profile {\n                  TutorialAuthor(orchestrator: orchestrator)\n                  if let summary {\n                      Instructions { \"Summary: \\(summary)\" }\n                  }\n              }\n              .onResponse {\n                  if history.count > 50, let responseIndex = lastResponse(history.prefix(40)) {\n                      summary = try await summarize(history[0..\u003cresponseIndex])\n                      history = history[responseIndex...]\n                  }\n              }\n          }\n      }\n  }","// Baton-pass\n  \n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      var orchestrator: CraftOrchestrator\n      var body: some DynamicProfile {\n          switch orchestrator.mode {\n          case .brainstorm:\n              Profile {\n                  BrainstormInstructions()\n                  BatonPassTool()\n              }\n              .onToolCall { orchestrator.mode = .tutorial }\n              .model(orchestrator.serverModel)\n          case .tutorial:\n              Profile {\n                  TutorialInstructions()\n                  BatonPassTool()\n              }\n              .onToolCall { orchestrator.mode = .brainstorm }\n              .model(orchestrator.systemModel)\n          }\n      }\n  }","// Phone-a-friend\n\n  struct CraftProfile: LanguageModelSession.DynamicProfile {\n      var body: some DynamicProfile {\n          Profile {\n              BrainstormInstructions()\n              PhoneFriendTool(\n                  name: \"generate_title\",\n                  description: \"Generate a creative project title\",\n                  profile: TitleProfile()\n              )\n          }\n      }\n  }\n\n  struct PhoneFriendTool\u003cP: LanguageModelSession.DynamicProfile>: Tool {\n      func call(arguments: GeneratedContent) async throws -> String {\n          let session = LanguageModelSession(profile: profile())\n          let response = try await session.respond(to: arguments)\n          return response.content\n      }\n  }","// The skills pattern\n  \n  struct CraftingSkills: LanguageModelSession.DynamicInstructions {\n      var activations: SkillActivations\n      var body: some DynamicInstructions {\n          Skills(activations: activations) {\n              Skill(\n                  name: \"origami_folds\",\n                  description: \"Details about specific types of folds\",\n                  prompt: \"\"\"\n                      Valley Fold: Paper is folded toward you, creating a V-shaped crease\n                      Mountain Fold: Paper is folded away from you, creating an inverted V\n                      ...\n                      \"\"\"\n              )\n              Skill(...)\n              Skill(...)\n          }\n      }\n  }"]},"related":[{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"347","title":"Secure your app: mitigate risks to agentic features","gloss":"保護你的 App：降低 agentic 功能的風險","gloss_en":"Secure your app: mitigate risks to agentic features","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"237","title":"What’s new in image understanding","gloss":"影像理解的新功能","gloss_en":"What's new in image understanding","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"246","title":"LLM search using Core Spotlight","gloss":"使用 Core Spotlight 的 LLM 搜尋","gloss_en":"LLM search using Core Spotlight","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
