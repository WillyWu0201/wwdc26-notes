<script id="d" type="application/json">{"s":{"id":"207","title":"Deliver workout insights with HealthKit workout zones","gloss":"用 HealthKit 運動區間呈現訓練洞察","category":"other","categoryLabel":"其他","duration":735,"url":"https://developer.apple.com/videos/play/wwdc2026/207/","takeaway":"HealthKit 新增 workout zones,讓你能直接讀取已完成訓練的心率區間、即時接收區間更新,並為使用者建立預設或自訂的區間設定。","chapters":[[1,"Introduction"],[137,"Accessing workout zones"],[234,"Reading Heart Rate Zones from a completed workout"],[379,"Live zone updates"],[477,"Handling Live Zone Updates"],[491,"Preferred zones"],[540,"Custom zones"],[559,"Check if Preferred Zone has been set"],[564,"Create Zone Boundaries"],[573,"Create Default Workout Zone Configuration"],[598,"Set Custom Zone Configuration"],[603,"Begin Data Collection"]],"points":[{"text":"HealthKit 讓你更容易提供訓練洞察,例如**心率與騎乘功率區間(workout zones)**。","hot":true},{"text":"可從已完成的訓練透過 **workout.zoneGroupsByType** 讀取各區間的數量與停留時間(zoneDurations)。","hot":false},{"text":"即時訓練可實作 **HKLiveWorkoutBuilder 的 didUpdateWorkoutZone**,在 @MainActor 上更新目前所在區間。","hot":false},{"text":"支援 **preferred zones**:先用 zoneConfiguration(for:) 檢查使用者是否已設定。","hot":false},{"text":"可用 **HKWorkoutZoneConfiguration** 以心率邊界陣列建立自訂區間,再以 setCustomZoneConfiguration 套用後 beginCollection。","hot":false}],"apis":["HealthKit","HKWorkoutZoneConfiguration","HKLiveWorkoutBuilder","HKLiveWorkoutZoneUpdate","zoneGroupsByType","HKQuantityType","HKQuantity","HKUnit"],"audience":"**開發健身、運動或健康類 App,想呈現心率/功率區間訓練數據的開發者。**","gloss_en":"Surface workout insights with HealthKit workout zones","takeaway_en":"HealthKit adds workout zones, letting you read heart rate zones from completed workouts, receive live zone updates, and set up preferred or custom zone configurations for users.","points_en":[{"text":"HealthKit makes it easier to deliver workout insights, such as **heart rate and cycling power zones (workout zones)**.","hot":true},{"text":"From a completed workout, read each zone's count and time spent (zoneDurations) via **workout.zoneGroupsByType**.","hot":false},{"text":"For live workouts, implement **HKLiveWorkoutBuilder's didUpdateWorkoutZone** to update the current zone on the @MainActor.","hot":false},{"text":"Support **preferred zones**: first check whether the user has configured them with zoneConfiguration(for:).","hot":false},{"text":"Use **HKWorkoutZoneConfiguration** to build custom zones from an array of heart rate boundaries, then apply with setCustomZoneConfiguration before beginCollection.","hot":false}],"audience_en":"**Developers building fitness, workout, or health apps who want to surface heart rate / power zone training data.**","code":["// Read heart rate zones from the completed workout​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n\nif let heartRateZoneGroup = workout.zoneGroupsByType?[HKQuantityType(.heartRate)] {​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\nlet zones = ZoneDisplayData(​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n    zoneCount: heartRateZoneGroup.configuration.zones.count,​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n    currentZoneIndex: nil,​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n    durations: heartRateZoneGroup.zoneDurations.map(\\.duration)​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n)","func workoutBuilder(_ workoutBuilder: HKLiveWorkoutBuilder,​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n                    didUpdateWorkoutZone zoneUpdate: HKLiveWorkoutZoneUpdate) {​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n    guard let zoneGroup = zoneUpdate.zoneGroup else {​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n        return​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n    }​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n    if let currentIndex = zoneUpdate.currentZoneDuration?.zone.index {​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n        let data = ZoneDisplayData(​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​\n            zoneCount: zoneGroup.configuration.zones.count,​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​
