<script id="d" type="application/json">{"s":{"id":"357","title":"Speedrun your game port with agentic coding","gloss":"用代理式編碼加速遊戲移植","category":"graphics","categoryLabel":"圖形與遊戲","duration":1680,"url":"https://developer.apple.com/videos/play/wwdc2026/357/","takeaway":"用 Game Porting Toolkit 4 的新代理式技能，大幅加速把遊戲移植到 Apple 平台，並把 D3D12 對應到 Metal 4。","chapters":[[0,"Introduction"],[66,"Porting assistant workflow"],[211,"Install Game Porting Toolkit skills"],[385,"Windowing and frame pacing"],[508,"Scene rendering with Metal 4"],[624,"Register resources for residency"],[685,"Query argument buffer offsets"],[754,"Map D3D12 states to Metal 4 stages"],[864,"Query shader reflection parameter count"],[916,"Debugging with GPU command-line tools"],[1149,"Game controllers and MetalFX"],[1511,"Next steps"]],"points":[{"text":"**Game Porting Toolkit 4** 新增**代理式技能（agentic skills）**，可大幅加速遊戲移植到 Apple 平台的歷程。","hot":true},{"text":"透過 **/plugin** 安裝 game-porting-skills，並導入移植助理工作流程，處理視窗化與**影格節奏（frame pacing）**。","hot":false},{"text":"用 **Metal 4** 算繪場景：登錄資源 residency、查詢 argument buffer 位移，並把 **D3D12** 狀態對應到 Metal 4 階段。","hot":false},{"text":"用 **IRShaderReflection** 查詢著色器參數數量，並借助 GPU 命令列工具除錯。","hot":false},{"text":"整合遊戲控制器與 **MetalFX**，完善移植後的輸入與升頻體驗。","hot":false}],"apis":["Game Porting Toolkit","Metal 4","MetalFX","IRShaderReflection","D3D12"],"audience":"**要把 Windows/D3D12 遊戲移植到 Apple 平台**、想用 AI 代理加速移植與 Metal 4 轉換的遊戲開發者。","gloss_en":"Speedrun your game port with agentic coding","takeaway_en":"Use the new agentic skills in Game Porting Toolkit 4 to dramatically accelerate porting your game to Apple platforms, and map D3D12 to Metal 4.","points_en":[{"text":"**Game Porting Toolkit 4** adds **agentic skills** that can dramatically accelerate the journey of porting games to Apple platforms.","hot":true},{"text":"Install game-porting-skills via **/plugin** and adopt the porting-assistant workflow to handle windowing and **frame pacing**.","hot":false},{"text":"Render scenes with **Metal 4**: register resource residency, query argument buffer offsets, and map **D3D12** state to Metal 4 stages.","hot":false},{"text":"Use **IRShaderReflection** to query shader parameter counts, and debug with the help of GPU command-line tools.","hot":false},{"text":"Integrate game controllers and **MetalFX** to round out input and upscaling for the ported experience.","hot":false}],"audience_en":"Game developers who **want to port Windows/D3D12 games to Apple platforms** and use AI agents to accelerate the port and the Metal 4 conversion.","code":["/plugin marketplace add apple/game-porting-toolkit\n/plugin install game-porting-skills@game-porting-toolkit","// With skill\nresidencySet->addAllocation(texture);\nresidencySet->commit();\n// ...\nargumentTable->setAddress(texture->gpuAddress(), bindPoint);\n\n// Without skill\nargumentTable->setAddress(texture->gpuAddress(), bindPoint);","// With skill\nIRRootSignatureGetResourceLocations(m_MtlCurIRRootSig, locations);\nsize_t offset = locations[i].topLevelOffset;\n\n// Without skill\nsize_t offset = paramIndex * descriptorSize;","// With skill\nm_MtlPendingProducerStages |= MtlProducerStageFromD3D12(OldState);\nm_MtlPendingConsumerStages |= MtlConsumerStageFromD3D12(NewState);\n// ...\nm_ComputeEncoder->barrierAfterStages(\n    m_MtlPendingProducerStages,\n    m_MtlPendingConsumerStages,\n    MTL4::VisibilityOptionDevice);\n\n// Without skill\nm_ComputeEncoder->barrierAfterStages(\n    MTL::StageDispatch,\n    MTL::StageAll,\n    MTL4::VisibilityOptionDevice);","// With skill\nIRShaderReflection* refl = IRShaderReflectionCreate();\nIRObjectGetReflection(compiledObj, IRShaderStageCompute, refl);\n// ...\ns_RootSignature.Reset(4, 2); // Reflection reveals: 4 params\n\n// Without skill\ns_RootSignature.Reset(5, 2);"]},"related":[{"id":"356","title":"Bringing Cyberpunk 2077 to Mac","gloss":"將《電馭叛客 2077》帶上 Mac","gloss_en":"Bringing Cyberpunk 2077 to Mac","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"359","title":"Build real-time neural rendering pipelines with Metal","gloss":"用 Metal 打造即時神經渲染管線","gloss_en":"Build real-time neural rendering pipelines with Metal","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"215","title":"Get started with the HTML Model Element","gloss":"開始使用 HTML model 元素","gloss_en":"Getting started with the HTML model element","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"252","title":"Design no-code games with Reality Composer Pro 3","gloss":"用 Reality Composer Pro 3 設計無程式碼遊戲","gloss_en":"Design no-code games with Reality Composer Pro 3","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"256","title":"Discover generated subtitles and subtitle styles","gloss":"認識自動產生字幕與字幕樣式","gloss_en":"Discover generated subtitles and subtitle styles","category":"graphics","categoryLabel":"圖形與遊戲"}]}</script>
