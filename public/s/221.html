<script id="d" type="application/json">{"s":{"id":"221","title":"Prepare your tvOS apps for Dynamic Type","gloss":"讓你的 tvOS App 支援動態字型","category":"uikit","categoryLabel":"UIKit","duration":608,"url":"https://developer.apple.com/videos/play/wwdc2026/221/","takeaway":"tvOS 也要支援 Dynamic Type,改用標準 text styles 與彈性 constraints,並在進入無障礙字級時切換成適配版面。","chapters":[[1,"Introduction"],[166,"Identify common issues"],[298,"Adopt standard text styles"],[310,"Use flexible constraints"],[355,"Dynamic Type with text styles in UIKit"],[373,"Adapt your layout"],[429,"Adapt layout in response to dynamic type"],[487,"Provide a conditional layout for when larger sizes are turned on"],[511,"UIKit adaptive layout that responds to content size changes"]],"points":[{"text":"**Dynamic Type** 讓使用者自選文字大小,tvOS App 也應支援以提升閱讀與操作舒適度。","hot":true},{"text":"常見問題來自**寫死的字體大小與固定寬度 frame**;改用 .frame(maxWidth: .infinity) 等彈性 constraints。","hot":false},{"text":"採用**標準 text styles**:SwiftUI 用 .font(.caption) 等,UIKit 用 UIFont.preferredFont(forTextStyle:) 並開啟 adjustsFontForContentSizeCategory。","hot":false},{"text":"在 SwiftUI 監看 **@Environment(\\.dynamicTypeSize)**,用 isAccessibilitySize 調整 containerRelativeFrame 的欄數或以 AnyLayout 切換 H/V Stack。","hot":false},{"text":"UIKit 用 **registerForTraitChanges** 監聽 UITraitPreferredContentSizeCategory,在無障礙字級時把 stack 軸向改為垂直。","hot":false}],"apis":["dynamicTypeSize","isAccessibilitySize","UIFont.preferredFont(forTextStyle:)","adjustsFontForContentSizeCategory","registerForTraitChanges","UITraitPreferredContentSizeCategory","containerRelativeFrame","AnyLayout"],"audience":"**開發 tvOS App、想兼顧無障礙與不同字級下版面正確性的開發者。**","gloss_en":"Prepare your tvOS app for Dynamic Type","takeaway_en":"tvOS apps should support Dynamic Type too—switch to standard text styles and flexible constraints, and adapt the layout when accessibility text sizes are in use.","points_en":[{"text":"**Dynamic Type** lets users choose their text size, and tvOS apps should support it to make reading and interaction more comfortable.","hot":true},{"text":"Common problems come from **hard-coded font sizes and fixed-width frames**; switch to flexible constraints like .frame(maxWidth: .infinity).","hot":false},{"text":"Adopt **standard text styles**: in SwiftUI use .font(.caption) and the like; in UIKit use UIFont.preferredFont(forTextStyle:) and enable adjustsFontForContentSizeCategory.","hot":false},{"text":"In SwiftUI, observe **@Environment(\\.dynamicTypeSize)** and use isAccessibilitySize to adjust the column count in containerRelativeFrame, or switch between H/V Stacks with AnyLayout.","hot":false},{"text":"In UIKit, use **registerForTraitChanges** to observe UITraitPreferredContentSizeCategory and switch the stack axis to vertical at accessibility text sizes.","hot":false}],"audience_en":"**Developers building tvOS apps who want correct layouts across text sizes while supporting accessibility.**","code":["// Adopt standard text styles\n\nVStack(spacing: 20) {\n  Text(\"Signup information\")\n    .font(.caption.bold())\n    .lineLimit(1)\n    .foregroundStyle(.secondary)\n    .frame(width: 300, alignment: .leading)\n  HStack(alignment: .top, spacing: 40) { \n      //* ... *//\n  }\n}","// Adopt standard text styles\n\nVStack(spacing: 20) {\n  Text(\"Signup information\")\n    .font(.caption.bold())\n    .lineLimit(1)\n    .foregroundStyle(.secondary)\n    .frame(maxWidth: .infinity, alignment: .leading)\n  HStack(alignment: .top, spacing: 40) { \n      /* ... */\n  }\n}","// Hard coded text size in UIKit\n\ntitleLabel.font = UIFont.boldSystemFont(ofSize: 28)\n\n// Dynamic Type with text styles in UIKit\n\ntitleLabel.font = UIFont.preferredFont(forTextStyle: .headline)\ntitleLabel.adjustsFontForContentSizeCategory = true","// A view that shows a collection of movie posters\n\nstruct MovieShelf: View {\n  @Environment(\\.dynamicTypeSize) private var dynamicTypeSize\n  var body: some View {\n    ScrollView(.horizontal) {\n      LazyHStack(spacing: 40) {\n        ForEach(Asset.allCases) { asset in\n          Button { \n            /* ... */\n          } label: {\n            asset.portraitImage\n            Text(asset.title)\n          }\n          .containerRelativeFrame(\n            .horizontal,\n            count: dynamicTypeSize.isAccessibilitySize ? 4 : 6,\n            spacing: 40)\n        }\n      }\n    }\n  }\n}","// A view that shows content in a card\n\nstruct CardContentView: View {\n  @Environment(\\.dynamicTypeSize) private var dynamicTypeSize\n  var asset: Asset\n\n  var body: some View {\n    let layout = dynamicTypeSize.isAccessibilitySize ?\n      AnyLayout(VStackLayout(alignment: .leading, spacing: 10)) :\n      AnyLayout(HStackLayout(alignment: .top, spacing: 10))\n    layout {\n      /* ... */\n    }\n  }\n}","// UIKit adaptive layout that responds to content size changes\n\nclass AdaptiveLayoutViewController: UIViewController {\n  let stackView = UIStackView()\n  \n  override func viewDidLoad() {\n    super.viewDidLoad()\n    updateLayout()\n\n    let sizeTraits: [UITrait] = [UITraitPreferredContentSizeCategory.self]\n    registerForTraitChanges(sizeTraits, action: #selector(updateLayout))\n  }\n\n  private func updateLayout() {\n    if traitCollection.preferredContentSizeCategory.isAccessibilityCategory {\n      stackView.axis = .vertical\n    } else {\n      stackView.axis = .horizontal\n    }\n  }\n\n}"]},"related":[{"id":"278","title":"Modernize your UIKit app","gloss":"現代化你的 UIKit App","gloss_en":"Modernize your UIKit app","category":"uikit","categoryLabel":"UIKit"},{"id":"203","title":"Read between the strokes with PencilKit","gloss":"用 PencilKit 解讀筆跡內容","gloss_en":"Read handwriting content with PencilKit","category":"uikit","categoryLabel":"UIKit"},{"id":"212","title":"Rev up your CarPlay app","gloss":"強化你的 CarPlay App","gloss_en":"Rev up your CarPlay app","category":"uikit","categoryLabel":"UIKit"},{"id":"219","title":"Enhance the accessibility of your reading app","gloss":"強化你閱讀類 App 的無障礙體驗","gloss_en":"Enhance
