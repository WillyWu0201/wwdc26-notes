<script id="d" type="application/json">{"s":{"id":"322","title":"Compose advanced graphics effects with SwiftUI","gloss":"用 SwiftUI 組合進階圖形效果","category":"swiftui","categoryLabel":"SwiftUI","duration":1075,"url":"https://developer.apple.com/videos/play/wwdc2026/322/","takeaway":"結合 SwiftUI 的 layerEffect、Metal shader 與 TimelineView、對齊指南等版面 API，把複雜視覺拆解成可組合、可動畫的圖形效果。","chapters":[[0,"Introduction"],[100,"Design breakdown"],[251,"Cover art and shader effects"],[258,"Cover art image"],[264,"Blurred cover art image"],[429,"Applying layer effect in SwiftUI"],[441,"Writing layer effect shader in Metal"],[459,"Metal shader with offset parameter"],[475,"SwiftUI layer effect with offset parameter"],[484,"SwiftUI layer effect with full-width offset"],[517,"SwiftUI layer effect with noise sampling"],[535,"Metal shader with noise sampling"],[622,"Metal shader with domain warping"],[667,"Driving animation with time"],[676,"SwiftUI layer effect with static visual"],[697,"SwiftUI layer effect with animated visual"],[720,"Time-synced transcript view"],[735,"Basic transcript view"],[753,"Time-synced transcript view"],[798,"Floating timestamps with alignment guides"],[833,"Overlay with center alignment"],[846,"Overlay with bottom leading alignment"],[872,"Overlay with alignment guide override"],[976,"Creative pipelines"],[1033,"Next steps"]],"points":[{"text":"示範如何把設計**拆解（design breakdown）**成可組合的 SwiftUI 版面與圖形 API。","hot":false},{"text":"以 **layerEffect** 搭配 Metal 的 `[[stitchable]]` shader 套用自訂效果（如背景扭曲）。","hot":true},{"text":"透過 noise texture 取樣與 **domain warping** 在 shader 中產生豐富的視覺變化。","hot":false},{"text":"用 **TimelineView(.animation)** 把經過時間傳入 shader，驅動動畫化的視覺。","hot":false},{"text":"以 **ScrollViewReader** 做時間同步逐字稿，並用 **alignmentGuide** 讓時間戳浮動對齊。","hot":false}],"apis":["SwiftUI","layerEffect","ShaderLibrary","Metal","TimelineView","ScrollViewReader","alignmentGuide","GeometryReader"],"audience":"**想為 SwiftUI App 打造客製化視覺與動畫效果的開發者**，對 shader 與圖形組合有興趣的人。","gloss_en":"Compose advanced graphics effects with SwiftUI","takeaway_en":"Combine SwiftUI's layerEffect, Metal shaders, and layout APIs like TimelineView and alignment guides to break complex visuals down into composable, animatable graphics effects.","points_en":[{"text":"Demonstrates how to do a **design breakdown** into composable SwiftUI layout and graphics APIs.","hot":false},{"text":"Apply custom effects (such as background distortion) using **layerEffect** paired with Metal's `[[stitchable]]` shaders.","hot":true},{"text":"Produce rich visual variation in the shader through noise texture sampling and **domain warping**.","hot":false},{"text":"Use **TimelineView(.animation)** to pass elapsed time into a shader, driving animated visuals.","hot":false},{"text":"Build a time-synced transcript with **ScrollViewReader**, and use **alignmentGuide** to float the timestamps into alignment.","hot":false}],"audience_en":"**Developers who want to craft custom visuals and animation effects for their SwiftUI apps** and are interested in shaders and graphics composition.","code":["Image(\"CoverArt\")","Image(\"CoverArt\")\n    .blur(radius: 30)","GeometryReader { proxy in\n    CoverArtView()\n        .layerEffect(\n            ShaderLibrary.backgroundWarp(),\n            maxSampleOffset: .zero\n        )\n}\n.ignoresSafeArea()","[[stitchable]] half4 backgroundWarp(\n    float2 position, SwiftUI::Layer layer\n) {\n    return layer.sample(position);\n}","[[stitchable]] half4 backgroundWarp(\n    float2 position, SwiftUI::Layer layer,\n    float2 offset\n) {\n    return layer.sample(position + offset);\n}","GeometryReader { proxy in\n    CoverArtView()\n        .layerEffect(\n            ShaderLibrary.backgroundWarp(\n               .float2(.init(x: 0, y: 0))\n            ),\n            maxSampleOffset: .zero\n        )\n}\n.ignoresSafeArea()","GeometryReader { proxy in\n    CoverArtView()\n        .layerEffect(\n            ShaderLibrary.backgroundWarp(\n               .float2(.init(x: proxy.size.width, y: 0))\n            ),\n            maxSampleOffset: .zero\n        )\n}\n.ignoresSafeArea()","GeometryReader { proxy in\n    CoverArtView()\n        .layerEffect(\n            ShaderLibrary.backgroundWarp(\n                .float2(proxy.size),\n                .image(Image(\"NoiseTexture\"))\n            ),\n            maxSampleOffset: .zero\n        )\n}\n.ignoresSafeArea()","[[stitchable]] half4 backgroundWarp(\n    float2 position, SwiftUI::Layer layer,\n    float2 size, texture2d\u003chalf> noiseTex\n) {\n    constexpr sampler s(address::repeat, filter::linear);\n    float2 uv = position / size;\n\n    half4 n = noiseTex.sample(s, uv);\n    float2 offset = (float2(n.r, n.g) - 0.5) * 200.0;\n\n    return layer.sample(position + offset);\n}","[[stitchable]] half4 backgroundWarp(\n    float2 position, SwiftUI::Layer layer,\n    float2 size, texture2d\u003chalf> noiseTex\n) {\n    constexpr sampler s(address::repeat, filter::linear);\n    float2 uv = position / size;\n\n    half4 n = noiseTex.sample(s, uv);\n\n    float2 q = float2(n.r, n.g);\n    n = noiseTex.sample(s, uv + q);\n\n    float2 offset = (float2(n.r, n.g) - 0.5) * 200.0;\n\n    return layer.sample(position + offset);\n}","GeometryReader { proxy in\n    CoverArtView()\n        .layerEffect(\n            ShaderLibrary.backgroundWarp(\n                .float2(proxy.size),\n                .image(Image(\"NoiseTexture\"))\n            ),\n            maxSampleOffset: .zero\n        )\n}\n.ignoresSafeArea()","@State private var startDate = Date.now\n\nTimelineView(.animation) { timeline in\n    let elapsed = timeline.date.timeIntervalSince(\n        startDate\n    )\n    CoverArtView()\n        .layerEffect(\n            ShaderLibrary.backgroundWarp(\n                .float2(proxy.size),\n                .image(Image(\"NoiseTexture\")),\n                .float(elapsed)\n            ),\n            maxSampleOffset: .zero\n        )\n}"]},"related":[{"id":"269","title":"What’s new in SwiftUI","gloss":"SwiftUI 的新功能","gloss_en":"What's new in SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"271","title":"Code-along: Build powerful drag and drop in SwiftUI","gloss":"程式碼共做：在 SwiftUI 打造強大的拖放功能","gloss_en":"Code-along: Build powerful drag and drop in SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"272","title":"Use SwiftUI with AppKit and UIKit","gloss":"在 AppKit 與 UIKit 中使用 SwiftUI","gloss_en":"Use SwiftUI with AppKit and UIKit","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"8002","title":"SwiftUI for Beginners Group Lab","gloss":"SwiftUI 新手團體實驗室","gloss_en":"SwiftUI for Beginners Group Lab","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"8006","title":"SwiftUI Group Lab","gloss":"SwiftUI 小組實驗室","gloss_en":"SwiftUI Group Lab","category":"swiftui","categoryLabel":"SwiftUI"}]}</script>
