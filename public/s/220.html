<script id="d" type="application/json">{"s":{"id":"220","title":"Refine accessibility for custom controls","gloss":"為自訂控制項優化無障礙體驗","category":"design","categoryLabel":"設計","duration":985,"url":"https://developer.apple.com/videos/play/wwdc2026/220/","takeaway":"為自訂控制項補上 label、value、可調整特性與自訂動作，能讓 VoiceOver 使用者完整操作你的互動元件。","chapters":[[1,"Introduction"],[62,"Guiding principles"],[301,"Improve accessibility for coffee dispenser"],[425,"Set the accessibility activation point"],[447,"Post accessibility announcements"],[521,"Complex controls"],[613,"Add custom actions"],[767,"Customize accessibility for the interactive cat surface"]],"points":[{"text":"用 **accessibilityLabel**、**accessibilityValue** 與 **.adjustable** 特性，搭配 **accessibilityAdjustableAction** 讓滑桿類控制項可被輔助技術調整。","hot":false},{"text":"透過 **accessibilityActivationPoint** 設定啟用點，讓 VoiceOver 啟用控制項時落在正確位置。","hot":false},{"text":"使用 **AccessibilityNotification.Announcement** 在數值變化時播報，並做好節流避免過度通知。","hot":false},{"text":"對複雜控制項以 **accessibilityActions** 提供「上/下/左/右」等自訂動作，取代難以操作的連續手勢。","hot":true},{"text":"針對直接觸控的互動表面，用 **accessibilityDirectTouch([.requiresActivation])** 兼顧探索與操作。","hot":false}],"apis":["accessibilityLabel","accessibilityValue","accessibilityAddTraits","accessibilityAdjustableAction","accessibilityActivationPoint","AccessibilityNotification.Announcement","accessibilityActions","accessibilityDirectTouch","SwiftUI"],"audience":"在 SwiftUI 中打造**自訂控制項與互動元件**、想讓它們完整支援 VoiceOver 的開發者。","gloss_en":"Refine accessibility for custom controls","takeaway_en":"Adding labels, values, adjustable traits, and custom actions to your custom controls lets VoiceOver users fully operate your interactive elements.","points_en":[{"text":"Use **accessibilityLabel**, **accessibilityValue**, and the **.adjustable** trait together with **accessibilityAdjustableAction** so slider-style controls can be adjusted by assistive technologies.","hot":false},{"text":"Set an activation point with **accessibilityActivationPoint** so VoiceOver activates the control at the correct location.","hot":false},{"text":"Use **AccessibilityNotification.Announcement** to announce value changes, and throttle them to avoid excessive notifications.","hot":false},{"text":"For complex controls, provide custom actions like up/down/left/right via **accessibilityActions** instead of hard-to-perform continuous gestures.","hot":true},{"text":"For direct-touch interactive surfaces, use **accessibilityDirectTouch([.requiresActivation])** to balance exploration and operation.","hot":false}],"audience_en":"Developers building **custom controls and interactive elements** in SwiftUI who want full VoiceOver support.","code":["// Improve accessibility for coffee dispenser\n\nimport SwiftUI\n\nstruct CoffeeDispenserView: View {\n    @State var coffee: Double = 0.0\n    var body: some View {\n        CoffeeSlider(value: coffee)\n            .accessibilityElement()\n            .accessibilityLabel(\"Coffee Dispenser\")\n            .accessibilityValue(\"\\(Int(coffee)) ounces\")\n            .accessibilityAddTraits(.adjustable)\n            .accessibilityAdjustableAction { direction in\n                switch direction {\n                case .increment:\n                    increaseCoffeeAmount()\n                case .decrement:\n                    decreaseCoffeeAmount()\n                }\n            }\n    }\n}","// Set the accessibility activation point\nimport SwiftUI\n\nstruct CoffeeDispenserView: View {\n    @State var coffee: Double = 0.0\n\n    var body: some View {\n        CoffeeSlider(value: coffee)\n            .accessibilityActivationPoint(\n                UnitPoint(x: 0.5, y: 1 - coffee)\n            )\n    }\n}","// Post accessibility announcements \n\nimport SwiftUI\n\nstruct CoffeeDispenserView: View {\n    @State var coffee: Double = 0.0\n  \n    var body: some View {\n        CoffeeSlider(value: coffee)\n            // ...\n            .onChange(of: coffee) { _, newValue in\n                if sufficientTimeSinceLastAnnouncement() && valueHasChanged() {\n                    cacheLastSpokenValue(newValue)\n                    AccessibilityNotification\n                        .Announcement(newValue)\n                        .post()\n                }\n            }\n    }\n}","// Add custom actions\n\nimport SwiftUI\n                                                          \nstruct EqualizerView: View {\n    var body: some View {\n        EqualizerPad()\n            .accessibilityActions(\"Move Up\") {\n                increaseY(by: 10)\n            }\n            .accessibilityActions(\"Move Right\") {\n                increaseX(by: 10)\n            }\n            .accessibilityActions(\"Move Down\") {\n                decreaseY(by: 10)\n            }\n            .accessibilityActions(\"Move Left\") {\n                decreaseX(by: 10)\n            }\n     }\n }","// Customize accessibility for the interactive cat surface\n\nimport SwiftUI\n\nstruct VirtualCat: View {\n    var cat: CatModel\n    var body: some View {\n        InteractiveCatSurface()\n            .accessibilityLabel(\"Virtual Cat\")\n            .accessibilityValue(cat.currentReaction.description)\n            .accessibilityDirectTouch([.requiresActivation])\n     }\n}"]},"related":[{"id":"269","title":"What’s new in SwiftUI","gloss":"SwiftUI 的新功能","gloss_en":"What's new in SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"271","title":"Code-along: Build powerful drag and drop in SwiftUI","gloss":"程式碼共做：在 SwiftUI 打造強大的拖放功能","gloss_en":"Code-along: Build powerful drag and drop in SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"272","title":"Use SwiftUI with AppKit and UIKit","gloss":"在 AppKit 與 UIKit 中使用 SwiftUI","gloss_en":"Use SwiftUI with AppKit and UIKit","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"286","title":"Use foveated streaming to bring immersive content to visionOS","gloss":"用注視點串流把沉浸式內容帶到 visionOS","gloss_en":"Use foveated streaming to bring immersive content to visionOS","category":"visionos","categoryLabel":"visionOS"},{"id":"322","title":"Compose advanced graphics effects with SwiftUI","gloss":"用 SwiftUI 組合進階圖形效果","gloss_en":"Compose advanced graphics effects with SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"}]}</script>
