<script id="d" type="application/json">{"s":{"id":"237","title":"What’s new in image understanding","gloss":"影像理解的新功能","category":"ai","categoryLabel":"AI 與機器學習","duration":946,"url":"https://developer.apple.com/videos/play/wwdc2026/237/","takeaway":"用 Vision 的 tap-to-segment 以點選方式分割影像，並把影像當作輸入餵給 Foundation Models 產生說明或進行 image-based tool calling。","chapters":[[0,"Introduction"],[96,"Segment images with tap-to-segment"],[255,"Segment images (tap-to-segment)"],[350,"Image inputs for Foundation Models"],[401,"Generate an image caption with Foundation Models"],[477,"Image-based tool calling"],[595,"Create an image-based tool"],[729,"Use Vision tools"],[789,"Vision on watchOS"],[834,"Create a crop that highlights a prominent subject (watchOS / saliency)"],[879,"Next steps"]],"points":[{"text":"用 **tap-to-segment**（`GenerateIterativeSegmentationRequest`）以種子點產生物件遮罩，並可加點逐步修正結果。","hot":true},{"text":"**Foundation Models** 現可接收影像輸入，透過 `Prompt` 搭配 `Attachment(image)` 直接產生影像說明文字。","hot":false},{"text":"支援 **image-based tool calling**：自訂 `Tool` 以 `ImageReference` 解析影像，讓模型呼叫如植物辨識等工具。","hot":false},{"text":"Vision 現可在 **watchOS** 使用，並以 `GenerateObjectnessBasedSaliencyImageRequest` 依顯著主體自動裁切影像。","hot":false}],"apis":["Vision","FoundationModels","ImageRequestHandler","GenerateIterativeSegmentationRequest","Prompt","Attachment","ImageReference","Tool","GenerateObjectnessBasedSaliencyImageRequest"],"audience":"**想在 App 中加入影像分割、影像理解或多模態模型功能的開發者**。","gloss_en":"What's new in image understanding","takeaway_en":"Segment images by tapping with Vision's tap-to-segment, and feed images as input to Foundation Models to generate captions or perform image-based tool calling.","points_en":[{"text":"Use **tap-to-segment** (`GenerateIterativeSegmentationRequest`) to produce object masks from seed points, refining the result step by step by adding more points.","hot":true},{"text":"**Foundation Models** can now accept image input, generating image captions directly via a `Prompt` paired with `Attachment(image)`.","hot":false},{"text":"Support **image-based tool calling**: define a custom `Tool` that resolves images via `ImageReference`, letting the model call tools such as plant identification.","hot":false},{"text":"Vision is now available on **watchOS**, and `GenerateObjectnessBasedSaliencyImageRequest` can automatically crop images based on their salient subject.","hot":false}],"audience_en":"**Developers who want to add image segmentation, image understanding, or multimodal model features to their app**.","code":["// Generate a segmentation mask of an object with a seed point\nlet handler = ImageRequestHandler(image)\nlet request = GenerateIterativeSegmentationRequest(seed: point)\nlet observation = try await handler.perform(request)\nlet mask = observation?.pixelBuffer\n\n// Refine the mask with a new point\nrequest.addIncludedPoint(newPoint)\nlet refinedObservation = try await handler.perform(request)","// Generate an image caption with Foundation Models\nimport FoundationModels\n\nlet prompt = Prompt {\n    \"Generate a caption for this image\"\n    Attachment(image)\n}\nlet response = try await session.respond(to: prompt)\nlet caption = response.content","// Create an image-based tool\nstruct PlantIdentifierTool: Tool {\n    @SessionProperty(\\.history) var history\n\n    @Generable\n    struct Arguments {\n        var image: ImageReference\n    }\n\n    func call(arguments: Arguments) async throws -> String {\n        let imageReference = arguments.image\n        let transcript = Transcript(history)\n        guard let imageAttachment = imageReference.resolve(in: transcript) else {\n            throw AppError.imageNotFound\n        }\n        let image = try imageAttachment.pixelBuffer()\n        return classifyPlant(image)\n    }\n}","// Use Vision tools\nimport FoundationModels\nimport Vision\n\nlet session = LanguageModelSession(model: model, tools: [BarcodeReaderTool()])\nlet response = try await session.respond(generating: EventInfo.self) {\n    \"Get the date, location, and website from this flyer\"\n    Attachment(image)\n        .label(\"flyer\")\n}","// Create a crop that highlights a prominent subject\nfunc generateImageCrop(in image: CGImage) async throws -> NormalizedRect? {\n    let request = GenerateObjectnessBasedSaliencyImageRequest()\n    let observation = try await request.perform(on: image)\n    let prominentObjects = observation.salientObjects\n    return prominentObjects.first\n}"]},"related":[{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"242","title":"Build agentic app experiences with the Foundation Models framework","gloss":"用 Foundation Models 框架打造 agentic App 體驗","gloss_en":"Build agentic app experiences with Foundation Models","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"347","title":"Secure your app: mitigate risks to agentic features","gloss":"保護你的 App：降低 agentic 功能的風險","gloss_en":"Secure your app: mitigate risks to agentic features","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"243","title":"Debug and profile agentic app experiences with Instruments","gloss":"用 Instruments 除錯與分析代理式 App 體驗","gloss_en":"Debug and profile agentic app experiences with Instruments","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
