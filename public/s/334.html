<script id="d" type="application/json">{"s":{"id":"334","title":"Build AI-powered scripts with the fm CLI and Python SDK","gloss":"用 fm CLI 與 Python SDK 打造 AI 腳本","category":"ai","categoryLabel":"AI 與機器學習","duration":996,"url":"https://developer.apple.com/videos/play/wwdc2026/334/","takeaway":"macOS 上新的 fm 命令列工具與 Foundation Models Python SDK，讓你在腳本與 Python 中使用裝置端／PCC 模型，支援結構化輸出、工具呼叫與評估流程。","chapters":[[0,"Introduction"],[82,"Introducing the fm CLI and Python SDK"],[203,"Command line tool"],[302,"fm respond and structured output"],[307,"Prompt the on-device model with fm respond"],[371,"Automating file management with fm"],[475,"Sort files with fm respond and a schema"],[532,"Python SDK"],[534,"Install the Foundation Models Python SDK"],[582,"Prompting, tool calling and guided generation"],[600,"Create a session and respond to a prompt"],[621,"Define a Tool for the language model"],[635,"Generate structured output with @fm.generable"],[644,"Building an evaluation pipeline in Python"],[920,"Next steps"]],"points":[{"text":"新的 **fm CLI** 可用 `fm respond` 直接在終端機提示模型，支援 `--model pcc`、`--image` 影像輸入與 `--schema` 結構化輸出。","hot":true},{"text":"可結合 **fm schema** 與 jq 撰寫 shell 腳本，例如自動**分類與整理檔案**（final 與 draft）。","hot":false},{"text":"**Foundation Models Python SDK**（pip install apple_fm_sdk）提供 LanguageModelSession，可在 Python 中提示模型。","hot":false},{"text":"Python 中以 **fm.Tool** 定義工具、用 **@fm.generable** 與 fm.guide 產生結構化輸出，並可建構評估管線。","hot":false}],"apis":["fm","apple_fm_sdk","LanguageModelSession","fm.Tool","fm.generable","fm.guide","GenerationSchema"],"audience":"**想在 macOS 腳本或 Python 中整合 Apple Foundation Models** 的開發者與自動化工作流程使用者。","gloss_en":"Build AI-powered scripts with the fm CLI and Python SDK","takeaway_en":"The new fm command-line tool and Foundation Models Python SDK on macOS let you use on-device/PCC models in scripts and Python, with support for structured output, tool calling, and evaluation flows.","points_en":[{"text":"The new **fm CLI** lets you prompt the model directly in the terminal with `fm respond`, supporting `--model pcc`, `--image` image input, and `--schema` structured output.","hot":true},{"text":"Combine **fm schema** with jq to write shell scripts, for example to automatically **classify and organize files** (final and draft).","hot":false},{"text":"The **Foundation Models Python SDK** (pip install apple_fm_sdk) provides LanguageModelSession to prompt the model from Python.","hot":false},{"text":"In Python, define tools with **fm.Tool**, produce structured output with **@fm.generable** and fm.guide, and build evaluation pipelines.","hot":false}],"audience_en":"**Developers and automation-workflow users who want to integrate Apple Foundation Models into macOS scripts or Python.**","code":["$ fm respond \"Provide a basic regex in Swift to parse an email address\"\n# Here is a basic regex to parse an email address in Swift: [...]\n\n$ fm respond \"Provide a comprehensive regex in Swift to parse an email address\" --model pcc\n# [...] Here's a robust Swift implementation using 'NSRegularExpression' to validate a typical email address:\n\n$ fm respond \"What app is the user using in this screenshot?\" --model pcc \\\n\t--image Screenshot.png\n# The user is using the Mail app.\n\n$ fm schema object --name AppsIdentified --string app_names --array > schema.json \n$ fm respond \"What apps are the user actively using in this screenshot?\" \\\n\t--image Screenshot.png --model pcc --schema schema.json\n# {\"app_names\": [\"Messages\", \"Mail\", \"Calendar\"]}\n\n$ fm respond --help","fm schema object --name \"TriagedFileList\" \\\n    --string 'final_files' --array \\\n    --string 'draft_files' --array > /tmp/schema.json\n\noutput=$(fm respond \\\n    --instructions \"I just completed a project, and I need help triaging the latest version of the files from the previous versions. I will give you a list of files. Return a list of the latest files (i.e., all files that, you can infer from their name in the list, are the latest versions), and then return separately a list of all draft files (i.e., all files that weren't considered final).\" \\\n    \"This is the list of all files:\\n\\n${files_list}\" \\\n    --schema /tmp/schema.json\n)\n\necho \"${output}\" | jq -r '.final_files[]' | while read -r file; do\n    cp \"${DIRECTORY_TO_TRIAGE}/${file}\" \"${FINAL_FILES_STORAGE_DIRECTORY}\"\ndone\n\necho \"${output}\" | jq -r '.draft_files[]' | while read -r file; do\n    mv \"${DIRECTORY_TO_TRIAGE}/${file}\" \"${DRAFT_FILES_STORAGE_DIRECTORY}\"\ndone","pip install apple_fm_sdk","import apple_fm_sdk as fm\n\nINSTRUCTIONS = \"You're an AI assistant for Cupertino Mart, a grocery store with in-app ordering.\"\n\nasync def answer_question(prompt: str) -> str:\n\tsession = fm.LanguageModelSession(instructions=INSTRUCTIONS)\n  return await session.respond(prompt)","class GetPastOrdersTool(fm.Tool):\n  name = \"get_past_orders\"\n  description = \"Retrieves information about this user's past orders.\"\n\n  @fm.generable(\"Past orders query parameter\")\n  class Arguments:\n  \tnumber_orders: str = fm.guide(\"How many of the last orders to retrieve\")\n\n  @property\n  def arguments_schema(self) -> fm.GenerationSchema:\n  \treturn self.Arguments.generation_schema()\n\nasync def call(self, args: fm.GeneratedContent) -> str:\n\tnumber_orders = args.value(int, for_property=\"number_orders\")\n  return await Orders.load_last_orders(user_id=user_id, amount=number_orders)","@fm.generable(\"Suggested items\")\nclass ItemsSuggestion:\n\titem_names: list[str] = fm.guide(\"Names of the suggested items\")\n\nINSTRUCTIONS = \"You're an AI assistant tasked with returning potential grocery items that the user might be interested in.\"\n\nasync def generate_suggested_cart_items(user_input: Optional[str]) -> ItemsSuggestion:\n\tsession = fm.LanguageModelSession(instructions=INSTRUCTIONS, tools=load_tools())\n\tprompt = \"\"\"Using the tools to load the user's previous orders, \\\n              return a list of items the user has already ordered \\\n              and that they might be interested in again \\\n              as they're getting ready to place a new grocery order.\"\"\"\n\tif user_input is not None:\n    prompt += f\"\\nAccount for the following request from the user: {user_input}\"\n    return await session.respond(prompt, generating=ItemsSuggestion)"]},"related":[{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"242","title":"Build agentic app experiences with the Foundation Models framework","gloss":"用 Foundation Models 框架打造 agentic App 體驗","gloss_en":"Build agentic app experiences with Foundation Models","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"246","title":"LLM search using Core Spotlight","gloss":"使用 Core Spotlight 的 LLM 搜尋","gloss_en":"LLM search using Core Spotlight","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"326","title":"Integrate on-device AI models into your app using Core AI","gloss":"用 Core AI 把裝置端 AI 模型整合進你的 App","gloss_en":"Integrate on-device AI models with Core AI","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
