owingTaskGroup** 同時讀取請求與推送即時的賽車位置與排名更新。","hot":true},{"text":"用 **SwiftProtobuf** 取得高效的二進位序列化，並以 **Containerfile** 打包後部署到 Cloud Run。","hot":false}],"apis":["GRPCCore","GRPCNIOTransportHTTP2","SwiftProtobuf","withGRPCClient","GRPCClient","HTTP2ClientTransport","GRPCServer","RPCAsyncSequence","RPCWriter","withThrowingTaskGroup","Mutex"],"audience":"想用 **gRPC 串接 Swift App 與後端、打造即時串流功能**的全端 Swift 開發者。","gloss_en":"Build real-time apps and services with gRPC and Swift","takeaway_en":"Use grpc-swift and bidirectional streaming RPCs to build high-performance real-time experiences between your Swift app and backend.","points_en":[{"text":"Introduces the open-source RPC framework **gRPC**, defining services and messages (like ListRaces) in **.proto** and generating Swift code in Xcode with **grpc-swift-proto-generator**.","hot":false},{"text":"Use **withGRPCClient** together with **HTTP2ClientTransport** to establish the connection, then wrap the generated client in a service stub to call RPCs.","hot":false},{"text":"Manage the connection lifecycle with an **@Observable ClientManager**, inject it via **@Environment**, and disconnect when **scenePhase** enters the background.","hot":false},{"text":"Implement the **FollowRace bidirectional streaming RPC**, using **withThrowingTaskGroup** to read requests and push live race position and ranking updates concurrently.","hot":true},{"text":"Use **SwiftProtobuf** for efficient binary serialization, then package with a **Containerfile** and deploy to Cloud Run.","hot":false}],"audience_en":"Full-stack Swift developers who want to **connect a Swift app and backend with gRPC to build real-time streaming features**.","code":["edition = \"2024\";\n\nimport \"google/protobuf/timestamp.proto\";\n\nservice SwiftKartService {\n  rpc ListRaces(ListRacesRequest) returns (ListRacesResponse);\n}\n\nmessage ListRacesRequest {\n  int32 limit = 1 [default = 100];\n}\n\nmessage ListRacesResponse {\n  repeated Race races = 1;\n}\n\nmessage Race {\n  string name = 1;\n  string location = 2;\n  google.protobuf.Timestamp start_time = 3;\n  int32 laps = 4;\n  string championship = 5;\n}","{\n    \"generate\": {\n        \"clients\": true,\n        \"servers\": false,\n        \"messages\": true\n    }\n}","import GRPCCore\nimport GRPCNIOTransportHTTP2\nimport SwiftProtobuf",".task {\n    do {\n        try await withGRPCClient(\n            transport: .http2NIOTS(\n                address: .ipv4(host: \"127.0.0.1\", port: 8080),\n                transportSecurity: .tls\n            )\n        ) { client in\n            \u003c#code#>\n        }\n    } catch {\n        print(\"gRPC error: \\(error)\")\n    }\n}",".task {\n    do {\n        try await withGRPCClient(\n            transport: .http2NIOTS(\n                address: .ipv4(host: \"127.0.0.1\", port: 8080),\n                transportSecurity: .tls\n            )\n        ) { client in\n            let kart = SwiftKartService.Client(wrapping: client)\n            let request = ListRacesRequest()\n            let response = try await kart.listRaces(request)\n            self.races = response.races.map { race in\n                RaceInfo(\n                    name: race.name,\n                    location: race.location,\n                    startTime: race.startTime.date,\n                    championship: race.championship,\n                    laps: Int(race.laps),\n                    drivers: race.drivers\n                )\n            }\n        }\n    } catch {\n        print(\"gRPC error: \\(error)\")\n    }\n}","import GRPCCore\nimport GRPCNIOTransportHTTP2\nimport Synchronization\nimport SwiftUI\n\n@Observable\nfinal class ClientManager: Sendable {\n    fileprivate let state = Mutex(State.disconnected)\n\n    static func makeTransport() throws -> HTTP2ClientTransport.TransportServices {\n        try .http2NIOTS(\n            target: .ipv4(address: \"127.0.0.1\", port: 8080),\n            transportSecurity: .plaintext\n        )\n    }\n\n    func withClient(\n        body: (_ client: GRPCClient\u003cHTTP2ClientTransport.TransportServices>) async throws -> Void\n    ) async throws {\n        let client = try connectIfNecessary()\n        try await body(client)\n    }\n\n    private func connectIfNecessary() throws -> GRPCClient\u003cHTTP2ClientTransport.TransportServices> {\n        try self.state.withLock { state in\n            try state.connectIfNecessary()\n        }\n    }\n\n    func disconnect() {\n        let client = self.state.withLock { state in\n            state.disconnect()\n        }\n\n        client?.beginGracefulShutdown()\n    }\n}\n\nextension ClientManager {\n    enum State {\n        case connected(GRPCClient\u003cHTTP2ClientTransport.TransportServices>, Task\u003cVoid, any Error>)\n        case disconnected\n    }\n}\n\nextension ClientManager.State {\n    mutating func connectIfNecessary() throws -> GRPCClient\u003cHTTP2ClientTransport.TransportServices> {\n        switch self {\n        case .connected(let client, _):\n            return client\n\n        case .disconnected:\n            let client = try GRPCClient(transport: ClientManager.makeTransport())\n            let task = Task { try await client.runConnections() }\n            self = .connected(client, task)\n            return client\n        }\n    }\n\n    mutating func disconnect() -> GRPCClient\u003cHTTP2ClientTransport.TransportServices>? {\n        switch self {\n        case .connected(let client, _):\n            self = .disconnected\n            return client\n        case .disconnected:\n            return nil\n        }\n    }\n}","import SwiftUI\n\n@main\nstruct SwiftKartApp: App {\n    let manager = ClientManager()\n\n    var body: some Scene {\n        WindowGroup {\n            RaceScheduleView()\n                .environment(manager)\n        }\n    }\n}","import SwiftUI\n\n@main\nstruct SwiftKartApp: App {\n    let manager = ClientManager()\n    @Environment(\\.scenePhase) private var scenePhase\n\n    var body: some Scene {\n        WindowGroup {\n            RaceScheduleView()\n                .environment(manager)\n        }\n        .onChange(of: scenePhase) { _, newPhase in\n            switch newPhase {\n            case .background :\n                manager.disconnect()\n            case .inactive, .active:\n                break\n            @unknown default:\n                break\n            }\n        }\n    }\n}","@Environment(ClientManager.self) var manager",".task {\n    do {\n        try await manager.withClient { client in\n            let kart = SwiftKartService.Client(wrapping: client)\n            let request = ListRacesRequest()\n            let response = try await kart.listRaces(request)\n            self.races = response.races.map { race in\n                RaceInfo(\n                    name: race.name,\n                    location: race.location,\n                    startTime: race.startTime.date,\n                    championship: race.championship,\n                    laps: Int(race.laps),\n                    drivers: race.drivers\n                )\n            }\n        }\n    } catch {\n        print(\"gRPC error: \\(error)\")\n    }\n}","var race = Race()\nrace.name = \"Duck Pond Dash\"\nrace.location = \"Apple Park, Cupertino\"\nrace.startTime = .init(roundingTimeIntervalSince1970: 1_781_198_600)\nrace.laps = 6\nrace.championship = \"Corporate Cup\"\nrace.drivers = [\"Monty\", \"Pepper\", \"Mycroft\", \"Pancakes\", \"Duke\", \"Kiko\", \"Sissi\", \"Bo\"]\n\ntry race.serializedBytes()","let server = GRPCServer(\n    transport: .http2NIOPosix(\n        address: .ipv4(host: \"127.0.0.1\", port: 8080),\n        transportSecurity: .plaintext\n    ),\n    services: [Service()]\n)\ntry await server.serve()"]},"related":[{"id":"201","title":"Secure your apps with App Attest","gloss":"運用 App Attest 保護你的 App","gloss_en":"Protect your app with App Attest","category":"swift","categoryLabel":"Swift"},{"id":"213","title":"Translate your app using ag
