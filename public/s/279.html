<script id="d" type="application/json">{"s":{"id":"279","title":"Explore advances in RealityKit","gloss":"探索 RealityKit 的最新進展","category":"visionos","categoryLabel":"visionOS","duration":1431,"url":"https://developer.apple.com/videos/play/wwdc2026/279/","takeaway":"RealityKit 新增柔和陰影、導航網格、布料模擬、LOD、3D 高斯潑濺與沉浸式音訊等能力，讓 App 與遊戲更擬真、更具沉浸感。","chapters":[[0,"Introduction"],[120,"Lighting and shadows"],[242,"Soft shadows"],[373,"Projective textures"],[433,"Physical space lighting"],[464,"Navigation mesh"],[586,"Querying the navigation mesh"],[661,"Cloth simulation"],[771,"Pinning cloth to anchor points"],[822,"Performance"],[882,"LOD by camera distance"],[958,"LOD by screen area"],[986,"Responding to thermal state changes"],[1029,"3D Gaussian splats"],[1124,"Creating a Gaussian splat"],[1148,"Immersive audio"],[1249,"Creating a custom reverb mesh"],[1293,"Creating custom reverb materials"],[1362,"Next steps"]],"points":[{"text":"強化**光照與陰影**：以 **SpotLightComponent.Shadow** 啟用柔和陰影，並支援投影貼圖與實體空間光照。","hot":false},{"text":"新增**導航網格（navigation mesh）**，用 **NavigationController** 計算路徑，支援網格點與離網連結（如梯子）。","hot":false},{"text":"提供**布料模擬**，可將布料頂點以 kinematic 方式釘在錨點上。","hot":false},{"text":"用 **LevelOfDetailComponent** 依相機距離或螢幕面積切換 LOD，並監聽 thermalState 調整效能。","hot":false},{"text":"引入 **3D Gaussian splats（GaussianSplatComponent）**與沉浸式音訊的自訂 reverb 網格與材質。","hot":true}],"apis":["RealityKit","SpotLightComponent","SpotLightComponent.Shadow","SpotLightComponent.ProjectiveTexture","SpotLightComponent.SurroundingsLight","NavigationController","ClothSphereShape","LevelOfDetailComponent","ProcessInfo.thermalState","GaussianSplatResource","GaussianSplatComponent","ReverbMeshResource","ReverbComponent","Audio.Material"],"audience":"**開發 visionOS 沉浸式體驗與 3D 遊戲的 RealityKit 開發者**，想提升擬真度與效能的人。","gloss_en":"Explore advances in RealityKit","takeaway_en":"RealityKit adds soft shadows, navigation meshes, cloth simulation, LOD, 3D Gaussian splats, and immersive audio, making apps and games more realistic and immersive than ever.","points_en":[{"text":"Enhanced **lighting and shadows**: enable soft shadows with **SpotLightComponent.Shadow**, with support for projected textures and physical-space lighting.","hot":false},{"text":"Adds a **navigation mesh**, using **NavigationController** to compute paths, with support for mesh points and off-mesh links (such as ladders).","hot":false},{"text":"Provides **cloth simulation**, letting you pin cloth vertices to anchors in a kinematic manner.","hot":false},{"text":"Use **LevelOfDetailComponent** to switch LOD based on camera distance or screen area, and observe thermalState to adjust performance.","hot":false},{"text":"Introduces **3D Gaussian splats (GaussianSplatComponent)** and custom reverb meshes and materials for immersive audio.","hot":true}],"audience_en":"**RealityKit developers building visionOS immersive experiences and 3D games** who want to improve realism and performance.","code":["// Enable soft shadows for the hearth spotlight\n    \nguard var shadow = hearthSpotlight.components[SpotLightComponent.Shadow.self] else {\n    // handle error\n}\nshadow.lightSize = 0.7 // meters\n    \nshadow.quality = .medium // or .high\n// shadow.quality = .low // will result in hard shadows\n    \nhearthSpotlight.components.set(shadow)","// Create one of the planetarium spotlights\n    \nlet spotLightEntity = Entity()\nspotLightEntity.components.set(SpotLightComponent(\n    color: .white,\n    intensity: intensity,\n    innerAngleInDegrees: innerAngle,\n    outerAngleInDegrees: outerAngle,\n    attenuationRadius: attenuationRadius,\n))\n    \nlet projectiveTexture: TextureResource = generateStarsAndNebulaeTexture()\nspotLightEntity.components.set(SpotLightComponent.ProjectiveTexture(\n    texture: projectiveTexture\n))","// Enable physical space lighting\n    \nspotLightEntity.components.set(SpotLightComponent.SurroundingsLight())","// Querying the navigation mesh in Chaparral Village\n\nextension Entity {\n    public func navigate(/* ... */) async {\n        let navigator = try! NavigationController(entity: self)\n        guard let result = await navigator.computePath(from: fromPosition, to: toPosition) \n        else {\n            return\n        }\n        if result.isEmpty {\n            return\n        }\n        for node in result {\n            switch node.category {\n                case .meshPoint:\n                    finalPath.append(node.position)\n                case .offMeshConnection:\n                    // handle ladders\n            }\n        }\n    }\n}","// Pin the curtains to the Alchemist's lab\n\nfor (pin, pinComponent) in pins {\n        let position = pin.position(relativeTo: event.entity)\n        let selectionSphere = ClothSphereShape(radius: pinComponent.radius)\n    \n        let vertices = clothMesh.vertices(in: .sphere(selectionSphere),\n                                    center: position)\n        clothBody.motionTypes.set(vertexIndices: vertices, value: .kinematic)\n}","// Create entity with LODs\n    \nlet lod0 = [ModelEntity(mesh: lodMesh0)]\nlet lod1 = [ModelEntity(mesh: lodMesh1)]\nlet lod2 = [ModelEntity(mesh: lodMesh2)]\n\nlet entity = Entity()\n\nLevelOfDetailComponent.addByCameraDistance(to: entity, levels: [\n    (entities: lod0, maxDistance: 1.0 /* meters */), // highest detail\n    (entities: lod1, maxDistance: 5.0),              // medium detail\n    (entities: lod2, maxDistance: .infinity),        // lowest detail\n])","// Create entity with LODs\n    \nlet lod0 = [ModelEntity(mesh: lodMesh0)]\nlet lod1 = [ModelEntity(mesh: lodMesh1)]\nlet lod2 = [ModelEntity(mesh: lodMesh2)]\n\nlet entity = Entity()\n\nLevelOfDetailComponent.addByScreenArea(to: entity, levels: [\n    (entities: lod0, minArea: 0.2 /* fraction of screen area */),  // highest detail\n    (entities: lod1, minArea: 0.1),                                // medium detail\n    (entities: lod2, minArea: 0.01),                               // lowest detail\n])","// Respond to changes in device thermal state\n    \nNotificationCenter.default.addObserver(of: ProcessInfo.self,\n                                       for: .thermalStateDidChange) {_ in\n    switch ProcessInfo.processInfo.thermalState {\n        case .nominal, .fair:\n            // Stay the course\n        case .serious, .critical:\n            // Improve performance by:\n            // More aggressive LOD switching\n            // Lower shadow quality\n    }\n}","// Create Gaussian splat resource and component\n\nlet resource = try GaussianSplatResource.BufferResource(count: splatCount,\n                                                        position: positionBuffer,\n                                                        scale: scaleBuffer,\n                                                        rotation: rotationBuffer,\n                                                        opacity: opacityBuffer,\n                                                        sphericalHarmonics:\n                                                                                                                    (sphericalHarmonicsBuffer, degree))\n\nlet splatResource = GaussianSplatResource(resource)\n\nlet splatComponent = GaussianSplatComponent(splatResource)\n\nsplatEntity.components.set(splatComponent)","// Create and use custom reverb mesh\n\nlet mesh: ReverbMeshResource = .shoebox(size: [5, 4, 6])\n    \nlet reverb: Reverb = .simulated(mesh: mesh, materials: [.dryWall])\n    \nentity.components.set(ReverbComponent(reverb: reverb))","// Create custom materials for custom reverb mesh\n    \nlet thickCarpet: Audio.Material = .carpet.scalingAbsorption {freq in 0.1 }\n    \nlet bookshelf: Audio.Material\n    \n// Absorption coefficients by center frequency:\n// 31.5Hz, 63Hz, 125Hz, 250Hz, 500Hz, 1kHz, 2kHz, 4kHz, 8kHz, 16kHz\nlet bookshelfAbsorption = Audio.Absorption(\n    [0.10, 0.15, 0.28, 0.20, 0.15, 0.10, 0.10, 0.07, 0.07, 0.05])\n    \n// Scattering coefficients for: 500Hz, 1000Hz, 4000Hz\nlet bookshelfScattering = Audio.Scattering([500: 0.5, 1000: 0.6, 4000: 0.7])\n    \nbookshelf = .init(absorption: bookshelfAbsorption,\n              scattering: bookshelfScattering)"]},"related":[{"id":"280","title":"Iterate your spatial scenes faster with Reality Composer Pro 3","gloss":"用 Reality Composer Pro 3 更快迭代空間場景","gloss_en":"Iterate your spatial scenes faster with Reality Composer Pro 3","category":"visionos","categoryLabel":"visionOS"},{"id":"283","title":"Explore enhancements to visionOS object tracking","gloss":"探索 visionOS 物件追蹤的強化功能","gloss_en":"Explore enhancements to visionOS object tracking","category":"visionos","categoryLabel":"visionOS"},{"id":"284","title":"Collaborate on structured 3D models in visionOS","gloss":"在 visionOS 中協作操作結構化 3D 模型","gloss_en":"Collaborate on structured 3D models in visionOS","category":"visionos","categoryLabel":"visionOS"},{"id":"286","title":"Use foveated streaming to bring immersive content to visionOS","gloss":"用注視點串流把沉浸式內容帶到 visionOS","gloss_en":"Use foveated streaming to bring immersive content to visionOS","category":"visionos","categoryLabel":"visionOS"},{"id":"287","title":"Build next-generation experiences with visionOS 27","gloss":"用 visionOS 27 打造次世代體驗","gloss_en":"Build next-generation experiences with visionOS 27","category":"visionos","categoryLabel":"visionOS"}]}</script>
