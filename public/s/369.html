<script id="d" type="application/json">{"s":{"id":"369","title":"Find your accessory with Bluetooth Channel Sounding","gloss":"用藍牙通道測距找到你的配件","category":"other","categoryLabel":"其他","duration":492,"url":"https://developer.apple.com/videos/play/wwdc2026/369/","takeaway":"用 Bluetooth Channel Sounding 透過 Core Bluetooth 或 Nearby Interaction，為藍牙配件帶來距離與方向感知。","chapters":[[0,"Introduction"],[50,"Overview"],[197,"Core Bluetooth API"],[223,"Start a Core Bluetooth Channel Sounding session"],[249,"Receive distance results and cancel a session"],[274,"Nearby Interaction API"],[281,"Start a Nearby Interaction Channel Sounding session"],[319,"Run a Nearby Interaction Channel Sounding session"],[425,"Hardware tips"]],"points":[{"text":"**Channel Sounding** 為藍牙配件帶來**距離與方向**感知，可用於尋找配件等情境。","hot":true},{"text":"在 **Core Bluetooth** 中先以 **supportsFeatures(.channelSounding)** 檢查支援，再用 **CBChannelSoundingSessionConfiguration** 啟動測距 session。","hot":false},{"text":"透過 delegate 接收 **CBChannelSoundingProcedureResults** 取得 **distance**，並可隨時取消 session。","hot":false},{"text":"用 **Nearby Interaction** 的 **NINearbyAccessoryConfiguration** 並啟用**相機輔助（camera assistance）**，可額外取得方向（水平角）。","hot":false}],"apis":["CoreBluetooth","NearbyInteraction","CBCentralManager","CBChannelSoundingSessionConfiguration","CBChannelSoundingProcedureResults","NISession","NINearbyAccessoryConfiguration"],"audience":"開發**藍牙配件或尋物類 App、需要距離與方向定位**的硬體與 iOS 開發者。","gloss_en":"Find your accessory with Bluetooth Channel Sounding","takeaway_en":"Use Bluetooth Channel Sounding through Core Bluetooth or Nearby Interaction to bring distance and direction awareness to Bluetooth accessories.","points_en":[{"text":"**Channel Sounding** brings **distance and direction** awareness to Bluetooth accessories, useful for scenarios like finding an accessory.","hot":true},{"text":"In **Core Bluetooth**, first check support with **supportsFeatures(.channelSounding)**, then start a ranging session with **CBChannelSoundingSessionConfiguration**.","hot":false},{"text":"Receive **CBChannelSoundingProcedureResults** through the delegate to get **distance**, and cancel the session at any time.","hot":false},{"text":"Use **Nearby Interaction**'s **NINearbyAccessoryConfiguration** with **camera assistance** enabled to additionally obtain direction (azimuth).","hot":false}],"audience_en":"Hardware and iOS developers building **Bluetooth accessories or item-finder apps that need distance and direction positioning**.","code":["import CoreBluetooth\n\nfunc isChannelSoundingSupported() -> BOOL {\n    guard centralManager.state == .poweredOn else { return }\n    if #available(iOS 27.0, *) {\n        // Check current device supports Bluetooth Channel Sounding\n        return CBCentralManager.supportsFeatures(.channelSounding)\n    }\n}\n\nfunc startChannelSounding(_ peripheral: CBPeripheral) {\n    guard peripheral.isConnected else { return }\n    if #available(iOS 27.0, *) {  \n        // Step 1: Create a CBChannelSoundingSessionConfiguration\n        let config = CBChannelSoundingSessionConfiguration(role: .initiator)\n\n        // Step 2: Start the channel sounding session\n        peripheral.startChannelSoundingSession(config)\n    }\n}","import CoreBluetooth\n\n// Receive distance results\nfunc peripheral(_ peripheral: CBPeripheral,\n                didReceive results: CBChannelSoundingProcedureResults?,\n                error: Error?) {\n    guard let results = results else { return }\n\n    let distance = results.distance\n    \n    // Do something with distance\n}\n\n// Cancel a Channel Sounding session\nfunc cancelChannelSounding(_ peripheral: CBPeripheral) {\n    guard peripheral.isConnected else { return }\n    if #available(iOS 27.0, *) {\n        // Cancel the channel sounding session\n        peripheral.cancelChannelSoundingSession(config)\n    }\n}\n\nfunc peripheral(_ peripheral: CBPeripheral,\n                didCompleteChannelSoundingSession error: Error?) {   \n    // Session is complete\n}","import CoreBluetooth\nimport NearbyInteraction\n\n// Configure a Nearby Interaction Channel Sounding session\nfunc startChannelSoundingThroughNearbyInteraction(_ peripheral: CBPeripheral) {\n    if #available(iOS 27.0, *) {        \n        // Step 1: Check current device supports Bluetooth Channel Sounding\n        guard NISession.deviceCapabilities.supportsBluetoothChannelSounding else { return }\n\n        // Step 2: Create an NINearbyAccessoryConfiguration\n        let config = NINearbyAccessoryConfiguration(\n            bluetoothChannelSoundingIdentifier: peripheral.identifier, \n            previousChannelSoundingIdentifier: nil)\n\n        // Step 3: Enable camera assistance for direction support\n        if NISession.deviceCapabilities.supportsCameraAssistance { \n            config.isCameraAssistanceEnabled = true\n        }\n    }\n}","import CoreBluetooth\nimport NearbyInteraction\n\n// Run a Nearby Interaction Channel Sounding session\nfunc runChannelSoundingThroughNearbyInteraction(_ config: NINearbyAccessoryConfiguration) {\n    // Create an NISession\n    let session = NISession()\n    session.delegate = self\n    // Run the NISession with the accessory configuration\n    session.run(config)\n}\n\n// Improve Nearby Interaction direction outputs\nfunc updateAccessoryMotionState(_ isMoving: Bool) {\n    NIMotionActivityState motionState = isMoving ? .moving : .stationary\n    \n    // Tell NISession about.the accessory's motion state\n    session.updateMotionState(motionState, forObjectWithToken: object.discoveryToken)\n}\n\n// Receive NISession updates\nfunc session(_ session: NISession, didUpdate nearbyObjects: [NINearbyObjects]) {   \n    guard let object = nearbyObjects.first else { return }\n\n    if let distance = object.distance {\n        // Do something with distance\n    }\n\n    if let direction = object.horizontalAngle {\n        // Do something with horizontal angle\n    }\n}"]},"related":[{"id":"101","title":"Keynote","gloss":"主題演講","gloss_en":"Keynote","category":"other","categoryLabel":"其他"},{"id":"102","title":"Platforms State of the Union","gloss":"平台現況報告","gloss_en":"Platforms State of the Union","category":"other","categoryLabel":"其他"},{"id":"111","title":"Keynote (ASL)","gloss":"主題演講(美國手語版)","gloss_en":"Keynote (American Sign Language)","category":"other","categoryLabel":"其他"},{"id":"112","title":"Platforms State of the Union (ASL)","gloss":"平台現況報告（美國手語版）","gloss_en":"Platforms State of the Union (American Sign Language)","category":"other","categoryLabel":"其他"},{"id":"122","title":"WWDC26 Platforms State of the Union Recap","gloss":"WWDC26 平台現況演講重點回顧","gloss_en":"WWDC26 Platforms State of the Union recap","category":"other","categoryLabel":"其他"}]}</script>
