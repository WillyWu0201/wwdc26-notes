<script id="d" type="application/json">{"s":{"id":"222","title":"Meet the new MetricKit","gloss":"認識全新的 MetricKit","category":"other","categoryLabel":"其他","duration":1063,"url":"https://developer.apple.com/videos/play/wwdc2026/222/","takeaway":"用全新以 async 串流為核心的 MetricKit 接收效能指標與診斷資料，並透過 State Reporting 加上自訂情境，更快找出並修正效能問題。","chapters":[[1,"Introduction"],[247,"Metrics"],[299,"Receive metrics from MetricKit"],[325,"Send your metrics to the server"],[344,"Access your performance metrics"],[433,"Diagnostics"],[539,"Receive diagnostics"],[554,"Send your diagnostic data to the server"],[579,"Access your diagnostic data"],[603,"Context"],[837,"Receive MetricKit data with states"],[861,"Define custom structured types"],[929,"Send encoded metric reports to the server"]],"points":[{"text":"用 `MetricManager` 的 **async 串流**（`metricReports`、`diagnosticReports`）接收效能指標與診斷，取代舊有的 delegate 模式。","hot":true},{"text":"指標報告可直接以 **`JSONEncoder` 編碼**並上傳到自家伺服器，方便集中分析。","hot":false},{"text":"診斷資料涵蓋**當機（crash）與卡頓（hang）**，並提供 `callStackTree`、終止原因與分類等細節。","hot":false},{"text":"透過 **State Reporting**（`StateReporter`、`@ReportableMetadata`）為指標加上自訂情境，把資料對應到 App 內的狀態與畫面。","hot":false}],"apis":["MetricKit","MetricManager","MetricReport","StateReporting","StateReportingDomain","StateReporter","ReportableMetadata"],"audience":"**重視 App 效能、想建立指標與當機監控管線的開發者**。","gloss_en":"Meet the new MetricKit","takeaway_en":"Receive performance metrics and diagnostics with the new async-stream-based MetricKit, and use State Reporting to add custom context so you can find and fix performance problems faster.","points_en":[{"text":"Receive performance metrics and diagnostics via `MetricManager`'s **async streams** (`metricReports`, `diagnosticReports`), replacing the old delegate pattern.","hot":true},{"text":"Metric reports can be encoded directly with **`JSONEncoder`** and uploaded to your own server for centralized analysis.","hot":false},{"text":"Diagnostics cover **crashes and hangs**, with details like `callStackTree`, termination reason, and classification.","hot":false},{"text":"Use **State Reporting** (`StateReporter`, `@ReportableMetadata`) to attach custom context to metrics, mapping data to in-app states and screens.","hot":false}],"audience_en":"**Developers who care about app performance and want to build a metrics and crash monitoring pipeline**.","code":["// Receive metrics from MetricKit\n\nimport MetricKit\n\nlet manager = MetricManager()\n\nfor await report in manager.metricReports {\n    processReport(report)\n}","// Send your metrics to the server\n\nimport MetricKit\n\nfor await report in manager.metricReports {\n    let jsonData = try JSONEncoder().encode(report)\n    sendToServer(jsonData)\n}","// Access your performance metrics\n\nimport MetricKit\n\nfor await report in manager.metricReports {\n    let intervalEntries = report.intervalEntries\n    let fullDayEntry = intervalEntries.fullDayEntry\n    \n    for entry in intervalEntries {\n        let memoryMetrics = entry.values.filter { $0.metricGroup == .memory }\n        \n        for metric in memoryMetrics {\n            switch metric {\n            case .peakMemory(let peak):\n                processPeakMemory(peak)\n            default: break\n            }\n        }\n    }\n}","// Receive diagnostics\n\nimport MetricKit\n\nlet manager = MetricManager()\n\nfor await report in manager.diagnosticReports {\n    processReport(report)\n}","// Send your diagnostic data to the server\n\nimport MetricKit\n\nfor await report in manager.diagnosticReports {\n    let jsonData = try JSONEncoder().encode(report)\n    sendToServer(jsonData)\n}","// Access your diagnostic data\n\nimport MetricKit\n\nfor await report in manager.diagnosticReports {\n    switch report.result {\n    case .crash(let crash):\n        let backtrace = crash.callStackTree\n        let reason = crash.terminationReason\n        let category = crash.terminationCategory\n        processCrash(backtrace: backtrace, reason: reason, category: category)\n    case .hang(let hang):\n        processHangDiagnostic(hang)\n    default: break\n    }\n}","// Receive MetricKit data with states\n\nimport MetricKit\nimport StateReporting\n\nlet domain = StateReportingDomain(\"com.metrickitsample.tabs\")\nlet manager = MetricManager(enabledStateReportingDomains: [domain])\n\n\n// Report transitions throughout the app\n\nlet reporter = StateReporter.reporter(for: domain.rawValue)\nreporter.reportTransition(to: \"Reports\")","// Define custom structured types\n\nimport StateReporting\n\n@ReportableMetadata\nstruct ViewConfiguration {\n    let listSize: String\n    let isSorted: Bool\n}\n\nlet reporter = StateReporter.reporter(\n    for: domain.rawValue,\n    stableMetadata: ViewConfiguration.self\n)\n\nreporter.reportTransition(\n    to: \"Reports\",\n    stableMetadata: ViewConfiguration(listSize: \"large\", isSorted: false)\n)","// Send encoded metric reports to the server\n\nimport MetricKit\n\nfor await report in manager.metricReports {\n    let encoder = JSONEncoder()\n    \n    let formatKey = MetricReport.encodingFormatKey\n    encoder.userInfo[formatKey] = MetricReport.EncodingFormat.byStateReportingDomain\n    \n    let jsonData = try encoder.encode(report)\n    sendToServer(jsonData)\n}"]},"related":[{"id":"388","title":"Find and fix performance issues in your Metal games","gloss":"找出並修復 Metal 遊戲的效能問題","gloss_en":"Find and fix performance issues in your Metal games","category":"graphics","categoryLabel":"圖形與遊戲"},{"id":"101","title":"Keynote","gloss":"主題演講","gloss_en":"Keynote","category":"other","categoryLabel":"其他"},{"id":"102","title":"Platforms State of the Union","gloss":"平台現況報告","gloss_en":"Platforms State of the Union","category":"other","categoryLabel":"其他"},{"id":"111","title":"Keynote (ASL)","gloss":"主題演講(美國手語版)","gloss_en":"Keynote (American Sign Language)","category":"other","categoryLabel":"其他"},{"id":"112","title":"Platforms State of the Union (ASL)","gloss":"平台現況報告（美國手語版）","gloss_en":"Platforms State of the Union (American Sign Language)","category":"other","categoryLabel":"其他"}]}</script>
