<script id="d" type="application/json">{"s":{"id":"223","title":"Live Activities essentials","gloss":"Live Activities 核心要點","category":"swiftui","categoryLabel":"SwiftUI","duration":916,"url":"https://developer.apple.com/videos/play/wwdc2026/223/","takeaway":"用 ActivityKit 從零打造、更新並最佳化 **Live Activity**，涵蓋 Dynamic Island、StandBy、新的 small 樣式與 App Intents 互動。","chapters":[[1,"Introduction"],[113,"Create and update"],[256,"Define initial Live Activity"],[335,"Create each Live Activity view"],[463,"Start and update a Live Activity"],[591,"Optimize"],[633,"Optimize for limited width in the Dynamic Island"],[694,"Extend background color in StandBy"],[750,"Add support for activityFamily small"],[763,"Optimize for small family"],[816,"Add interactivity with App Intents"],[846,"Associate an intent with a button"]],"points":[{"text":"以 `ActivityAttributes` 與 `ContentState` 定義資料，並用 `ActivityConfiguration` 與 **Dynamic Island** 各區域建立 Live Activity 視圖。","hot":false},{"text":"透過 `Activity.request` 啟動、`activity.update` 更新內容，先以 `ActivityAuthorizationInfo` 確認已啟用。","hot":false},{"text":"新增對 **`activityFamily` small** 樣式的支援（`supplementalActivityFamilies([.small])`），可依 `activityFamily` 環境值客製化呈現。","hot":true},{"text":"用 `isDynamicIslandLimitedInWidth` 與 `showsWidgetContainerBackground` 等環境值，最佳化 Dynamic Island 窄版與 **StandBy** 背景。","hot":false},{"text":"以 `LiveActivityIntent` 加入互動，將 intent 綁定到 `Button(intent:)` 直接在 Live Activity 上操作。","hot":false}],"apis":["ActivityKit","ActivityAttributes","ActivityConfiguration","DynamicIsland","WidgetKit","Activity","ActivityContent","LiveActivityIntent","supplementalActivityFamilies","activityFamily"],"audience":"**想加入或精進 Live Activity 與 Dynamic Island** 的 iOS 開發者。","gloss_en":"Live Activities essentials","takeaway_en":"Build, update, and optimize a **Live Activity** from scratch with ActivityKit, covering Dynamic Island, StandBy, the new small style, and App Intents interaction.","points_en":[{"text":"Define data with `ActivityAttributes` and `ContentState`, and build the Live Activity views with `ActivityConfiguration` and the **Dynamic Island** regions.","hot":false},{"text":"Start with `Activity.request` and update content with `activity.update`, after confirming it's enabled via `ActivityAuthorizationInfo`.","hot":false},{"text":"Adds support for the **`activityFamily` small** style (`supplementalActivityFamilies([.small])`), letting you customize presentation based on the `activityFamily` environment value.","hot":true},{"text":"Use environment values like `isDynamicIslandLimitedInWidth` and `showsWidgetContainerBackground` to optimize the narrow Dynamic Island and the **StandBy** background.","hot":false},{"text":"Add interactivity with `LiveActivityIntent`, binding the intent to `Button(intent:)` to act directly on the Live Activity.","hot":false}],"audience_en":"iOS developers **looking to add or refine Live Activities and Dynamic Island**.","code":["// Define initial Live Activity.\n\nimport ActivityKit\nimport Foundation\n\npublic struct DrinkOrderAttributes: ActivityAttributes {\n    let shopName: String\n    let drink: Drink\n    let orderID: UUID\n\n    public struct ContentState: Codable, Hashable {\n        var phase: DrinkOrder.Phase = .waiting\n        var estimatedReadyDate: Date\n        var rating: DrinkOrder.Rating?\n    }\n}","// Create each Live Activity view\n\nimport ActivityKit\nimport SwiftUI\nimport WidgetKit\n\nstruct DrinkOrderLiveActivity: Widget {\n    var body: some WidgetConfiguration {\n        ActivityConfiguration(for: DrinkOrderAttributes.self) { context in\n            ActivityView(context: context)\n        } dynamicIsland: { context in\n            DynamicIsland {\n                DynamicIslandExpandedRegion(.leading) {\n                    ExpandedLeadingView(context: context)\n                }\n                DynamicIslandExpandedRegion(.center) {\n                    ExpandedCenterView(context: context)\n                }\n                DynamicIslandExpandedRegion(.trailing) {\n                    ExpandedTrailingView(context: context)\n                }\n                DynamicIslandExpandedRegion(.bottom) {\n                    ExpandedBottomView(context: context)\n                }\n            } compactLeading: {\n                CompactLeadingView(context: context)\n            } compactTrailing: {\n                CompactTrailingView(context: context)\n            } minimal: {\n                MinimalView(context: context)\n            }\n        }\n    }\n}","// Start a Live Activity\n\nfunc launchLiveActivity(order: DrinkOrder) throws {\n    guard ActivityAuthorizationInfo().areActivitiesEnabled else { return }\n    let attributes = DrinkOrderAttributes(shopName: \"Coffee Shop\", drink: order.drink, orderID: order.id)\n    let estimatedReadyDate = Date.now + (15 * 60)\n    let contentState = DrinkOrderAttributes.ContentState(phase: .waiting, estimatedReadyDate: estimatedReadyDate)\n    let activityContent = ActivityContent(state: contentState, staleDate: nil)\n    let activity = try Activity.request(attributes: attributes, content: activityContent)\n\n}\n\n// Update a Live Activity\n\nawait activity.update(\n    ActivityContent(\n        state: DrinkOrderAttributes.ContentState(\n            phase: .preparing,\n            estimatedReadyDate: estimatedReadyDate\n        ),\n        staleDate: nil\n    )\n)","// Optimize for limited width in the Dynamic Island\n\nstruct CompactTrailingView: View {\n    @Environment(\\.isDynamicIslandLimitedInWidth) var isDynamicIslandLimitedInWidth\n    var context: ActivityViewContext\u003cDrinkOrderAttributes>\n    var body: some View {\n        if isDynamicIslandLimitedInWidth {\n            StepProgressIconView(context: context)\n        } else if context.state.phase.showsTimer {\n            EstimatedReadyView(context: context, font: .system(.body).monospacedDigit())\n                .multilineTextAlignment(.trailing)\n                .frame(maxWidth: maximumTimerLabelWidth)\n        } else {\n            OrderPhaseLabelView(context: context, font: .caption2.bold(), color: .brown)\n                .multilineTextAlignment(.trailing)\n        }\n    }\n}","// Extend background color in StandBy\n\nstruct ActivityView: View {\n\n    @Environment(\\.showsWidgetContainerBackground) var showsWidgetContainerBackground\n    var context: ActivityViewContext\u003cDrinkOrderAttributes>\n\n    var body: some View {\n        DetailView(context: context)\n            .background {\n                if showsWidgetContainerBackground {\n                    LinearGradient.barista\n                }\n            }\n            .activityBackgroundTint(.espresso)\n    }\n}","// Add support for activityFamily small\n\nimport ActivityKit\nimport SwiftUI\nimport WidgetKit\n\nstruct DrinkOrderLiveActivity: Widget {\n    var body: some WidgetConfiguration {\n        ActivityConfiguration(for: DrinkOrderAttributes.self) { context in\n            ActivityView(context: context)\n        } dynamicIsland: { context in\n            DynamicIsland {\n                DynamicIslandExpandedRegion(.leading) {\n                    ExpandedLeadingView(context: context)\n                }\n                DynamicIslandExpandedRegion(.center) {\n                    ExpandedCenterView(context: context)\n                }\n                DynamicIslandExpandedRegion(.trailing) {\n                    ExpandedTrailingView(context: context)\n                }\n                DynamicIslandExpandedRegion(.bottom) {\n                    ExpandedBottomView(context: context)\n                }\n            } compactLeading: {\n                CompactLeadingView(context: context)\n            } compactTrailing: {\n                CompactTrailingView(context: context)\n            } minimal: {\n                MinimalView(context: context)\n            }\n        }\n        .supplementalActivityFamilies([.small])\n    }\n}","// Optimize for small family\n\nstruct ActivityView: View {\n    @Environment(\\.showsWidgetContainerBackground) var showsWidgetContainerBackground\n    @Environment(\\.activityFamily) var activityFamily\n\n    var context: ActivityViewContext\u003cDrinkOrderAttributes>\n\n    var body: some View {\n        contentView\n            .background {\n                if showsWidgetContainerBackground {\n                    LinearGradient.barista\n                }\n            }\n            .activityBackgroundTint(.espresso)\n    }\n\n    @ViewBuilder\n    var contentView: some View {\n        if activityFamily == .small {\n            SmallView(context: context)\n        } else {\n            DetailView(context: context)\n        }\n    }\n}","// Add interactivity with App Intents\n\nstruct RateDrinkIntent: LiveActivityIntent {\n    static var title: LocalizedStringResource = \"Rate Drink\"\n\n    @Parameter(title: \"Order ID\")\n    var orderID: String\n\n    @Parameter(title: \"Positive\")\n    var isPositive: Bool\n\n    func perform() async throws -> some IntentResult {\n        await updateLocalDatastore(rating: isPositive ? .great : .poor, dismissPolicy: .after(.now + 15))\n        return .result()\n    }\n}","// Associate an intent with a button\n\nstruct RatingButtons: View {\n    var context: ActivityViewContext\u003cDrinkOrderAttributes>\n    var body: some View {\n        HStack(spacing: 12) {\n            Button(intent: RateDrinkIntent(\n                orderID: context.attributes.orderID.uuidString, isPositive: false)) {\n                Label(\"Not Good\", systemImage: \"hand.thumbsdown.fill\")\n            }\n            .buttonStyle(RatingButtonStyle(color: .red))\n\n            Button(intent: RateDrinkIntent(\n                orderID: context.attributes.orderID.uuidString, isPositive: true)) {\n                Label(\"Great\", systemImage: \"hand.thumbsup.fill\")\n            }\n            .buttonStyle(RatingButtonStyle(color: .green))\n        }\n    }\n}"]},"related":[{"id":"277","title":"WidgetKit foundations","gloss":"WidgetKit 基礎入門","gloss_en":"WidgetKit foundations","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"269","title":"What’s new in SwiftUI","gloss":"SwiftUI 的新功能","gloss_en":"What's new in SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"271","title":"Code-along: Build powerful drag and drop in SwiftUI","gloss":"程式碼共做：在 SwiftUI 打造強大的拖放功能","gloss_en":"Code-along: Build powerful drag and drop in SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"272","title":"Use SwiftUI with AppKit and UIKit","gloss":"在 AppKit 與 UIKit 中使用 SwiftUI","gloss_en":"Use SwiftUI with AppKit and UIKit","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"275","title":"Code-along: Add persistence with SwiftData","gloss":"程式碼實作：用 SwiftData 加入持久化","gloss_en":"Code-along: Add persistence with SwiftData","category":"swiftui","categoryLabel":"SwiftUI"}]}</script>
