<script id="d" type="application/json">{"s":{"id":"283","title":"Explore enhancements to visionOS object tracking","gloss":"探索 visionOS 物件追蹤的強化功能","category":"visionos","categoryLabel":"visionOS","duration":845,"url":"https://developer.apple.com/videos/play/wwdc2026/283/","takeaway":"visionOS 大幅強化**物件追蹤**，支援高更新率追蹤移動物件，並導入空間配件（spatial accessories）輸入。","chapters":[[0,"Introduction"],[140,"Object tracking"],[230,"Enable high frame rate tracking"],[290,"Extended training mode via command-line"],[325,"Object pose coordinate spaces"],[382,"Implement object tracking in iOS"],[440,"Spatial accessories"],[467,"Creating a spatial accessory"],[708,"Plug-and-play accessories"],[742,"Implementing in your app"],[746,"Discover and connect a spatial accessory"],[783,"Next steps"]],"points":[{"text":"以 `ReferenceObject.Configuration` 開啟 **`highFrameRateTrackingEnabled`**，追蹤移動與手持物件。","hot":true},{"text":"在 Mac 上用命令列 `xrun createml objecttracker` 的**擴充訓練模式（extended，all-angles）**產生 `.referenceobject`。","hot":false},{"text":"用 `coordinateSpace(correction:)` 取得 `.rendered` 或 `.none` 的物件姿態座標，分別對應顯示校正與公制空間。","hot":false},{"text":"物件追蹤也可在 **iOS** 上以 ARKit 實作，用 `detectionObjects`（低更新率）與 `trackingObjects`（高更新率）。","hot":false},{"text":"透過 GameController 的 `GCSpatialAccessory` 與 `AccessoryTrackingProvider` 探索並連接**空間配件**，支援隨插即用與動態更新。","hot":false}],"apis":["ARKit","RealityKit","ReferenceObject","ARReferenceObject","ARObjectAnchor","GCSpatialAccessory","AccessoryTrackingProvider","GameController"],"audience":"**開發 visionOS 空間運算或 AR 物件追蹤、配件互動**的開發者。","gloss_en":"Explore enhancements to visionOS object tracking","takeaway_en":"visionOS significantly enhances **object tracking**, supporting high-frame-rate tracking of moving objects and introducing spatial accessory input.","points_en":[{"text":"Enable **`highFrameRateTrackingEnabled`** via `ReferenceObject.Configuration` to track moving and handheld objects.","hot":true},{"text":"Generate a `.referenceobject` on Mac using the command-line `xrun createml objecttracker` with its **extended (all-angles) training mode**.","hot":false},{"text":"Use `coordinateSpace(correction:)` to get object pose coordinates in `.rendered` or `.none`, corresponding to display correction and metric space respectively.","hot":false},{"text":"Object tracking can also be implemented on **iOS** with ARKit, using `detectionObjects` (low frame rate) and `trackingObjects` (high frame rate).","hot":false},{"text":"Discover and connect **spatial accessories** through GameController's `GCSpatialAccessory` and `AccessoryTrackingProvider`, with support for hot-plugging and dynamic updates.","hot":false}],"audience_en":"Developers **building visionOS spatial computing or AR object tracking and accessory interactions**.","code":["// Enable high frame rate tracking\n\n// Create reference object configuration\nvar configuration = ReferenceObject.Configuration()\nconfiguration.highFrameRateTrackingEnabled = true\n\n// Load the reference object with ARKit API\nlet refObjURL = Bundle.main.url(forResource: \"flashlight\", withExtension: \".referenceobject\")\nlet refObject = try? await ReferenceObject(from: refObjURL!, configuration: configuration)","// Extended training mode on Mac using command-line interface\n\n% xrun createml objecttracker --source flashlight.usdz --output flashlight.referenceobject --training-mode extended --all-angles","// Different object pose spaces\n\n// Obtain anchor transform with display corrections\n\nlet renderingPose = myObjectAnchor.coordinateSpace(correction: .rendered)\n\n// Obtain anchor transform in metric space\n\nlet metricPose = myObjectAnchor.coordinateSpace(correction: .none)","// Implement object tracking in iOS\n\nimport ARKit\nimport RealityKit\n\nclass ObjectTrackingARSessionDelegate: NSObject, ARSessionDelegate {\n        let arView = ARView(frame: .zero)\n        var entities: [UUID: AnchorEntity] = [:]\n\n        func start() throws {\n                let stationaryObject = try ARReferenceObject(archiveURL:\n                        Bundle.main.url(forResource: \"stationary\", withExtension: \"referenceobject\")!)\n                let movingObject = try ARReferenceObject(archiveURL:\n                        Bundle.main.url(forResource: \"moving\", withExtension: \"referenceobject\")!)\n\n                let configuration = ARWorldTrackingConfiguration()\n                configuration.detectionObjects = [stationaryObject]   // Low frame rate\n                configuration.trackingObjects = [movingObject]        // High frame rate\n\n                arView.session.delegate = self\n                arView.session.run(configuration)\n        }\n\n\t\t\t\tfunc session(_ session: ARSession, didAdd anchors: [ARAnchor]) {\n                for case let anchor as ARObjectAnchor in anchors {\n                        let entity = AnchorEntity(anchor: anchor)\n                        entities[anchor.identifier] = entity\n                        arView.scene.addAnchor(entity)\n                }\n        }\n\n        func session(_ session: ARSession, didUpdate anchors: [ARAnchor]) {\n                for case let anchor as ARObjectAnchor in anchors {\n                        entities[anchor.identifier]?.isEnabled = anchor.isTracked\n                }\n        }\n\n        func session(_ session: ARSession, didRemove anchors: [ARAnchor]) {\n                for case let anchor as ARObjectAnchor in anchors {\n                        if let entity = entities.removeValue(forKey: anchor.identifier) {\n                                arView.scene.removeAnchor(entity)\n                        }\n                }\n        }\n}","import ARKit\nimport GameController\n\n// Generic accessory discovery\n\nif let device = GCSpatialAccessory.spatialAccessories.first {\n\n        // Resolves the .referenceaccessory bundle automatically\n        \n        let accessory = try await Accessory(device: device)\n        let provider = AccessoryTrackingProvider(accessories: [accessory])\n        try await arkitSession.run([provider])\n}\n\n// Update tracked accessories without restarting the session                             \n\ntry await provider.updateAccessories([newAccessory])"]},"related":[{"id":"279","title":"Explore advances in RealityKit","gloss":"探索 RealityKit 的最新進展","gloss_en":"Explore advances in RealityKit","category":"visionos","categoryLabel":"visionOS"},{"id":"280","title":"Iterate your spatial scenes faster with Reality Composer Pro 3","gloss":"用 Reality Composer Pro 3 更快迭代空間場景","gloss_en":"Iterate your spatial scenes faster with Reality Composer Pro 3","category":"visionos","categoryLabel":"visionOS"},{"id":"284","title":"Collaborate on structured 3D models in visionOS","gloss":"在 visionOS 中協作操作結構化 3D 模型","gloss_en":"Collaborate on structured 3D models in visionOS","category":"visionos","categoryLabel":"visionOS"},{"id":"286","title":"Use foveated streaming to bring immersive content to visionOS","gloss":"用注視點串流把沉浸式內容帶到 visionOS","gloss_en":"Use foveated streaming to bring immersive content to visionOS","category":"visionos","categoryLabel":"visionOS"},{"id":"287","title":"Build next-generation experiences with visionOS 27","gloss":"用 visionOS 27 打造次世代體驗","gloss_en":"Build next-generation experiences with visionOS 27","category":"visionos","categoryLabel":"visionOS"}]}</script>
