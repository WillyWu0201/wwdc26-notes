<script id="d" type="application/json">{"s":{"id":"295","title":"Validate your App Intents adoption with AppIntentsTesting","gloss":"用 AppIntentsTesting 驗證你的 App Intents","category":"testing","categoryLabel":"測試","duration":1557,"url":"https://developer.apple.com/videos/play/wwdc2026/295/","takeaway":"用全新的 AppIntentsTesting 框架，透過與 Siri、Shortcuts 相同的基礎架構來自動化測試你的 App Intents、entity 查詢、Spotlight 索引與畫面標註。","chapters":[[16,"Introduction"],[121,"Meet CometCal: your first test"],[149,"How AppIntentsTesting works"],[408,"Your first test: execute an intent"],[579,"Testing entity queries"],[745,"Test an entity string query"],[780,"Implement the EntityStringQuery under test"],[829,"Combining multiple intents"],[942,"Chain multiple intents in one test"],[987,"Test-only intents"],[1065,"Make an intent test-only"],[1102,"Testing Spotlight indexing"],[1227,"Test Spotlight indexing"],[1256,"Testing view annotations"],[1353,"Test view annotations"],[1440,"The App Intents testing workflow"],[1519,"Next steps"]],"points":[{"text":"全新的 **AppIntentsTesting** 框架透過 Siri 與 Shortcuts 相同的基礎架構執行測試，用 `IntentDefinitions` 取得並 `run()` 你的 intent。","hot":true},{"text":"可測試 **entity 查詢**（含 `EntityStringQuery` 的 `entities(matching:)`），驗證搜尋結果是否正確。","hot":false},{"text":"支援在單一測試中**串接多個 intent**（如建立後再更新事件），並可用 `isDiscoverable = false` 建立僅供測試的 intent。","hot":false},{"text":"能驗證 **Spotlight 索引**（`spotlightQuery`）與**畫面標註（view annotations）**，搭配 `XCUIApplication` 確認 UI 呈現正確內容。","hot":false}],"apis":["AppIntentsTesting","IntentDefinitions","AppIntent","EntityStringQuery","spotlightQuery","viewAnnotations","XCUIApplication"],"audience":"**已採用或正在採用 App Intents、想為 Siri 與 Shortcuts 整合建立自動化測試的開發者**。","gloss_en":"Validate your App Intents with AppIntentsTesting","takeaway_en":"Use the new AppIntentsTesting framework to automate testing of your App Intents, entity queries, Spotlight indexing, and view annotations through the same infrastructure as Siri and Shortcuts.","points_en":[{"text":"The new **AppIntentsTesting** framework runs tests through the same infrastructure as Siri and Shortcuts, using `IntentDefinitions` to obtain and `run()` your intent.","hot":true},{"text":"You can test **entity queries** (including `EntityStringQuery`'s `entities(matching:)`) to verify that search results are correct.","hot":false},{"text":"Supports **chaining multiple intents** in a single test (such as creating an event and then updating it), and lets you create test-only intents with `isDiscoverable = false`.","hot":false},{"text":"Can validate **Spotlight indexing** (`spotlightQuery`) and **view annotations**, using `XCUIApplication` to confirm the UI presents the correct content.","hot":false}],"audience_en":"**Developers who have adopted or are adopting App Intents and want to build automated tests for their Siri and Shortcuts integration**.","code":["import AppIntentsTesting\n\nfunc testCreateCalendar() async throws {\n    let definitions = IntentDefinitions(bundleIdentifier: \"com.example.apple-samplecode.CometCal\")\n    let createCalendar = definitions.intents[\"CreateCalendarIntent\"]\n    let result = try await createCalendar.makeIntent(\n        name: \"Occupy Saturn\",\n        color: \"red\"\n    ).run()\n    XCTAssertEqual(try result.value.title, \"Occupy Saturn\")\n}","// Testing Entity string queries\nfunc testEventStringQuery() async throws {\n    let results = try await eventEntityDefinition\n        .entities(matching: \"Cosmic Ray\")\n\n    XCTAssertEqual(results.count, 1)\n    XCTAssertEqual(try results[0].title, \"Cosmic Ray Calibration\")\n}","// Updated query implementation\nstruct EventEntityQuery: EntityStringQuery {\n    func entities(for identifiers: [EventEntity.ID]) async throws -> [EventEntity] {\n\n    }\n\n    func suggestedEntities() async throws -> [EventEntity] {\n\n    }\n\n    func entities(matching string: String) async throws -> [EventEntity] {\n        try calendarManager.fetchEvents()\n            .filter { $0.title.localizedCaseInsensitiveContains(string) }\n            .map(\\.entity)\n    }\n}","// Test event creation followed by update\nfunc testCreateAndUpdateEvent() async throws {\n    let createResult = try await createEventDefinition.makeIntent(\n        title: \"Asteroid Dodgeball Practice\",\n        startDate: Date(),\n        isAllDay: false,\n        calendar: \"Deep Space\"\n    ).run()\n\n    XCTAssertEqual(try createResult.value.title, \"Asteroid Dodgeball Practice\")\n\n    let updateResult = try await updateEventDefinition.makeIntent(\n        title: \"Asteroid Dodgeball Rules Overview\",\n        event: createResult.value\n    ).run()\n\n    XCTAssertEqual(try updateResult.value.title, \"Asteroid Dodgeball Rules Overview\")\n}","// Test-only intent: SeedSampleEventsIntent\n#if DEBUG\nstruct SeedSampleEventsIntent: AppIntent {\n    static let isDiscoverable = false\n\n    func perform() async throws -> some IntentResult {\n        // Create known list of events\n        return .result()\n    }\n}\n#endif","// Testing Spotlight indexing\nfunc testNewEventIndexedInSpotlight() async throws {\n\n    let before = try await eventEntityDefinition.spotlightQuery(\"Supernova Viewing Party\")\n    XCTAssertTrue(before.isEmpty, \"Event should not exist in Spotlight yet\")\n\n    // ... Create \"Supernova Viewing Party\" Event\n\n    let after = try await eventEntityDefinition.spotlightQuery(\"Supernova Viewing Party\")\n    XCTAssertEqual(after.count, 1)\n    XCTAssertEqual(try after[0].title, \"Supernova Viewing Party\")\n}","/ Testing view annotations\nfunc testEventViewAnnotation() async throws {\n    try await openEventDefinition.makeIntent(target: \"Morning Launch Briefing\").run()\n\n    // Confirm correct event page\n    let app = XCUIApplication()\n    let title = app.staticTexts[\"Morning Launch Briefing\"]\n    XCTAssertTrue(title.waitForExistence(timeout: 5))\n\n    let annotations = try await eventEntityDefinition.viewAnnotations()\n\n    XCTAssertEqual(annotations.count, 1, \"Expected exactly one view annotation\")\n    XCTAssertEqual(try annotations[0].entity.title, \"Morning Launch Briefing\")\n}"]},"related":[{"id":"240","title":"Build intelligent Siri experiences with App Schemas","gloss":"用 App Schemas 打造智慧 Siri 體驗","gloss_en":"Build intelligent Siri experiences with App Schemas","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"267","title":"Migrate to Swift Testing","gloss":"遷移到 Swift Testing","gloss_en":"Migrate to Swift Testing","category":"testing","categoryLabel":"測試"}]}</script>
