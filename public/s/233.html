<script id="d" type="application/json">{"s":{"id":"233","title":"Explore distributed inference and training with MLX","gloss":"用 MLX 探索分散式推論與訓練","category":"ai","categoryLabel":"AI 與機器學習","duration":1326,"url":"https://developer.apple.com/videos/play/wwdc2026/233/","takeaway":"用 MLX 把推論與微調工作分散到多台 Mac，可執行單機放不下的大型模型。","chapters":[[0,"Introduction"],[129,"Distributed communication"],[272,"Setting up your cluster"],[511,"Hostfile format for a 4-node MLX cluster"],[536,"Generate the cluster hostfile with mlx.distributed_config"],[633,"Distributed inference and fine-tuning"],[664,"Run distributed LLM inference with mlx_lm.chat"],[815,"Model parallelism strategies"],[903,"Run distributed inference with pipeline parallelism"],[953,"Distributed fine-tuning"],[1038,"Run distributed fine-tuning with mlx_lm.lora"],[1114,"CLI, Python, Swift, and C++ APIs"],[1141,"Distributed inference with the MLX LM Python API"],[1171,"Shard a layer with the MLX Python API"],[1187,"All-reduce across devices in Python, Swift, and C++"],[1206,"Standalone distributed sum with the JACCL C++ API"],[1245,"Next steps"]],"points":[{"text":"用 **mlx.distributed_config** 產生叢集 hostfile，並透過 **jaccl** 後端與 **RDMA** 達成高效節點互連。","hot":false},{"text":"以 **mlx.launch** 搭配 **mlx_lm.chat** 在多台 Mac 上跑分散式 LLM 推論，執行單機放不下的大模型。","hot":true},{"text":"支援兩種模型平行策略：預設的**張量平行（tensor parallelism）**與加上 `--pipeline` 的**管線平行（pipeline parallelism）**。","hot":false},{"text":"用 **mlx_lm.lora** 做分散式微調，並依裝置數放大 `--batch-size`。","hot":false},{"text":"提供 **CLI、Python、Swift 與 C++** 多語言 API，包含 **all_sum** 等集合通訊與 **sharded_load** 分片載入。","hot":false}],"apis":["MLX","mlx.distributed_config","mlx.launch","mlx_lm.chat","mlx_lm.lora","mx.distributed.init","mx.distributed.all_sum","sharded_load","shard_linear","JACCL","DistributedGroup"],"audience":"想在**多台 Mac 上擴展大型模型推論與微調**、熟悉 MLX 的機器學習工程師。","gloss_en":"Explore distributed inference and training with MLX","takeaway_en":"Use MLX to distribute inference and fine-tuning across multiple Macs, running large models that won't fit on a single machine.","points_en":[{"text":"Use **mlx.distributed_config** to generate a cluster hostfile, and achieve efficient node interconnect through the **jaccl** backend and **RDMA**.","hot":false},{"text":"Use **mlx.launch** with **mlx_lm.chat** to run distributed LLM inference across multiple Macs, running large models that won't fit on a single machine.","hot":true},{"text":"Supports two model-parallel strategies: the default **tensor parallelism** and **pipeline parallelism** with `--pipeline`.","hot":false},{"text":"Use **mlx_lm.lora** for distributed fine-tuning, scaling up `--batch-size` according to the number of devices.","hot":false},{"text":"Provides multi-language APIs across **CLI, Python, Swift, and C++**, including collective communication like **all_sum** and sharded loading via **sharded_load**.","hot":false}],"audience_en":"Machine learning engineers familiar with MLX who want to **scale large-model inference and fine-tuning across multiple Macs**.","code":["[\n  {\n    \"ssh\": \"m3-ultra-0\",\n    \"ips\": [\"192.168.1.10\"],\n    \"rdma\": [null, \"rdma_en5\", \"rdma_en4\", \"rdma_en3\"]\n  },\n  {\n    \"ssh\": \"m3-ultra-1\",\n    \"ips\": [\"192.168.1.11\"],\n    \"rdma\": [\"rdma_en5\", null, \"rdma_en4\", \"rdma_en3\"]\n  },\n  {\n    \"ssh\": \"m3-ultra-2\",\n    \"ips\": [\"192.168.1.12\"],\n    \"rdma\": [\"rdma_en5\", \"rdma_en4\", null, \"rdma_en3\"]\n  },\n  {\n    \"ssh\": \"m3-ultra-3\",\n    \"ips\": [\"192.168.1.13\"],\n    \"rdma\": [\"rdma_en5\", \"rdma_en4\", \"rdma_en3\", null]\n  }\n]","mlx.distributed_config \\\n    --hosts m3-ultra-0,m3-ultra-1,m3-ultra-2,m3-ultra-3 \\\n    --output \"m3-ultra-jaccl.json\" \\\n    --env MLX_METAL_FAST_SYNCH=1 \\\n    --auto-setup \\\n    --backend jaccl","# Single-device LLM inference\nmlx_lm.chat --model \"Qwen/Qwen3.6-27B\" --max-tokens 2048\n\n# Distributed LLM inference across the cluster\nmlx.launch --hostfile \"m3-ultra-jaccl.json\" -- \\\n    /remote/path/to/mlx_lm.chat --model \"Qwen/Qwen3.6-27B\" --max-tokens 2048","# Tensor parallelism (default)\nmlx.launch --hostfile \"m3-ultra-jaccl.json\" -- \\\n    /remote/path/to/mlx_lm.chat --model \"moonshotai/Kimi-K2.6\" \\\n                                 --max-tokens 2048\n\n# Pipeline parallelism — append --pipeline flag\nmlx.launch --hostfile \"m3-ultra-jaccl.json\" -- \\\n    /remote/path/to/mlx_lm.chat --model \"moonshotai/Kimi-K2.6\" \\\n                                 --max-tokens 2048 \\\n                                 --pipeline","# Single-device fine-tuning\nmlx_lm.lora --model \"Qwen/Qwen3.5-9B\" \\\n             --data \"mlx-community/wikisql\" \\\n             --train --batch-size 4\n\n# Distributed fine-tuning (scale --batch-size by number of devices)\nmlx.launch --hostfile \"hostfile.json\" -- \\\n    /remote/path/to/mlx_lm.lora --model \"Qwen/Qwen3.5-9B\" \\\n                                  --data \"mlx-community/wikisql\" \\\n                                  --train --batch-size 16","import mlx.core as mx\nfrom mlx_lm import stream_generate\nfrom mlx_lm.utils import sharded_load\n\n# Initialise distributed backend\ngroup = mx.distributed.init(strict=True, backend=\"jaccl\")\n# Define parallelism\ntensor_group, pipeline_group = group, None\n\n# Shard the model\nmodel, tokenizer = sharded_load(\"moonshotai/Kimi-K2.6\", pipeline_group, tensor_group)\nfor response in stream_generate(model, tokenizer, prompt, max_tokens=1024):\n    if group.rank() == 0:\n        print(response.text, end=\"\", flush=True)","import mlx.core as mx\nimport mlx.nn as nn\n\n# Initialise distributed backend\ngroup = mx.distributed.init(strict=True, backend=\"jaccl\")\n\n# Define layer and shard it column-wise\nlayer = nn.Linear(1024, 1024)\nsharded_layer = nn.layers.distributed.shard_linear(\n    layer, strategy=\"all-to-sharded\", group=group\n)\ndata = mx.random.normal((1, 1, 1024))\noutput = sharded_layer(data)\nmx.eval(output)","# Python\nimport mlx.core as mx\nworld = mx.distributed.init(strict=True, backend=\"jaccl\")\ndata = mx.full((4,), float(world.rank()), dtype=mx.float32)\nresult = mx.distributed.all_sum(data, group=world)\nmx.eval(result)\n\n# Swift\nlet group = try DistributedGroup(strict: .ring)\nlet data = rank == 0\n    ? MLXArray(converting: [1.0, 2.0, 3.0])\n    : MLXArray(converting: [5.0, 6.0, 7.0])\nlet result = try group.allSum(data)\n\n// C++\nnamespace mx = mlx::core;\nauto world = mx::distributed::init(/* strict */ true, \"jaccl\");\nmx::array data = mx::full({4}, static_cast\u003cfloat>(world.rank()), mx::float32);\nmx::array result = mx::distributed::all_sum(data, world);\nmx::eval(result);","#include \u003cjaccl/jaccl.h>\n#include \u003ciostream>\n\nint main() {\n    // Initialize JACCL group\n    auto group = jaccl::init();\n    std::cout \u003c\u003c \"Rank \" \u003c\u003c group->rank() \u003c\u003c \" of \" \u003c\u003c group->size() \u003c\u003c std::endl;\n    // Perform all-reduce sum\n    float data[10] = {1.0f, 2.0f, 3.0f, 4.0f, 5.0f, 6.0f, 7.0f, 8.0f, 9.0f, 10.0f};\n    float output[10];\n    group->all_sum(data, output, sizeof(data), jaccl::Float32);\n    std::cout \u003c\u003c \"Result: \" \u003c\u003c output[0] \u003c\u003c std::endl;\n    return 0;\n}"]},"related":[{"id":"232","title":"Run local agentic AI on the Mac using MLX","gloss":"用 MLX 在 Mac 上執行本機 agentic AI","gloss_en":"Run local agentic AI on the Mac using MLX","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"328","title":"Explore numerical computing in Swift with MLX","gloss":"用 MLX 探索 Swift 的數值計算","gloss_en":"Explore numerical computing in Swift with MLX","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"382","title":"Inside Apple Intelligence and Xcode: Special Presentation","gloss":"深入 Apple Intelligence 與 Xcode：特別發表","gloss_en":"Inside Apple Intelligence and Xcode: Special Presentation","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"121","title":"Announcing Apple’s next big step for Siri and iPhone","gloss":"宣布 Apple 為 Siri 與 iPhone 邁出的下一大步","gloss_en":"Announcing Apple's next big step for Siri and iPhone","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"227","title":"Create UI prototypes using agents in Xcode","gloss":"在 Xcode 用代理人打造 UI 原型","gloss_en":"Prototype UI with agents in Xcode","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
