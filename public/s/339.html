<script id="d" type="application/json">{"s":{"id":"339","title":"Bring an LLM provider to the Foundation Models framework","gloss":"把 LLM 供應商接入 Foundation Models 框架","category":"ai","categoryLabel":"AI 與機器學習","duration":1241,"url":"https://developer.apple.com/videos/play/wwdc2026/339/","takeaway":"實作 LanguageModel 與 LanguageModelExecutor，把自家或開源 LLM 接入 Foundation Models，串流 token、對應 Transcript、處理錯誤並支援自訂段落與伺服器端工具。","chapters":[[0,"Introduction"],[120,"Choose a language model"],[217,"Packaging"],[226,"Configure Package.swift for your model package"],[288,"Protocol"],[296,"LanguageModel and LanguageModelExecutor protocols"],[385,"Implement LanguageModel and Executor conformances"],[448,"Manage model resources with prewarm and respond"],[540,"Map Transcript entries to model messages"],[642,"Read generation and context options from the request"],[707,"Stream tokens and metadata through the channel"],[813,"Honor the developer's intent or throw"],[837,"Built-in errors that any model can throw"],[854,"Handle errors from your model executor"],[890,"Authentication"],[951,"Customization"],[968,"Attach custom metadata to responses"],[1025,"Define and use custom Transcript segments"],[1089,"Implement server-side tools in your model"],[1187,"Next steps"]],"points":[{"text":"可選擇多種模型來源：on-device、**Private Cloud Compute**、Core AI 或從 HuggingFace 來的開源 **MLX** 模型。","hot":false},{"text":"透過實作 **LanguageModel** 與 **LanguageModelExecutor** 協定，把新模型接入 Foundation Models 框架。","hot":true},{"text":"以 **prewarm／respond** 管理模型資源，並把 **Transcript** 條目對應成模型訊息。","hot":false},{"text":"透過 channel **串流 token 與 metadata**，回報用量；無法滿足需求時拋出 **LanguageModelError**。","hot":false},{"text":"支援**自訂 Transcript 段落**與**伺服器端工具**（如 web search），擴充回應內容。","hot":false}],"apis":["FoundationModels","LanguageModel","LanguageModelExecutor","LanguageModelSession","SystemLanguageModel","MLXLanguageModel","Transcript","LanguageModelError","Transcript.CustomSegment"],"audience":"**想把自家或第三方 LLM 整合進 Apple Foundation Models 框架的開發者與模型供應商**。","gloss_en":"Bring an LLM provider to the Foundation Models framework","takeaway_en":"Implement LanguageModel and LanguageModelExecutor to bring your own or open-source LLMs into Foundation Models, streaming tokens, mapping the Transcript, handling errors, and supporting custom segments and server-side tools.","points_en":[{"text":"Choose from multiple model sources: on-device, **Private Cloud Compute**, Core AI, or open-source **MLX** models from HuggingFace.","hot":false},{"text":"Bring new models into the Foundation Models framework by implementing the **LanguageModel** and **LanguageModelExecutor** protocols.","hot":true},{"text":"Manage model resources with **prewarm / respond**, and map **Transcript** entries into model messages.","hot":false},{"text":"**Stream tokens and metadata** through a channel and report usage; throw a **LanguageModelError** when a request can't be satisfied.","hot":false},{"text":"Support **custom Transcript segments** and **server-side tools** (such as web search) to extend response content.","hot":false}],"audience_en":"**Developers and model providers who want to integrate their own or third-party LLMs into Apple's Foundation Models framework**.","code":["import FoundationModels\nimport MLXFoundationModels\n\n// On-device Apple Foundation Model\nlet model = SystemLanguageModel()\n\n// Private Cloud Compute model\n// let model = PrivateCloudComputeLanguageModel()\n\n// Custom Core AI model\n// let model = try await CoreAILanguageModel(resourcesAt: modelURL)\n\n// Open-source MLX model from HuggingFace\n// let model = MLXLanguageModel(modelID: \"mlx-community/my-model\")\n\nlet session = LanguageModelSession(model: model)\nlet response = try await session.respond(to: \"...\")\nprint(response.content)","// Package.swift\n\nlet package = Package(\n    name: \"MyModel\",\n    platforms: [\n        .macOS(.v27), .iOS(.v27), .visionOS(.v27), .watchOS(.v27)\n    ],\n    products: [\n        .library(name: \"MyModel\", targets: [\"MyModel\"])\n    ],\n    dependencies: [\n        .package(url: \"...\", .upToNextMinor(from: \"1.0.0\"))\n    ],\n    targets: [\n        .target(name: \"MyModelRuntime\"),\n        // public: LanguageModel conformance\n        .target(name: \"MyModel\", dependencies: [\"MyModelRuntime\"]),\n        .testTarget(name: \"MyModelTests\", dependencies: [\"MyModel\"])\n    ]\n)","// LanguageModel protocol\n\npublic protocol LanguageModel: Sendable {\n    var capabilities: LanguageModelCapabilities { get }\n    var executorConfiguration: Executor.Configuration { get }\n}\n\n// LanguageModelExecutor protocol\n\npublic protocol LanguageModelExecutor: Sendable {\n    init(configuration: Configuration) throws\n    func prewarm(model: Model, transcript: Transcript)\n    func respond(\n        to request: LanguageModelExecutorGenerationRequest,\n        model: Model,\n        streamingInto channel: LanguageModelExecutorGenerationChannel\n    ) async throws\n}","// LanguageModel conformance\npublic struct MyLanguageModel: LanguageModel {\n    typealias Executor = MyLanguageModelExecutor\n\n    public var capabilities: LanguageModelCapabilities {\n        LanguageModelCapabilities(capabilities: [\n            .toolCalling, .guidedGeneration, .reasoning\n        ])\n    }\n\n    public var executorConfiguration: Executor.Configuration {\n        Executor.Configuration(/* ... */)\n    }\n}\n\n// Executor conformance\npublic struct MyLanguageModelExecutor: LanguageModelExecutor {\n    public typealias Model = MyLanguageModel\n\n    public struct Configuration: Hashable, Sendable { /* ... */ }\n\n    public init(configuration: Configuration) throws { /* ... */ }\n\n    public func respond(\n        to request: LanguageModelExecutorGenerationRequest,\n        model: MyLanguageModel,\n        streamingInto channel: LanguageModelExecutorGenerationChannel\n    ) async throws { /* ... */ }\n}","// One approach to managing resources\n\nstruct MyLanguageModelExecutor: LanguageModelExecutor {\n\n    private mutating func loadModelIfNeeded() throws -> LoadedWeights {\n        let weights = try loadedModel ?? loadWeights()\n        loadedModel = weights\n        return weights\n    }\n\n    func prewarm(transcript: Transcript) {\n        loadedModel = try? loadModelIfNeeded()\n    }\n\n    func respond( ... ) async throws {\n        let weights = try loadModelIfNeeded()\n        // ...generate with 'weights'...\n    }\n}","// Transcript entries\n\nlet transcript = Transcript(entries: [\n    .instructions( ... ),  // \"You are a helpful assistant\"\n\n    .prompt( ... ),        // \"What's the weather in Pittsburgh?\"\n    .toolCalls( ... ),     // getWeather(location: \"Pittsburgh\")\n    .toolOutput( ... ),    // 65°F, sunny\n    .response( ... ),      // \"It's 65°F and sunny in Pittsburgh\"\n\n    .prompt( ... ),        // \"What's the address of Apple Park?\"\n    .response( ... ),      // \"One Apple Park Way, Cupertino, CA 95014\"\n])","// Parse generation and context options\n\nfunc respond(\n    to request: LanguageModelExecutorGenerationRequest,\n    model: MyLanguageModel,\n    streamingInto channel: LanguageModelExecutorGenerationChannel\n) async throws {\n    let reasoningLevel = request.contextOptions.reasoningLevel\n    let temperature = request.generationOptions.temperature\n    let maxTokens = request.generationOptions.maximumResponseTokens\n}","// Streaming text tokens\n\nfunc respond( ... ) async throws {\n    // 1. Report metadata\n    await channel.send(.response(action: .updateMetadata([\n        \"modelID\": \"my-model-2026-06-08\",\n        \"requestID\": request.id.uuidString\n    ])))\n    // 2. Report prompt token usage before generating\n    await channel.send(.response(action: .updateUsage(\n        input: .init(totalTokenCount: promptTokens, cachedTokenCount: cachedTokens),\n        output: .init(totalTokenCount: 0, reasoningTokenCount: 0)\n    )))\n    // 3. Stream text deltas as the model generates\n    for try await token in tokens {\n        await channel.send(.response(action: .appendText(token)))\n    }\n}","// Honor the developer's intention where possible\n\n// The developer set sampling: .greedy, but our service only takes temperature\nif request.generationOptions.sampling?.kind == .greedy {\n    serviceRequest.temperature = 0\n}\n\n// Otherwise, throw an error\n\n// The token budget is too small to satisfy the schema\nif let schema = request.schema,\n   let budget = request.generationOptions.maximumResponseTokens,\n   budget \u003c minimumTokens(for: schema) {\n    throw LanguageModelError.unsupportedCapability(\n        .init(\n            capability: .guidedGeneration,\n            debugDescription: \"Token budget too small to satisfy this schema.\"\n        )\n    )\n}","// Built-in errors that any model can throw\n\npublic enum LanguageModelError: LocalizedError, CustomDebugStringConvertible {\n    // Transcript grew past the model's context window. Trim entries and retry.\n    case contextSizeExceeded(     )\n    // Too many requests in a short window. Space them out or reduce load.\n    case rateLimited(     )\n    // Model declined to answer. Fall back to a message of your choosing.\n    case refusal(     )\n    // Safety guardrails tripped on the prompt or the response.\n    case guardrailViolation(     )\n    // Model lacks a feature you used, such as guided generation or tools.\n    case unsupportedCapability(     )\n    // Prompt contains content the model can't process (bad files, unknown formats).\n    case unsupportedTranscriptContent(     )\n    // A generation guide (e.g., a regex pattern) isn't supported by this model.\n    case unsupportedGenerationGuide(     )\n    // Prompt asked for output in a language or locale the model doesn't support.\n    case unsupportedLanguageOrLocale(     )\n    // Request timed out before the model produced a response.\n    case timeout(     )\n}","// Custom errors\n\npublic enum MyModelError: Error, LocalizedError {\n    // User hit monthly token limit. Prompt upgrade or wait for reset.\n    case exceededSubscriptionTierLimit\n    // Model variant isn't enabled on this account.\n    case modelNotProvisioned\n    // Billing or policy review locked this account.\n    case accountSuspended\n\n    public var errorDescription: String? {\n        switch self {\n        case .exceededSubscriptionTierLimit:\n            String(localized: \"Your plan limit has been reached.\")\n        // ...\n        }\n    }\n}","// Attach service-specific performance metadata\n\nlet elapsed = Date().timeIntervalSince(startTime)\nlet tokensPerSecond = Double(tokenCount) / elapsed\nlet timeToFirstToken = firstTokenTime?.timeIntervalSince(startTime) ?? 0\n\nawait channel.send(.metadataUpdate([\n    \"tokensPerSecond\": tokensPerSecond,\n    \"timeToFirstToken\": timeToFirstToken\n]))"]},"related":[{"id":"241","title":"What’s new in the Foundation Models framework","gloss":"Foundation Models 框架的新功能","gloss_en":"What's new in the Foundation Models framework","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"319","title":"Build with the new Apple Foundation Model on Private Cloud Compute","gloss":"在 Private Cloud Compute 上使用全新 Apple Foundation Model 開發","gloss_en":"Build with the new Apple Foundation Model on Private Cloud Compute","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"242","title":"Build agentic app experiences with the Foundation Models framework","gloss":"用 Foundation Models 框架打造 agentic App 體驗","gloss_en":"Build agentic app experiences with Foundation Models","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"246","title":"LLM search using Core Spotlight","gloss":"使用 Core Spotlight 的 LLM 搜尋","gloss_en":"LLM search using Core Spotlight","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"326","title":"Integrate on-device AI models into your app using Core AI","gloss":"用 Core AI 把裝置端 AI 模型整合進你的 App","gloss_en":"Integrate on-device AI models with Core AI","category":"ai","categoryLabel":"AI 與機器學習"}]}</scri
