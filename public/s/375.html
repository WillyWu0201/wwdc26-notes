<script id="d" type="application/json">{"s":{"id":"375","title":"Create high-quality images using Image Playground","gloss":"用 Image Playground 產生高品質影像","category":"ai","categoryLabel":"AI 與機器學習","duration":851,"url":"https://developer.apple.com/videos/play/wwdc2026/375/","takeaway":"用 **Image Playground** 在 App 中產生高品質影像，新模型運行於 Private Cloud Compute，並可透過 concepts、參考相片與樣式客製化。","chapters":[[0,"Introduction"],[123,"Capabilities"],[302,"Adopt Image Playground"],[328,"Adopt Image Playground in SwiftUI"],[339,"Add Image Playground sheet with binding to @State"],[389,"Seeding the sheet with context from your card"],[431,"Starting from a reference photo"],[462,"Providing a visual suggestion using a drawing"],[486,"Adopt Image Playground in UIKit or AppKit"],[509,"Options"],[542,"Size Specification"],[579,"Styles"],[627,"External Provider Style"],[662,"Generating an expressive icon for the card thumbnail"],[721,"Disabling personalization when it doesn't fit your context"],[735,"Availability"],[752,"Supports image generation"]],"points":[{"text":"新的生成式模型運行於 **Private Cloud Compute**，可產出更高品質的影像。","hot":true},{"text":"在 SwiftUI 用 **`imagePlaygroundSheet`** 綁定 `@State` 呈現；UIKit／AppKit 則用 `ImagePlaygroundViewController`。","hot":false},{"text":"用 `ImagePlaygroundConcept`（`.text`、`.extracted`、`.drawing`）與 `sourceImage` 以情境、參考相片或塗鴉引導生成。","hot":false},{"text":"以 `ImagePlaygroundOptions` 設定尺寸（`sizeSpecification`）與樣式（`imagePlaygroundGenerationStyle`，含 `.emoji`、`.externalProvider`），並可關閉個人化。","hot":false},{"text":"用 `@Environment(\\.supportsImageGeneration)` 檢查裝置是否支援影像生成，再決定提供哪種 UI。","hot":false}],"apis":["ImagePlayground","imagePlaygroundSheet","ImagePlaygroundConcept","ImagePlaygroundOptions","ImagePlaygroundViewController","imagePlaygroundGenerationStyle","supportsImageGeneration","PKDrawing"],"audience":"**想在 App 中加入生成式影像建立功能**的 SwiftUI 或 UIKit 開發者。","gloss_en":"Create high-quality images using Image Playground","takeaway_en":"Use **Image Playground** to create high-quality images in und = true\n    }\n    .imagePlaygroundSheet(\n        isPresented: $showingPlayground,\n        concepts: concepts,\n        onCompletion: { url in\n            var updated = card\n            store.saveImage(url, for: &updated)\n        }\n    )\n}","// Starting from a reference photo\n\n@State private var sourceImage: Image?\n\nvar body: some View {\n    Button(\"Create image\") {\n        showingPlayground = true\n    }\n    .imagePlaygroundSheet(\n        isPresented: $showingPlayground,\n        concepts: concepts,\n        sourceImage: sourceImage,\n        onCompletion: { url in\n            var updated = card\n            store.saveImage(url, for: &updated)\n        }\n    )\n}","// Providing a visual suggestion using a drawing\n\n@State private var drawing = PKDrawing()\n\nvar concepts: [ImagePlaygroundConcept] {\n    var result: [ImagePlaygroundConcept] = [\n        .text(card.theme),\n        .extracted(from: card.message)\n    ]\n    if !drawing.strokes.isEmpty {\n        result.append(.drawing(drawing))\n    }\n    return result\n}","// Adopt Image Playground in UIKit or AppKit\n\nfunc presentViewController() {\n    let viewController = ImagePlaygroundViewController()\n    viewController.concepts = [\n        .text(card.theme),\n        .extracted(from: card.message)\n    ]\n    viewController.delegate = self\n    present(viewController, animated: true)\n}\n\nfunc imagePlaygroundViewController(\n    _ viewController: ImagePlaygroundViewController,\n    didCreateImageAt url: URL\n) {\n    var updated = card\n    store.saveImage(url, for: &updated)\n    dismiss(animated: true)\n}","// Size Specification\n\nvar options: ImagePlaygroundOptions {\n    var options = ImagePlaygroundOptions()\n    options.sizeSpecification = .closest(to: card.format.size)\n    return options\n}\n\nvar body: some View {\n    Button(\"Create image\") { showingPlayground = true }\n        .imagePlaygroundSheet(\n            isPresented: $showingPlayground,\n            concepts: concepts,\n            onCompletion: { url in\n                var updated = card\n                store.saveImage(url, for: &updated)\n            }\n        )\n        .imagePlaygroundOptions(options)\n}","// Styles\n\nvar options: ImagePlaygroundOptions {\n    var options = ImagePlaygroundOptions()\n    options.sizeSpecification = .closest(to: card.format.size)\n    return options\n}\n\nvar body: some View {\n    Button(\"Create image\") { showingPlayground = true }\n        .imagePlaygroundSheet(\n            isPresented: $showingPlayground,\n            concepts: concepts,\n            onCompletion: { url in\n                var updated = card\n                store.saveImage(url, for: &updated)\n            }\n        )\n        .imagePlaygroundOptions(options)\n        .imagePlaygroundGenerationStyle(\n            pendingStylePreset.defaultStyle,\n            in: pendingStylePreset.allowedStyles\n        )\n}","// External Provider Style\n\nvar options: ImagePlaygroundOptions {\n    var options = ImagePlaygroundOptions()\n    options.sizeSpecification = .closest(to: card.format.size)\n    return options\n}\n\nvar body: some View {\n    Button(\"Create image\") { showingPlayground = true }\n        .imagePlaygroundSheet(\n            isPresented: $showingPlayground,\n            concepts: concepts,\n            onCompletion: { url in\n                var updated = card\n                store.saveImage(url, for: &updated)\n            }\n        )\n        .imagePlaygroundOptions(options)\n        .imagePlaygroundGenerationStyle(\n            pendingStylePreset.defaultStyle,\n            in: pendingStylePreset.allowedStyles + [.externalProvider]\n        )\n}","// Generating an expressive icon for the card thumbnail\n\n@State private var showingIconPlayground = false\n\nvar body: some View {\n    Button(\"Create icon\") {\n        showingIconPlayground = true\n    }\n    Color.clear\n        .imagePlaygroundSheet(\n            isPresented: $showingIconPlayground,\n            concepts: concepts,\n            onCompletion: { _ in\n            } ,\n            onAdaptiveImageGlyphCreation: { glyph in\n                var updatedCard = card\n                store.saveIcon(glyph, for: &updatedCard)\n            }\n        )\n        .imagePlaygroundGenerationStyle(.emoji, in: [.emoji])\n}","// Disabling personalization when it doesn't fit your context\n\nvar options: ImagePlaygroundOptions {\n    var options = ImagePlaygroundOptions()\n    options.sizeSpecification = .closest(to: card.format.size)\n    options.personalization = .disabled\n    return options\n}","// Supports image generation\n\n@Environment(\\.supportsImageGeneration)\nprivate var supportsImageGeneration\n\nvar body: some View {\n    NavigationLink(card.recipient) {\n        if supportsImageGeneration {\n            CardEditorView(card: card)\n        }γelse {\n            CardPickerView(card: card)\n        }\n    }\n}"]},"related":[{"id":"372","title":"Unwrap PaperKit","gloss":"深入了解 PaperKit","gloss_en":"Unwrap PaperKit","category":"uikit","categoryLabel":"UIKit"},{"id":"121","title":"Announcing Apple’s next big step for Siri and iPhone","gloss":"宣布 Apple 為 Siri 與 iPhone 邁出的下一大步","gloss_en":"Announcing Apple's next big step for Siri and iPhone","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"227","title":"Create UI prototypes using agents in Xcode","gloss":"在 Xcode 用代理人打造 UI 原型","gloss_en":"Prototype UI with agents in Xcode","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"232","title":"Run local agentic AI on the Mac using MLX","gloss":"用 MLX 在 Mac 上執行本機 agentic AI","gloss_en":"Run local agentic AI on the Mac using MLX","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"233","title":"Explore distributed inference and training with MLX","gloss":"用 MLX 探索分散式推論與訓練","gloss_en":"Explore distributed inference and training with MLX","category":"ai","categoryLabel":"AI 與機器學習"}]}</script>
