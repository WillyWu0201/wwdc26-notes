<script id="d" type="application/json">{"s":{"id":"325","title":"Dive into Core AI model authoring and optimization","gloss":"深入 Core AI 模型編寫與最佳化","category":"ai","categoryLabel":"AI 與機器學習","duration":1761,"url":"https://developer.apple.com/videos/play/wwdc2026/325/","takeaway":"用全新的 Core AI 框架走完自訂模型部署流程:從 PyTorch 轉換、最佳化、除錯,到寫自訂 Metal kernel 與重新編寫模型,部署到 Apple silicon。","chapters":[[0,"Introduction"],[109,"Models and skills"],[207,"Python workflow"],[242,"Convert, optimize and run inference with Core AI"],[354,"Model optimization"],[640,"Core AI Debugger"],[1167,"Advanced authoring"],[1243,"Custom Metal kernels"],[1272,"Define a SiLU Metal kernel with PyTorch reference"],[1329,"Use a custom Metal kernel and convert with TorchConverter"],[1381,"Model re-authoring"],[1726,"Next steps"]],"points":[{"text":"全新 **Core AI 框架**提供 Apple silicon 上**完整的自訂模型部署工作流**。","hot":true},{"text":"**Python 工作流**:用 torch.export 匯出模型,再以 coreai_torch.TorchConverter 轉成 Core AI 並 optimize()、存成 .aimodel。","hot":false},{"text":"在裝置端以 **AIModel.load 載入 .aimodel**、load_function 取得函式並執行 inference(NDArray 輸入)。","hot":false},{"text":"提供 **Core AI Debugger** 協助檢視與診斷模型,並有 model optimization 段落講最佳化技巧。","hot":false},{"text":"進階可寫**自訂 Metal kernel(TorchMetalKernel,如 fused SiLU)**,經 register_custom_kernels 把 MSL 整合進 asset,並支援 model re-authoring。","hot":false}],"apis":["Core AI","coreai","coreai_torch","TorchConverter","AIModel","NDArray","torch.export","TorchMetalKernel","MetalParameter","Metal"],"audience":"**要把自訂機器學習模型最佳化並部署到 Apple silicon、熟悉 PyTorch 的 ML 工程師。**","gloss_en":"Dive into Core AI model authoring and optimization","takeaway_en":"Walk through the full custom model deployment workflow with the new Core AI framework: from PyTorch conversion, optimization, and debugging to writing custom Metal kernels and re-authoring models, deployed to Apple silicon.","points_en":[{"text":"The new **Core AI framework** provides a **complete custom model deployment workflow** on Apple silicon.","hot":true},{"text":"**Python workflow**: export the model with torch.export, then convert it to Core AI with coreai_torch.TorchConverter, optimize(), and save as .aimodel.","hot":false},{"text":"On device, **load the .aimodel with AIModel.load**, get a function with load_function, and run inference (with NDArray inputs).","hot":false},{"text":"Provides the **Core AI Debugger** to help inspect and diagnose models, plus a model optimization section covering optimization techniques.","hot":false},{"text":"For advanced cases, write a **custom Metal kernel (TorchMetalKernel, such as a fused SiLU)**, integrate the MSL into the asset via register_custom_kernels, and support model re-authoring.","hot":false}],"audience_en":"**ML engineers familiar with PyTorch who need to optimize and deploy custom machine learning models to Apple silicon.**","code":["import torch\nimport torch.nn as nn\n\n# Define a simple model\nclass MLP(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.fc1 = nn.Linear(256, 512)\n        self.fc2 = nn.Linear(512, 10)\n\n    def forward(self, x):\n        return self.fc2(torch.relu(self.fc1(x)))\n\n# Export with torch.export\nmodel = MLP().eval()\nexample_input = (torch.randn(1, 256),)\nexported_program = torch.export.export(model, example_input)","import coreai\nimport coreai_torch\nfrom coreai.runtime import NDArray\n\n# Convert to Core AI\nconverter = coreai_torch.TorchConverter()\nconverter.add_exported_program(\n    exported_program,\n    input_names=[\"features\"], output_names=[\"logits\"])\ncore_ai_program = converter.to_coreai()\n\n# Optimize and save to .aimodel\ncore_ai_program.optimize()\nasset = core_ai_program.save_asset(\"mlp.aimodel\")\n\n# Run inference\nspecialized_model = await AIModel.load(\"mlp.aimodel\")\nspecialized_function = specialized_model.load_function(\"main\")\nresult = await specialized_function({\"features\": NDArray(example[0].numpy())})","import torch\nfrom coreai_torch.dsl import TorchMetalKernel, MetalParameter\n\ndef silu_torch(x):\n    return x * torch.sigmoid(x)\n\nSILU_MSL = \"\"\"\nfloat val = float(x[gid]);\nfloat sig = 1.0f / (1.0f + exp(-val));\ny[gid] = TYPE(val * sig);\n\"\"\"\n\nsilu_kernel = TorchMetalKernel(\n    name=\"fused_silu\",\n    input_names=[\"x\"],\n    result_names=[\"y\"],\n    src=SILU_MSL,\n    torch_defn=silu_torch,\n    metal_params=[MetalParameter(\"gid\", \"uint\", \"thread_position_in_grid\")],\n    template_dtypes={\"x\": \"TYPE\"},\n)","class MyModel(torch.nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.linear = torch.nn.Linear(256, 256)\n\n    def forward(self, x):\n        h = self.linear(x)\n        n = h.numel()\n        return silu_kernel(\n            h,\n            threads_per_grid_size=(n, 1, 1),\n            threads_per_thread_group=(min(n, 256), 1, 1),\n            result_shapes=[h.shape],\n        )\n\nexported_program = torch.export.export(MyModel(), (torch.randn(1, 256),))\n\nconverter = coreai_torch.TorchConverter()\nconverter.register_custom_kernels([silu_kernel])\nconverter.add_exported_program(exported_program,\n                               input_names=[\"x\"], output_names=[\"y\"])\ndeployable = converter.to_coreai()  # MSL integrated into asset"]},"related":[{"id":"324","title":"Meet Core AI","gloss":"認識 Core AI","gloss_en":"Meet Core AI","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"326","title":"Integrate on-device AI models into your app using Core AI","gloss":"用 Core AI 把裝置端 AI 模型整合進你的 App","gloss_en":"Integrate on-device AI models with Core AI","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"382","title":"Inside Apple Intelligence and Xcode: Special Presentation","gloss":"深入 Apple Intelligence 與 Xcode：特別發表","gloss_en":"Inside Apple Intelligence and Xcode: Special Presentation","category":"ai","categoryLabel":"AI 與機器學習"},{"id":"322","title":"Compose advanced graphics effects with SwiftUI","gloss":"用 SwiftUI 組合進階圖形效果","gloss_en":"Compose advanced graphics effects with SwiftUI","category":"swiftui","categoryLabel":"SwiftUI"},{"id":"330","title":"Optimize custom machine learning operations with Metal tensors","gloss":"用 Metal tensors 最佳化自訂機器學習運算","gloss_en":"Optimize custom machine learning operations with Metal tensors","category":"graphics","categoryLabel":"圖形與遊戲"}]}</script>
