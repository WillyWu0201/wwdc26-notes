) {\n        // Handle the exception\n    }\n}"]},"related":[{"id":"210","title":"What’s new in Apple In-App Purchase","gloss":"Apple App 內購買的新功能","gloss_en":"What's new in Apple In-App Purchase","category":"appstore","categoryLabel":"App Store"},{"id":"309","title":"Explore Retention Messaging in App Store Connect","gloss":"探索 App Store Connect 的挽留訊息","gloss_en":"Explore Retention Messaging in App Store Connect","category":"appstore","categoryLabel":"App Store"},{"id":"391","title":"Offer subscriptions to groups and organizations","gloss":"向群組與組織提供訂閱","gloss_en":"Offer subscriptions to groups and organizations","category":"appstore","categoryLabel":"App Store"},{"id":"205","title":"Enhance your presence on the App Store","gloss":"強化你在 App Store 上的呈現","gloss_en":"Enhance your presence on the App Store","category":"appstore","categoryLabel":"App Store"},{"id":"261","title":"Build, deliver, and automate with Xcode Cloud","gloss":"用 Xcode Cloud 建置、交付與自動化","gloss_en":"Build, deliver, and automate with Xcode Cloud","category":"appstore","categoryLabel":"App Store"}]}</script>
