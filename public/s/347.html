<script id="d" type="application/json">{"s":{"id":"347","title":"Secure your app: mitigate risks to agentic features","gloss":"保護你的 App：降低 agentic 功能的風險","category":"ai","categoryLabel":"AI 與機器學習","duration":1512,"url":"https://developer.apple.com/videos/play/wwdc2026/347/","takeaway":"針對間接提示注入進行威脅建模，並用工具確認、spotlighting、redaction 與 App Intents 驗證政策來保護 agentic 功能。","chapters":[[0,"Introduction"],[126,"Risks"],[392,"Threat modeling"],[716,"Implementing mitigations"],[723,"Foundation Models"],[770,"Tools"],[793,"Profile"],[808,"Session"],[873,"Confirmation via onToolCall"],[956,"Spotlighting via historyTransform"],[1008,"Redaction via historyTransform"],[1075,"App Intents"],[1388,"Intent authentication policy"],[1407,"Schema authentication policy"]],"points":[{"text":"解析 **間接提示注入（indirect prompt injection）** 帶來的資料外洩與非預期行為風險。","hot":true},{"text":"以 **威脅建模** 區分高風險工具（如有財務影響的下單）與會回傳不可信資料的工具。","hot":false},{"text":"用 **onToolCall** 在執行高風險工具前要求使用者確認，避免未授權動作。","hot":false},{"text":"透過 **historyTransform** 對不可信工具輸出做 spotlighting 標記與 PII redaction。","hot":false},{"text":"為 App Intents 設定 **authenticationPolicy（.requiresAuthentication）**，保護刪除等敏感操作。","hot":false}],"apis":["FoundationModels","LanguageModelSession","DynamicProfile","Tool","onToolCall","historyTransform","AppIntents","IntentAuthenticationPolicy"],"audience":"正在 App 中加入 **LLM 工具呼叫或 agentic 功能**、需要把關安全性的開發者。","gloss_en":"Secure your app: mitigate risks to agentic features","takeaway_en":"Threat-model indirect prompt injection and protect agentic features with tool confirmation, spotlighting, redaction, and App Intents authentication policies.","points_en":[{"text":"Breaks down the data-exfiltration and unintended-action risks posed by **indirect prompt injection**.","hot":true},{"text":"Use **threat modeling** to distinguish high-risk tools (such as placing an order with financial impact) from tools that return untrusted data.","hot":false},{"text":"Use **onToolCall** to require user confirmation before running high-risk tools, preventing unauthorized actions.","hot":false},{"text":"Use **historyTransform** to apply spotlighting tags and PII redaction to untrusted tool output.","hot":false},{"text":"Set an **authenticationPolicy (.requiresAuthentication)** for App Intents to protect sensitive operations like deletion.","hot":false}],"audience_en":"Developers adding **LLM tool calls or agentic features** to their app who need to enforce security.","code":["// Tools\n\nstruct OrderTeaTool: Tool {\n  let name = \"orderTeaTool\"\n  let description: String = \"Orders a particular quantity of a tea from the store.\"\n  // Arguments\n  // Implementation\n}\n\nstruct PostAndFetchPublicFeedTool: Tool {\n  let name = \"postAndFetchPublicFeedTool\"\n  let description: String = \"Posts a message to the public feed.”\n  // Arguments\n  // Implementation\n}","// Profile\n\nclass LooseLeafAgent {\n  struct DefaultProfile: LanguageModelSession.DynamicProfile {\n    var body: some DynamicProfile {\n      Profile {\n        Instructions(\"You are a helpful, tea-loving assistant ... \")\n\n        OrderTeaTool()\n        PostAndFetchPublicFeedTool()\n      }\n      .model(SystemLanguageModel())\n    }\n  }\n}","// Session \n\nclass LooseLeafAgent {\n  struct DefaultProfile: LanguageModelSession.DynamicProfile {\n    var body: some DynamicProfile {\n      Profile {\n        Instructions(\"You are a helpful, tea-loving assistant ... \")\n\n        OrderTeaTool()\n        PostAndFetchPublicFeedTool()\n      }\n      .model(SystemLanguageModel())\n    }\n  }\n\n  let session: LanguageModelSession\n\n  public init() {\n    self.session = LanguageModelSession(profile: DefaultProfile())\n  }\n}","// Confirmation via onToolCall\n\nvar body: some DynamicProfile {\n  Profile {\n    Instructions(\"You are a helpful, tea-loving assistant ... \")\n\n    OrderTeaTool() // Financial impact; risky tool.\n    // Other Tools\n  }\n  \n  .onToolCall { call in\n    guard call.toolName == \"orderTeaTool\" else {\n      return\n    }\n    guard ConfirmationAction.confirmWithUser() else {\n      throw LooseLeafError.userConfirmationDenied\n    }\n  }\n}","// Spotlighting via historyTransform\n\nvar body: some DynamicProfile {\n  Profile {\n    Instructions(\"You are a helpful, tea-loving assistant ... \")\n\n    PostAndFetchPublicFeedTool() // Returns untrusted data; requires spotlighting\n    // Other Tools\n  }\n\n  .historyTransform {γentries in\n    entries.map { entry in\n      guard case .toolOutput(var toolOutput) = entry,\n        toolOutput.toolName == \"postAndFetchPublicFeedTool\"\n      else {\n        return entry\n      }\n    }\n    toolOutput.segments = toolOutput.segments.map { segment in\n      delimit(segment: segment,\n              startDelimiter: \"\u003c\u003cUNTRUSTED>>\",\n              endDelimiter: \"\u003c\u003c/UNTRUSTED>>\")\n    }\n    return .toolOutput(toolOutput)\n  }\n}\n\nfunc delimit(segment: Transcript.Segment,\n             startDelimiter: String,\n             endDelimiter: String) -> Transcript.Segment","// Redaction via historyTransform\n\nvar body: some DynamicProfile {\n  Profile {\n    Instructions(\"You are a helpful, tea-loving assistant ... \")\n\n    PostAndFetchPublicFeedTool() // Returns untrusted data; requires spotlighting\n    // Other Tools\n  }\n\n  .historyTransform {γentries in\n    entries.map { entry in\n      guard case .toolOutput(var toolOutput) = entry,\n        toolOutput.toolName == \"postAndFetchPublicFeedTool\"\n      else {\n        return entry\n      }\n    }\n    toolOutput.segments = toolOutput.segments.map { segment in\n      redactPII(segment: segment,\n                placeHolder: \"[REDACTED]\")\n    }\n    return .toolOutput(toolOutput)\n  }\n}\n\nfunc redactPII(segment: Transcript.Segment,\n               placeHolder: String) -> Transcript.Segment","// Intent authentication policy\n\nstruct DeletePhotoIntent: DeleteIntent {\n    var entities: [LooseLeafPhoto]\n\n    static var authenticationPolicy: Int
